<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cat Catch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 50%, #B2EBF2 100%);
            font-family: 'Comic Sans MS', 'Chalkboard', cursive;
        }
        #gameContainer {
            width: 100%;
            height: 100%;
            position: relative;
        }
        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(135, 206, 235, 0.9);
            z-index: 10;
        }
        #gameOverScreen {
            display: none;
        }
        .title {
            font-size: 3rem;
            color: #FF6B6B;
            text-shadow: 3px 3px 0 #FFE66D, 5px 5px 0 #4ECDC4;
            margin-bottom: 20px;
            text-align: center;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #2C3E50;
            margin-bottom: 30px;
            text-align: center;
            padding: 0 20px;
        }
        .btn {
            padding: 15px 50px;
            font-size: 1.5rem;
            background: #FF6B6B;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 0 #C0392B;
            transition: all 0.1s;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #C0392B;
        }
        .score-display {
            font-size: 2rem;
            color: #2C3E50;
            margin: 10px 0;
        }
        .high-score {
            font-size: 1.2rem;
            color: #E74C3C;
            margin-top: 10px;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 5;
            pointer-events: none;
        }
        .hud-item {
            background: rgba(255, 255, 255, 0.8);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 1.1rem;
            color: #2C3E50;
            font-weight: bold;
        }
        .fish-icon {
            display: inline-block;
            width: 20px;
            height: 12px;
            background: #3498DB;
            border-radius: 50% 0 50% 0;
            position: relative;
            margin-right: 5px;
        }
        .fish-icon::after {
            content: '';
            position: absolute;
            right: -8px;
            top: 2px;
            border-left: 8px solid #3498DB;
            border-top: 4px solid transparent;
            border-bottom: 4px solid transparent;
        }
        .lives-container {
            display: flex;
            align-items: center;
        }
        .life {
            width: 25px;
            height: 20px;
            background: #E74C3C;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            margin-left: 5px;
            position: relative;
        }
        .life::before, .life::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: #E74C3C;
            border-radius: 50%;
            top: -4px;
        }
        .life::before {
            left: 3px;
        }
        .life::after {
            right: 3px;
        }
        .life.lost {
            opacity: 0.3;
        }
        .instructions {
            font-size: 0.9rem;
            color: #7F8C8D;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="hud" style="display: none;">
            <div class="hud-item"><span class="fish-icon"></span><span id="scoreText">0</span></div>
            <div class="hud-item lives-container" id="livesContainer"></div>
        </div>
        <div id="startScreen">
            <div class="title">Cat Catch</div>
            <div class="subtitle">Help the hungry cat catch falling fish!
<br>Move left and right to catch them!</div>
            <button class="btn" id="startBtn">PLAY</button>
            <div class="high-score">High Score: <span id="highScoreStart">0</span></div>
            <div class="instructions">Tap or click to move the cat</div>
        </div>
        <div id="gameOverScreen">
            <div class="title">Game Over!</div>
            <div class="score-display">Score: <span id="finalScore">0</span></div>
            <div class="high-score">High Score: <span id="highScoreEnd">0</span></div>
            <button class="btn" id="restartBtn" style="margin-top: 20px;">PLAY AGAIN</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const hud = document.getElementById('hud');
        const scoreText = document.getElementById('scoreText');
        const finalScore = document.getElementById('finalScore');
        const livesContainer = document.getElementById('livesContainer');
        const highScoreStart = document.getElementById('highScoreStart');
        const highScoreEnd = document.getElementById('highScoreEnd');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        let width, height;
        let gameState = 'start';
        let score = 0;
        let lives = 3;
        let highScore = localStorage.getItem('catCatchHighScore') || 0;
        let fish = [];
        let cat = { x: 0, y: 0, width: 80, height: 60, targetX: 0 };
        let lastTime = 0;
        let spawnTimer = 0;
        let spawnInterval = 1500;
        let difficulty = 1;
        let particles = [];

        highScoreStart.textContent = highScore;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            cat.y = height - 100;
            if (gameState === 'start') {
                cat.x = width / 2;
                cat.targetX = width / 2;
            }
        }

        window.addEventListener('resize', resize);
        resize();

        function drawCat(x, y) {
            const w = cat.width;
            const h = cat.height;
            ctx.save();
            ctx.translate(x, y);
            // body
            ctx.fillStyle = '#FF8C00';
            ctx.beginPath();
            ctx.ellipse(w/2, h/2 + 5, w/2 - 5, h/2 - 10, 0, 0, Math.PI * 2);
            ctx.fill();
            // head
            ctx.fillStyle = '#FFA500';
            ctx.beginPath();
            ctx.arc(w/2, 15, 22, 0, Math.PI * 2);
            ctx.fill();
            // ears
            ctx.fillStyle = '#FF8C00';
            ctx.beginPath();
            ctx.moveTo(w/2 - 18, 10);
            ctx.lineTo(w/2 - 12, -8);
            ctx.lineTo(w/2 - 5, 8);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(w/2 + 18, 10);
            ctx.lineTo(w/2 + 12, -8);
            ctx.lineTo(w/2 + 5, 8);
            ctx.closePath();
            ctx.fill();
            // inner ears
            ctx.fillStyle = '#FFB6C1';
            ctx.beginPath();
            ctx.moveTo(w/2 - 15, 8);
            ctx.lineTo(w/2 - 12, -2);
            ctx.lineTo(w/2 - 8, 7);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(w/2 + 15, 8);
            ctx.lineTo(w/2 + 12, -2);
            ctx.lineTo(w/2 + 8, 7);
            ctx.closePath();
            ctx.fill();
            // eyes
            ctx.fillStyle = '#2C3E50';
            ctx.beginPath();
            ctx.ellipse(w/2 - 8, 12, 4, 5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(w/2 + 8, 12, 4, 5, 0, 0, Math.PI * 2);
            ctx.fill();
            // eye shine
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(w/2 - 7, 10, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(w/2 + 9, 10, 2, 0, Math.PI * 2);
            ctx.fill();
            // nose
            ctx.fillStyle = '#FF69B4';
            ctx.beginPath();
            ctx.moveTo(w/2, 18);
            ctx.lineTo(w/2 - 4, 23);
            ctx.lineTo(w/2 + 4, 23);
            ctx.closePath();
            ctx.fill();
            // whiskers
            ctx.strokeStyle = '#2C3E50';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(w/2 - 8, 20);
            ctx.lineTo(w/2 - 25, 17);
            ctx.moveTo(w/2 - 8, 22);
            ctx.lineTo(w/2 - 25, 24);
            ctx.moveTo(w/2 + 8, 20);
            ctx.lineTo(w/2 + 25, 17);
            ctx.moveTo(w/2 + 8, 22);
            ctx.lineTo(w/2 + 25, 24);
            ctx.stroke();
            // tail
            ctx.strokeStyle = '#FF8C00';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(w - 10, h/2 + 10);
            ctx.quadraticCurveTo(w + 15, h/2, w + 5, h/2 - 20);
            ctx.stroke();
            // stripes
            ctx.strokeStyle = '#FF6600';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(w/2 - 5, 5);
            ctx.lineTo(w/2 - 5, 15);
            ctx.moveTo(w/2, 3);
            ctx.lineTo(w/2, 13);
            ctx.moveTo(w/2 + 5, 5);
            ctx.lineTo(w/2 + 5, 15);
            ctx.stroke();
            ctx.restore();
        }

        function drawFish(f) {
            ctx.save();
            ctx.translate(f.x, f.y);
            ctx.rotate(f.rotation);
            const size = f.size;
            // body
            ctx.fillStyle = f.color;
            ctx.beginPath();
            ctx.ellipse(0, 0, size, size * 0.5, 0, 0, Math.PI * 2);
            ctx.fill();
            // tail
            ctx.beginPath();
            ctx.moveTo(-size + 5, 0);
            ctx.lineTo(-size - 10, -12);
            ctx.lineTo(-size - 10, 12);
            ctx.closePath();
            ctx.fill();
            // fin
            ctx.fillStyle = f.color;
            ctx.globalAlpha = 0.7;
            ctx.beginPath();
            ctx.moveTo(0, -size * 0.3);
            ctx.lineTo(-5, -size * 0.8);
            ctx.lineTo(8, -size * 0.3);
            ctx.closePath();
            ctx.fill();
            ctx.globalAlpha = 1;
            // eye
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(size * 0.5, -size * 0.1, size * 0.25, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#2C3E50';
            ctx.beginPath();
            ctx.arc(size * 0.55, -size * 0.1, size * 0.12, 0, Math.PI * 2);
            ctx.fill();
            // scales pattern
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(-size * 0.3, 0, size * 0.25, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(0, 0, size * 0.3, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }

        function drawWater() {
            ctx.fillStyle = 'rgba(52, 152, 219, 0.1)';
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.moveTo(0, height - 30 + Math.sin(Date.now() / 500 + i) * 5);
                for (let x = 0; x <= width; x += 50) {
                    ctx.lineTo(x, height - 30 + Math.sin(Date.now() / 500 + i + x / 50) * 5);
                }
                ctx.lineTo(width, height);
                ctx.lineTo(0, height);
                ctx.closePath();
                ctx.fill();
            }
        }

        function drawClouds() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            const time = Date.now() / 10000;
            for (let i = 0; i < 4; i++) {
                const x = ((i * 300 + time * 100) % (width + 200)) - 100;
                const y = 50 + i * 40;
                ctx.beginPath();
                ctx.arc(x, y, 30, 0, Math.PI * 2);
                ctx.arc(x + 30, y - 10, 25, 0, Math.PI * 2);
                ctx.arc(x + 60, y, 30, 0, Math.PI * 2);
                ctx.arc(x + 30, y + 10, 20, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawParticles() {
            particles.forEach((p, i) => {
                p.life -= 0.02;
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    return;
                }
                ctx.fillStyle = `rgba(${p.color}, ${p.life})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function spawnParticle(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8 - 3,
                    size: Math.random() * 8 + 4,
                    life: 1,
                    color: color
                });
            }
        }

        function spawnFish() {
            const colors = ['#3498DB', '#1ABC9C', '#E74C3C', '#F39C12', '#9B59B6', '#FF69B4'];
            const fish = {
                x: Math.random() * (width - 60) + 30,
                y: -30,
                size: 15 + Math.random() * 10,
                speed: 2 + Math.random() * 2 * difficulty,
                color: colors[Math.floor(Math.random() * colors.length)],
                rotation: Math.PI / 2 + (Math.random() - 0.5) * 0.3,
                wobble: Math.random() * Math.PI * 2,
                wobbleSpeed: 0.05 + Math.random() * 0.05
            };
            this.fish.push(fish);
        }

        function updateLives() {
            livesContainer.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const life = document.createElement('div');
                life.className = 'life' + (i >= lives ? ' lost' : '');
                livesContainer.appendChild(life);
            }
        }

        function startGame() {
            gameState = 'playing';
            score = 0;
            lives = 3;
            difficulty = 1;
            spawnInterval = 1500;
            fish = [];
            particles = [];
            cat.x = width / 2;
            cat.targetX = width / 2;
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            hud.style.display = 'flex';
            scoreText.textContent = '0';
            updateLives();
            lastTime = Date.now();
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameState = 'gameover';
            hud.style.display = 'none';
            gameOverScreen.style.display = 'flex';
            finalScore.textContent = score;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('catCatchHighScore', highScore);
            }
            highScoreEnd.textContent = highScore;
            highScoreStart.textContent = highScore;
        }

        function update(deltaTime) {
            // Spawn fish
            spawnTimer += deltaTime;
            if (spawnTimer >= spawnInterval) {
                spawnFish();
                spawnTimer = 0;
                // Increase difficulty
                difficulty += 0.05;
                spawnInterval = Math.max(600, spawnInterval - 20);
            }
            // Move cat
            const catSpeed = 0.15;
            cat.x += (cat.targetX - cat.x) * catSpeed;
            cat.x = Math.max(cat.width / 2, Math.min(width - cat.width / 2, cat.x));
            // Update fish
            for (let i = fish.length - 1; i >= 0; i--) {
                const f = fish[i];
                f.y += f.speed;
                f.wobble += f.wobbleSpeed;
                f.x += Math.sin(f.wobble) * 0.5;
                f.rotation = Math.PI / 2 + Math.sin(f.wobble) * 0.2;
                // Check collision with cat
                const dx = f.x - cat.x;
                const dy = f.y - (cat.y + 10);
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < cat.width / 2 + f.size) {
                    score += 10;
                    scoreText.textContent = score;
                    spawnParticle(f.x, f.y, f.color);
                    fish.splice(i, 1);
                    continue;
                }
                // Check if fish fell off screen
                if (f.y > height + 30) {
                    fish.splice(i, 1);
                    lives--;
                    updateLives();
                    if (lives <= 0) {
                        endGame();
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            drawClouds();
            drawWater();
            fish.forEach(f => drawFish(f));
            drawCat(cat.x, cat.y);
            drawParticles();
        }

        function gameLoop() {
            if (gameState !== 'playing') return;
            const currentTime = Date.now();
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;
            update(deltaTime);
            draw();
            requestAnimationFrame(gameLoop);
        }

        function handleInput(clientX) {
            if (gameState === 'playing') {
                cat.targetX = clientX;
            }
        }

        // Event listeners
        canvas.addEventListener('mousemove', e => handleInput(e.clientX));
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            handleInput(e.touches[0].clientX);
        }, { passive: false });
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            handleInput(e.touches[0].clientX);
        }, { passive: false });
        canvas.addEventListener('mousedown', e => handleInput(e.clientX));

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // Initial draw
        drawClouds();
        drawWater();
        drawCat(width / 2, height - 100);
    </script>
</body>
</html>
