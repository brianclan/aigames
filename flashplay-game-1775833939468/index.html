<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>猫咪Catch鱼</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:linear-gradient(180deg,#8fe3ff 0%,#b9f4ff 35%,#e9fbff 100%);font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;touch-action:none;}body{display:flex;align-items:stretch;justify-content:center;}#game{position:fixed;inset:0;width:100vw;height:100vh;display:block;}#ui{position:fixed;inset:0;pointer-events:none;}#topBar{position:absolute;left:0;right:0;top:0;display:flex;justify-content:space-between;gap:12px;padding:calc(env(safe-area-inset-top) + 12px) 14px 10px;} .pill{background:rgba(255,255,255,0.84);border:2px solid rgba(20,80,120,0.16);border-radius:16px;padding:8px 12px;color:#21455e;font-weight:700;font-size:16px;box-shadow:0 6px 16px rgba(0,0,0,0.08);}#hint{position:absolute;left:50%;bottom:calc(env(safe-area-inset-bottom) + 18px);transform:translateX(-50%);background:rgba(33,69,94,0.82);color:#fff;padding:10px 14px;border-radius:999px;font-size:14px;font-weight:700;letter-spacing:0.5px;box-shadow:0 8px 20px rgba(0,0,0,0.18);opacity:0.95;}#overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(10,20,40,0.16),rgba(10,20,40,0.28));pointer-events:auto;}#panel{width:min(88vw,420px);background:rgba(255,255,255,0.93);border-radius:24px;padding:24px 20px 20px;text-align:center;box-shadow:0 18px 50px rgba(0,0,0,0.18);border:2px solid rgba(255,255,255,0.6);}#panel h1{margin:0 0 8px;font-size:30px;line-height:1.1;color:#ff7b54;}#panel p{margin:8px 0;color:#31536a;font-size:15px;line-height:1.6;}#startBtn{margin-top:14px;border:none;background:linear-gradient(180deg,#ffb347,#ff8d4d);color:#fff;font-size:20px;font-weight:800;padding:14px 28px;border-radius:999px;box-shadow:0 10px 18px rgba(255,141,77,0.35);pointer-events:auto;}#startBtn:active{transform:scale(0.98);}#result{font-size:22px;color:#21455e;font-weight:800;margin-top:10px;}canvas{image-rendering:auto;}</style></head><body><canvas id="game"></canvas><div id="ui"><div id="topBar"><div class="pill" id="scoreLabel">得分 0</div><div class="pill" id="timeLabel">时间 45</div></div><div id="hint">按住屏幕拖动小猫接鱼</div><div id="overlay"><div id="panel"><h1>猫咪Catch鱼</h1><p>小鱼会从天而降，拖动猫咪左右移动来接住它们。</p><p>接到小鱼加分，碰到臭靴子会扣时间，45 秒后结算。</p><div id="result"></div><button id="startBtn">开始抓鱼</button></div></div></div><script>(()=>{const canvas=document.getElementById('game');const ctx=canvas.getContext('2d');const scoreLabel=document.getElementById('scoreLabel');const timeLabel=document.getElementById('timeLabel');const overlay=document.getElementById('overlay');const startBtn=document.getElementById('startBtn');const result=document.getElementById('result');const hint=document.getElementById('hint');let w=0,h=0,dpr=1;let last=0;let running=false;let score=0;let timeLeft=45;let spawnTimer=0;let effects=[];let items=[];let clouds=[];let bubbles=[];let shake=0;const cat={x:0,y:0,w:88,h:74,targetX:0};function resize(){dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1));w=window.innerWidth;h=window.innerHeight;canvas.width=Math.floor(w*dpr);canvas.height=Math.floor(h*dpr);canvas.style.width=w+'px';canvas.style.height=h+'px';ctx.setTransform(dpr,0,0,dpr,0,0);cat.w=Math.max(82,Math.min(108,w*0.23));cat.h=cat.w*0.84;cat.y=h-cat.h-28-Math.max(6,(window.visualViewport?Math.max(0,h-window.visualViewport.height):0));cat.x=Math.min(Math.max(cat.x||w*0.5,cat.w*0.5+8),w-cat.w*0.5-8);cat.targetX=cat.x;initBg();}function initBg(){clouds=[];for(let i=0;i<5;i++){clouds.push({x:Math.random()*w,y:40+Math.random()*h*0.22,s:0.7+Math.random()*1.1,v:8+Math.random()*10});}bubbles=[];for(let i=0;i<16;i++){bubbles.push({x:Math.random()*w,y:Math.random()*h,r:3+Math.random()*9,v:14+Math.random()*24,a:0.18+Math.random()*0.28});}}window.addEventListener('resize',resize);function resetGame(){score=0;timeLeft=45;spawnTimer=0;items=[];effects=[];shake=0;scoreLabel.textContent='得分 '+score;timeLabel.textContent='时间 '+timeLeft;cat.x=w*0.5;cat.targetX=cat.x;hint.style.display='block';}function startGame(){resetGame();running=true;overlay.style.display='none';last=performance.now();requestAnimationFrame(loop);}function endGame(){running=false;overlay.style.display='flex';result.textContent='本次得分：'+score;startBtn.textContent='再玩一次';}function rand(a,b){return Math.random()*(b-a)+a;}function spawnItem(){const fish=Math.random()<0.82;const size=fish?rand(26,40):rand(24,34);items.push({type:fish?'fish':'boot',x:rand(size,w-size),y:-size-10,vx:rand(-18,18),vy:rand(240,420)+(45-timeLeft)*5,size,rot:rand(-0.4,0.4),spin:rand(-1.2,1.2)});}function addEffect(text,x,y,color){effects.push({text,x,y,vy:-28,life:0.9,max:0.9,color});}function inputX(clientX){const rect=canvas.getBoundingClientRect();const x=clientX-rect.left;cat.targetX=Math.min(Math.max(x,cat.w*0.5+8),w-cat.w*0.5-8);hint.style.display='none';}let dragging=false;canvas.addEventListener('pointerdown',e=>{dragging=true;inputX(e.clientX);});canvas.addEventListener('pointermove',e=>{if(dragging)inputX(e.clientX);});window.addEventListener('pointerup',()=>dragging=false);canvas.addEventListener('mousedown',e=>inputX(e.clientX));canvas.addEventListener('mousemove',e=>{if(e.buttons)inputX(e.clientX);});function update(dt){for(const c of clouds){c.x+=c.v*dt;if(c.x-c.s*60>w+20)c.x=-120*c.s;}for(const b of bubbles){b.y-=b.v*dt;b.x+=Math.sin((performance.now()*0.001+b.y)*0.8)*8*dt;if(b.y<-20){b.y=h+Math.random()*120;b.x=Math.random()*w;}}cat.x+=((cat.targetX-cat.x)*Math.min(1,dt*10));spawnTimer-=dt;const difficulty=1+(45-timeLeft)/30;const interval=Math.max(0.22,0.58/difficulty);if(spawnTimer<=0){spawnItem();spawnTimer=interval*(0.7+Math.random()*0.7);}for(let i=items.length-1;i>=0;i--){const it=items[i];it.x+=it.vx*dt;it.y+=it.vy*dt;it.rot+=it.spin*dt;if(it.x<it.size*0.7&&it.vx<0)it.vx*=-1;if(it.x>w-it.size*0.7&&it.vx>0)it.vx*=-1;const catchW=cat.w*0.7;const catchH=cat.h*0.35;const cx=cat.x;const cy=cat.y+cat.h*0.12;if(Math.abs(it.x-cx)<(catchW*0.5+it.size*0.42)&&Math.abs(it.y-cy)<(catchH*0.5+it.size*0.3)){if(it.type==='fish'){score+=10;addEffect('+10',it.x,it.y,'#ff8a3d');}else{timeLeft=Math.max(0,Math.ceil((timeLeft*10-25))/10);addEffect('-2.5秒',it.x,it.y,'#c94a4a');shake=0.22;}items.splice(i,1);scoreLabel.textContent='得分 '+score;continue;}if(it.y>h+60){items.splice(i,1);}}for(let i=effects.length-1;i>=0;i--){const e=effects[i];e.y+=e.vy*dt;e.life-=dt;if(e.life<=0)effects.splice(i,1);}if(shake>0)shake-=dt;timeLeft-=dt;timeLabel.textContent='时间 '+Math.max(0,Math.ceil(timeLeft));if(timeLeft<=0)endGame();}function drawSky(){const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'#85ddff');g.addColorStop(0.42,'#c2f3ff');g.addColorStop(1,'#f6feff');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);ctx.fillStyle='rgba(255,255,255,0.85)';for(const c of clouds){drawCloud(c.x,c.y,c.s);}ctx.fillStyle='#7dd3fc';ctx.fillRect(0,h*0.82,w,h*0.18);ctx.fillStyle='#56b6e9';ctx.beginPath();ctx.moveTo(0,h*0.84);for(let x=0;x<=w+20;x+=20){ctx.lineTo(x,h*0.84+Math.sin(x*0.025+performance.now()*0.002)*5);}ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();ctx.fill();for(const b of bubbles){ctx.globalAlpha=b.a;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();ctx.globalAlpha=1;}}function drawCloud(x,y,s){ctx.beginPath();ctx.arc(x,y,22*s,0,Math.PI*2);ctx.arc(x+20*s,y-10*s,28*s,0,Math.PI*2);ctx.arc(x+48*s,y,24*s,0,Math.PI*2);ctx.arc(x+26*s,y+10*s,24*s,0,Math.PI*2);ctx.fill();}function drawFish(x,y,size,rot){ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.fillStyle='#ffb347';ctx.beginPath();ctx.ellipse(0,0,size*0.52,size*0.32,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff8d4d';ctx.beginPath();ctx.moveTo(-size*0.45,0);ctx.lineTo(-size*0.82,-size*0.24);ctx.lineTo(-size*0.82,size*0.24);ctx.closePath();ctx.fill();ctx.fillStyle='#fff4dc';ctx.beginPath();ctx.arc(size*0.18,-size*0.04,size*0.08,0,Math.PI*2);ctx.fill();ctx.fillStyle='#222';ctx.beginPath();ctx.arc(size*0.2,-size*0.04,size*0.04,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-size*0.1,-size*0.16);ctx.lineTo(size*0.16,0);ctx.lineTo(-size*0.1,size*0.16);ctx.stroke();ctx.restore();}function drawBoot(x,y,size,rot){ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.fillStyle='#704f3a';ctx.beginPath();ctx.roundRect(-size*0.32,-size*0.24,size*0.42,size*0.56,8);ctx.fill();ctx.fillStyle='#533828';ctx.beginPath();ctx.roundRect(-size*0.12,size*0.1,size*0.56,size*0.22,10);ctx.fill();ctx.fillStyle='#8d6a52';ctx.fillRect(-size*0.26,-size*0.16,size*0.28,size*0.08);ctx.restore();}function drawCat(){const x=cat.x,y=cat.y,wc=cat.w,hc=cat.h;ctx.save();ctx.translate(x,y);ctx.fillStyle='#ffb16b';ctx.beginPath();ctx.ellipse(0,0,wc*0.38,hc*0.38,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.moveTo(-wc*0.22,-hc*0.18);ctx.lineTo(-wc*0.36,-hc*0.52);ctx.lineTo(-wc*0.08,-hc*0.34);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(wc*0.22,-hc*0.18);ctx.lineTo(wc*0.36,-hc*0.52);ctx.lineTo(wc*0.08,-hc*0.34);ctx.closePath();ctx.fill();ctx.fillStyle='#ffd6b3';ctx.beginPath();ctx.ellipse(0,hc*0.05,wc*0.2,hc*0.16,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#222';ctx.beginPath();ctx.arc(-wc*0.12,-hc*0.02,wc*0.03,0,Math.PI*2);ctx.arc(wc*0.12,-hc*0.02,wc*0.03,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#222';ctx.lineWidth=2.3;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(0,hc*0.02);ctx.lineTo(0,hc*0.09);ctx.stroke();ctx.beginPath();ctx.arc(0,hc*0.1,wc*0.06,0.15*Math.PI,0.85*Math.PI);ctx.stroke();ctx.strokeStyle='#8f5f43';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-wc*0.2,hc*0.08);ctx.lineTo(-wc*0.42,hc*0.03);ctx.moveTo(-wc*0.2,hc*0.14);ctx.lineTo(-wc*0.42,hc*0.14);ctx.moveTo(wc*0.2,hc*0.08);ctx.lineTo(wc*0.42,hc*0.03);ctx.moveTo(wc*0.2,hc*0.14);ctx.lineTo(wc*0.42,hc*0.14);ctx.stroke();ctx.fillStyle='#ffcf85';ctx.beginPath();ctx.ellipse(0,hc*0.55,wc*0.52,hc*0.22,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#ffb16b';ctx.lineWidth=wc*0.08;ctx.beginPath();ctx.arc(wc*0.42,hc*0.38,wc*0.18,-0.2,1.25);ctx.stroke();ctx.restore();}function drawEffects(){for(const e of effects){ctx.globalAlpha=Math.max(0,e.life/e.max);ctx.fillStyle=e.color;ctx.font='bold 24px Arial';ctx.textAlign='center';ctx.fillText(e.text,e.x,e.y);ctx.globalAlpha=1;}}function draw(){const ox=shake>0?(Math.random()-0.5)*10*shake:0;const oy=shake>0?(Math.random()-0.5)*8*shake:0;ctx.save();ctx.translate(ox,oy);drawSky();for(const it of items){if(it.type==='fish')drawFish(it.x,it.y,it.size,it.rot);else drawBoot(it.x,it.y,it.size,it.rot);}drawCat();drawEffects();ctx.restore();}function loop(ts){if(!running)return;const dt=Math.min(0.033,(ts-last)/1000||0.016);last=ts;update(dt);draw();requestAnimationFrame(loop);}startBtn.addEventListener('click',startGame);resize();drawSky();drawCat();})();</script></body></html>
