<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Codex Check Fish</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            font-family: Arial, sans-serif;
        }
        #game-container {
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            position: relative;
        }
        #score-display {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            color: #333;
            text-shadow: 1px 1px 2px white;
            z-index: 10;
        }
        #cat {
            position: absolute;
            bottom: 20px;
            width: 60px;
            height: 60px;
            background: #FF9800;
            border-radius: 50% 50% 45% 45%;
            transition: left 0.1s ease-out;
        }
        #cat::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 5px;
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 20px solid #FF9800;
        }
        #cat::after {
            content: '';
            position: absolute;
            top: -15px;
            right: 5px;
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 20px solid #FF9800;
        }
        .cat-eyes {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 10px;
            display: flex;
            justify-content: space-between;
        }
        .cat-eye {
            width: 12px;
            height: 12px;
            background: #333;
            border-radius: 50%;
        }
        .cat-nose {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 8px solid #FF6B6B;
        }
        .fish {
            position: absolute;
            width: 30px;
            height: 20px;
            background: #4FC3F7;
            border-radius: 50% 20% 20% 50%;
        }
        .fish::after {
            content: '';
            position: absolute;
            right: -10px;
            top: 2px;
            width: 0;
            height: 0;
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            border-left: 12px solid #4FC3F7;
        }
        #start-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #game-over-screen {
            display: none;
        }
        h1 {
            color: white;
            font-size: 32px;
            margin-bottom: 20px;
            text-align: center;
        }
        p {
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
        }
        button {
            padding: 15px 40px;
            font-size: 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:active {
            background: #45a049;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="score-display">Score: 0</div>
        <div id="cat">
            <div class="cat-eyes">
                <div class="cat-eye"></div>
                <div class="cat-eye"></div>
            </div>
            <div class="cat-nose"></div>
        </div>
    </div>

    <div id="start-screen">
        <h1>Codex Check Fish</h1>
        <p>Move the cat to catch falling fish!</p>
        <p>Click or tap left/right to move</p>
        <button id="start-btn">Start Game</button>
    </div>

    <div id="game-over-screen">
        <h1>Game Over!</h1>
        <p id="final-score">Score: 0</p>
        <button id="restart-btn">Play Again</button>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const cat = document.getElementById('cat');
        const scoreDisplay = document.getElementById('score-display');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreDisplay = document.getElementById('final-score');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');

        let score = 0;
        let gameRunning = false;
        let catX = window.innerWidth / 2 - 30;
        let fishes = [];
        let missedFish = 0;
        const maxMissed = 5;

        function initGame() {
            score = 0;
            missedFish = 0;
            catX = window.innerWidth / 2 - 30;
            cat.style.left = catX + 'px';
            fishes.forEach(f => f.element.remove());
            fishes = [];
            scoreDisplay.textContent = 'Score: 0';
        }

        function startGame() {
            startScreen.classList.add('hidden');
            gameOverScreen.style.display = 'none';
            initGame();
            gameRunning = true;
            spawnFishLoop();
            gameLoop();
        }

        function gameOver() {
            gameRunning = false;
            finalScoreDisplay.textContent = 'Score: ' + score;
            gameOverScreen.style.display = 'flex';
        }

        function spawnFish() {
            const fish = document.createElement('div');
            fish.className = 'fish';
            const fishX = Math.random() * (window.innerWidth - 30);
            fish.style.left = fishX + 'px';
            fish.style.top = '-20px';
            container.appendChild(fish);
            fishes.push({
                element: fish,
                x: fishX,
                y: -20,
                speed: 2 + Math.random() * 2
            });
        }

        function spawnFishLoop() {
            if (gameRunning) {
                spawnFish();
                setTimeout(spawnFishLoop, 1000 + Math.random() * 1000);
            }
        }

        function checkCollision(fish) {
            const catRect = {
                left: catX,
                right: catX + 60,
                top: window.innerHeight - 80,
                bottom: window.innerHeight - 20
            };
            const fishRect = {
                left: fish.x,
                right: fish.x + 30,
                top: fish.y,
                bottom: fish.y + 20
            };
            return !(catRect.right < fishRect.left || 
                     catRect.left > fishRect.right ||
                     catRect.bottom < fishRect.top ||
                     catRect.top > fishRect.bottom);
        }

        function gameLoop() {
            if (!gameRunning) return;

            const catBottom = window.innerHeight - 20;

            for (let i = fishes.length - 1; i >= 0; i--) {
                const fish = fishes[i];
                fish.y += fish.speed;
                fish.element.style.top = fish.y + 'px';

                if (checkCollision(fish)) {
                    score += 10;
                    scoreDisplay.textContent = 'Score: ' + score;
                    fish.element.remove();
                    fishes.splice(i, 1);
                } else if (fish.y > catBottom) {
                    missedFish++;
                    fish.element.remove();
                    fishes.splice(i, 1);
                    if (missedFish >= maxMissed) {
                        gameOver();
                        return;
                    }
                }
            }

            requestAnimationFrame(gameLoop);
        }

        function moveCat(direction) {
            const speed = 20;
            if (direction === 'left') {
                catX = Math.max(0, catX - speed);
            } else {
                catX = Math.min(window.innerWidth - 60, catX + speed);
            }
            cat.style.left = catX + 'px';
        }

        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            if (e.key === 'ArrowLeft' || e.key === 'a') moveCat('left');
            if (e.key === 'ArrowRight' || e.key === 'd') moveCat('right');
        });

        document.addEventListener('touchstart', (e) => {
            if (!gameRunning) return;
            e.preventDefault();
            const touchX = e.touches[0].clientX;
            if (touchX < window.innerWidth / 2) {
                moveCat('left');
            } else {
                moveCat('right');
            }
        });

        document.addEventListener('click', (e) => {
            if (!gameRunning) return;
            if (e.target.tagName !== 'BUTTON') {
                if (e.clientX < window.innerWidth / 2) {
                    moveCat('left');
                } else {
                    moveCat('right');
                }
            }
        });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        cat.style.left = catX + 'px';
    </script>
</body>
</html>
