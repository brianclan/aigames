<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cat Catch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #87CEEB;
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let width, height;
let gameState = 'start';
let score = 0;
let highScore = 0;
let catX;
let fish = [];
let fishSpeed = 2;
let spawnTimer = 0;
let spawnInterval = 60;

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    catX = width / 2;
}

window.addEventListener('resize', resize);
resize();

function drawCat(x, y, size) {
    const s = size;
    ctx.fillStyle = '#FFA500';
    ctx.beginPath();
    ctx.ellipse(x, y, s * 0.5, s * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x, y - s * 0.2, s * 0.4, s * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x - s * 0.35, y - s * 0.4);
    ctx.lineTo(x - s * 0.5, y - s * 0.7);
    ctx.lineTo(x - s * 0.2, y - s * 0.35);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x + s * 0.35, y - s * 0.4);
    ctx.lineTo(x + s * 0.5, y - s * 0.7);
    ctx.lineTo(x + s * 0.2, y - s * 0.35);
    ctx.fill();
    ctx.fillStyle = '#FFE4B5';
    ctx.beginPath();
    ctx.ellipse(x, y + s * 0.1, s * 0.25, s * 0.2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(x - s * 0.15, y - s * 0.25, s * 0.05, 0, Math.PI * 2);
    ctx.arc(x + s * 0.15, y - s * 0.25, s * 0.05, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x - s * 0.05, y - s * 0.1, s * 0.03, 0, Math.PI * 2);
    ctx.arc(x + s * 0.05, y - s * 0.1, s * 0.03, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x - s * 0.05, y - s * 0.05);
    ctx.lineTo(x + s * 0.05, y - s * 0.05);
    ctx.stroke();
}

function drawFish(x, y, size, rotation) {
    const s = size;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation);
    ctx.fillStyle = '#4169E1';
    ctx.beginPath();
    ctx.ellipse(0, 0, s * 0.5, s * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(s * 0.4, 0);
    ctx.lineTo(s * 0.7, -s * 0.25);
    ctx.lineTo(s * 0.7, s * 0.25);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath();
    ctx.arc(-s * 0.2, -s * 0.05, s * 0.08, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(-s * 0.2, -s * 0.05, s * 0.04, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

function spawnFish() {
    const types = ['blue', 'gold', 'purple'];
    const type = types[Math.floor(Math.random() * types.length)];
    fish.push({
        x: Math.random() * (width - 60) + 30,
        y: -30,
        size: 25 + Math.random() * 15,
        speed: fishSpeed + Math.random() * 2,
        rotation: 0,
        type: type,
        wobble: Math.random() * Math.PI * 2
    });
}

function startGame() {
    gameState = 'play';
    score = 0;
    fish = [];
    fishSpeed = 2;
    spawnInterval = 60;
}

function handleInput(clientX) {
    if (gameState === 'start') {
        startGame();
    } else if (gameState === 'play') {
        catX = Math.max(40, Math.min(width - 40, clientX));
    } else if (gameState === 'gameover') {
        gameState = 'start';
    }
}

canvas.addEventListener('mousedown', (e) => {
    handleInput(e.clientX);
});

canvas.addEventListener('mousemove', (e) => {
    if (gameState === 'play') {
        catX = Math.max(40, Math.min(width - 40, e.clientX));
    }
});

canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (e.touches.length > 0) {
        handleInput(e.touches[0].clientX);
    }
});

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length > 0 && gameState === 'play') {
        catX = Math.max(40, Math.min(width - 40, e.touches[0].clientX));
    }
});

function update() {
    if (gameState !== 'play') return;
    
    spawnTimer++;
    if (spawnTimer >= spawnInterval) {
        spawnFish();
        spawnTimer = 0;
        if (spawnInterval > 30) {
            spawnInterval -= 0.5;
        }
        fishSpeed += 0.02;
    }
    
    for (let i = fish.length - 1; i >= 0; i--) {
        const f = fish[i];
        f.y += f.speed;
        f.wobble += 0.1;
        f.x += Math.sin(f.wobble) * 0.5;
        f.rotation = Math.sin(f.wobble) * 0.3;
        
        const catY = height - 80;
        const dx = f.x - catX;
        const dy = f.y - catY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist < f.size + 35) {
            fish.splice(i, 1);
            score += 10;
        } else if (f.y > height + 30) {
            fish.splice(i, 1);
            gameState = 'gameover';
            if (score > highScore) {
                highScore = score;
            }
        }
    }
}

function drawBackground() {
    const gradient = ctx.createLinearGradient(0, 0, 0, height);
    gradient.addColorStop(0, '#87CEEB');
    gradient.addColorStop(1, '#E0F6FF');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, width, height);
    
    ctx.fillStyle = '#90EE90';
    ctx.beginPath();
    ctx.moveTo(0, height - 50);
    for (let x = 0; x <= width; x += 50) {
        ctx.lineTo(x, height - 50 - Math.sin(x * 0.05) * 10);
    }
    ctx.lineTo(width, height);
    ctx.lineTo(0, height);
    ctx.closePath();
    ctx.fill();
}

function drawUI() {
    ctx.fillStyle = '#333';
    ctx.font = 'bold 24px Arial, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Score: ' + score, 20, 40);
    ctx.textAlign = 'right';
    ctx.fillText('Best: ' + highScore, width - 20, 40);
}

function drawStartScreen() {
    drawBackground();
    
    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
    ctx.fillRect(0, 0, width, height);
    
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 48px Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Cat Catch', width / 2, height / 3);
    
    ctx.font = '24px Arial, sans-serif';
    ctx.fillText('Catch the falling fish!', width / 2, height / 2);
    ctx.fillText('Move your finger or mouse', width / 2, height / 2 + 40);
    
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 28px Arial, sans-serif';
    ctx.fillText('Tap to Start', width / 2, height * 0.75);
    
    const catSize = 60;
    drawCat(width / 2, height * 0.85, catSize);
}

function drawGameOverScreen() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillRect(0, 0, width, height);
    
    ctx.fillStyle = '#FF6B6B';
    ctx.font = 'bold 48px Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Game Over', width / 2, height / 3);
    
    ctx.fillStyle = '#FFF';
    ctx.font = '32px Arial, sans-serif';
    ctx.fillText('Score: ' + score, width / 2, height / 2 - 20);
    ctx.fillText('Best: ' + highScore, width / 2, height / 2 + 30);
    
    ctx.fillStyle = '#4ECDC4';
    ctx.font = 'bold 28px Arial, sans-serif';
    ctx.fillText('Tap to Continue', width / 2, height * 0.75);
}

function draw() {
    if (gameState === 'start') {
        drawStartScreen();
    } else if (gameState === 'play') {
        drawBackground();
        
        for (const f of fish) {
            if (f.type === 'blue') {
                drawFish(f.x, f.y, f.size, f.rotation);
            } else if (f.type === 'gold') {
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.ellipse(f.x, f.y, f.size * 0.5, f.size * 0.3, f.rotation, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(f.x + f.size * 0.4, f.y);
                ctx.lineTo(f.x + f.size * 0.7, f.y - f.size * 0.25);
                ctx.lineTo(f.x + f.size * 0.7, f.y + f.size * 0.25);
                ctx.closePath();
                ctx.fill();
            } else {
                ctx.fillStyle = '#9370DB';
                ctx.beginPath();
                ctx.ellipse(f.x, f.y, f.size * 0.5, f.size * 0.3, f.rotation, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(f.x + f.size * 0.4, f.y);
                ctx.lineTo(f.x + f.size * 0.7, f.y - f.size * 0.25);
                ctx.lineTo(f.x + f.size * 0.7, f.y + f.size * 0.25);
                ctx.closePath();
                ctx.fill();
            }
        }
        
        drawCat(catX, height - 80, 70);
        drawUI();
    } else if (gameState === 'gameover') {
        drawBackground();
        for (const f of fish) {
            drawFish(f.x, f.y, f.size, f.rotation);
        }
        drawCat(catX, height - 80, 70);
        drawGameOverScreen();
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
