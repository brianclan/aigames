<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover" />
  <meta name="description" content="ファーム仕分けチャレンジ: タップで動物を正しい部屋へ戻す、短時間で遊べるモバイル向けミニゲーム。" />
  <meta name="theme-color" content="#95c97d" />
  <title>ファーム仕分けチャレンジ</title>
  <style>
    :root {
      --sky: #d8efff;
      --grass: #88c070;
      --soil: #b68d62;
      --wood: #7a5135;
      --ink: #2c2a27;
      --good: #1d9d53;
      --warn: #d96f2f;
      --bad: #c53a3a;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background: linear-gradient(180deg, var(--sky) 0%, #e9f8ff 36%, #b9dea7 36%, #95c97d 100%);
    }

    .wrap {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: calc(12px + env(safe-area-inset-top)) calc(12px + env(safe-area-inset-right)) calc(12px + env(safe-area-inset-bottom)) calc(12px + env(safe-area-inset-left));
    }

    .game {
      width: min(980px, 96vw);
      background: rgba(255,255,255,.75);
      border: 2px solid rgba(60,60,60,.15);
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 16px 35px rgba(35,60,31,.18);
    }

    .top {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .stat {
      background: #fff;
      border: 1px solid rgba(0,0,0,.1);
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 14px;
      text-align: center;
    }

    .stat b { font-size: 18px; }

    .yard {
      position: relative;
      width: 100%;
      height: min(58vh, 520px);
      border-radius: 16px;
      border: 2px solid rgba(79,101,63,.38);
      overflow: hidden;
      background:
        radial-gradient(620px 180px at 78% -8%, rgba(255,255,255,.45), transparent 60%),
        repeating-linear-gradient(0deg, rgba(255,255,255,.08), rgba(255,255,255,.08) 2px, transparent 2px, transparent 26px),
        linear-gradient(180deg, #bee7ff 0%, #c9f0ff 18%, #8dc875 18%, #7ab65e 100%);
    }

    .animal {
      position: absolute;
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,.12);
      background: rgba(255,255,255,.9);
      cursor: pointer;
      transition: transform .08s ease;
      user-select: none;
      touch-action: manipulation;
      font-size: 27px;
    }

    .animal:hover { transform: scale(1.06); }
    .animal.selected {
      outline: 3px solid #ffd44f;
      box-shadow: 0 0 0 4px rgba(255,212,79,.35);
      transform: scale(1.08);
    }

    .rooms {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .room {
      border: 2px solid rgba(0,0,0,.18);
      border-radius: 14px;
      padding: 10px 8px;
      text-align: center;
      background: linear-gradient(180deg, #fff8ef, #ead7c3);
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
    }

    .room b { display: block; font-size: 16px; }
    .room small { opacity: .75; }

    .room.good { border-color: rgba(29,157,83,.55); box-shadow: inset 0 0 0 2px rgba(29,157,83,.18); }
    .room.bad { border-color: rgba(197,58,58,.55); box-shadow: inset 0 0 0 2px rgba(197,58,58,.15); }

    .bottom {
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      font-size: 13px;
    }

    .btn {
      border: 1px solid rgba(0,0,0,.18);
      border-radius: 10px;
      background: #fff;
      padding: 8px 12px;
      cursor: pointer;
    }

    .actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .legal {
      width: 100%;
      font-size: 12px;
      opacity: .8;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      margin-top: 2px;
    }
    .legal a { color: #2b4e8a; text-decoration: none; }
    .legal a:hover { text-decoration: underline; }

    .message { min-height: 20px; font-weight: 600; }
    .message.good { color: var(--good); }
    .message.warn { color: var(--warn); }
    .message.bad { color: var(--bad); }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(31,34,26,.52);
      color: #fff;
      text-align: center;
      padding: 16px;
      z-index: 20;
    }

    .overlay.show { display: flex; }
    .card {
      width: min(420px, 92vw);
      border-radius: 14px;
      background: rgba(16,18,14,.9);
      border: 1px solid rgba(255,255,255,.2);
      padding: 16px;
    }

    .card h2 { margin: 0 0 10px; }
    .card p { margin: 6px 0; opacity: .92; }
    .card p.meta { opacity: .78; font-size: 13px; }

    @media (max-width: 740px) {
      .top { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .rooms { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .yard { height: min(54vh, 460px); }
      .btn { min-height: 42px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="game">
      <div class="top">
        <div class="stat">生存時間<br><b id="timer">0.0s</b></div>
        <div class="stat">救出数<br><b id="saved">0</b></div>
        <div class="stat">場内の動物<br><b id="alive">0</b></div>
        <div class="stat">ミス回数<br><b id="mistakes">0</b></div>
        <div class="stat">ベスト記録<br><b id="best">0.0s</b></div>
        <div class="stat">スコア<br><b id="score">0</b></div>
      </div>

      <div id="yard" class="yard" aria-label="farm yard">
        <div id="overlay" class="overlay show">
          <div class="card">
            <h2>ファーム仕分けチャレンジ</h2>
            <p>ルール: 動物をタップして、対応する部屋をタップ。</p>
            <p>時間が経つほど動物が増え、あふれると失敗です。</p>
            <p>短時間で遊べる1プレイ30-90秒設計。</p>
            <p class="meta">モバイル向け: タップだけで操作可能</p>
            <button id="startBtn" class="btn">ゲーム開始</button>
          </div>
        </div>
      </div>

      <div id="rooms" class="rooms"></div>

      <div class="bottom">
        <div id="msg" class="message">ヒント: 先に動物、その後に部屋をタップ。</div>
        <div class="actions">
          <button id="pauseBtn" class="btn" type="button">一時停止</button>
          <button id="shareBtn" class="btn" type="button">シェア</button>
          <button id="restartBtn" class="btn" type="button">リスタート</button>
        </div>
        <div class="legal">
          <a href="https://www.thenext.games/privacy" target="_blank" rel="noopener noreferrer">プライバシーポリシー</a>
          <a href="https://www.thenext.games/terms" target="_blank" rel="noopener noreferrer">利用規約</a>
        </div>
      </div>
    </section>
  </div>

  <script>
    const ttGame = window.tt || (window.TTMinis && window.TTMinis.game) || null;
    const REWARDED_AD_URL = '';

    const ANIMALS = [
      { type: 'cow', emoji: '🐮', room: 'barn', roomName: '牛舎' },
      { type: 'pig', emoji: '🐷', room: 'sty', roomName: '豚舎' },
      { type: 'chicken', emoji: '🐔', room: 'coop', roomName: '鶏小屋' },
      { type: 'sheep', emoji: '🐑', room: 'fold', roomName: '羊小屋' },
    ];

    const ROOMS = [
      { id: 'barn', title: '牛舎', icon: '🏠🐮' },
      { id: 'sty', title: '豚舎', icon: '🧱🐷' },
      { id: 'coop', title: '鶏小屋', icon: '🪺🐔' },
      { id: 'fold', title: '羊小屋', icon: '🌾🐑' },
    ];

    const LIMIT_ON_FIELD = 28;

    const yard = document.getElementById('yard');
    const roomsEl = document.getElementById('rooms');
    const msgEl = document.getElementById('msg');
    const overlay = document.getElementById('overlay');
    const timerEl = document.getElementById('timer');
    const savedEl = document.getElementById('saved');
    const aliveEl = document.getElementById('alive');
    const mistakesEl = document.getElementById('mistakes');
    const bestEl = document.getElementById('best');
    const scoreEl = document.getElementById('score');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const shareBtn = document.getElementById('shareBtn');
    const restartBtn = document.getElementById('restartBtn');

    const bestKey = 'farm_room_rush_best_seconds';
    const bestScoreKey = 'farm_room_rush_best_score';
    let best = Number(localStorage.getItem(bestKey) || 0);
    bestEl.textContent = best.toFixed(1) + 's';
    let bestScore = Number(localStorage.getItem(bestScoreKey) || 0);

    let animals = [];
    let selected = null;
    let playing = false;
    let paused = false;
    let startTs = 0;
    let pausedTotal = 0;
    let pauseStart = 0;
    let lastTick = 0;
    let spawnAcc = 0;
    let saved = 0;
    let mistakes = 0;
    let score = 0;
    let combo = 0;
    let maxCombo = 0;
    let pendingRevive = false;

    function track(event, payload = {}) {
      if (!ttGame || typeof ttGame.reportAnalytics !== 'function') return;
      try {
        ttGame.reportAnalytics(event, payload);
      } catch (_) {}
    }

    function setMessage(text, cls = '') {
      msgEl.className = 'message ' + cls;
      msgEl.textContent = text;
    }

    function makeRoomUI() {
      roomsEl.innerHTML = '';
      for (const room of ROOMS) {
        const el = document.createElement('button');
        el.className = 'room';
        el.type = 'button';
        el.dataset.room = room.id;
        el.innerHTML = `<b>${room.icon} ${room.title}</b><small>対応する動物を入れる</small>`;
        el.addEventListener('click', () => placeSelected(room.id, el));
        roomsEl.appendChild(el);
      }
    }

    function spawnAnimal() {
      const model = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
      const bounds = yard.getBoundingClientRect();
      const pad = 58;
      const x = Math.random() * (bounds.width - pad);
      const y = Math.random() * (bounds.height - 120) + 40;
      const vx = (Math.random() * 0.7 + 0.35) * (Math.random() < 0.5 ? -1 : 1);
      const vy = (Math.random() * 0.7 + 0.35) * (Math.random() < 0.5 ? -1 : 1);

      const el = document.createElement('button');
      el.className = 'animal';
      el.type = 'button';
      el.textContent = model.emoji;
      el.title = model.roomName;
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.addEventListener('click', () => selectAnimal(animal));

      const animal = {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
        type: model.type,
        room: model.room,
        emoji: model.emoji,
        x, y, vx, vy,
        el,
      };

      animals.push(animal);
      yard.appendChild(el);
      updateStats();
    }

    function selectAnimal(animal) {
      if (!playing || paused) return;
      if (selected && selected.el) selected.el.classList.remove('selected');
      selected = animal;
      animal.el.classList.add('selected');
      setMessage(`${animal.emoji} を選択中。対応する部屋をタップしてください。`, 'warn');
    }

    function pulseRoom(roomBtn, ok) {
      roomBtn.classList.remove('good', 'bad');
      roomBtn.classList.add(ok ? 'good' : 'bad');
      setTimeout(() => roomBtn.classList.remove('good', 'bad'), 260);
    }

    function removeAnimal(animal) {
      const idx = animals.findIndex(a => a.id === animal.id);
      if (idx !== -1) animals.splice(idx, 1);
      animal.el.remove();
      if (selected && selected.id === animal.id) selected = null;
    }

    function placeSelected(roomId, roomBtn) {
      if (!playing || paused) return;
      if (!selected) {
        setMessage('先に動物を1匹選んでください。', 'warn');
        return;
      }

      const ok = selected.room === roomId;
      pulseRoom(roomBtn, ok);

      if (ok) {
        combo += 1;
        maxCombo = Math.max(maxCombo, combo);
        score += 10 + Math.min(8, combo) * 2;
        setMessage(`正解! ${selected.emoji} は ${ROOMS.find(r => r.id === roomId).title} に戻りました。 x${combo}`, 'good');
        if (ttGame && typeof ttGame.vibrateShort === 'function') {
          try { ttGame.vibrateShort(); } catch (_) {}
        }
        track('place_correct', { combo: String(combo), score: String(score) });
        removeAnimal(selected);
        saved += 1;
      } else {
        mistakes += 1;
        combo = 0;
        score = Math.max(0, score - 6);
        setMessage('部屋が違います! もっと急いで!', 'bad');
        if (ttGame && typeof ttGame.vibrateLong === 'function') {
          try { ttGame.vibrateLong(); } catch (_) {}
        }
        track('place_wrong', { mistakes: String(mistakes), score: String(score) });
      }
      updateStats();
    }

    function updateStats() {
      aliveEl.textContent = String(animals.length);
      savedEl.textContent = String(saved);
      mistakesEl.textContent = String(mistakes);
      scoreEl.textContent = String(score);
    }

    function getSurvivedSeconds(now = performance.now()) {
      return Math.max(0, (now - startTs - pausedTotal) / 1000);
    }

    function pauseGame() {
      if (!playing || paused) return;
      paused = true;
      pauseStart = performance.now();
      pauseBtn.textContent = '再開';
      setMessage('一時停止中。再開をタップしてください。', 'warn');
      track('pause', { elapsed: String(getSurvivedSeconds().toFixed(1)) });
    }

    function resumeGame() {
      if (!playing || !paused) return;
      paused = false;
      pausedTotal += performance.now() - pauseStart;
      lastTick = performance.now();
      pauseBtn.textContent = '一時停止';
      setMessage('再開しました。', 'good');
      track('resume', { elapsed: String(getSurvivedSeconds().toFixed(1)) });
    }

    function gameOver() {
      playing = false;
      paused = false;
      pauseBtn.textContent = '一時停止';
      if (selected && selected.el) selected.el.classList.remove('selected');
      selected = null;

      const survived = getSurvivedSeconds();
      timerEl.textContent = survived.toFixed(1) + 's';

      if (survived > best) {
        best = survived;
        localStorage.setItem(bestKey, String(best));
        bestEl.textContent = best.toFixed(1) + 's';
      }
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem(bestScoreKey, String(bestScore));
      }

      overlay.classList.add('show');
      overlay.innerHTML = `
        <div class="card">
          <h2>農場が満員です!</h2>
          <p>生存時間: <b>${survived.toFixed(1)} 秒</b></p>
          <p>スコア: <b>${score}</b>（ベスト: ${bestScore}）</p>
          <p>救出: ${saved} ｜ ミス: ${mistakes} ｜ 最大コンボ: x${maxCombo}</p>
          <p>場内の動物が多すぎる（≥ ${LIMIT_ON_FIELD}）ためゲームオーバー。</p>
          <div class="actions" style="justify-content:center; margin-top: 12px;">
            <button id="quitBtn" class="btn" type="button">放棄する</button>
            <button id="watchAdBtn" class="btn" type="button">広告を見て続ける</button>
            <button id="againBtn" class="btn" type="button" hidden>もう一回</button>
          </div>
          <p id="adHint" class="meta">広告を見終わると「もう一回」が表示されます。</p>
        </div>`;
      pendingRevive = false;
      document.getElementById('quitBtn').addEventListener('click', () => {
        overlay.classList.remove('show');
        setMessage('ゲームを終了しました。', 'warn');
      });
      document.getElementById('watchAdBtn').addEventListener('click', openRewardedAd);
      document.getElementById('againBtn').addEventListener('click', startGame);
      track('game_over', {
        survived: String(survived.toFixed(1)),
        score: String(score),
        saved: String(saved),
        mistakes: String(mistakes),
        maxCombo: String(maxCombo)
      });
    }

    function clearAnimals() {
      for (const a of animals) a.el.remove();
      animals = [];
      selected = null;
    }

    function unlockRestartAfterAd() {
      if (!pendingRevive) return;
      pendingRevive = false;
      const againBtn = document.getElementById('againBtn');
      const watchAdBtn = document.getElementById('watchAdBtn');
      const adHint = document.getElementById('adHint');
      if (!againBtn || !watchAdBtn || !adHint) return;
      againBtn.hidden = false;
      watchAdBtn.hidden = true;
      adHint.textContent = '広告の視聴が完了しました。「もう一回」で再開できます。';
      setMessage('広告視聴が完了しました。', 'good');
      track('revive_unlocked', { source: 'rewarded_ad' });
    }

    function openRewardedAd() {
      if (!REWARDED_AD_URL) {
        setMessage('広告リンクがまだ設定されていません。', 'warn');
        return;
      }

      pendingRevive = true;
      setMessage('広告ページを開きました。視聴後にゲームへ戻ってください。', 'warn');
      track('rewarded_ad_open', { source: 'game_over' });

      const popup = window.open(REWARDED_AD_URL, '_blank', 'noopener,noreferrer');
      if (!popup) {
        pendingRevive = false;
        setMessage('広告を開けませんでした。ポップアップ設定をご確認ください。', 'bad');
      }
    }

    function startGame() {
      clearAnimals();
      playing = true;
      paused = false;
      pauseBtn.textContent = '一時停止';
      startTs = performance.now();
      pausedTotal = 0;
      pauseStart = 0;
      lastTick = startTs;
      spawnAcc = 0;
      saved = 0;
      mistakes = 0;
      score = 0;
      combo = 0;
      maxCombo = 0;
      timerEl.textContent = '0.0s';
      updateStats();
      overlay.classList.remove('show');
      setMessage('スタート! 動物をタップして、対応する部屋をタップ。', 'good');
      track('game_start', { from: (getEntryMeta().query.from || 'direct') });

      spawnAnimal();
      spawnAnimal();
    }

    function loop(ts) {
      const dt = Math.min(33, ts - lastTick || 16);
      lastTick = ts;

      if (playing && !paused) {
        const elapsed = getSurvivedSeconds(ts);
        timerEl.textContent = elapsed.toFixed(1) + 's';

        // 時間経過で出現間隔を徐々に短縮
        const spawnInterval = Math.max(220, 1250 - elapsed * 34);
        spawnAcc += dt;
        while (spawnAcc >= spawnInterval) {
          spawnAcc -= spawnInterval;
          spawnAnimal();
          // 終盤は低確率で連続出現して密度を上げる
          if (elapsed > 25 && Math.random() < 0.22) spawnAnimal();
        }

        const rect = yard.getBoundingClientRect();
        const maxX = rect.width - 56;
        const maxY = rect.height - 56;

        for (const a of animals) {
          a.x += a.vx * (dt / 16);
          a.y += a.vy * (dt / 16);

          if (a.x < 0) { a.x = 0; a.vx *= -1; }
          if (a.y < 0) { a.y = 0; a.vy *= -1; }
          if (a.x > maxX) { a.x = maxX; a.vx *= -1; }
          if (a.y > maxY) { a.y = maxY; a.vy *= -1; }

          a.el.style.left = a.x + 'px';
          a.el.style.top = a.y + 'px';
        }

        if (animals.length >= LIMIT_ON_FIELD) gameOver();
      }

      requestAnimationFrame(loop);
    }

    function shareGame() {
      const shareText = `ファーム仕分けチャレンジで ${best.toFixed(1)} 秒生存! あなたも挑戦してみよう。`;
      const shareUrl = location.origin + location.pathname + '?from=share_dm';

      if (ttGame && typeof ttGame.shareAppMessage === 'function') {
        try {
          ttGame.shareAppMessage({
            title: 'ファーム仕分けチャレンジ',
            desc: shareText,
            query: 'from=share_dm'
          });
          setMessage('シェアパネルを開きました。', 'good');
          track('share_click', { channel: 'dm' });
          return;
        } catch (_) {}
      }

      if (navigator.share) {
        navigator.share({ title: 'ファーム仕分けチャレンジ', text: shareText, url: shareUrl }).catch(() => {});
        setMessage('シェアメニューを開きました。', 'good');
        track('share_click', { channel: 'web-share' });
        return;
      }

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(shareUrl).then(() => {
          setMessage('URLをコピーしました。', 'good');
          track('share_click', { channel: 'clipboard' });
        }).catch(() => setMessage('コピーに失敗しました。', 'warn'));
        return;
      }

      setMessage('この端末ではシェア機能が利用できません。', 'warn');
    }

    function getEntryMeta() {
      if (!ttGame || typeof ttGame.getEnterOptionsSync !== 'function') return { query: {} };
      try {
        return ttGame.getEnterOptionsSync() || { query: {} };
      } catch (_) {
        return { query: {} };
      }
    }

    function bindPlatformLifecycle() {
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) pauseGame();
        if (!document.hidden) unlockRestartAfterAd();
      });
      window.addEventListener('focus', unlockRestartAfterAd);

      if (!ttGame) return;
      if (typeof ttGame.onHide === 'function') ttGame.onHide(() => pauseGame());
      if (typeof ttGame.onShow === 'function') ttGame.onShow((res) => {
        const from = (res && res.query && res.query.from) || getEntryMeta().query.from || 'direct';
        track('app_show', { from: String(from) });
        unlockRestartAfterAd();
      });
      if (typeof ttGame.onCopyUrl === 'function') {
        ttGame.onCopyUrl(() => ({ query: 'from=copy_link' }));
      }
    }

    makeRoomUI();
    bindPlatformLifecycle();
    startBtn.addEventListener('click', startGame);
    pauseBtn.addEventListener('click', () => {
      if (!playing) return;
      if (paused) resumeGame();
      else pauseGame();
    });
    shareBtn.addEventListener('click', shareGame);
    restartBtn.addEventListener('click', startGame);
    requestAnimationFrame(loop);
  </script>
</body>
</html>
