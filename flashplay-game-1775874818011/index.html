<!doctype html><html lang='zh-CN'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover'><title>3D Jump Ball</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#090b10;font-family:Arial,Helvetica,sans-serif;touch-action:none}#game{display:block;width:100vw;height:100vh;background:#10141c}#tip{position:fixed;left:0;right:0;bottom:18px;text-align:center;color:#fff;font-size:14px;pointer-events:none;text-shadow:0 2px 6px #000}</style></head><body><canvas id='game'></canvas><div id='tip'>点击 / 触摸 / 空格：跳跃　游戏结束后再次点击重开</div><script>(()=>{const c=document.getElementById('game'),x=c.getContext('2d');let W,H,D=1,run=false,over=false,t=0,last=0,score=0,best=0,speed=22,ballY=0,vy=0,obs=[];const G=52,J=24,far=95,near=4;function size(){D=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;x.setTransform(D,0,0,D,0,0)}addEventListener('resize',size);size();function reset(){run=true;over=false;t=0;score=0;speed=22;ballY=0;vy=0;obs=[];for(let i=0;i<7;i++)spawn(35+i*18)}function spawn(z){obs.push({z:z||far+Math.random()*20,h:1.25+Math.random()*0.7,w:.9+Math.random()*.35,hit:false})}function jump(){if(over){reset();return}if(!run)reset();if(ballY<.06){vy=J}}addEventListener('pointerdown',e=>{e.preventDefault();jump()},{passive:false});addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();jump()}});function proj(wx,z,wy=0){let p=1/(z*.075+1),cx=W*.5,gy=H*.77;return{x:cx+wx*W*.64*p,y:gy-z*H*.009-wy*H*.17*p,s:p}}function wall(o){let a=proj(-o.w,o.z,0),b=proj(o.w,o.z,0),ta=proj(-o.w,o.z,o.h),tb=proj(o.w,o.z,o.h);let g=x.createLinearGradient(0,ta.y,0,b.y);g.addColorStop(0,'#ffe06b');g.addColorStop(.55,'#f36a34');g.addColorStop(1,'#8d2435');x.fillStyle=g;x.beginPath();x.moveTo(a.x,a.y);x.lineTo(b.x,b.y);x.lineTo(tb.x,tb.y);x.lineTo(ta.x,ta.y);x.closePath();x.fill();x.strokeStyle='rgba(255,255,255,.38)';x.lineWidth=2;x.stroke()}function draw(dt){t+=dt;if(run&&!over){speed+=dt*.55;score+=dt*speed*.12;vy-=G*dt;ballY=Math.max(0,ballY+vy*dt);if(ballY===0&&vy<0)vy=0;for(const o of obs){o.z-=speed*dt;if(!o.hit&&o.z<near+1){o.hit=true;if(ballY<o.h*.78){over=true;run=false}}}obs=obs.filter(o=>o.z>-3);while(obs.length<7)spawn((obs.at(-1)?.z||far)+14+Math.random()*12)}x.clearRect(0,0,W,H);let sky=x.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#11203d');sky.addColorStop(.52,'#192331');sky.addColorStop(1,'#050608');x.fillStyle=sky;x.fillRect(0,0,W,H);x.fillStyle='rgba(255,255,255,.9)';for(let i=0;i<42;i++){let sx=(i*73+t*9)%W,sy=(i*i*19)%Math.max(1,H*.42),r=(i%3+1)*.45;x.globalAlpha=.25+(i%5)*.1;x.beginPath();x.arc(sx,sy,r,0,7);x.fill()}x.globalAlpha=1;let L=proj(-1.25,far),R=proj(1.25,far),l=proj(-2.2,near),r=proj(2.2,near);let road=x.createLinearGradient(0,L.y,0,H);road.addColorStop(0,'#313944');road.addColorStop(1,'#11151b');x.fillStyle=road;x.beginPath();x.moveTo(L.x,L.y);x.lineTo(R.x,R.y);x.lineTo(r.x,r.y);x.lineTo(l.x,l.y);x.closePath();x.fill();x.strokeStyle='#64e8ff';x.lineWidth=3;x.stroke();for(let z=8;z<far;z+=8){let p1=proj(0,z),p2=proj(0,z+3);x.strokeStyle='rgba(255,255,255,.28)';x.lineWidth=Math.max(1,p1.s*5);x.beginPath();x.moveTo(p1.x,p1.y);x.lineTo(p2.x,p2.y);x.stroke()}for(const o of obs.slice().sort((a,b)=>b.z-a.z))wall(o);let bp=proj(0,near,ballY),rad=Math.max(18,46*bp.s);let sh=proj(0,near,0);x.fillStyle='rgba(0,0,0,.42)';x.beginPath();x.ellipse(sh.x,sh.y+9,rad*.85,rad*.25,0,0,7);x.fill();let bg=x.createRadialGradient(bp.x-rad*.35,bp.y-rad*.45,rad*.1,bp.x,bp.y,rad);bg.addColorStop(0,'#ffffff');bg.addColorStop(.22,'#80fbff');bg.addColorStop(.65,'#1a91ff');bg.addColorStop(1,'#062763');x.fillStyle=bg;x.beginPath();x.arc(bp.x,bp.y,rad,0,7);x.fill();x.strokeStyle='rgba(255,255,255,.6)';x.lineWidth=2;x.stroke();x.fillStyle='#fff';x.textAlign='left';x.font='700 18px Arial';x.fillText('SCORE '+Math.floor(score),18,34);best=Math.max(best,Math.floor(score));x.textAlign='right';x.fillText('BEST '+best,W-18,34);if(!run&&!over){panel('3D JUMP BALL','点击开始，越过矮墙')}if(over){panel('撞墙了','得分 '+Math.floor(score)+'，点击重开')}}function panel(a,b){x.fillStyle='rgba(0,0,0,.52)';x.fillRect(0,0,W,H);x.textAlign='center';x.fillStyle='#fff';x.font='800 34px Arial';x.fillText(a,W/2,H*.42);x.font='18px Arial';x.fillText(b,W/2,H*.42+42)}function loop(ms){let dt=Math.min(.033,(ms-last)/1000||0);last=ms;draw(dt);requestAnimationFrame(loop)}requestAnimationFrame(loop);})();</script></body></html>
