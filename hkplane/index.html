<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>香港快线 - HK Rush</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh; overflow: hidden; }
canvas { display: block; border-radius: 6px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ════════════════════════════════════════
// CANVAS
// ════════════════════════════════════════
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');

function resize() {
  var maxW = Math.min(window.innerWidth * 0.96, 480);
  var maxH = window.innerHeight * 0.96;
  var ratio = 9 / 16;
  var w = maxW;
  var h = w / ratio;
  if (h > maxH) { h = maxH; w = h * ratio; }
  canvas.width = Math.floor(w);
  canvas.height = Math.floor(h);
}
resize();

// ════════════════════════════════════════
// GAME STATE  0=MENU  1=PLAY  2=OVER
// ════════════════════════════════════════
var STATE = 0;
var score = 0;
var best = parseInt(localStorage.getItem('hkRushBest') || '0');
var time = 0;
var pulse = 0;

// Plane
var plane = { x: 0, y: 0, vy: 0, w: 0, h: 0 };
function initPlane() {
  plane.w = canvas.width * 0.12;
  plane.h = plane.w * 0.6;
  plane.x = canvas.width * 0.25;
  plane.y = canvas.height * 0.5;
  plane.vy = 0;
}
initPlane();

// Pipes (obstacles)
var pipes = [];
var pipeTimer = 0;

// Background scroll
var bgX = 0;

// Coins
var coins = [];
var coinTimer = 0;

// ════════════════════════════════════════
// INPUT
// ════════════════════════════════════════
function flap() {
  plane.vy = -canvas.height * 0.012;
}

function handleStart(e) {
  e.preventDefault();
  if (STATE === 0) {
    STATE = 1;
    score = 0;
    time = 0;
    pipes = [];
    coins = [];
    pipeTimer = 0;
    coinTimer = 0;
    bgX = 0;
    initPlane();
  } else if (STATE === 2) {
    STATE = 0;
  } else {
    flap();
  }
}

canvas.addEventListener('mousedown', handleStart);
canvas.addEventListener('touchstart', handleStart, { passive: false });

// ════════════════════════════════════════
// SPAWN
// ════════════════════════════════════════
function spawnPipe() {
  var gap = canvas.height * 0.22;
  var minH = canvas.height * 0.1;
  var maxH = canvas.height * 0.55;
  var h1 = minH + Math.random() * (maxH - minH - gap);
  var w = canvas.width * 0.18;
  pipes.push({
    x: canvas.width + 10,
    topH: h1,
    botY: h1 + gap,
    w: w,
    passed: false
  });
}

function spawnCoin() {
  var s = canvas.width * 0.07;
  coins.push({
    x: canvas.width + 10,
    y: canvas.height * 0.15 + Math.random() * canvas.height * 0.55,
    s: s,
    rot: 0
  });
}

// ════════════════════════════════════════
// UPDATE
// ════════════════════════════════════════
function update(dt) {
  if (STATE !== 1) { pulse += dt * 2; return; }
  time += dt;
  bgX -= 2;

  // Gravity
  plane.vy += canvas.height * 0.0006;
  plane.y += plane.vy;

  // Floor/ceiling
  if (plane.y < plane.h / 2) { plane.y = plane.h / 2; plane.vy = 0; }
  if (plane.y > canvas.height - plane.h / 2) { plane.y = canvas.height - plane.h / 2; plane.vy = 0; }

  // Pipes
  pipeTimer += dt;
  if (pipeTimer > 1.6) { pipeTimer = 0; spawnPipe(); }
  pipes = pipes.filter(function(p) {
    p.x -= 2.5;

    // Score
    if (!p.passed && p.x + p.w < plane.x) {
      p.passed = true;
      score++;
      if (score > best) { best = score; localStorage.setItem('hkRushBest', best); }
    }

    // Collision
    var px = plane.x, py = plane.y;
    var pw = plane.w * 0.7, ph = plane.h * 0.7;
    if (px + pw/2 > p.x && px - pw/2 < p.x + p.w) {
      if (py - ph/2 < p.topH || py + ph/2 > p.botY) {
        STATE = 2;
      }
    }

    return p.x > -p.w;
  });

  // Coins
  coinTimer += dt;
  if (coinTimer > 2.5) { coinTimer = 0; spawnCoin(); }
  coins = coins.filter(function(c) {
    c.x -= 2.5;
    c.rot += 0.06;

    var dx = Math.abs(c.x - plane.x);
    var dy = Math.abs(c.y - plane.y);
    if (dx < (c.s + plane.w) * 0.4 && dy < (c.s + plane.h) * 0.4) {
      score += 5;
      return false;
    }

    return c.x > -c.s;
  });
}

// ════════════════════════════════════════
// DRAW
// ════════════════════════════════════════

function drawBG() {
  // Sky gradient
  var g = ctx.createLinearGradient(0, 0, 0, canvas.height);
  g.addColorStop(0, '#87CEEB');
  g.addColorStop(1, '#c8e6ff');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  for (var ci = 0; ci < 5; ci++) {
    var cx = ((ci * 180 + bgX * 0.3) % (canvas.width + 100)) - 50;
    var cy = canvas.height * (0.08 + ci * 0.07);
    ctx.beginPath();
    ctx.arc(cx, cy, canvas.width * 0.06, 0, Math.PI * 2);
    ctx.arc(cx + canvas.width * 0.05, cy - canvas.width * 0.02, canvas.width * 0.05, 0, Math.PI * 2);
    ctx.arc(cx + canvas.width * 0.1, cy, canvas.width * 0.06, 0, Math.PI * 2);
    ctx.fill();
  }

  // Buildings (scrolling)
  var buildingColors = ['#334455', '#445566', '#2c3e50', '#3d566e'];
  for (var bi = 0; bi < 10; bi++) {
    var bx = ((bi * 90 + bgX * 0.8) % (canvas.width + 80)) - 40;
    var bw = canvas.width * (0.07 + (bi % 3) * 0.03);
    var bh = canvas.height * (0.12 + (bi % 4) * 0.08);
    var by = canvas.height * 0.6 - bh;
    ctx.fillStyle = buildingColors[bi % buildingColors.length];
    ctx.fillRect(bx, by, bw, bh);
    // Windows
    ctx.fillStyle = '#ffdd88';
    ctx.globalAlpha = 0.5 + Math.sin(time * 3 + bi) * 0.3;
    for (var wi = 0; wi < 3; wi++) {
      for (var wj = 0; wj < 4; wj++) {
        ctx.fillRect(bx + 3 + wi * (bw / 4), by + 4 + wj * (bh / 5), bw / 6, bh / 7);
      }
    }
    ctx.globalAlpha = 1;
  }

  // Ground
  ctx.fillStyle = '#4CAF50';
  ctx.fillRect(0, canvas.height * 0.88, canvas.width, canvas.height * 0.12);
  ctx.fillStyle = '#388E3C';
  ctx.fillRect(0, canvas.height * 0.88, canvas.width, canvas.height * 0.03);

  // Road markings
  ctx.fillStyle = '#FFD700';
  for (var ri = 0; ri < 8; ri++) {
    var rx = ((ri * 80 + bgX * 1.2) % (canvas.width + 60)) - 30;
    ctx.fillRect(rx, canvas.height * 0.92, canvas.width * 0.1, canvas.height * 0.015);
  }
}

function drawPlane(x, y, w, h) {
  ctx.save();
  ctx.translate(x, y);

  // Tilt based on velocity
  var tilt = Math.max(-0.4, Math.min(0.4, plane.vy * 0.05));
  ctx.rotate(tilt);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(3, h * 0.2, w * 0.4, w * 0.12, 0, 0, Math.PI * 2);
  ctx.fill();

  // Fuselage (red/white)
  var fg = ctx.createLinearGradient(-w/2, 0, w/2, 0);
  fg.addColorStop(0, '#e74c3c');
  fg.addColorStop(0.4, '#ecf0f1');
  fg.addColorStop(1, '#e74c3c');
  ctx.fillStyle = fg;
  ctx.beginPath();
  ctx.ellipse(0, 0, w * 0.45, h * 0.28, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wings
  ctx.fillStyle = '#c0392b';
  ctx.beginPath();
  ctx.moveTo(-w * 0.1, 0);
  ctx.lineTo(-w * 0.4, h * 0.5);
  ctx.lineTo(-w * 0.05, h * 0.15);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-w * 0.1, 0);
  ctx.lineTo(-w * 0.4, -h * 0.5);
  ctx.lineTo(-w * 0.05, -h * 0.15);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.fillStyle = '#5dade2';
  ctx.beginPath();
  ctx.ellipse(w * 0.15, 0, w * 0.15, h * 0.18, 0, 0, Math.PI * 2);
  ctx.fill();

  // Tail
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.moveTo(-w * 0.38, 0);
  ctx.lineTo(-w * 0.55, h * 0.35);
  ctx.lineTo(-w * 0.48, 0);
  ctx.closePath();
  ctx.fill();

  // Propeller spin
  ctx.strokeStyle = 'rgba(100,200,255,0.6)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(w * 0.5, 0, w * 0.08, 0, Math.PI * 2);
  ctx.stroke();

  ctx.restore();
}

function drawPipe(p) {
  // Top pipe
  ctx.fillStyle = '#27ae60';
  ctx.fillRect(p.x, 0, p.w, p.topH);
  ctx.fillStyle = '#2ecc71';
  ctx.fillRect(p.x, 0, p.w * 0.3, p.topH);
  ctx.fillStyle = '#1e8449';
  ctx.fillRect(p.x + p.w - p.w * 0.15, 0, p.w * 0.15, p.topH);

  // Top cap
  ctx.fillStyle = '#27ae60';
  ctx.fillRect(p.x - 4, p.topH - canvas.height * 0.035, p.w + 8, canvas.height * 0.035);
  ctx.fillStyle = '#2ecc71';
  ctx.fillRect(p.x - 4, p.topH - canvas.height * 0.035, (p.w + 8) * 0.3, canvas.height * 0.035);

  // Bottom pipe
  var botH = canvas.height - p.botY;
  ctx.fillStyle = '#27ae60';
  ctx.fillRect(p.x, p.botY, p.w, botH);
  ctx.fillStyle = '#2ecc71';
  ctx.fillRect(p.x, p.botY, p.w * 0.3, botH);
  ctx.fillStyle = '#1e8449';
  ctx.fillRect(p.x + p.w - p.w * 0.15, p.botY, p.w * 0.15, botH);

  // Bottom cap
  ctx.fillStyle = '#27ae60';
  ctx.fillRect(p.x - 4, p.botY, p.w + 8, canvas.height * 0.035);
  ctx.fillStyle = '#2ecc71';
  ctx.fillRect(p.x - 4, p.botY, (p.w + 8) * 0.3, canvas.height * 0.035);
}

function drawCoin(c) {
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.rotate(c.rot);
  ctx.font = Math.floor(c.s) + 'px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 8;
  ctx.fillText('🪙', 0, 0);
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawHUD() {
  var pad = canvas.width * 0.04;

  // Score
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.roundRect(pad - 4, pad - 4, canvas.width * 0.3, canvas.height * 0.09, 8);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + Math.floor(canvas.width * 0.08) + 'px sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('🪙 ' + score, pad, pad);

  // Best
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = Math.floor(canvas.width * 0.04) + 'px sans-serif';
  ctx.fillText('最高 ' + best, pad, pad + canvas.height * 0.09);
}

function drawMenu() {
  drawBG();

  var cx = canvas.width / 2;
  var cy = canvas.height / 2;

  // Plane in menu
  ctx.save();
  ctx.shadowColor = '#ffffff';
  ctx.shadowBlur = 20;
  drawPlane(cx, canvas.height * 0.55, canvas.width * 0.16, canvas.width * 0.16 * 0.6);
  ctx.restore();

  // Title box
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, canvas.width, canvas.height * 0.55);

  // Title
  var glow = 0.5 + Math.sin(pulse) * 0.3;
  ctx.shadowColor = '#e74c3c';
  ctx.shadowBlur = 20 * glow;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + Math.floor(canvas.width * 0.14) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('香港快线', cx, canvas.height * 0.18);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#e74c3c';
  ctx.font = Math.floor(canvas.width * 0.05) + 'px sans-serif';
  ctx.fillText('HK RUSH', cx, canvas.height * 0.28);

  // Tap
  var alpha = 0.6 + Math.sin(pulse * 2) * 0.4;
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#fff';
  ctx.font = Math.floor(canvas.width * 0.06) + 'px sans-serif';
  ctx.fillText('👋 点我开始 👋', cx, canvas.height * 0.40);
  ctx.globalAlpha = 1;

  // Best
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = Math.floor(canvas.width * 0.05) + 'px sans-serif';
  ctx.fillText('🏆 最高分 ' + best, cx, canvas.height * 0.47);

  // Hint
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = Math.floor(canvas.width * 0.038) + 'px sans-serif';
  ctx.fillText('点击屏幕让飞机起飞 | 穿越多根管道得分', cx, canvas.height - canvas.height * 0.04);
}

function drawOver() {
  // Dim
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  var cx = canvas.width / 2;
  var cy = canvas.height / 2;

  ctx.shadowColor = '#e74c3c';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#e74c3c';
  ctx.font = 'bold ' + Math.floor(canvas.width * 0.12) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('💥 撞毁了!', cx, cy - canvas.height * 0.2);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#fff';
  ctx.font = Math.floor(canvas.width * 0.08) + 'px sans-serif';
  ctx.fillText('得分 ' + score, cx, cy - canvas.height * 0.04);

  if (score >= best && score > 0) {
    ctx.fillStyle = '#ffd700';
    ctx.font = Math.floor(canvas.width * 0.06) + 'px sans-serif';
    ctx.fillText('🎉 新纪录! 🎉', cx, cy + canvas.height * 0.06);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = Math.floor(canvas.width * 0.05) + 'px sans-serif';
    ctx.fillText('最高分 ' + best, cx, cy + canvas.height * 0.06);
  }

  var alpha = 0.6 + Math.sin(pulse * 2) * 0.4;
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#fff';
  ctx.font = Math.floor(canvas.width * 0.055) + 'px sans-serif';
  ctx.fillText('点我返回主页', cx, cy + canvas.height * 0.2);
  ctx.globalAlpha = 1;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (STATE === 0) { drawMenu(); return; }

  drawBG();
  pipes.forEach(drawPipe);
  coins.forEach(drawCoin);
  drawPlane(plane.x, plane.y, plane.w, plane.h);
  drawHUD();
  if (STATE === 2) drawOver();
}

// ════════════════════════════════════════
// LOOP
// ════════════════════════════════════════
var last = 0;
function loop(ts) {
  var dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(function(ts) { last = ts; loop(ts); });
window.addEventListener('resize', function() { resize(); initPlane(); });
</script>

<script>
/**
 * Iframe 元素高亮注入脚本
 * 需要在目标网站中引入此脚本来支持跨域 iframe 高亮功能
 *
 * 使用方法：
 * 1. 将此脚本添加到目标网站的 HTML 中
 * 2. 或通过浏览器扩展、用户脚本等方式注入
 */

(function () {
  "use strict";

  // 检查是否在 iframe 中
  if (window.self === window.top) {
    return; // 不在 iframe 中，不执行
  }

  // 检查是否已经初始化过
  if (window.__iframeHighlightInitialized) {
    return;
  }
  window.__iframeHighlightInitialized = true;
  console.log("Iframe 高亮脚本已加载");

  // 创建高亮覆盖层
  var overlay = document.createElement("div");
  overlay.id = "iframe-highlight-overlay";
  overlay.style.cssText = "\n    position: fixed;\n    top: 0;\n    left: 0;\n    width: 100vw;\n    height: 100vh;\n    pointer-events: none;\n    z-index: 999999;\n    overflow: hidden;\n  ";

  // 创建悬停高亮框（虚线边框）
  var highlightBox = document.createElement("div");
  highlightBox.id = "iframe-highlight-box";
