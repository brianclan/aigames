<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Iran vs USA Tank Battle 🇮🇷⚔️🇺🇸</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: #2c1810;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; height: 100dvh;
            font-family: Georgia, serif;
            overflow: hidden; touch-action: none;
        }
        #gameContainer {
            position: relative;
            width: 100vmin; height: 100vmin;
            max-width: 480px; max-height: 640px;
            border-radius: 8px; overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; }
        #ui {
            position: absolute; top: 6px; left: 8px; right: 8px;
            display: flex; justify-content: space-between; align-items: center;
            color: #fff; font-size: 13px; font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            pointer-events: none; z-index: 5;
        }
        #ui-labels { display: flex; gap: 4px; flex-direction: column; font-size: 11px; }
        #ui-center { text-align: center; }
        #ui-right { text-align: right; display: flex; flex-direction: column; gap: 2px; font-size: 11px; }
        #controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 6px 10px 12px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            z-index: 10;
        }
        .ctrl-group { display: flex; gap: 8px; align-items: center; }
        .ctrl-btn {
            width: 54px; height: 54px;
            border-radius: 50%;
            background: rgba(255,255,255,0.18);
            border: 2px solid rgba(255,255,255,0.4);
            color: #fff; font-size: 22px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; user-select: none; -webkit-user-select: none;
            transition: transform 0.1s, background 0.1s;
        }
        .ctrl-btn:active, .ctrl-btn.active {
            background: rgba(255,255,255,0.45);
            transform: scale(0.93);
        }
        .ctrl-btn.fire {
            width: 64px; height: 64px;
            background: rgba(255,60,60,0.4);
            border-color: rgba(255,100,100,0.6);
            font-size: 26px;
        }
        .ctrl-btn.fire:active {
            background: rgba(255,60,60,0.7);
        }
        #overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,10,0.88);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: #fff; z-index: 20; padding: 20px;
        }
        #overlay h1 { font-size: 24px; margin-bottom: 6px; text-align: center; }
        #overlay .sub { font-size: 12px; color: #aaa; margin-bottom: 16px; text-align: center; padding: 0 10px; }
        #overlay button {
            padding: 10px 30px; font-size: 17px;
            background: linear-gradient(to bottom, #3a5a3a, #2a3a2a);
            color: #fff; border: 2px solid #5a8a5a;
            border-radius: 22px; cursor: pointer;
        }
        #overlay button:hover { transform: scale(1.05); }
        #overlay.hidden { display: none; }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="game"></canvas>
    <div id="ui">
        <div id="ui-labels">
            <span id="lives">❤️ x3</span>
            <span id="wave">Wave 1</span>
        </div>
        <div id="ui-center">
            <span id="score">Score: 0</span>
        </div>
        <div id="ui-right">
            <span id="kills">Kills: 0</span>
        </div>
    </div>
    <div id="controls">
        <div class="ctrl-group">
            <div class="ctrl-btn" id="btnLeft">◀</div>
            <div class="ctrl-btn" id="btnRight">▶</div>
        </div>
        <div class="ctrl-btn fire" id="btnFire">💥</div>
    </div>
    <div id="overlay">
        <h1>🇮🇷⚔️🇺🇸 Tank Battle</h1>
        <div class="sub">Destroy enemy tanks! Survive the desert warzone.<br>Move left/right, aim, and fire!</div>
        <button id="startBtn">Start Battle</button>
    </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 480, H = 640;
canvas.width = W; canvas.height = H;

const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const livesEl = document.getElementById('lives');
const waveEl = document.getElementById('wave');
const scoreEl = document.getElementById('score');
const killsEl = document.getElementById('kills');
const btnLeft = document.getElementById('btnLeft');
const btnRight = document.getElementById('btnRight');
const btnFire = document.getElementById('btnFire');

let running = false, paused = false;
let score = 0, lives = 3, kills = 0, wave = 1;
let player = null, bullets = [], enemyBullets = [], enemies = [], explosions = [], particles = [];
let buildings = [], frame = 0, waveTimer = 0, spawnTimer = 0, spawnCount = 0;

// Buildings / terrain
const BUILDING_TYPES = ['oil','tower','bunker','wall'];

// Grass tiles
let grassTiles = [];

function initTerrain() {
    buildings = [];
    grassTiles = [];
    // Oil derricks
    for (let i = 0; i < 4; i++) {
        buildings.push({ x: 60+i*100, y: H*0.65, type:'oil', hp:3, w:30, h:60 });
    }
    // Bunkers
    buildings.push({ x: 150, y: H*0.6, type:'bunker', hp:5, w:60, h:40 });
    buildings.push({ x: 320, y: H*0.62, type:'bunker', hp:5, w:60, h:40 });
    // Walls
    for (let i = 0; i < 6; i++) {
        buildings.push({ x: 40+i*75, y: H*0.7, type:'wall', hp:2, w:50, h:15 });
    }
    // Grass
    for (let i = 0; i < 30; i++) {
        grassTiles.push({ x: Math.random()*W, y: H*0.5+Math.random()*H*0.35, r: 3+Math.random()*5, phase: Math.random()*Math.PI*2 });
    }
}

function createPlayer() {
    return {
        x: W/2, y: H - 80,
        w: 36, h: 44,
        speed: 4,
        lane: 1, targetX: W/2,
        turretAngle: 0,
        reload: 0,
        invincible: 0,
        alive: true,
        respawnTimer: 0
    };
}

function createEnemy(type) {
    const types = {
        light:   { w:28, h:34, speed:1.8, hp:1, color:'#1565C0', turretColor:'#0D47A1', pts:10, fireRate:90 },
        medium:  { w:32, h:40, speed:1.2, hp:2, color:'#1976D2', turretColor:'#0D47A1', pts:20, fireRate:60 },
        heavy:   { w:38, h:46, speed:0.7, hp:4, color:'#1E88E5', turretColor:'#0D47A1', pts:30, fireRate:100 },
        iran:    { w:34, h:42, speed:1.5, hp:3, color:'#2E7D32', turretColor:'#1B5E20', pts:25, fireRate:70 },
    };
    const t = types[type] || types.light;
    return {
        x: W - 60 + Math.random()*40,
        y: H*0.3 + Math.random()*(H*0.4),
        ...t,
        type,
        turretAngle: Math.PI,
        reload: Math.random() * t.fireRate,
        alive: true
    };
}

function fireBullet(shooter, isPlayer) {
    const angle = isPlayer ? shooter.turretAngle : shooter.turretAngle;
    const speed = isPlayer ? 10 : 6;
    const bx = shooter.x + Math.cos(angle) * (isPlayer ? 25 : -25);
    const by = shooter.y + Math.sin(angle) * (isPlayer ? 25 : -25);
    if (isPlayer) {
        bullets.push({ x: bx, y: by, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, r: 5, alive:true });
    } else {
        enemyBullets.push({ x: bx, y: by, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, r: 5, alive:true });
    }
}

function spawnExplosion(x, y, size, color) {
    explosions.push({ x, y, size, color, life: 25, maxLife: 25 });
    for (let i = 0; i < 12; i++) {
        const ang = (i/12)*Math.PI*2;
        particles.push({ x, y, vx: Math.cos(ang)*(2+Math.random()*4), vy: Math.sin(ang)*(2+Math.random()*4), life: 30+Math.random()*20, color, size: 4+Math.random()*6 });
    }
}

function rectCollision(ax,ay,aw,ah, bx,by,bw,bh) {
    return ax-aw/2 < bx+bw/2 && ax+aw/2 > bx-bw/2 && ay-ah/2 < by+bh/2 && ay+ah/2 > by-bh/2;
}

// DRAW FUNCTIONS

function drawBackground() {
    // Desert sky gradient
    const sky = ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0, '#b85c38');
    sky.addColorStop(0.4, '#d4845c');
    sky.addColorStop(0.7, '#e8b87a');
    sky.addColorStop(1, '#c8a060');
    ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);

    // Sun
    ctx.save();
    const sunGrad = ctx.createRadialGradient(W-80, 80, 20, W-80, 80, 50);
    sunGrad.addColorStop(0,'rgba(255,240,150,0.9)');
    sunGrad.addColorStop(1,'rgba(255,200,100,0)');
    ctx.fillStyle = sunGrad;
    ctx.beginPath(); ctx.arc(W-80, 80, 50, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFE87C';
    ctx.beginPath(); ctx.arc(W-80, 80, 28, 0, Math.PI*2); ctx.fill();
    // Rays
    ctx.strokeStyle = 'rgba(255,220,100,0.5)'; ctx.lineWidth = 2;
    for (let i=0;i<8;i++){
        const a = i*Math.PI/4 + frame*0.005;
        ctx.beginPath(); ctx.moveTo(W-80+Math.cos(a)*34,80+Math.sin(a)*34); ctx.lineTo(W-80+Math.cos(a)*55,80+Math.sin(a)*55); ctx.stroke();
    }
    ctx.restore();

    // Sand dunes
    ctx.fillStyle = '#c8a060';
    ctx.beginPath(); ctx.moveTo(0,H*0.45); ctx.quadraticCurveTo(W*0.25,H*0.38,W*0.5,H*0.42); ctx.quadraticCurveTo(W*0.75,H*0.38,W,H*0.45); ctx.lineTo(W,H*0.5); ctx.lineTo(0,H*0.5); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#d4b070';
    ctx.beginPath(); ctx.moveTo(0,H*0.5); ctx.quadraticCurveTo(W*0.3,H*0.44,W*0.6,H*0.48); ctx.quadraticCurveTo(W*0.85,H*0.44,W,H*0.5); ctx.lineTo(W,H*0.55); ctx.lineTo(0,H*0.55); ctx.closePath(); ctx.fill();

    // Ground
    ctx.fillStyle = '#c8a060';
    ctx.fillRect(0, H*0.55, W, H*0.45);

    // Grass tufts
    ctx.fillStyle = '#6a8040';
    for (let g of grassTiles) {
        const sway = Math.sin(g.phase + frame*0.03) * 3;
        ctx.beginPath(); ctx.moveTo(g.x, g.y); ctx.quadraticCurveTo(g.x+sway, g.y-8, g.x+2, g.y-15); ctx.quadraticCurveTo(g.x+sway+2, g.y-8, g.x+4, g.y); ctx.closePath(); ctx.fill();
    }

    // Buildings
    for (let b of buildings) {
        if (!b.alive) continue;
        ctx.save();
        if (b.type === 'oil') {
            // Oil derrick
            ctx.fillStyle = '#8B6914';
            ctx.fillRect(b.x-4, b.y-50, 8, 55);
            ctx.strokeStyle = '#6B4910'; ctx.lineWidth=1;
            for(let i=0;i<4;i++) ctx.beginPath(), ctx.moveTo(b.x-4,-50+b.y+i*12), ctx.lineTo(b.x-20-10*i,-50+b.y+12), ctx.stroke(), ctx.beginPath(), ctx.moveTo(b.x+4,-50+b.y+i*12), ctx.lineTo(b.x+20+10*i,-50+b.y+12), ctx.stroke();
            // Top beam
            ctx.fillStyle='#6B4910'; ctx.fillRect(b.x-25,-50+b.y,50,6);
            // Oil tank
            ctx.fillStyle='#333';
            ctx.beginPath(); ctx.ellipse(b.x,b.y+5,18,12,0,0,Math.PI*2); ctx.fill();
            // Smoke
            if(frame%20<10){
                ctx.fillStyle='rgba(100,100,100,0.3)';
                ctx.beginPath(); ctx.arc(b.x+Math.sin(frame*0.05)*5,-60+b.y,8,0,Math.PI*2); ctx.fill();
            }
        } else if (b.type === 'bunker') {
            ctx.fillStyle='#555';
            ctx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h);
            ctx.fillStyle='#444';
            ctx.fillRect(b.x-b.w/2+4,b.y-b.h/2+4,b.w-8,b.h-8);
            // Window slit
            ctx.fillStyle='#222';
            ctx.fillRect(b.x-10,b.y-5,20,6);
        } else if (b.type === 'wall') {
            const hp = b.hp;
            ctx.fillStyle = hp>1 ? '#8B7355' : '#6B5340';
            ctx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h);
            ctx.strokeStyle='#555'; ctx.lineWidth=1;
            ctx.strokeRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h);
        }
        ctx.restore();
    }
}

function drawTank(x, y, w, h, turretAngle, color, turretColor, isPlayer, invincible) {
    ctx.save();
    ctx.translate(x, y);

    if (invincible > 0 && Math.floor(invincible/4)%2===0) {
        ctx.globalAlpha = 0.5;
    }

    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(0, h/2+4, w*0.6, 6, 0, 0, Math.PI*2); ctx.fill();

    // Treads
    ctx.fillStyle='#333';
    ctx.fillRect(-w/2-3, -h/2, 6, h);
    ctx.fillRect(w/2-3, -h/2, 6, h);
    ctx.strokeStyle='#555'; ctx.lineWidth=1;
    for(let i=0;i<5;i++){
        ctx.beginPath(); ctx.moveTo(-w/2-3,-h/2+i*(h/4)); ctx.lineTo(-w/2+3,-h/2+i*(h/4)); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(w/2-3,-h/2+i*(h/4)); ctx.lineTo(w/2+3,-h/2+i*(h/4)); ctx.stroke();
    }

    // Body
    ctx.fillStyle=color;
    ctx.fillRect(-w/2,-h/2+h*0.15,w,h*0.55);

    // Body detail
    ctx.fillStyle = turretColor;
    ctx.fillRect(-w/3,-h/2+h*0.15,w*0.66,h*0.35);

    // Turret base
    ctx.fillStyle=turretColor;
    ctx.beginPath(); ctx.arc(0,0,Math.min(w,h)*0.32,0,Math.PI*2); ctx.fill();

    // Barrel
    ctx.save();
    ctx.rotate(turretAngle);
    ctx.fillStyle=turretColor;
    ctx.fillRect(0,-3, isPlayer?28:-28, 6);
    ctx.fillStyle='#222';
    ctx.fillRect(isPlayer?22:-28, -2, 6, 4);
    ctx.restore();

    // Stars emblem for USA
    if (!isPlayer) {
        ctx.fillStyle='#FFD700';
        for(let i=0;i<3;i++){
            ctx.beginPath();
            const a=i*Math.PI*2/3 - Math.PI/2;
            ctx.arc(Math.cos(a)*6, Math.sin(a)*6-2, 3, 0, Math.PI*2);
            ctx.fill();
        }
    }
    // Crescent for Iran
    if (isPlayer) {
        ctx.fillStyle='#DA251D';
        ctx.beginPath(); ctx.arc(0,-2,7,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=color;
        ctx.beginPath(); ctx.arc(2,-2,6,0,Math.PI*2); ctx.fill();
    }

    ctx.restore();
}

function drawBullets() {
    ctx.fillStyle='#FFD700';
    ctx.strokeStyle='#8B6914'; ctx.lineWidth=1;
    for(let b of bullets) {
        if(!b.alive) continue;
        ctx.save();
        ctx.translate(b.x,b.y);
        ctx.rotate(Math.atan2(b.vy,b.vx));
        ctx.beginPath(); ctx.ellipse(0,0,b.r*1.5,b.r,0,0,Math.PI*2);
        ctx.fill(); ctx.stroke();
        ctx.restore();
    }
    ctx.fillStyle='#FF4444';
    ctx.strokeStyle='#8B0000'; ctx.lineWidth=1;
    for(let b of enemyBullets) {
        if(!b.alive) continue;
        ctx.save();
        ctx.translate(b.x,b.y);
        ctx.rotate(Math.atan2(b.vy,b.vx));
        ctx.beginPath(); ctx.ellipse(0,0,b.r*1.5,b.r,0,0,Math.PI*2);
        ctx.fill(); ctx.stroke();
        ctx.restore();
    }
}

function drawExplosions() {
    for(let e of explosions) {
        const progress = 1 - e.life/e.maxLife;
        const r = e.size * (0.5 + progress * 1.5);
        ctx.save();
        ctx.globalAlpha = 1 - progress;
        const grad = ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,r);
        grad.addColorStop(0,'#FFE87C');
        grad.addColorStop(0.4,'#FF6600');
        grad.addColorStop(1,'rgba(255,0,0,0)');
        ctx.fillStyle=grad;
        ctx.beginPath(); ctx.arc(e.x,e.y,r,0,Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

function drawParticles() {
    for(let p of particles) {
        ctx.save();
        ctx.globalAlpha = p.life/50;
        ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size*(p.life/50),0,Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

function drawHUD() {
    // Wave enemy count
    ctx.save();
    ctx.font='bold 12px Georgia'; ctx.textAlign='center';
    ctx.fillStyle='rgba(255,255,255,0.6)';
    const remaining = Math.max(0, 5 + Math.floor(wave/2) - spawnCount);
    ctx.fillText(`Enemies left: ${remaining}`, W/2, H-55);
    ctx.restore();
}

function drawWaveStart() {
    if (waveTimer > 0 && waveTimer < 120) {
        ctx.save();
        ctx.globalAlpha = Math.min(1, waveTimer/30) * (waveTimer>90?1:(waveTimer/90));
        ctx.font='bold 36px Georgia'; ctx.textAlign='center';
        ctx.fillStyle='#FFD700'; ctx.strokeStyle='#000'; ctx.lineWidth=4;
        ctx.strokeText(`WAVE ${wave}`, W/2, H/2); ctx.fillText(`WAVE ${wave}`, W/2, H/2);
        ctx.font='18px Georgia';
        ctx.fillText('🇮🇷 GET READY! 🇺🇸', W/2, H/2+35);
        ctx.restore();
    }
}

function draw() {
    frame++;
    ctx.clearRect(0,0,W,H);
    drawBackground();

    if (!running) {
        requestAnimationFrame(draw);
        return;
    }

    // Enemies
    for(let e of enemies) {
        if(!e.alive) continue;
        drawTank(e.x, e.y, e.w, e.h, e.turretAngle, e.color, e.turretColor, false, 0);
    }

    // Player
    if (player && player.alive) {
        drawTank(player.x, player.y, player.w, player.h, player.turretAngle, '#2E7D32', '#1B5E20', true, player.invincible);
    }

    drawBullets();
    drawExplosions();
    drawParticles();
    drawHUD();
    drawWaveStart();

    requestAnimationFrame(draw);
}

function update() {
    if (!running || paused) return;

    // Wave start timer
    if (waveTimer > 0) {
        waveTimer--;
        if (waveTimer === 0) {
            // Start spawning enemies for this wave
            spawnTimer = 0;
            spawnCount = 0;
        }
    }

    // Spawn enemies
    if (waveTimer === 0) {
        const enemiesThisWave = 3 + Math.floor(wave/2);
        if (spawnCount < enemiesThisWave) {
            spawnTimer--;
            if (spawnTimer <= 0) {
                const types = ['light','light','medium','iran','iran'];
                const t = types[Math.floor(Math.random()*types.length)];
                enemies.push(createEnemy(t));
                spawnCount++;
                spawnTimer = 60 + Math.random()*40;
            }
        }
    }

    // Check wave complete
    const aliveEnemies = enemies.filter(e=>e.alive);
    const enemiesThisWave = 3 + Math.floor(wave/2);
    if (spawnCount >= enemiesThisWave && aliveEnemies.length === 0 && waveTimer === 0) {
        wave++;
        waveTimer = 150;
        waveEl.textContent = `Wave ${wave}`;
    }

    // Player
    if (player) {
        if (!player.alive) {
            player.respawnTimer--;
            if (player.respawnTimer <= 0) {
                lives--;
                livesEl.textContent = `❤️ x${lives}`;
                if (lives <= 0) {
                    gameOver();
                    return;
                }
                player.alive = true;
                player.x = W/2;
                player.invincible = 120;
                player.turretAngle = -Math.PI/2;
            }
        } else {
            if (player.invincible > 0) player.invincible--;

            // Move toward target
            player.x += (player.targetX - player.x) * 0.2;
            player.x = Math.max(25, Math.min(W-25, player.x));

            if (player.reload > 0) player.reload--;

            // Auto-turret: always aims downward (enemy direction)
            const targetAngle = -Math.PI/2;
            player.turretAngle += (targetAngle - player.turretAngle) * 0.1;
        }
    }

    // Enemy AI
    for(let e of enemies) {
        if(!e.alive) continue;

        // Move toward left
        e.x -= e.speed;
        if (e.x < -20) {
            e.alive = false;
            continue;
        }

        // Aim at player
        if (player && player.alive) {
            const dx = player.x - e.x;
            const dy = player.y - e.y;
            const targetAngle = Math.atan2(dy, dx);
            e.turretAngle += (targetAngle - e.turretAngle) * 0.03;

            // Fire
            e.reload--;
            if (e.reload <= 0 && Math.abs(dx) < W*0.7) {
                fireBullet(e, false);
                e.reload = e.fireRate + Math.random()*30;
            }
        }
    }

    // Player bullets
    for(let b of bullets) {
        if(!b.alive) continue;
        b.x += b.vx; b.y += b.vy;

        // Off screen
        if(b.x<0||b.x>W||b.y<0||b.y>H){ b.alive=false; continue; }

        // Hit buildings
        for(let bld of buildings) {
            if(!bld.alive) continue;
            if(b.x>bld.x-bld.w/2&&b.x<bld.x+bld.w/2&&b.y>bld.y-bld.h/2&&b.y<bld.y+bld.h/2){
                b.alive=false;
                bld.hp--;
                if(bld.hp<=0) bld.alive=false;
                spawnExplosion(b.x,b.y,8,'#888');
                break;
            }
        }
        if(!b.alive) continue;

        // Hit enemies
        for(let e of enemies) {
            if(!e.alive) continue;
            if(Math.abs(b.x-e.x)<e.w/2+5 && Math.abs(b.y-e.y)<e.h/2+5){
                b.alive=false;
                e.hp--;
                spawnExplosion(b.x,b.y,10,'#FF6600');
                if(e.hp<=0){
                    e.alive=false;
                    kills++; score+=e.pts;
                    killsEl.textContent=`Kills: ${kills}`;
                    scoreEl.textContent=`Score: ${score}`;
                    spawnExplosion(e.x,e.y,25,'#FF4444');
                    spawnExplosion(e.x,e.y,20,'#FFE87C');
                }
            }
        }
    }

    // Enemy bullets
    for(let b of enemyBullets) {
        if(!b.alive) continue;
        b.x += b.vx; b.y += b.vy;
        if(b.x<0||b.x>W||b.y<0||b.y>H){ b.alive=false; continue; }

        // Hit buildings
        for(let bld of buildings) {
            if(!bld.alive) continue;
            if(b.x>bld.x-bld.w/2&&b.x<bld.x+bld.w/2&&b.y>bld.y-bld.h/2&&b.y<bld.y+bld.h/2){
                b.alive=false;
                bld.hp--;
                if(bld.hp<=0) bld.alive=false;
                spawnExplosion(b.x,b.y,8,'#888');
                break;
            }
        }
        if(!b.alive) continue;

        // Hit player
        if(player && player.alive && player.invincible===0){
            if(Math.abs(b.x-player.x)<player.w/2+5 && Math.abs(b.y-player.y)<player.h/2+5){
                b.alive=false;
                player.alive=false;
                player.respawnTimer=90;
                lives--;
                livesEl.textContent=`❤️ x${lives}`;
                spawnExplosion(player.x,player.y,25,'#FF4444');
                spawnExplosion(player.x,player.y,20,'#2E7D32');
                if(lives<=0) gameOver();
            }
        }
    }

    // Clean up
    bullets = bullets.filter(b=>b.alive);
    enemyBullets = enemyBullets.filter(b=>b.alive);

    // Explosions
    for(let i=explosions.length-1;i>=0;i--){ explosions[i].life--; if(explosions[i].life<=0) explosions.splice(i,1); }
    for(let i=particles.length-1;i>=0;i--){ let p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life--; if(p.life<=0) particles.splice(i,1); }
}

function gameOver() {
    running=false;
    overlay.classList.remove('hidden');
    overlay.querySelector('h1').textContent='💥 Game Over!';
    overlay.querySelector('.sub').innerHTML=`You reached Wave ${wave}<br>Kills: ${kills} | Score: ${score}`;
    startBtn.textContent='Play Again';
}

function startGame() {
    score=0; lives=3; kills=0; wave=1; waveTimer=120; spawnCount=0; spawnTimer=0;
    enemies=[]; bullets=[]; enemyBullets=[]; explosions=[]; particles=[];
    initTerrain();
    player = createPlayer();
    livesEl.textContent='❤️ x3'; waveEl.textContent='Wave 1'; scoreEl.textContent='Score: 0'; killsEl.textContent='Kills: 0';
    running=true; paused=false;
    overlay.classList.add('hidden');
}

// Player fire
function playerFire() {
    if (!running || !player || !player.alive || player.reload>0) return;
    fireBullet(player, true);
    player.reload = 20;
}

function movePlayerLeft() {
    if (!player || !player.alive) return;
    player.targetX = Math.max(25, player.targetX - 30);
}
function movePlayerRight() {
    if (!player || !player.alive) return;
    player.targetX = Math.min(W-25, player.targetX + 30);
}

// Controls
btnFire.addEventListener('click', playerFire);
btnFire.addEventListener('touchstart', e => { e.preventDefault(); btnFire.classList.add('active'); playerFire(); }, {passive:false});
btnFire.addEventListener('touchend', e => { e.preventDefault(); btnFire.classList.remove('active'); }, {passive:false});

btnLeft.addEventListener('mousedown', e => { e.preventDefault(); btnLeft.classList.add('active'); movePlayerLeft(); });
btnLeft.addEventListener('mouseup', e => btnLeft.classList.remove('active'));
btnRight.addEventListener('mousedown', e => { e.preventDefault(); btnRight.classList.add('active'); movePlayerRight(); });
btnRight.addEventListener('mouseup', e => btnRight.classList.remove('active'));

btnLeft.addEventListener('touchstart', e => { e.preventDefault(); btnLeft.classList.add('active'); movePlayerLeft(); }, {passive:false});
btnLeft.addEventListener('touchend', e => { e.preventDefault(); btnLeft.classList.remove('active'); }, {passive:false});
btnRight.addEventListener('touchstart', e => { e.preventDefault(); btnRight.classList.add('active'); movePlayerRight(); }, {passive:false});
btnRight.addEventListener('touchend', e => { e.preventDefault(); btnRight.classList.remove('active'); }, {passive:false});

document.addEventListener('keydown', e => {
    if (!running) return;
    if (e.key==='ArrowLeft'||e.key==='a'||e.key==='A') movePlayerLeft();
    if (e.key==='ArrowRight'||e.key==='d'||e.key==='D') movePlayerRight();
    if (e.key===' '||e.key==='ArrowUp'||e.key==='w'||e.key==='W') playerFire();
});

startBtn.addEventListener('click', startGame);

// Game loop
setInterval(update, 1000/60);

draw();
</script>
</body>
</html>
