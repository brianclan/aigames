<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Cat Catch</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;background:#1a1a2e;font-family:Arial,sans-serif;}
#gameCanvas{width:100%;height:100%;display:block;}
#ui{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;z-index:10;}
.score-box{background:rgba(0,0,0,0.6);color:#fff;padding:10px 20px;border-radius:25px;font-size:20px;font-weight:bold;}
#gameOver{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.9);color:#fff;padding:30px 50px;border-radius:20px;text-align:center;display:none;z-index:20;}
#gameOver h2{font-size:28px;margin-bottom:15px;color:#ffcc00;}
#gameOver p{font-size:18px;margin-bottom:20px;}
#restartBtn{background:linear-gradient(135deg,#ff6b6b,#ee5a5a);color:#fff;border:none;padding:12px 30px;font-size:18px;border-radius:25px;cursor:pointer;}
#startScreen{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,#2d2d44,#1a1a2e);color:#fff;padding:40px 50px;border-radius:20px;text-align:center;z-index:25;box-shadow:0 10px 40px rgba(0,0,0,0.5);}
#startScreen h1{font-size:32px;margin-bottom:10px;color:#ffcc00;}
#startScreen p{font-size:16px;margin-bottom:25px;opacity:0.8;}
#startBtn{background:linear-gradient(135deg,#4ecdc4,#45b7aa);color:#fff;border:none;padding:15px 40px;font-size:20px;border-radius:25px;cursor:pointer;font-weight:bold;}
</style>
</head>
<body>
<div id="ui">
<div class="score-box">Score: <span id="score">0</span></div>
<div class="score-box">Lives: <span id="lives">3</span></div>
</div>
<div id="startScreen">
<h1>Cat Catch</h1>
<p>Swipe or drag to move the cat<br>Catch fish to score points!</p>
<button id="startBtn">Play</button>
</div>
<div id="gameOver">
<h2>Game Over!</h2>
<p>Final Score: <span id="finalScore">0</span></p>
<button id="restartBtn">Play Again</button>
</div>
<canvas id="gameCanvas"></canvas>
<script>
const canvas=document.getElementById('gameCanvas');
const scoreEl=document.getElementById('score');
const livesEl=document.getElementById('lives');
const gameOverEl=document.getElementById('gameOver');
const finalScoreEl=document.getElementById('finalScore');
const startScreen=document.getElementById('startScreen');
const startBtn=document.getElementById('startBtn');
const restartBtn=document.getElementById('restartBtn');

let scene,camera,renderer,cat,fishArr=[],score=0,lives=3,gameRunning=false;
let targetX=0,isDragging=false,lastX=0;
const moveSpeed=0.15;
const bounds=3;

function init(){
scene=new THREE.Scene();
scene.background=new THREE.Color(0x1a1a2e);
scene.fog=new THREE.Fog(0x1a1a2e,8,20);

camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,100);
camera.position.set(0,0,10);
camera.lookAt(0,0,0);

renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;

const ambientLight=new THREE.AmbientLight(0xffffff,0.4);
scene.add(ambientLight);

const mainLight=new THREE.DirectionalLight(0xffffff,0.8);
mainLight.position.set(5,10,7);
mainLight.castShadow=true;
scene.add(mainLight);

const fillLight=new THREE.DirectionalLight(0x4ecdc4,0.3);
fillLight.position.set(-5,3,-5);
scene.add(fillLight);

createGround();
createCat();

window.addEventListener('resize',onResize);
canvas.addEventListener('mousedown',onDown);
canvas.addEventListener('mousemove',onMove);
canvas.addEventListener('mouseup',onUp);
canvas.addEventListener('touchstart',onTouchStart,{passive:false});
canvas.addEventListener('touchmove',onTouchMove,{passive:false});
canvas.addEventListener('touchend',onTouchEnd);
}

function createGround(){
const groundGeo=new THREE.PlaneGeometry(30,30);
const groundMat=new THREE.MeshStandardMaterial({color:0x2d2d44,roughness:0.8});
const ground=new THREE.Mesh(groundGeo,groundMat);
ground.rotation.x=-Math.PI/2;
ground.position.y=-2;
ground.receiveShadow=true;
scene.add(ground);

const gridHelper=new THREE.GridHelper(20,20,0x3d3d5c,0x3d3d5c);
gridHelper.position.y=-1.9;
scene.add(gridHelper);
}

function createCat(){
cat=new THREE.Group();

const bodyGeo=new THREE.BoxGeometry(1.2,0.8,1.5);
const bodyMat=new THREE.MeshStandardMaterial({color:0xff9f43,roughness:0.5});
const body=new THREE.Mesh(bodyGeo,bodyMat);
body.castShadow=true;
body.position.y=0.4;
cat.add(body);

const headGeo=new THREE.BoxGeometry(1,0.9,0.9);
const headMat=new THREE.MeshStandardMaterial({color:0xff9f43,roughness:0.5});
const head=new THREE.Mesh(headGeo,headMat);
head.position.set(0,0.9,0.7);
head.castShadow=true;
cat.add(head);

const earGeo=new THREE.ConeGeometry(0.2,0.35,4);
const earMat=new THREE.MeshStandardMaterial({color:0xff6b6b,roughness:0.5});
const earL=new THREE.Mesh(earGeo,earMat);
earL.position.set(-0.35,1.5,0.7);
cat.add(earL);
const earR=new THREE.Mesh(earGeo,earMat);
earR.position.set(0.35,1.5,0.7);
cat.add(earR);

const eyeGeo=new THREE.SphereGeometry(0.1,8,8);
const eyeMat=new THREE.MeshBasicMaterial({color:0x1a1a2e});
const eyeL=new THREE.Mesh(eyeGeo,eyeMat);
eyeL.position.set(-0.25,1,1.15);
cat.add(eyeL);
const eyeR=new THREE.Mesh(eyeGeo,eyeMat);
eyeR.position.set(0.25,1,1.15);
cat.add(eyeR);

const noseGeo=new THREE.SphereGeometry(0.08,8,8);
const noseMat=new THREE.MeshStandardMaterial({color:0xff6b6b});
const nose=new THREE.Mesh(noseGeo,noseMat);
nose.position.set(0,0.75,1.3);
cat.add(nose);

const tailGeo=new THREE.CylinderGeometry(0.1,0.15,1.2,8);
const tailMat=new THREE.MeshStandardMaterial({color:0xff9f43,roughness:0.5});
const tail=new THREE.Mesh(tailGeo,tailMat);
tail.position.set(0,0.5,-1.1);
tail.rotation.x=Math.PI/3;
cat.add(tail);

const legGeo=new THREE.CylinderGeometry(0.12,0.12,0.5,8);
const legMat=new THREE.MeshStandardMaterial({color:0xff9f43});
const legPositions=[[-0.4,-0.1,0.5],[0.4,-0.1,0.5],[-0.4,-0.1,-0.5],[0.4,-0.1,-0.5]];
legPositions.forEach(pos=>{
const leg=new THREE.Mesh(legGeo,legMat);
leg.position.set(...pos);
cat.add(leg);
});

cat.position.set(0,-1,2);
cat.scale.set(0.8,0.8,0.8);
scene.add(cat);
}

function createFish(){
const fishGroup=new THREE.Group();

const bodyGeo=new THREE.SphereGeometry(0.3,8,8);
bodyGeo.scale(1.5,0.6,0.8);
const colors=[0x4ecdc4,0xff6b6b,0xffd93d,0x6bcb77,0x9b59b6];
const fishColor=colors[Math.floor(Math.random()*colors.length)];
const bodyMat=new THREE.MeshStandardMaterial({color:fishColor,roughness:0.3,metalness:0.2});
const body=new THREE.Mesh(bodyGeo,bodyMat);
body.castShadow=true;
fishGroup.add(body);

const tailGeo=new THREE.ConeGeometry(0.2,0.4,4);
const tailMat=new THREE.MeshStandardMaterial({color:fishColor,roughness:0.3});
const tail=new THREE.Mesh(tailGeo,tailMat);
tail.rotation.z=Math.PI/2;
tail.position.x=-0.5;
fishGroup.add(tail);

const eyeGeo=new THREE.SphereGeometry(0.06,8,8);
const eyeMat=new THREE.MeshBasicMaterial({color:0xffffff});
const eyeL=new THREE.Mesh(eyeGeo,eyeMat);
eyeL.position.set(0.25,0.08,0.2);
fishGroup.add(eyeL);
const eyeR=new THREE.Mesh(eyeGeo,eyeMat);
eyeR.position.set(0.25,0.08,-0.2);
fishGroup.add(eyeR);

const pupilGeo=new THREE.SphereGeometry(0.03,6,6);
const pupilMat=new THREE.MeshBasicMaterial({color:0x1a1a2e});
const pupilL=new THREE.Mesh(pupilGeo,pupilMat);
pupilL.position.set(0.28,0.08,0.2);
fishGroup.add(pupilL);
const pupilR=new THREE.Mesh(pupilGeo,pupilMat);
pupilR.position.set(0.28,0.08,-0.2);
fishGroup.add(pupilR);

const startX=(Math.random()-0.5)*8;
fishGroup.position.set(startX,7,1);
fishGroup.userData={speed:0.05+Math.random()*0.03,rotationSpeed:(Math.random()-0.5)*0.05};
scene.add(fishGroup);
fishArr.push(fishGroup);
}

function updateCat(){
const diff=targetX-cat.position.x;
cat.position.x+=diff*moveSpeed;
cat.position.x=Math.max(-bounds,Math.min(bounds,cat.position.x));
}

function updateFish(){
fishArr.forEach((fish,index)=>{
fish.position.y-=fish.userData.speed;
fish.rotation.y+=fish.userData.rotationSpeed;

const dx=cat.position.x-fish.position.x;
const dy=cat.position.y-fish.position.y;
const dist=Math.sqrt(dx*dx+dy*dy);

if(dist<1){
score++;
scoreEl.textContent=score;
scene.remove(fish);
fishArr.splice(index,1);
createCatchEffect(fish.position.clone());
}

if(fish.position.y<-4){
scene.remove(fish);
fishArr.splice(index,1);
lives--;
livesEl.textContent=lives;
if(lives<=0)endGame();
}
});
}

function createCatchEffect(pos){
for(let i=0;i<8;i++){
const sparkle=new THREE.Mesh(
new THREE.SphereGeometry(0.08,6,6),
new THREE.MeshBasicMaterial({color:0xffd93d})
);
sparkle.position.copy(pos);
sparkle.userData={vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,vz:(Math.random()-0.5)*0.2,life:1};
scene.add(sparkle);
setTimeout(()=>scene.remove(sparkle),500);
}
}

function endGame(){
gameRunning=false;
finalScoreEl.textContent=score;
gameOverEl.style.display='block';
}

function resetGame(){
fruitArr.forEach(f=>scene.remove(f));
fruitArr=[];
score=0;
lives=3;
scoreEl.textContent=score;
livesEl.textContent=lives;
cat.position.x=0;
targetX=0;
gameOverEl.style.display='none';
gameRunning=true;
}

function onDown(e){
isDragging=true;
lastX=e.clientX;
}

function onMove(e){
if(!isDragging)return;
const deltaX=e.clientX-lastX;
targetX+=deltaX*0.02;
targetX=Math.max(-bounds,Math.min(bounds,targetX));
lastX=e.clientX;
}

function onUp(){
isDragging=false;
}

function onTouchStart(e){
e.preventDefault();
isDragging=true;
lastX=e.touches[0].clientX;
}

function onTouchMove(e){
e.preventDefault();
if(!isDragging)return;
const deltaX=e.touches[0].clientX-lastX;
targetX+=deltaX*0.02;
targetX=Math.max(-bounds,Math.min(bounds,targetX));
lastX=e.touches[0].clientX;
}

function onTouchEnd(){
isDragging=false;
}

function onResize(){
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
}

let fruitArr=[];
function animate(){
requestAnimationFrame(animate);
if(gameRunning){
updateCat();
if(Math.random()<0.03)createFish();
updateFish();
}
renderer.render(scene,camera);
}

startBtn.addEventListener('click',()=>{
startScreen.style.display='none';
gameRunning=true;
});

restartBtn.addEventListener('click',()=>{
resetGame();
});

init();
animate();
</script>
</body>
</html>
