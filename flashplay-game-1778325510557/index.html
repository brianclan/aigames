<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cat Catch - Tank Battle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameContainer {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(26, 26, 46, 0.95);
            z-index: 10;
        }
        #gameOverScreen {
            display: none;
        }
        .title {
            font-size: clamp(2rem, 8vw, 4rem);
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
            margin-bottom: 20px;
            text-align: center;
        }
        .subtitle {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            color: #aaa;
            margin-bottom: 30px;
            text-align: center;
            padding: 0 20px;
        }
        .btn {
            padding: 15px 50px;
            font-size: clamp(1rem, 4vw, 1.3rem);
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            border: none;
            border-radius: 50px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: none;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 5;
            pointer-events: none;
        }
        .hud-panel {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 10px;
            border: 2px solid #00ff88;
        }
        .hud-text {
            color: #00ff88;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            font-weight: bold;
        }
        #scoreDisplay, #waveDisplay, #livesDisplay {
            display: block;
        }
        #joystickArea {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            display: none;
            z-index: 5;
        }
        #fireButton {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 68, 68, 0.8);
            border: 3px solid #ff4444;
            display: none;
            z-index: 5;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
        }
        #fireButton:active {
            background: rgba(255, 68, 68, 1);
        }
        .controls-hint {
            color: #888;
            font-size: 0.9rem;
            margin-top: 20px;
            text-align: center;
        }
        .final-score {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            color: #ffaa00;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="hud">
            <div class="hud-panel">
                <span class="hud-text" id="scoreDisplay">Score: 0</span>
            </div>
            <div class="hud-panel">
                <span class="hud-text" id="waveDisplay">Wave: 1</span>
            </div>
            <div class="hud-panel">
                <span class="hud-text" id="livesDisplay">Lives: 3</span>
            </div>
        </div>
        
        <div id="joystickArea">
            <canvas id="joystickCanvas" width="120" height="120"></canvas>
        </div>
        
        <div id="fireButton"></div>
        
        <div id="startScreen">
            <h1 class="title">CAT CATCH</h1>
            <p class="subtitle">Tank Battle Edition - Destroy enemy tanks and survive the waves!</p>
            <button class="btn" id="startBtn">START BATTLE</button>
            <p class="controls-hint">Use WASD/Arrows to move • SPACE/Click to fire<br>On mobile: Joystick to move • Red button to fire</p>
        </div>
        
        <div id="gameOverScreen">
            <h1 class="title">GAME OVER</h1>
            <p class="final-score" id="finalScore">Score: 0</p>
            <p class="subtitle" id="finalWave">You reached Wave 1</p>
            <button class="btn" id="restartBtn">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const joystickCanvas = document.getElementById('joystickCanvas');
        const joystickCtx = joystickCanvas.getContext('2d');
        
        let width, height;
        let gameState = 'start';
        let score = 0;
        let wave = 1;
        let lives = 3;
        let player = null;
        let enemies = [];
        let bullets = [];
        let enemyBullets = [];
        let particles = [];
        let obstacles = [];
        let keys = {};
        let joystickActive = false;
        let joystickX = 0;
        let joystickY = 0;
        let fireButtonPressed = false;
        let lastFireTime = 0;
        let enemiesKilledThisWave = 0;
        let enemiesRequiredForWave = 3;
        let isMobile = false;
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        function init() {
            resize();
            window.addEventListener('resize', resize);
            
            isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            
            if (isMobile) {
                document.getElementById('joystickArea').style.display = 'block';
                document.getElementById('fireButton').style.display = 'block';
                setupMobileControls();
            } else {
                setupKeyboardControls();
            }
            
            document.getElementById('startBtn').addEventListener('click', startGame);
            document.getElementById('startBtn').addEventListener('touchend', (e) => { e.preventDefault(); startGame(); });
            document.getElementById('restartBtn').addEventListener('click', startGame);
            document.getElementById('restartBtn').addEventListener('touchend', (e) => { e.preventDefault(); startGame(); });
            
            document.getElementById('fireButton').addEventListener('touchstart', (e) => { e.preventDefault(); fireButtonPressed = true; });
            document.getElementById('fireButton').addEventListener('touchend', (e) => { e.preventDefault(); fireButtonPressed = false; });
            document.getElementById('fireButton').addEventListener('mousedown', () => fireButtonPressed = true);
            document.getElementById('fireButton').addEventListener('mouseup', () => fireButtonPressed = false);
            
            requestAnimationFrame(gameLoop);
        }
        
        function setupKeyboardControls() {
            document.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                if (e.code === 'Space') {
                    e.preventDefault();
                    fireButtonPressed = true;
                }
            });
            document.addEventListener('keyup', (e) => {
                keys[e.code] = false;
                if (e.code === 'Space') {
                    fireButtonPressed = false;
                }
            });
            canvas.addEventListener('click', () => {
                if (gameState === 'playing') fire();
            });
        }
        
        function setupMobileControls() {
            const joystickArea = document.getElementById('joystickArea');
            let joystickTouch = null;
            const joystickCenter = { x: 60, y: 60 };
            const maxDist = 40;
            
            joystickArea.addEventListener('touchstart', (e) => {
                e.preventDefault();
                joystickTouch = e.touches[0].identifier;
                joystickActive = true;
                updateJoystick(e.touches[0]);
            });
            
            joystickArea.addEventListener('touchmove', (e) => {
                e.preventDefault();
                for (let touch of e.touches) {
                    if (touch.identifier === joystickTouch) {
                        updateJoystick(touch);
                    }
                }
            });
            
            joystickArea.addEventListener('touchend', (e) => {
                e.preventDefault();
                let found = false;
                for (let touch of e.touches) {
                    if (touch.identifier === joystickTouch) found = true;
                }
                if (!found) {
                    joystickActive = false;
                    joystickX = 0;
                    joystickY = 0;
                    joystickTouch = null;
                    drawJoystick();
                }
            });
            
            function updateJoystick(touch) {
                const rect = joystickCanvas.getBoundingClientRect();
                let x = touch.clientX - rect.left - joystickCenter.x;
                let y = touch.clientY - rect.top - joystickCenter.y;
                const dist = Math.sqrt(x*x + y*y);
                
                if (dist > maxDist) {
                    x = (x / dist) * maxDist;
                    y = (y / dist) * maxDist;
                }
                
                joystickX = x / maxDist;
                joystickY = y / maxDist;
                drawJoystick();
            }
            
            function drawJoystick() {
                joystickCtx.clearRect(0, 0, 120, 120);
                
                joystickCtx.beginPath();
                joystickCtx.arc(joystickCenter.x, joystickCenter.y, 50, 0, Math.PI * 2);
                joystickCtx.fillStyle = 'rgba(0, 255, 136, 0.2)';
                joystickCtx.fill();
                joystickCtx.strokeStyle = 'rgba(0, 255, 136, 0.5)';
                joystickCtx.lineWidth = 2;
                joystickCtx.stroke();
                
                const knobX = joystickCenter.x + joystickX * maxDist;
                const knobY = joystickCenter.y + joystickY * maxDist;
                
                joystickCtx.beginPath();
                joystickCtx.arc(knobX, knobY, 25, 0, Math.PI * 2);
                joystickCtx.fillStyle = '#00ff88';
                joystickCtx.fill();
            }
        }
        
        function startGame() {
            gameState = 'playing';
            score = 0;
            wave = 1;
            lives = 3;
            enemies = [];
            bullets = [];
            enemyBullets = [];
            particles = [];
            obstacles = [];
            enemiesKilledThisWave = 0;
            enemiesRequiredForWave = 3;
            
            player = {
                x: width / 2,
                y: height / 2,
                width: 40,
                height: 50,
                angle: -Math.PI / 2,
                speed: 0,
                maxSpeed: 4,
                acceleration: 0.2,
                friction: 0.95,
                rotationSpeed: 0.05,
                color: '#00ff88'
            };
            
            generateObstacles();
            spawnWave();
            
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            
            updateHUD();
        }
        
        function generateObstacles() {
            obstacles = [];
            const numObstacles = 5 + Math.floor(wave / 2);
            for (let i = 0; i < numObstacles; i++) {
                let valid = false;
                let attempts = 0;
                while (!valid && attempts < 50) {
                    const obs = {
                        x: Math.random() * (width - 100) + 50,
                        y: Math.random() * (height - 100) + 50,
                        width: 30 + Math.random() * 40,
                        height: 30 + Math.random() * 40,
                        color: `hsl(${Math.random() * 60 + 20}, 50%, 30%)`
                    };
                    
                    const distToPlayer = Math.sqrt(
                        Math.pow(obs.x - width/2, 2) + Math.pow(obs.y - height/2, 2)
                    );
                    
                    if (distToPlayer > 100) {
                        obstacles.push(obs);
                        valid = true;
                    }
                    attempts++;
                }
            }
        }
        
        function spawnWave() {
            const numEnemies = 2 + Math.floor(wave * 1.5);
            for (let i = 0; i < numEnemies; i++) {
                spawnEnemy();
            }
        }
        
        function spawnEnemy() {
            const side = Math.floor(Math.random() * 4);
            let x, y;
            
            switch(side) {
                case 0: x = Math.random() * width; y = -50; break;
                case 1: x = width + 50; y = Math.random() * height; break;
                case 2: x = Math.random() * width; y = height + 50; break;
                case 3: x = -50; y = Math.random() * height; break;
            }
            
            const types = ['basic', 'fast', 'heavy'];
            const type = types[Math.floor(Math.random() * Math.min(types.length, 1 + Math.floor(wave / 2)))];
            
            let enemy = {
                x: x,
                y: y,
                width: 35,
                height: 45,
                angle: 0,
                speed: 0,
                type: type,
                color: '#ff4444',
                lastShot: 0,
                shootInterval: 2000,
                hp: 1,
                points: 100
            };
            
            switch(type) {
                case 'fast':
                    enemy.speed = 2.5;
                    enemy.color = '#ffaa00';
                    enemy.points = 150;
                    break;
                case 'heavy':
                    enemy.speed = 1;
                    enemy.width = 45;
                    enemy.height = 55;
                    enemy.color = '#aa00ff';
                    enemy.hp = 3;
                    enemy.shootInterval = 1500;
                    enemy.points = 300;
                    break;
                default:
                    enemy.speed = 1.5;
                    enemy.color = '#ff4444';
                    enemy.shootInterval = 2500;
                    break;
            }
            
            enemies.push(enemy);
        }
        
        function fire() {
            const now = Date.now();
            if (now - lastFireTime < 300) return;
            lastFireTime = now;
            
            const bulletSpeed = 8;
            bullets.push({
                x: player.x + Math.cos(player.angle) * 30,
                y: player.y + Math.sin(player.angle) * 30,
                vx: Math.cos(player.angle) * bulletSpeed,
                vy: Math.sin(player.angle) * bulletSpeed,
                radius: 5,
                color: '#00ffff'
            });
            
            createParticles(player.x + Math.cos(player.angle) * 30, 
                          player.y + Math.sin(player.angle) * 30, 
                          '#00ffff', 3);
        }
        
        function enemyFire(enemy) {
            const now = Date.now();
            if (now - enemy.lastShot < enemy.shootInterval) return;
            enemy.lastShot = now;
            
            const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
            const bulletSpeed = 5;
            
            enemyBullets.push({
                x: enemy.x + Math.cos(angle) * 25,
                y: enemy.y + Math.sin(angle) * 25,
                vx: Math.cos(angle) * bulletSpeed,
                vy: Math.sin(angle) * bulletSpeed,
                radius: 4,
                color: '#ff0000'
            });
        }
        
        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 3;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 30,
                    maxLife: 30,
                    color: color,
                    size: 2 + Math.random() * 3
                });
            }
        }
        
        function createExplosion(x, y, size) {
            createParticles(x, y, '#ffaa00', 10 * size);
            createParticles(x, y, '#ff4444', 8 * size);
            createParticles(x, y, '#ffffff', 5 * size);
        }
        
        function update() {
            if (gameState !== 'playing') return;
            
            // Player input
            let moveX = 0, moveY = 0;
            
            if (isMobile) {
                if (joystickActive) {
                    const moveAngle = Math.atan2(joystickY, joystickX);
                    const magnitude = Math.sqrt(joystickX * joystickX + joystickY * joystickY);
                    moveX = Math.cos(moveAngle) * magnitude;
                    moveY = Math.sin(moveAngle) * magnitude;
                }
            } else {
                if (keys['KeyW'] || keys['ArrowUp']) moveY = -1;
                if (keys['KeyS'] || keys['ArrowDown']) moveY = 1;
                if (keys['KeyA'] || keys['ArrowLeft']) moveX = -1;
                if (keys['KeyD'] || keys['ArrowRight']) moveX = 1;
            }
            
            // Player movement
            if (moveX !== 0 || moveY !== 0) {
                const targetAngle = Math.atan2(moveY, moveX);
                let angleDiff = targetAngle - player.angle;
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                player.angle += angleDiff * player.rotationSpeed * 3;
                
                player.speed = Math.min(player.speed + player.acceleration, player.maxSpeed);
            } else {
                player.speed *= player.friction;
            }
            
            player.x += Math.cos(player.angle) * player.speed;
            player.y += Math.sin(player.angle) * player.speed;
            
            // Boundary collision
            player.x = Math.max(player.width/2, Math.min(width - player.width/2, player.x));
            player.y = Math.max(player.height/2, Math.min(height - player.height/2, player.y));
            
            // Obstacle collision
            for (let obs of obstacles) {
                if (rectCollision(player, obs)) {
                    resolveCollision(player, obs);
                }
            }
            
            // Fire
            if (fireButtonPressed) fire();
            
            // Update bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;
                
                if (b.x < 0 || b.x > width || b.y < 0 || b.y > height) {
                    bullets.splice(i, 1);
                    continue;
                }
                
                // Bullet-obstacle collision
                let hitObstacle = false;
                for (let obs of obstacles) {
                    if (pointInRect(b.x, b.y, obs)) {
                        createParticles(b.x, b.y, '#888888', 3);
                        bullets.splice(i, 1);
                        hitObstacle = true;
                        break;
                    }
                }
                if (hitObstacle) continue;
                
                // Bullet-enemy collision
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    if (pointInRect(b.x, b.y, {x: e.x - e.width/2, y: e.y - e.height/2, width: e.width, height: e.height})) {
                        e.hp--;
                        createParticles(b.x, b.y, e.color, 5);
                        bullets.splice(i, 1);
                        
                        if (e.hp <= 0) {
                            createExplosion(e.x, e.y, 1.5);
                            enemies.splice(j, 1);
                            score += e.points;
                            enemiesKilledThisWave++;
                            updateHUD();
                        }
                        break;
                    }
                }
            }
            
            // Update enemy bullets
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const b = enemyBullets[i];
                b.x += b.vx;
                b.y += b.vy;
                
                if (b.x < 0 || b.x > width || b.y < 0 || b.y > height) {
                    enemyBullets.splice(i, 1);
                    continue;
                }
                
                // Enemy bullet-obstacle collision
                let hitObstacle = false;
                for (let obs of obstacles) {
                    if (pointInRect(b.x, b.y, obs)) {
                        enemyBullets.splice(i, 1);
                        hitObstacle = true;
                        break;
                    }
                }
                if (hitObstacle) continue;
                
                // Enemy bullet-player collision
                if (pointInRect(b.x, b.y, {x: player.x - player.width/2, y: player.y - player.height/2, width: player.width, height: player.height})) {
                    enemyBullets.splice(i, 1);
                    lives--;
                    createExplosion(player.x, player.y, 1);
                    updateHUD();
                    
                    if (lives <= 0) {
                        gameOver();
                        return;
                    }
                }
            }
            
            // Update enemies
            for (let enemy of enemies) {
                const angleToPlayer = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                let angleDiff = angleToPlayer - enemy.angle;
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                enemy.angle += angleDiff * 0.03;
                
                enemy.x += Math.cos(enemy.angle) * enemy.speed;
                enemy.y += Math.sin(enemy.angle) * enemy.speed;
                
                // Boundary
                enemy.x = Math.max(-50, Math.min(width + 50, enemy.x));
                enemy.y = Math.max(-50, Math.min(height + 50, enemy.y));
                
                // Obstacle avoidance
                for (let obs of obstacles) {
                    if (rectCollision(enemy, obs)) {
                        enemy.x -= Math.cos(enemy.angle) * enemy.speed * 2;
                        enemy.y -= Math.sin(enemy.angle) * enemy.speed * 2;
                        enemy.angle += (Math.random() - 0.5) * 0.5;
                    }
                }
                
                // Enemy fire
                const distToPlayer = Math.sqrt(
                    Math.pow(player.x - enemy.x, 2) + Math.pow(player.y - enemy.y, 2)
                );
                if (distToPlayer < 400) {
                    enemyFire(enemy);
                }
                
                // Enemy-player collision
                if (rectCollision(enemy, player)) {
                    lives--;
                    createExplosion(player.x, player.y, 1);
                    updateHUD();
                    
                    if (lives <= 0) {
                        gameOver();
                        return;
                    } else {
                        // Push player away
                        const pushAngle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                        player.x += Math.cos(pushAngle) * 50;
                        player.y += Math.sin(pushAngle) * 50;
                    }
                }
            }
            
            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            // Wave progression
            if (enemies.length === 0) {
                wave++;
                enemiesKilledThisWave = 0;
                enemiesRequiredForWave = 3 + wave;
                generateObstacles();
                spawnWave();
                updateHUD();
            }
        }
        
        function rectCollision(a, b) {
            return a.x - a.width/2 < b.x + b.width &&
                   a.x + a.width/2 > b.x &&
                   a.y - a.height/2 < b.y + b.height &&
                   a.y + a.height/2 > b.y;
        }
        
        function pointInRect(px, py, rect) {
            return px >= rect.x && px <= rect.x + rect.width &&
                   py >= rect.y && py <= rect.y + rect.height;
        }
        
        function resolveCollision(entity, obstacle) {
            const overlapX = (entity.width/2 + obstacle.width/2) - Math.abs(entity.x - (obstacle.x + obstacle.width/2));
            const overlapY = (entity.height/2 + obstacle.height/2) - Math.abs(entity.y - (obstacle.y + obstacle.height/2));
            
            if (overlapX < overlapY) {
                entity.x += (entity.x < obstacle.x + obstacle.width/2 ? -overlapX : overlapX);
            } else {
                entity.y += (entity.y < obstacle.y + obstacle.height/2 ? -overlapY : overlapY);
            }
        }
        
        function updateHUD() {
            document.getElementById('scoreDisplay').textContent = `Score: ${score}`;
            document.getElementById('waveDisplay').textContent = `Wave: ${wave}`;
            document.getElementById('livesDisplay').textContent = `Lives: ${lives}`;
        }
        
        function gameOver() {
            gameState = 'gameover';
            document.getElementById('finalScore').textContent = `Score: ${score}`;
            document.getElementById('finalWave').textContent = `You reached Wave ${wave}`;
            document.getElementById('gameOverScreen').style.display = 'flex';
            document.getElementById('hud').style.display = 'none';
        }
        
        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, width, height);
            
            // Draw grid
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.1)';
            ctx.lineWidth = 1;
            const gridSize = 50;
            for (let x = 0; x < width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            for (let y = 0; y < height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
            
            // Draw obstacles
            for (let obs of obstacles) {
                ctx.fillStyle = obs.color;
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                ctx.strokeStyle = '#555';
                ctx.lineWidth = 2;
                ctx.strokeRect(obs.x, obs.y, obs.width, obs.height);
            }
            
            // Draw bullets
            for (let b of bullets) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fillStyle = b.color;
                ctx.fill();
                ctx.shadowColor = b.color;
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            
            // Draw enemy bullets
            for (let b of enemyBullets) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fillStyle = b.color;
                ctx.fill();
                ctx.shadowColor = b.color;
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            
            // Draw enemies
            for (let enemy of enemies) {
                drawTank(enemy, enemy.color);
            }
            
            // Draw player
            if (player && gameState === 'playing') {
                drawTank(player, player.color);
                
                // Draw cannon
                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.rotate(player.angle);
                ctx.fillStyle = '#00cc6a';
                ctx.fillRect(10, -4, 25, 8);
                ctx.restore();
            }
            
            // Draw particles
            for (let p of particles) {
                const alpha = p.life / p.maxLife;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = alpha;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        function drawTank(tank, color) {
            ctx.save();
            ctx.translate(tank.x, tank.y);
            ctx.rotate(tank.angle);
            
            // Tank body
            ctx.fillStyle = color;
            ctx.fillRect(-tank.width/2, -tank.height/2, tank.width, tank.height);
            
            // Tank tracks
            ctx.fillStyle = '#333';
            ctx.fillRect(-tank.width/2 - 5, -tank.height/2, 8, tank.height);
            ctx.fillRect(tank.width/2 - 3, -tank.height/2, 8, tank.height);
            
            // Tank turret
            ctx.beginPath();
            ctx.arc(0, 0, tank.width/3, 0, Math.PI * 2);
            ctx.fillStyle = shadeColor(color, -20);
            ctx.fill();
            
            // Tank cannon
            ctx.fillStyle = '#333';
            ctx.fillRect(5, -4, 20, 8);
            
            ctx.restore();
            
            // Glow effect
            ctx.save();
            ctx.globalAlpha = 0.3;
            ctx.shadowColor = color;
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(tank.x, tank.y, tank.width/2, 0, Math.PI * 2);
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.restore();
        }
        
        function shadeColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return '#' + (0x1000000 +
                (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
                (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
                (B < 255 ? B < 1 ? 0 : B : 255)
            ).toString(16).slice(1);
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        init();
    </script>
</body>
