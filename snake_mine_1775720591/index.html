<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>像素地雷贪吃蛇</title><style>html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#0f140f;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;touch-action:none}canvas{display:block;width:100vw;height:100vh;image-rendering:pixelated;image-rendering:crisp-edges}.hud{position:fixed;left:0;right:0;top:0;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;padding:calc(env(safe-area-inset-top,0px) + 10px) 10px 10px;pointer-events:none;box-sizing:border-box}.badge{background:rgba(0,0,0,.45);border:2px solid #69d36e;color:#dbffdb;padding:6px 10px;font-size:13px;box-shadow:0 0 0 2px rgba(0,0,0,.2) inset}.overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box}.card{max-width:440px;background:rgba(12,18,12,.94);border:3px solid #69d36e;color:#efffef;padding:18px;text-align:center;box-shadow:0 0 0 4px rgba(0,0,0,.25)}.title{font-size:24px;font-weight:700;margin-bottom:10px}.desc{font-size:13px;line-height:1.7;color:#caecca}.btn{display:inline-block;margin-top:12px;padding:8px 14px;border:3px solid #d9ffd9;background:#69d36e;color:#102010;font-weight:700}.controls{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 12px);transform:translateX(-50%);display:grid;grid-template-columns:64px 64px 64px;grid-template-rows:64px 64px;gap:8px;z-index:5}.ctrl{background:rgba(20,28,20,.92);border:3px solid #69d36e;color:#ecffec;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;user-select:none;-webkit-user-select:none}.ctrl:active{transform:scale(.98)}.ghost{visibility:hidden}@media (min-width:900px){.controls{left:auto;right:18px;transform:none}} </style></head><body><canvas id="game"></canvas><div class="hud"><div class="badge">得分 <span id="score">0</span></div><div class="badge">长度 <span id="length">3</span></div><div class="badge">地雷 <span id="mineCount">0</span></div><div class="badge">最高 <span id="best">0</span></div></div><div class="overlay" id="overlay"><div class="card"><div class="title" id="ovTitle">像素地雷贪吃蛇</div><div class="desc" id="ovDesc">吃食物加分并变长。地图会持续随机刷新地雷，蛇头或蛇身碰到地雷会立刻爆炸。<br>支持方向键、WASD、点击虚拟方向按钮、手机滑动。</div><div class="btn" id="ovBtn">开始游戏</div></div></div><div class="controls"><div class="ghost"></div><div class="ctrl" data-dir="up">▲</div><div class="ghost"></div><div class="ctrl" data-dir="left">◀</div><div class="ctrl" data-dir="down">▼</div><div class="ctrl" data-dir="right">▶</div></div><script>const canvas=document.getElementById('game');const ctx=canvas.getContext('2d');const scoreEl=document.getElementById('score');const lengthEl=document.getElementById('length');const mineCountEl=document.getElementById('mineCount');const bestEl=document.getElementById('best');const overlay=document.getElementById('overlay');const ovTitle=document.getElementById('ovTitle');const ovDesc=document.getElementById('ovDesc');let DPR=Math.max(1,Math.min(2,window.devicePixelRatio||1)),W=0,H=0;const COLS=24,ROWS=34;let cell=16,boardW=0,boardH=0,ox=0,oy=0;function resize(){W=innerWidth;H=innerHeight;canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);cell=Math.max(12,Math.floor(Math.min((W-24)/COLS,(H-120)/ROWS)));boardW=cell*COLS;boardH=cell*ROWS;ox=Math.floor((W-boardW)/2);oy=Math.max(56,Math.floor((H-boardH)/2))}resize();addEventListener('resize',resize);const BEST_KEY='pixel_mine_snake_best_final';let best=+localStorage.getItem(BEST_KEY)||0;bestEl.textContent=best;let snake=[],dir='right',nextDir='right',food=null,mines=new Set(),score=0,started=false,alive=false,acc=0,stepTime=.14,mineTimer=0,last=0,particles=[];function rand(n){return Math.floor(Math.random()*n)}function k(x,y){return x+','+y}function eq(a,b){return a.x===b.x&&a.y===b.y}function inside(x,y){return x>=0&&x<COLS&&y>=0&&y<ROWS}function hasMine(x,y){return mines.has(k(x,y))}function snakeIndex(x,y){for(let i=0;i<snake.length;i++)if(snake[i].x===x&&snake[i].y===y)return i;return -1}function blocked(x,y){if(food&&food.x===x&&food.y===y)return true;if(hasMine(x,y))return true;return snakeIndex(x,y)!==-1}function randomEmptyCell(minDist=0){for(let tries=0;tries<5000;tries++){const x=rand(COLS),y=rand(ROWS);if(blocked(x,y))continue;const d=Math.abs(x-snake[0].x)+Math.abs(y-snake[0].y);if(d<minDist)continue;return{x,y}}return null}function spawnFood(){const c=randomEmptyCell(2);if(c)food=c}function spawnMine(){const c=randomEmptyCell(3);if(c){mines.add(k(c.x,c.y));updateHud()}}function updateHud(){scoreEl.textContent=score;lengthEl.textContent=snake.length;mineCountEl.textContent=mines.size;bestEl.textContent=best}function resetGame(){snake=[{x:6,y:17},{x:5,y:17},{x:4,y:17}];dir='right';nextDir='right';food=null;mines=new Set();score=0;acc=0;stepTime=.14;mineTimer=2.3;particles=[];started=true;alive=true;for(let i=0;i<7;i++)spawnMine();spawnFood();updateHud();overlay.style.display='none'}function setDir(d){const opp={up:'down',down:'up',left:'right',right:'left'};if(d!==opp[dir])nextDir=d}function explode(gx,gy){for(let i=0;i<34;i++){const a=Math.PI*2*i/34+Math.random()*.12;const v=1.5+Math.random()*4.2;particles.push({x:ox+gx*cell+cell/2,y:oy+gy*cell+cell/2,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:.95,size:2+Math.random()*5,color:i%3===0?'#ffef66':i%2===0?'#ff7a45':'#ffd24d'})}}function gameOver(msg){alive=false;started=false;if(score>best){best=score;localStorage.setItem(BEST_KEY,String(best))}updateHud();ovTitle.textContent='游戏结束';ovDesc.innerHTML=msg+'<br>得分：'+score+'　长度：'+snake.length+'<br>点击开始、方向按钮，或按方向键重新开始';overlay.style.display='flex'}function step(){dir=nextDir;const head={x:snake[0].x,y:snake[0].y};if(dir==='up')head.y--;else if(dir==='down')head.y++;else if(dir==='left')head.x--;else head.x++;if(!inside(head.x,head.y)){explode(Math.max(0,Math.min(COLS-1,head.x)),Math.max(0,Math.min(ROWS-1,head.y)));gameOver('撞墙了');return}if(hasMine(head.x,head.y)){explode(head.x,head.y);gameOver('蛇头踩到地雷');return}snake.unshift(head);const ate=food&&eq(head,food);if(ate){score++;if(score>best){best=score;localStorage.setItem(BEST_KEY,String(best))}spawnFood();if(score%4===0&&stepTime>.09)stepTime-=.006}else{snake.pop()}for(let i=1;i<snake.length;i++){if(eq(snake[0],snake[i])){explode(snake[0].x,snake[0].y);gameOver('撞到自己了');return}}for(let i=0;i<snake.length;i++){if(hasMine(snake[i].x,snake[i].y)){explode(snake[i].x,snake[i].y);gameOver(i===0?'蛇头踩到地雷':'蛇身碰到地雷');return}}updateHud()}function update(dt){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*60*dt;p.y+=p.vy*60*dt;p.vx*=0.985;p.vy*=0.985;p.life-=dt*1.22;if(p.life<=0)particles.splice(i,1)}if(!alive)return;mineTimer-=dt;if(mineTimer<=0){spawnMine();mineTimer=1.8+Math.random()*2.2}acc+=dt;while(acc>=stepTime){acc-=stepTime;step();if(!alive)break}}function rect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h))}function drawBoard(){rect(0,0,W,H,'#0f140f');rect(ox-6,oy-6,boardW+12,boardH+12,'#293729');for(let y=0;y<ROWS;y++){for(let x=0;x<COLS;x++){rect(ox+x*cell,oy+y*cell,cell-1,cell-1,((x+y)&1)?'#182418':'#1f2c1f')}}}function drawFood(){if(!food)return;const x=ox+food.x*cell,y=oy+food.y*cell;rect(x+cell*.2,y+cell*.2,cell*.6,cell*.6,'#ff5a5a');rect(x+cell*.3,y+cell*.08,cell*.12,cell*.14,'#89df67');rect(x+cell*.42,y+cell*.12,cell*.12,cell*.12,'#b9ff9d')}function drawMines(){for(const m of mines){const parts=m.split(',');const mx=+parts[0],my=+parts[1];const x=ox+mx*cell,y=oy+my*cell;rect(x+cell*.2,y+cell*.2,cell*.6,cell*.6,'#343434');rect(x+cell*.3,y+cell*.3,cell*.4,cell*.4,'#4b4b4b');rect(x+cell*.44,y+cell*.06,cell*.08,cell*.18,'#7a7a7a');rect(x+cell*.44,y+cell*.76,cell*.08,cell*.18,'#7a7a7a');rect(x+cell*.06,y+cell*.44,cell*.18,cell*.08,'#7a7a7a');rect(x+cell*.76,y+cell*.44,cell*.18,cell*.08,'#7a7a7a')}}function drawSnake(){for(let i=snake.length-1;i>=0;i--){const s=snake[i],x=ox+s.x*cell,y=oy+s.y*cell;const head=i===0;rect(x+1,y+1,cell-2,cell-2,head?'#79ff74':'#43c95e');rect(x+3,y+3,cell-6,Math.max(3,cell*.2),head?'#d8ffd2':'#96f1a8');if(head){if(dir==='up'||dir==='down'){rect(x+cell*.25,y+cell*.24,3,3,'#102010');rect(x+cell*.62,y+cell*.24,3,3,'#102010')}else{rect(x+cell*.28,y+cell*.22,3,3,'#102010');rect(x+cell*.28,y+cell*.6,3,3,'#102010')}}}}function drawParticles(){for(const p of particles){ctx.globalAlpha=Math.max(0,p.life);rect(p.x,p.y,p.size,p.size,p.color)}ctx.globalAlpha=1}function drawHint(){ctx.fillStyle='#a8d8aa';ctx.font='12px monospace';ctx.textAlign='center';ctx.fillText('方向键 / WASD / 虚拟按钮 / 手机滑动',W/2,H-8)}function render(){drawBoard();drawFood();drawMines();drawSnake();drawParticles();drawHint()}function loop(ts){if(!last)last=ts;const dt=Math.min(.033,(ts-last)/1000);last=ts;update(dt);render();requestAnimationFrame(loop)}requestAnimationFrame(loop);function startOrTurn(d){if(!started)resetGame();if(d)setDir(d)}document.querySelectorAll('.ctrl').forEach(el=>{el.addEventListener('click',e=>{e.stopPropagation();startOrTurn(el.dataset.dir)});el.addEventListener('pointerdown',e=>{e.stopPropagation();startOrTurn(el.dataset.dir)})});overlay.addEventListener('click',()=>resetGame());addEventListener('keydown',e=>{const key=e.key.toLowerCase();if(key==='arrowup'||key==='w')startOrTurn('up');else if(key==='arrowdown'||key==='s')startOrTurn('down');else if(key==='arrowleft'||key==='a')startOrTurn('left');else if(key==='arrowright'||key==='d')startOrTurn('right')});let touchStart=null;canvas.addEventListener('touchstart',e=>{const t=e.touches[0];touchStart={x:t.clientX,y:t.clientY};if(!started)resetGame()},{passive:true});canvas.addEventListener('touchend',e=>{if(!touchStart)return;const t=e.changedTouches[0];const dx=t.clientX-touchStart.x,dy=t.clientY-touchStart.y;if(Math.abs(dx)>10||Math.abs(dy)>10){if(Math.abs(dx)>Math.abs(dy))setDir(dx>0?'right':'left');else setDir(dy>0?'down':'up')}touchStart=null},{passive:true});render();</script></body></html>
