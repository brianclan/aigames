<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Eat Apple</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a0a2e;touch-action:none}
#gameCanvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
let w,h,scale;

const game={
  score:0,
  lives:3,
  state:'start',
  player:null,
  apples:[],
  particles:[],
  stars:[]
};

function resize(){
  w=canvas.width=window.innerWidth;
  h=canvas.height=window.innerHeight;
  scale=Math.min(w/400,h/700);
}

function createPlayer(){
  return{
    x:w/2,
    y:h-120*scale,
    width:100*scale,
    height:60*scale,
    speed:8*scale,
    targetX:w/2
  };
}

function createApple(){
  const size=(30+Math.random()*20)*scale;
  return{
    x:Math.random()*(w-size)+size/2,
    y:-size,
    size:size,
    speed:(3+Math.random()*3)*scale,
    rotation:Math.random()*Math.PI*2,
    rotSpeed:(Math.random()-0.5)*0.1
  };
}

function createParticle(x,y,color){
  return{
    x:x,
    y:y,
    vx:(Math.random()-0.5)*8,
    vy:(Math.random()-0.5)*8-3,
    size:(5+Math.random()*10)*scale,
    life:1,
    color:color,
    decay:0.02+Math.random()*0.02
  };
}

function createStar(){
  return{
    x:Math.random()*w,
    y:Math.random()*h*0.6,
    size:(1+Math.random()*2)*scale,
    twinkle:Math.random()*Math.PI*2,
    speed:0.02+Math.random()*0.03
  };
}

function init(){
  game.player=createPlayer();
  game.apples=[];
  game.particles=[];
  game.score=0;
  game.lives=3;
  game.stars=[];
  for(let i=0;i<50;i++)game.stars.push(createStar());
}

function spawnApple(){
  if(game.state==='playing' && Math.random()<0.03){
    game.apples.push(createApple());
  }
}

function update(){
  if(game.state!=='playing')return;
  
  const p=game.player;
  const dx=p.targetX-p.x;
  p.x+=dx*0.15;
  
  for(let i=game.apples.length-1;i>=0;i--){
    const a=game.apples[i];
    a.y+=a.speed;
    a.rotation+=a.rotSpeed;
    
    if(a.y>h+a.size){
      game.apples.splice(i,1);
      game.lives--;
      if(game.lives<=0)game.state='over';
      continue;
    }
    
    const dist=Math.hypot(a.x-p.x,a.y-p.y);
    if(dist<a.size/2+p.width/2){
      game.apples.splice(i,1);
      game.score++;
      for(let j=0;j<8;j++){
        game.particles.push(createParticle(a.x,a.y,'#ff6b6b'));
        game.particles.push(createParticle(a.x,a.y,'#ffd93d'));
      }
    }
  }
  
  for(let i=game.particles.length-1;i>=0;i--){
    const p2=game.particles[i];
    p2.x+=p2.vx;
    p2.y+=p2.vy;
    p2.vy+=0.2;
    p2.life-=p2.decay;
    if(p2.life<=0)game.particles.splice(i,1);
  }
  
  for(const s of game.stars){
    s.twinkle+=s.speed;
  }
}

function drawBackground(){
  const grad=ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,'#0f0c29');
  grad.addColorStop(0.5,'#302b63');
  grad.addColorStop(1,'#24243e');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,w,h);
  
  for(const s of game.stars){
    const alpha=0.3+Math.sin(s.twinkle)*0.5;
    ctx.fillStyle=`rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
    ctx.fill();
  }
}

function drawPlayer(){
  const p=game.player;
  ctx.save();
  ctx.translate(p.x,p.y);
  
  ctx.fillStyle='#8b4513';
  ctx.beginPath();
  ctx.ellipse(0,10*scale,p.width/2,25*scale,0,0,Math.PI*2);
  ctx.fill();
  
  ctx.fillStyle='#d2691e';
  ctx.beginPath();
  ctx.ellipse(0,0,p.width/2-5*scale,20*scale,0,0,Math.PI*2);
  ctx.fill();
  
  ctx.fillStyle='#ffd700';
  ctx.beginPath();
  ctx.ellipse(0,5*scale,p.width/2-10*scale,15*scale,0,0,Math.PI);
  ctx.fill();
  
  ctx.strokeStyle='#8b4513';
  ctx.lineWidth=3*scale;
  ctx.beginPath();
  ctx.arc(-p.width/2+5*scale,5*scale,8*scale,0,Math.PI*2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(p.width/2-5*scale,5*scale,8*scale,0,Math.PI*2);
  ctx.stroke();
  
  ctx.restore();
}

function drawApple(a){
  ctx.save();
  ctx.translate(a.x,a.y);
  ctx.rotate(a.rotation);
  
  const s=a.size/2;
  
  const grad=ctx.createRadialGradient(-s*0.3,-s*0.3,0,s*0.2,s*0.2,s);
  grad.addColorStop(0,'#ff6b6b');
  grad.addColorStop(0.7,'#c0392b');
  grad.addColorStop(1,'#8b0000');
  ctx.fillStyle=grad;
  ctx.beginPath();
  ctx.arc(0,0,s,0,Math.PI*2);
  ctx.fill();
  
  ctx.fillStyle='#27ae60';
  ctx.beginPath();
  ctx.ellipse(s*0.2,-s*0.7,s*0.15,s*0.4,0.3,0,Math.PI*2);
  ctx.fill();
  
  ctx.strokeStyle='#5d4037';
  ctx.lineWidth=2*scale;
  ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.lineTo(0,-s*0.8);
  ctx.stroke();
  
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.ellipse(-s*0.3,-s*0.3,s*0.2,s*0.15,-0.5,0,Math.PI*2);
  ctx.fill();
  
  ctx.restore();
}

function drawParticles(){
  for(const p of game.particles){
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawUI(){
  ctx.fillStyle='#fff';
  ctx.font=`bold ${24*scale}px Arial`;
  ctx.textAlign='left';
  ctx.fillText(`🍎 ${game.score}`,20*scale,40*scale);
  
  ctx.textAlign='right';
  for(let i=0;i<game.lives;i++){
    ctx.font=`${20*scale}px Arial`;
    ctx.fillText('❤️',w-20*scale-i*28*scale,40*scale);
  }
}

function drawStartScreen(){
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillRect(0,0,w,h);
  
  ctx.fillStyle='#ffd93d';
  ctx.font=`bold ${48*scale}px Arial`;
  ctx.textAlign='center';
  ctx.fillText('Eat Apple',w/2,h/2-80*scale);
  
  ctx.fillStyle='#fff';
  ctx.font=`${20*scale}px Arial`;
  ctx.fillText('滑动或点击来移动碗',w/2,h/2-20*scale);
  ctx.fillText('接住掉落的苹果得分',w/2,h/2+10*scale);
  
  const pulse=Math.sin(Date.now()*0.005)*5*scale;
  ctx.fillStyle='#4ade80';
  ctx.font=`bold ${28*scale+pulse}px Arial`;
  ctx.fillText('点击开始游戏',w/2,h/2+80*scale);
}

function drawOverScreen(){
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillRect(0,0,w,h);
  
  ctx.fillStyle='#ff6b6b';
  ctx.font=`bold ${42*scale}px Arial`;
  ctx.textAlign='center';
  ctx.fillText('游戏结束',w/2,h/2-60*scale);
  
  ctx.fillStyle='#ffd93d';
  ctx.font=`bold ${36*scale}px Arial`;
  ctx.fillText(`得分: ${game.score}`,w/2,h/2);
  
  const pulse=Math.sin(Date.now()*0.005)*5*scale;
  ctx.fillStyle='#4ade80';
  ctx.font=`bold ${24*scale+pulse}px Arial`;
  ctx.fillText('点击重新开始',w/2,h/2+60*scale);
}

function draw(){
  drawBackground();
  
  for(const a of game.apples)drawApple(a);
  drawParticles();
  drawPlayer();
  drawUI();
  
  if(game.state==='start')drawStartScreen();
  if(game.state==='over')drawOverScreen();
}

function gameLoop(){
  spawnApple();
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

function handleInput(clientX){
  if(game.state==='start'){
    game.state='playing';
    return;
  }
  if(game.state==='over'){
    init();
    game.state='playing';
    return;
  }
  game.player.targetX=clientX;
}

canvas.addEventListener('mousedown',e=>handleInput(e.clientX));
canvas.addEventListener('mousemove',e=>{
  if(e.buttons===1 && game.state==='playing'){
    game.player.targetX=e.clientX;
  }
});

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length>0)handleInput(e.touches[0].clientX);
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length>0 && game.state==='playing'){
    game.player.targetX=e.touches[0].clientX;
  }
},{passive:false});

window.addEventListener('resize',()=>{
  resize();
  if(game.player){
    game.player.x=w/2;
    game.player.y=h-120*scale;
    game.player.width=100*scale;
    game.player.height=60*scale;
    game.player.targetX=w/2;
  }
});

resize();
init();
gameLoop();
</script>
</body>
</html>
