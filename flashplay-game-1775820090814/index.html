<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>猫咪接鱼</title><style>html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:linear-gradient(180deg,#8fd3ff 0%,#dff7ff 55%,#fff3d6 100%);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:none;-webkit-user-select:none;user-select:none}#game{display:block;width:100vw;height:100vh}#ui{position:fixed;left:0;top:0;right:0;pointer-events:none;color:#17324d;text-shadow:0 2px 0 rgba(255,255,255,.35)}#topbar{display:flex;justify-content:space-between;align-items:center;padding:calc(env(safe-area-inset-top) + 10px) 14px 0 14px;font-weight:700;font-size:18px}#hint{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 12px);transform:translateX(-50%);background:rgba(255,255,255,.72);color:#234;padding:8px 14px;border-radius:999px;font-size:14px;backdrop-filter:blur(6px);pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.08)}#overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(11,30,45,.18);pointer-events:auto}#panel{width:min(86vw,420px);background:rgba(255,255,255,.86);border-radius:24px;padding:22px 18px;text-align:center;box-shadow:0 16px 40px rgba(0,0,0,.18);color:#16314b}#panel h1{margin:0 0 8px;font-size:30px}#panel p{margin:8px 0 0;line-height:1.5;font-size:16px}#btn{margin-top:16px;border:none;background:linear-gradient(180deg,#ffb347,#ff8b3d);color:#fff;font-size:20px;font-weight:800;padding:14px 26px;border-radius:16px;box-shadow:0 10px 20px rgba(255,139,61,.35)}#btn:active{transform:scale(.98)}.hide{display:none}</style></head><body><canvas id="game"></canvas><div id="ui"><div id="topbar"><div id="score">得分 0</div><div id="life">漏接 0 / 5</div></div><div id="hint">按住屏幕左右拖动，接住小鱼</div></div><div id="overlay"><div id="panel"><h1>猫咪接鱼</h1><p id="panelText">小鱼会从天上掉下来，移动猫咪把它们接住。<br>漏接 5 条就结束。</p><button id="btn">开始游戏</button></div></div><script>(function(){const canvas=document.getElementById('game');const ctx=canvas.getContext('2d');const scoreEl=document.getElementById('score');const lifeEl=document.getElementById('life');const overlay=document.getElementById('overlay');const btn=document.getElementById('btn');const panelText=document.getElementById('panelText');let w=0,h=0,dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1));function resize(){w=window.innerWidth;h=window.innerHeight;canvas.width=Math.floor(w*dpr);canvas.height=Math.floor(h*dpr);canvas.style.width=w+'px';canvas.style.height=h+'px';ctx.setTransform(dpr,0,0,dpr,0,0)}window.addEventListener('resize',resize,{passive:true});resize();const state={running:false,score:0,miss:0,maxMiss:5,time:0,spawn:0,speed:1,clouds:[],fish:[],ripples:[],stars:[]};for(let i=0;i<5;i++){state.clouds.push({x:Math.random()*w,y:40+Math.random()*h*0.25,s:0.6+Math.random()*1.2,v:0.15+Math.random()*0.25})}const cat={x:w*0.5,y:h*0.83,w:76,h:58,targetX:w*0.5};function reset(){state.running=true;state.score=0;state.miss=0;state.time=0;state.spawn=0;state.speed=1;state.fish.length=0;state.ripples.length=0;cat.x=w*0.5;cat.targetX=cat.x;updateUI()}function updateUI(){scoreEl.textContent='得分 '+state.score;lifeEl.textContent='漏接 '+state.miss+' / '+state.maxMiss}function spawnFish(){const bad=Math.random()<Math.min(0.12+state.score*0.006,0.28);const size=bad?(26+Math.random()*8):(24+Math.random()*14);state.fish.push({x:24+Math.random()*(w-48),y:-30,r:0,vy:(2.4+Math.random()*1.8)*state.speed,rot:(Math.random()*0.08-0.04),size,bad,wobble:Math.random()*6.28,drift:(Math.random()*1.2-0.6)})}function addRipple(x,y,color){for(let i=0;i<5;i++){state.ripples.push({x,y,vx:(Math.random()*2-1)*2.5,vy:(Math.random()*2-1)*2.5,a:1,r:4+Math.random()*6,color})}}function pointerX(ev){if(ev.touches&&ev.touches[0])return ev.touches[0].clientX;return ev.clientX}function moveTo(px){cat.targetX=Math.max(cat.w*0.5+8,Math.min(w-cat.w*0.5-8,px))}window.addEventListener('pointerdown',e=>{moveTo(pointerX(e));if(!state.running&&overlay.classList.contains('hide')){}},{passive:true});window.addEventListener('pointermove',e=>{moveTo(pointerX(e))},{passive:true});window.addEventListener('touchstart',e=>{moveTo(pointerX(e))},{passive:true});window.addEventListener('touchmove',e=>{moveTo(pointerX(e))},{passive:true});btn.addEventListener('click',()=>{overlay.classList.add('hide');reset()});function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}function drawCloud(x,y,s){ctx.fillStyle='rgba(255,255,255,0.72)';ctx.beginPath();ctx.arc(x,y,18*s,0,Math.PI*2);ctx.arc(x+18*s,y-8*s,22*s,0,Math.PI*2);ctx.arc(x+42*s,y,18*s,0,Math.PI*2);ctx.fill()}function drawFish(f){ctx.save();ctx.translate(f.x,f.y);ctx.rotate(Math.sin(f.wobble)*0.25+f.r);if(f.bad){ctx.fillStyle='#6f7b8c';ctx.beginPath();ctx.moveTo(-f.size*0.55,0);ctx.quadraticCurveTo(-f.size*0.1,-f.size*0.42,f.size*0.3,0);ctx.quadraticCurveTo(-f.size*0.1,f.size*0.42,-f.size*0.55,0);ctx.fill();ctx.beginPath();ctx.moveTo(f.size*0.25,0);ctx.lineTo(f.size*0.65,-f.size*0.28);ctx.lineTo(f.size*0.65,f.size*0.28);ctx.closePath();ctx.fill();ctx.fillStyle='#e8eef7';ctx.beginPath();ctx.arc(-f.size*0.18,-f.size*0.06,f.size*0.07,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#495463';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-f.size*0.05,-f.size*0.18);ctx.lineTo(f.size*0.12,f.size*0.18);ctx.moveTo(f.size*0.12,-f.size*0.18);ctx.lineTo(-f.size*0.05,f.size*0.18);ctx.stroke()}else{ctx.fillStyle='#ffb548';ctx.beginPath();ctx.moveTo(-f.size*0.58,0);ctx.quadraticCurveTo(-f.size*0.1,-f.size*0.45,f.size*0.3,0);ctx.quadraticCurveTo(-f.size*0.1,f.size*0.45,-f.size*0.58,0);ctx.fill();ctx.fillStyle='#ff8a3d';ctx.beginPath();ctx.moveTo(f.size*0.22,0);ctx.lineTo(f.size*0.68,-f.size*0.3);ctx.lineTo(f.size*0.68,f.size*0.3);ctx.closePath();ctx.fill();ctx.fillStyle='#fff7d6';ctx.beginPath();ctx.arc(-f.size*0.2,-f.size*0.07,f.size*0.07,0,Math.PI*2);ctx.fill();ctx.fillStyle='#17324d';ctx.beginPath();ctx.arc(-f.size*0.2,-f.size*0.07,f.size*0.03,0,Math.PI*2);ctx.fill()}ctx.restore()}function drawCat(){const x=cat.x,y=cat.y;ctx.save();ctx.translate(x,y);ctx.fillStyle='#f4a261';ctx.beginPath();ctx.ellipse(0,10,34,24,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(0,-16,24,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.moveTo(-16,-27);ctx.lineTo(-7,-47);ctx.lineTo(1,-24);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(16,-27);ctx.lineTo(7,-47);ctx.lineTo(-1,-24);ctx.closePath();ctx.fill();ctx.fillStyle='#ffd1b0';ctx.beginPath();ctx.ellipse(0,-10,14,11,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-8,-18,4.8,0,Math.PI*2);ctx.arc(8,-18,4.8,0,Math.PI*2);ctx.fill();ctx.fillStyle='#17324d';ctx.beginPath();ctx.arc(-8,-18,2.2,0,Math.PI*2);ctx.arc(8,-18,2.2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ef476f';ctx.beginPath();ctx.moveTo(0,-11);ctx.lineTo(-4,-6);ctx.lineTo(4,-6);ctx.closePath();ctx.fill();ctx.strokeStyle='#8b4a2b';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-14,-10);ctx.lineTo(-28,-13);ctx.moveTo(-14,-6);ctx.lineTo(-30,-5);ctx.moveTo(14,-10);ctx.lineTo(28,-13);ctx.moveTo(14,-6);ctx.lineTo(30,-5);ctx.stroke();ctx.strokeStyle='#a85d36';ctx.lineWidth=5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(-15,26);ctx.lineTo(-15,42);ctx.moveTo(15,26);ctx.lineTo(15,42);ctx.stroke();ctx.strokeStyle='#a85d36';ctx.lineWidth=6;ctx.beginPath();ctx.arc(34,6,16,-1.3,0.9);ctx.stroke();ctx.restore()}function drawBackground(){const grad=ctx.createLinearGradient(0,0,0,h);grad.addColorStop(0,'#8fd3ff');grad.addColorStop(0.58,'#dff7ff');grad.addColorStop(1,'#fff3d6');ctx.fillStyle=grad;ctx.fillRect(0,0,w,h);for(const c of state.clouds)drawCloud(c.x,c.y,c.s);ctx.fillStyle='#8bd17c';ctx.beginPath();ctx.moveTo(0,h*0.84);ctx.quadraticCurveTo(w*0.2,h*0.8,w*0.38,h*0.84);ctx.quadraticCurveTo(w*0.56,h*0.88,w*0.78,h*0.83);ctx.quadraticCurveTo(w*0.92,h*0.8,w,h*0.84);ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();ctx.fill();ctx.fillStyle='#5ca65d';ctx.fillRect(0,h*0.88,w,h*0.12)}function endGame(){state.running=false;overlay.classList.remove('hide');panelText.innerHTML='游戏结束，最终得分 <b>'+state.score+'</b> 分。<br>再来一次，看看你能接住多少条鱼。';btn.textContent='重新开始'}let last=0;function loop(ts){const dt=Math.min(33,ts-last||16.7);last=ts;drawBackground();for(const c of state.clouds){c.x+=c.v*dt*0.03;if(c.x>w+80)c.x=-80}if(state.running){state.time+=dt;state.spawn+=dt;state.speed=1+Math.min(1.4,state.score*0.03);cat.x+=((cat.targetX||cat.x)-cat.x)*Math.min(0.22,dt*0.015);const spawnEvery=Math.max(320,900-state.score*16);if(state.spawn>=spawnEvery){state.spawn=0;spawnFish()}for(let i=state.fish.length-1;i>=0;i--){const f=state.fish[i];f.y+=f.vy*dt*0.06;f.x+=Math.sin((state.time*0.003)+f.wobble)*f.drift;f.r+=f.rot;const catchZoneY=cat.y-8;const dx=Math.abs(f.x-cat.x);if(f.y>catchZoneY&&f.y<cat.y+26&&dx<cat.w*0.45+f.size*0.38){if(f.bad){state.score=Math.max(0,state.score-3);addRipple(f.x,f.y,'#708090')}else{state.score+=1;addRipple(f.x,f.y,'#ffb548')}state.fish.splice(i,1);updateUI();continue}if(f.y>h+30){if(!f.bad){state.miss+=1;addRipple(f.x,h-26,'#7ec8ff');updateUI();if(state.miss>=state.maxMiss){state.fish.splice(i,1);endGame();continue}}state.fish.splice(i,1)}}for(let i=state.ripples.length-1;i>=0;i--){const p=state.ripples[i];p.x+=p.vx;p.y+=p.vy;p.a-=0.03;p.r+=0.3;if(p.a<=0)state.ripples.splice(i,1)}}else{cat.x+=((w*0.5)-cat.x)*0.06}for(const f of state.fish)drawFish(f);drawCat();for(const p of state.ripples){ctx.globalAlpha=Math.max(0,p.a);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}requestAnimationFrame(loop)}requestAnimationFrame(loop)})();</script></body></html>
