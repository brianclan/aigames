<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'><title>Cat Jump</title><style>body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; } #ui { position: absolute; top: 10px; left: 0; width: 100%; text-align: center; color: white; pointer-events: none; text-shadow: 1px 1px 2px black; z-index: 10; } #score { font-size: 24px; } #gameOver { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.7); color: white; padding: 20px; border-radius: 10px; text-align: center; pointer-events: auto; z-index: 20; } #gameOver h2 { margin: 0 0 10px; } #restartBtn { background: #4CAF50; border: none; color: white; padding: 10px 20px; font-size: 18px; border-radius: 5px; cursor: pointer; pointer-events: auto; } #instructions { position: absolute; bottom: 20px; left: 0; width: 100%; text-align: center; color: white; font-size: 16px; text-shadow: 1px 1px 2px black; pointer-events: none; z-index: 10; }</style></head><body><div id='ui'><div id='score'>Score: 0</div></div><div id='gameOver'><h2>Game Over!</h2><p id='finalScore'>Score: 0</p><button id='restartBtn'>Play Again</button></div><div id='instructions'>Tap or click to jump</div><script src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js'></script><script>// Scene setupconst scene = new THREE.Scene();scene.background = new THREE.Color(0x87CEEB); // sky blueconst camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);camera.position.set(0, 5, 10);camera.lookAt(0, 0, 0);const renderer = new THREE.WebGLRenderer({ antialias: true });renderer.setSize(window.innerWidth, window.innerHeight);renderer.shadowMap.enabled = true;document.body.appendChild(renderer.domElement);// Lightsconst ambientLight = new THREE.AmbientLight(0x404040);scene.add(ambientLight);const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);directionalLight.position.set(10, 20, 10);directionalLight.castShadow = true;scene.add(directionalLight);// Groundconst groundGeometry = new THREE.PlaneGeometry(30, 30);const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x8B4513 });const ground = new THREE.Mesh(groundGeometry, groundMaterial);ground.rotation.x = -Math.PI / 2;ground.position.y = -1;ground.receiveShadow = true;scene.add(ground);// Platformsconst platformMaterial = new THREE.MeshLambertMaterial({ color: 0x808080 });const platforms = [];const platformPositions = [  { x: -5, z: -8 },  { x: 0, z: -4 },  { x: 5, z: 0 },  { x: 0, z: 4 },  { x: -5, z: 8 },  { x: 5, z: 12 }];platformPositions.forEach(pos => {  const geometry = new THREE.BoxGeometry(3, 0.5, 3);  const platform = new THREE.Mesh(geometry, platformMaterial);  platform.position.set(pos.x, -0.75, pos.z);  platform.castShadow = true;  platform.receiveShadow = true;  scene.add(platform);  platforms.push(platform);});// Cat (simple geometric shape)const catGroup = new THREE.Group();// Bodyconst bodyGeo = new THREE.BoxGeometry(0.8, 0.6, 1.2);const bodyMat = new THREE.MeshLambertMaterial({ color: 0xffa500 });const body = new THREE.Mesh(bodyGeo, bodyMat);body.position.y = 0.3; body.castShadow = true; catGroup.add(body);// Headconst headGeo = new THREE.SphereGeometry(0.4, 16, 16);const headMat = new THREE.MeshLambertMaterial({ color: 0xffa500 });const head = new THREE.Mesh(headGeo, headMat);head.position.set(0, 0.7, 0.6);head.castShadow = true; catGroup.add(head);// Earsconst earMat = new THREE.MeshLambertMaterial({ color: 0xffa500 });const earGeo = new THREE.ConeGeometry(0.15, 0.2, 8);const ear1 = new THREE.Mesh(earGeo, earMat);ear1.position.set(-0.25, 0.9, 0.6);ear1.rotation.z = 0.2; catGroup.add(ear1);const ear2 = new THREE.Mesh(earGeo, earMat);ear2.position.set(0.25, 0.9, 0.6);ear2.rotation.z = -0.2; catGroup.add(ear2);// Eyesconst eyeMat = new THREE.MeshLambertMaterial({ color: 0x000000 });const eyeGeo = new THREE.SphereGeometry(0.08, 8, 8);const eye1 = new THREE.Mesh(eyeGeo, eyeMat);eye1.position.set(-0.15, 0.75, 0.85); catGroup.add(eye1);const eye2 = new THREE.Mesh(eyeGeo, eyeMat);eye2.position.set(0.15, 0.75, 0.85); catGroup.add(eye2);// Tailconst tailMat = new THREE.MeshLambertMaterial({ color: 0xffa500 });const tailGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.4, 6);const tail = new THREE.Mesh(tailGeo, tailMat);tail.position.set(0, 0.2, -0.7);tail.rotation.x = 0.3; catGroup.add(tail);catGroup.position.set(0, 0.5, 0);scene.add(catGroup);// Game variableslet score = 0;let isGrounded = true;let jumpVelocity = 0;const gravity = -20;const jumpPower = 7;let gameActive = true;let speed = 5; // move forward speed// UI elementsconst scoreDisplay = document.getElementById('score');const gameOverDiv = document.getElementById('gameOver');const finalScoreDisplay = document.getElementById('finalScore');const restartBtn = document.getElementById('restartBtn');// Input listenersdocument.addEventListener('click', () => { if (isGrounded && gameActive) { jumpVelocity = jumpPower; isGrounded = false; } });document.addEventListener('touchstart', (e) => { e.preventDefault(); if (isGrounded && gameActive) { jumpVelocity = jumpPower; isGrounded = false; } });restartBtn.addEventListener('click', restartGame);restartBtn.addEventListener('touchend', (e) => { e.preventDefault(); restartGame(); });function restartGame() {  gameOverDiv.style.display = 'none';  score = 0;  scoreDisplay.textContent = 'Score: ' + score;  catGroup.position.set(0, 0.5, 0);  platforms.forEach((p, i) => {    p.position.x = platformPositions[i].x;    p.position.z = platformPositions[i].z;  });  gameActive = true;  isGrounded = true;  jumpVelocity = 0;}// Animation looplet clock = new THREE.Clock();function animate() {  requestAnimationFrame(animate);  if (gameActive) {    const delta = clock.getDelta();    // Move platforms and cat forward (cat stays, world moves)    const moveZ = speed * delta;    platforms.forEach(p => { p.position.z -= moveZ; });    catGroup.position.z -= moveZ; // Keep cat relative to world? Actually we want cat to appear stationary relative to camera, so move camera? Let's just move everything.    // Instead, we can move camera forward or rotate. Simpler: keep cat at origin, move platforms towards cat.    // Since we already moved everything, reset cat z to 0 after move? Let's just keep cat at z=0 by adjusting camera?    // Actually, for simplicity, we will not move cat, we move platforms towards cat. Let's redo:    // Reset cat to z=0 every frame? That is easier.    catGroup.position.z = 0;    // Check if cat is on a platform    let onPlatform = false;    platforms.forEach(p => {      const dx = catGroup.position.x - p.position.x;      const dz = catGroup.position.z - p.position.z;      if (Math.abs(dx) < 1.5 && Math.abs(dz) < 1.5) {        // Check vertical distance        if (Math.abs(catGroup.position.y - (p.position.y + 0.5)) < 0.5) {          onPlatform = true;        }      }    });    if (!onPlatform && catGroup.position.y <= 0.5) {      isGrounded = true;      catGroup.position.y = 0.5;      jumpVelocity = 0;    } else {      // Apply gravity      jumpVelocity += gravity * delta;      catGroup.position.y += jumpVelocity * delta;      if (catGroup.position.y < 0.5) {        catGroup.position.y = 0.5;        jumpVelocity = 0;        if (onPlatform) {          isGrounded = true;        } else {          // Fall off -> game over          gameOver();        }      }    }    // Rotate cat slightly when jumping? Optional    // Score increment based on distance? Let's increment when passing platforms?    // Simple: increment score over time    score += delta * 2;    scoreDisplay.textContent = 'Score: ' + Math.floor(score);    // Remove platforms that are too far behind and add new ones ahead    platforms.forEach((p, index) => {      if (p.position.z < -15) {        // Reposition to front        const lastZ = platforms.reduce((max, p) => Math.max(max, p.position.z), -Infinity);        p.position.z = lastZ + 4 + Math.random() * 2;        p.position.x = (Math.random() - 0.5) * 10;      }    });    // Camera follows the cat? Camera is fixed.  }  renderer.render(scene, camera);}function gameOver() {  gameActive = false;  finalScoreDisplay.textContent = 'Score: ' + Math.floor(score);  gameOverDiv.style.display = 'block';}// Handle resizewindow.addEventListener('resize', () => {  camera.aspect = window.innerWidth / window.innerHeight;  camera.updateProjectionMatrix();  renderer.setSize(window.innerWidth, window.innerHeight);});animate();</script></body></html>
