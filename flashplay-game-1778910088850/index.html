<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Doggy Ball Chase</title><style>body{margin:0;overflow:hidden;touch-action:none;font-family:Arial,Helvetica,sans-serif}#info{position:absolute;bottom:20px;left:0;width:100%;text-align:center;color:#fff;font-size:18px;text-shadow:1px 1px 2px #000;pointer-events:none;z-index:10}#score{position:absolute;top:20px;right:20px;color:#fff;font-size:24px;font-weight:bold;text-shadow:1px 1px 3px #000;z-index:10}#instructions{position:absolute;top:20px;left:20px;color:#fff;font-size:16px;text-shadow:1px 1px 2px #000;z-index:10;pointer-events:none}#playAgain{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);padding:20px 40px;font-size:28px;background:#ff9800;color:#fff;border:none;border-radius:10px;cursor:pointer;z-index:20;box-shadow:0 4px 8px rgba(0,0,0,0.3)}#playAgain:hover{background:#e68900}</style></head><body><div id="score">Balls: 0</div><div id="instructions">Tap to move dog to ball</div><div id="info">Catch the balls!</div><button id="playAgain" onclick="resetGame()">Play Again</button><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script><script>let scene,camera,renderer,controls,dog,ball,ground,score=0,gameOver=false;let ballSpawnInterval;const ballSize=0.5;const dogSpeed=0.1;let targetPosition=null;let moveDirection=new THREE.Vector3();init();function init(){scene=new THREE.Scene();scene.background=new THREE.Color(0x87ceeb);camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);camera.position.set(8,6,12);renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(window.innerWidth,window.innerHeight);renderer.shadowMap.enabled=true;document.body.appendChild(renderer.domElement);const ambientLight=new THREE.AmbientLight(0x404040,0.8);scene.add(ambientLight);const directionalLight=new THREE.DirectionalLight(0xffffff,1);directionalLight.position.set(10,20,10);directionalLight.castShadow=true;directionalLight.shadow.mapSize.width=1024;directionalLight.shadow.mapSize.height=1024;scene.add(directionalLight);const groundGeometry=new THREE.CircleGeometry(10,32);const groundMaterial=new THREE.MeshStandardMaterial({color:0x4caf50});ground=new THREE.Mesh(groundGeometry,groundMaterial);ground.rotation.x=-Math.PI/2;ground.position.y=-0.5;ground.receiveShadow=true;scene.add(ground);const gridHelper=new THREE.GridHelper(20,20,0x888888,0x444444);gridHelper.position.y=-0.45;scene.add(gridHelper);const treeGeometry=new THREE.CylinderGeometry(0.2,0.3,1.5);const treeMaterial=new THREE.MeshStandardMaterial({color:0x8B4513});const foliageGeometry=new THREE.SphereGeometry(0.6);const foliageMaterial=new THREE.MeshStandardMaterial({color:0x228B22});for(let i=0;i<8;i++){const x=(Math.random()-0.5)*12;const z=(Math.random()-0.5)*12;if(Math.abs(x)<2&&Math.abs(z)<2)continue;const tree=new THREE.Mesh(treeGeometry,treeMaterial);tree.position.set(x,0.25,z);tree.castShadow=true;scene.add(tree);const foliage=new THREE.Mesh(foliageGeometry,foliageMaterial);foliage.position.set(x,1.1,z);foliage.castShadow=true;scene.add(foliage)}dog=createDog();dog.position.set(0,0,0);scene.add(dog);ball=createBall();scene.add(ball);resetBallPosition();controls=new THREE.OrbitControls(camera,renderer.domElement);controls.enableDamping=true;controls.dampingFactor=0.05;controls.maxPolarAngle=Math.PI/2.4;controls.minDistance=5;controls.maxDistance=20;controls.target.set(0,0,0);window.addEventListener('resize',onWindowResize,false);renderer.domElement.addEventListener('click',onPointerClick,false);renderer.domElement.addEventListener('touchstart',onTouchStart,{passive:true});ballSpawnInterval=setInterval(()=>{if(!gameOver){resetBallPosition()}},5000);animate()}function createDog(){const group=new THREE.Group();const bodyGeo=new THREE.BoxGeometry(0.8,0.6,1.2);const bodyMat=new THREE.MeshStandardMaterial({color:0xd2a679});const body=new THREE.Mesh(bodyGeo,bodyMat);body.position.y=0.3;body.castShadow=true;group.add(body);const headGeo=new THREE.SphereGeometry(0.35,16,16);const headMat=new THREE.MeshStandardMaterial({color:0xd2a679});const head=new THREE.Mesh(headGeo,headMat);head.position.set(0,0.5,0.7);head.castShadow=true;group.add(head);const eyeGeo=new THREE.SphereGeometry(0.08,8,8);const eyeMat=new THREE.MeshStandardMaterial({color:0x000000});const eyeL=new THREE.Mesh(eyeGeo,eyeMat);eyeL.position.set(-0.15,0.6,0.9);group.add(eyeL);const eyeR=new THREE.Mesh(eyeGeo,eyeMat);eyeR.position.set(0.15,0.6,0.9);group.add(eyeR);const noseGeo=new THREE.SphereGeometry(0.06,8,8);const noseMat=new THREE.MeshStandardMaterial({color:0x000000});const nose=new THREE.Mesh(noseGeo,noseMat);nose.position.set(0,0.45,1.0);group.add(nose);const earGeo=new THREE.SphereGeometry(0.12,8,8);const earMat=new THREE.MeshStandardMaterial({color:0x8B4513});const earL=new THREE.Mesh(earGeo,earMat);earL.position.set(-0.3,0.7,0.5);group.add(earL);const earR=new THREE.Mesh(earGeo,earMat);earR.position.set(0.3,0.7,0.5);group.add(earR);const legGeo=new THREE.CylinderGeometry(0.1,0.1,0.3);const legMat=new THREE.MeshStandardMaterial({color:0xd2a679});for(let i=0;i<4;i++){const leg=new THREE.Mesh(legGeo,legMat);const xOff=(i%2===0?-0.25:0.25);const zOff=(i<2?-0.4:0.4);leg.position.set(xOff,0.15,zOff);leg.castShadow=true;group.add(leg)}const tailGeo=new THREE.CylinderGeometry(0.04,0.04,0.4);const tailMat=new THREE.MeshStandardMaterial({color:0xd2a679});const tail=new THREE.Mesh(tailGeo,tailMat);tail.position.set(0,0.5,-0.7);tail.rotation.x=0.3;group.add(tail);return group}function createBall(){const geo=new THREE.SphereGeometry(ballSize,16,16);const mat=new THREE.MeshStandardMaterial({color:0xff4500});const ball=new THREE.Mesh(geo,mat);ball.castShadow=true;return ball}function resetBallPosition(){if(gameOver)return;let x=(Math.random()-0.5)*8;let z=(Math.random()-0.5)*8;if(Math.abs(x)<1.5&&Math.abs(z)<1.5){x=2;z=2}ball.position.set(x,ballSize,z);ball.visible=true}function onWindowResize(){camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight)}function onPointerClick(event){if(gameOver)return;const rect=renderer.domElement.getBoundingClientRect();const x=((event.clientX-rect.left)/rect.width)*2-1;const y=-((event.clientY-rect.top)/rect.height)*2+1;const vector=new THREE.Vector3(x,y,0.5);vector.unproject(camera);const dir=vector.sub(camera.position).normalize();const distance=-camera.position.y/dir.y;const pos=camera.position.clone().add(dir.multiplyScalar(distance));const clampedX=Math.max(-4.5,Math.min(4.5,pos.x));const clampedZ=Math.max(-4.5,Math.min(4.5,pos.z));targetPosition=new THREE.Vector3(clampedX,0,clampedZ)}function onTouchStart(event){if(gameOver)return;if(event.touches.length===1){const touch=event.touches[0];const rect=renderer.domElement.getBoundingClientRect();const x=((touch.clientX-rect.left)/rect.width)*2-1;const y=-((touch.clientY-rect.top)/rect.height)*2+1;const vector=new THREE.Vector3(x,y,0.5);vector.unproject(camera);const dir=vector.sub(camera.position).normalize();const distance=-camera.position.y/dir.y;const pos=camera.position.clone().add(dir.multiplyScalar(distance));const clampedX=Math.max(-4.5,Math.min(4.5,pos.x));const clampedZ=Math.max(-4.5,Math.min(4.5,pos.z));targetPosition=new THREE.Vector3(clampedX,0,clampedZ)}}function animate(){if(!gameOver){controls.update();if(targetPosition){const diff=new THREE.Vector3().copy(targetPosition).sub(new THREE.Vector3(dog.position.x,0,dog.position.z));if(diff.length()>0.1){diff.normalize();const move=new THREE.Vector3(diff.x*dogSpeed,0,diff.z*dogSpeed);dog.position.add(move);if(diff.x!==0||diff.z!==0){const angle=Math.atan2(diff.x,diff.z);dog.rotation.y=angle}}else{targetPosition=null}}checkCollision()}renderer.render(scene,camera);requestAnimationFrame(animate)}function checkCollision(){if(!ball.visible||gameOver)return;const dx=dog.position.x-ball.position.x;const dz=dog.position.z-ball.position.z;const dist=Math.sqrt(dx*dx+dz*dz);if(dist<ballSize+0.5){score++;document.getElementById('score').textContent='Balls: '+score;ball.visible=false;if(score>=10){endGame(true)}}}function endGame(won){gameOver=true;clearInterval(ballSpawnInterval);document.getElementById('info').textContent='You caught 10 balls! You win!';document.getElementById('playAgain').style.display='block';controls.enabled=false}function resetGame(){gameOver=false;score=0;document.getElementById('score').textContent='Balls: 0';document.getElementById('info').textContent='Catch the balls!';document.getElementById('playAgain').style.display='none';dog.position.set(0,0,0);targetPosition=null;resetBallPosition();controls.enabled=true;controls.target.set(0,0,0);ballSpawnInterval=setInterval(()=>{if(!gameOver)resetBallPosition()},5000)}</script></body></html>
