<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rock Rivals ✊🤺</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: #1a1a2e;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; height: 100dvh;
            font-family: Georgia, serif;
            overflow: hidden; touch-action: none;
        }
        #gameContainer {
            position: relative;
            width: 100vmin; height: 100vmin;
            max-width: 480px; max-height: 640px;
            background: linear-gradient(to bottom, #1a1a2e 0%, #16213e 100%);
            border-radius: 12px; overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; }
        #ui {
            position: absolute; top: 8px; left: 10px; right: 10px;
            display: flex; justify-content: space-between;
            color: #fff; font-size: 14px; font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            pointer-events: none; z-index: 5;
        }
        #controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            display: flex; justify-content: space-around;
            padding: 8px 8px 16px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            z-index: 10;
        }
        .hand-btn {
            width: 90px; height: 90px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 3px solid rgba(255,255,255,0.4);
            color: #fff; font-size: 36px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; user-select: none; -webkit-user-select: none;
            transition: transform 0.1s, background 0.1s;
            position: relative;
        }
        .hand-btn::after {
            content: attr(data-label);
            position: absolute; bottom: -18px;
            font-size: 11px; color: rgba(255,255,255,0.7); white-space: nowrap;
        }
        .hand-btn:active, .hand-btn.selected {
            background: rgba(255,255,255,0.4);
            transform: scale(1.15);
        }
        .hand-btn.disabled { opacity: 0.3; pointer-events: none; }
        #overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,30,0.9);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: #fff; z-index: 20; padding: 20px;
        }
        #overlay h1 { font-size: 28px; margin-bottom: 6px; text-align: center; }
        #overlay .sub { font-size: 13px; color: #aaa; margin-bottom: 16px; text-align: center; padding: 0 10px; }
        #overlay button {
            padding: 10px 32px; font-size: 18px;
            background: linear-gradient(to bottom, #4a4a8a, #2a2a5a);
            color: #fff; border: 3px solid #8888cc;
            border-radius: 24px; cursor: pointer;
        }
        #overlay button:hover { transform: scale(1.05); }
        #overlay.hidden { display: none; }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="game"></canvas>
    <div id="ui">
        <span id="wins">Wins: 0</span>
        <span id="round">Round 1</span>
        <span id="score">Score: 0</span>
    </div>
    <div id="controls">
        <div class="hand-btn disabled" id="btnRock" data-label="Rock">✊</div>
        <div class="hand-btn disabled" id="btnPaper" data-label="Paper">✋</div>
        <div class="hand-btn disabled" id="btnScissors" data-label="Scissors">✌️</div>
    </div>
    <div id="overlay">
        <h1>✊🤺 Rock Rivals</h1>
        <div class="sub">Doraemon only plays rock<br>Crab only plays scissors<br>Mop only plays paper<br>Choose wisely!</div>
        <button id="startBtn">Battle!</button>
    </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 480, H = 640;
canvas.width = W; canvas.height = H;

const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const winsEl = document.getElementById('wins');
const roundEl = document.getElementById('round');
const scoreEl = document.getElementById('score');
const btnRock = document.getElementById('btnRock');
const btnPaper = document.getElementById('btnPaper');
const btnScissors = document.getElementById('btnScissors');

let gameState = 'menu';
let round = 1, playerWins = 0, aiWins = 0, score = 0;
let playerChoice = null, aiChoice = null;
let animFrame = 0, resultAnim = 0, resultTimer = 0;
let battleResult = '', lastResult = '', flashColor = '';
let particles = [];

// Each character has a FIXED move
const chars = [
    { name: 'Doraemon', fixed: 'rock', emoji: '🤖', color: '#2196F3', bg: '#1565C0' },
    { name: 'Crab',     fixed: 'scissors', emoji: '🦀', color: '#EF6C00', bg: '#E65100' },
    { name: 'Mop',      fixed: 'paper', emoji: '🧹', color: '#607D8B', bg: '#455A64' },
];
let charIdx = 0;
function getChar() { return chars[charIdx]; }

function spawnParticles(x, y, count, emoji, color) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            vx: (Math.random()-0.5)*6,
            vy: -Math.random()*4-2,
            life: 50+Math.random()*20, maxLife: 70,
            emoji, color,
            size: 20+Math.random()*10,
            rot: Math.random()*Math.PI*2,
            rotSpeed: (Math.random()-0.5)*0.2
        });
    }
}

function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function drawBackground() {
    const c = getChar();
    const bg = ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0, c.bg); bg.addColorStop(1,'#0a0a1a');
    ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    for (let i = 0; i < 30; i++) {
        ctx.beginPath();
        ctx.arc((i*73+animFrame*0.05)%W, (i*37)%(H*0.5), 0.8+i%2, 0, Math.PI*2);
        ctx.fill();
    }
}

function drawVS() {
    ctx.save();
    ctx.font = 'bold 32px Georgia'; ctx.textAlign = 'center';
    ctx.fillStyle = '#FFD700'; ctx.strokeStyle = '#8B6914'; ctx.lineWidth = 3;
    ctx.strokeText('VS', W/2, H*0.38); ctx.fillText('VS', W/2, H*0.38);
    ctx.restore();
}

function drawCharacter(x, y, char, scale) {
    ctx.save();
    ctx.translate(x, y);
    const bounce = Math.sin(animFrame*0.12) * 4 * scale;
    const s = scale;

    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(0, 55*s, 40*s, 12*s, 0, 0, Math.PI*2); ctx.fill();
    ctx.translate(0, bounce);

    if (char.name === 'Doraemon') {
        ctx.fillStyle = '#2196F3';
        ctx.beginPath(); ctx.arc(0, 0, 38*s, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.ellipse(0, 10*s, 26*s, 24*s, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(0, -8*s, 30*s, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(-12*s,-14*s,9*s,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(12*s,-14*s,9*s,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(-12*s,-13*s,5*s,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(12*s,-13*s,5*s,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = '#F44336';
        ctx.beginPath(); ctx.arc(0,-4*s,4*s,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#555'; ctx.lineWidth = 2*s;
        for (let side of [-1,1]) {
            ctx.beginPath();
            ctx.moveTo(side*2*s,2*s);
            ctx.quadraticCurveTo(side*18*s,-2*s,side*24*s,-8*s);
            ctx.stroke();
        }
        ctx.strokeStyle = '#333'; ctx.lineWidth = 2*s;
        ctx.beginPath(); ctx.arc(0,2*s,12*s,0.1*Math.PI,0.9*Math.PI); ctx.stroke();
        ctx.fillStyle = '#FFD700';
        ctx.beginPath(); ctx.arc(0,28*s,6*s,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = '#F44336';
        ctx.beginPath(); ctx.arc(-40*s,20*s,12*s,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(40*s,20*s,12*s,0,Math.PI*2); ctx.fill();

    } else if (char.name === 'Crab') {
        ctx.fillStyle = '#EF6C00';
        ctx.beginPath(); ctx.ellipse(0,0,38*s,30*s,0,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#BF360C'; ctx.lineWidth = 2*s;
        ctx.beginPath(); ctx.ellipse(0,0,28*s,20*s,0,0,Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.ellipse(0,0,18*s,12*s,0,0,Math.PI*2); ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(-15*s,-30*s,9*s,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(15*s,-30*s,9*s,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(-15*s,-29*s,5*s,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(15*s,-29*s,5*s,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = '#FF8F00';
        ctx.beginPath(); ctx.arc(-44*s,10*s,18*s,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(44*s,10*s,18*s,0,Math.PI*2); ctx.fill();
        // Scissors pinchers - open
        ctx.strokeStyle = '#BF360C'; ctx.lineWidth = 3*s;
        ctx.beginPath(); ctx.arc(-44*s,10*s,14*s,-0.5*Math.PI,0); ctx.stroke();
        ctx.beginPath(); ctx.arc(44*s,10*s,14*s,Math.PI,1.5*Math.PI); ctx.stroke();
        ctx.strokeStyle = '#EF6C00'; ctx.lineWidth = 4*s;
        for (let i=0;i<3;i++) {
            ctx.beginPath(); ctx.moveTo(-32*s,5*s); ctx.lineTo(-52*s,15*s+i*5*s); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(32*s,5*s); ctx.lineTo(52*s,15*s+i*5*s); ctx.stroke();
        }

    } else if (char.name === 'Mop') {
        ctx.fillStyle = '#8B6914';
        roundRect(ctx,-5*s,-60*s,10*s,120*s,4*s); ctx.fill();
        ctx.strokeStyle = '#6B4910'; ctx.lineWidth = 1*s;
        for(let i=0;i<5;i++){
            ctx.beginPath(); ctx.moveTo(-4*s,-50*s+i*15*s); ctx.lineTo(4*s,-50*s+i*15*s+5*s); ctx.stroke();
        }
        ctx.fillStyle = '#607D8B';
        ctx.beginPath(); ctx.ellipse(0,35*s,32*s,25*s,0,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#546E7A'; ctx.lineWidth = 3*s; ctx.lineCap = 'round';
        for(let i=0;i<8;i++){
            const sx=-24*s+i*7*s, wave=Math.sin(animFrame*0.1+i)*4;
            ctx.beginPath(); ctx.moveTo(sx,48*s); ctx.quadraticCurveTo(sx+wave,65*s,sx+wave*0.5,75*s); ctx.stroke();
        }
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(-12*s,20*s,9*s,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(12*s,20*s,9*s,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(-12*s,21*s,5*s,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(12*s,21*s,5*s,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#333'; ctx.lineWidth = 2*s;
        ctx.beginPath(); ctx.arc(0,38*s,8*s,1.1*Math.PI,1.9*Math.PI); ctx.stroke();
    }

    // Fixed move hint
    const hintEmoji = char.fixed === 'rock' ? '✊' : char.fixed === 'paper' ? '✋' : '✌️';
    ctx.font = '20px Georgia'; ctx.textAlign = 'center';
    ctx.fillStyle = '#FFD700';
    ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
    ctx.strokeText('只出', 0, -52*s); ctx.fillText('只出', 0, -52*s);
    ctx.font = 'bold 22px Georgia';
    ctx.strokeText(hintEmoji, 0, -30*s); ctx.fillText(hintEmoji, 0, -30*s);

    ctx.restore();
}

function drawHand(x, y, type, scale, glow) {
    ctx.save();
    ctx.translate(x, y);
    if (glow) {
        ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 20;
    }
    ctx.font = `${50*scale}px Georgia`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(type==='rock'?'✊':type==='paper'?'✋':'✌️', 0, 0);
    ctx.restore();
}

function drawBattlefield() {
    ctx.save();
    ctx.font = 'bold 13px Georgia'; ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('YOU', W/4, H*0.52);
    ctx.fillText(getChar().name.toUpperCase(), W*3/4, H*0.52);

    const playerY = H*0.7, aiY = H*0.35;

    if (resultAnim >= 1) {
        drawHand(W/4, playerY, playerChoice, 1.2, true);
    } else {
        ctx.font = '36px Georgia'; ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillText('?', W/4, playerY);
    }

    if (resultAnim >= 2) {
        // Show what the AI character plays
        const aiChar = getChar();
        drawHand(W*3/4, aiY, aiChar.fixed, 1.2, true);
        // Label
        ctx.font = 'bold 12px Georgia'; ctx.textAlign = 'center';
        ctx.fillStyle = '#FFD700';
        ctx.fillText(aiChar.name + '只出', W*3/4, aiY + 45);
    } else {
        ctx.font = '36px Georgia'; ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillText('?', W*3/4, aiY);
    }

    drawVS();
    drawCharacter(W*3/4, H*0.5, getChar(), 1.0);
    ctx.restore();
}

function drawParticles() {
    for (let p of particles) {
        ctx.save();
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.translate(p.x, p.y); ctx.rotate(p.rot);
        ctx.font = `${p.size}px Georgia`; ctx.textAlign = 'center';
        ctx.fillText(p.emoji, 0, 0);
        ctx.restore();
    }
}

function drawResult() {
    if (resultAnim < 3) return;
    const txt = battleResult==='win'?'YOU WIN!':battleResult==='lose'?'YOU LOSE!':'DRAW!';
    const color = battleResult==='win'?'#4CAF50':battleResult==='lose'?'#F44336':'#FFC107';
    const emoji = battleResult==='win'?'🎉':battleResult==='lose'?'😢':'🤝';
    ctx.save();
    ctx.font = 'bold 36px Georgia'; ctx.textAlign = 'center';
    ctx.fillStyle = color; ctx.strokeStyle='#000'; ctx.lineWidth=4;
    ctx.strokeText(txt,W/2,H*0.62); ctx.fillText(txt,W/2,H*0.62);
    ctx.font='28px Georgia'; ctx.fillText(emoji,W/2,H*0.68);
    if (flashColor) {
        ctx.globalAlpha=0.3; ctx.fillStyle=flashColor; ctx.fillRect(0,0,W,H);
    }
    ctx.restore();
}

function drawRoundInfo() {
    ctx.save();
    ctx.font='bold 15px Georgia'; ctx.textAlign='center'; ctx.fillStyle='#fff';
    const c = getChar();
    const hint = c.name==='Doraemon'?'(只会出锤子✊)':c.name==='Crab'?'(只会出剪刀✌️)':'(只会出布✋)';
    ctx.fillText(`Battle ${round}: ${c.name} ${hint}`, W/2, H*0.02+30);
    ctx.restore();
}

function draw() {
    animFrame++;
    ctx.clearRect(0,0,W,H);
    drawBackground();
    if (gameState !== 'menu') {
        drawBattlefield();
        drawParticles();
        drawResult();
        drawRoundInfo();
    }
    requestAnimationFrame(draw);
}

function determineWinner(player, ai) {
    if (player === ai) return 'draw';
    if ((player==='rock'&&ai==='scissors')||(player==='paper'&&ai==='rock')||(player==='scissors'&&ai==='paper')) return 'win';
    return 'lose';
}

function setButtons(enabled) {
    [btnRock, btnPaper, btnScissors].forEach(b => {
        if (enabled) b.classList.remove('disabled');
        else b.classList.add('disabled');
    });
}

function playRound(player) {
    if (gameState !== 'playing') return;
    gameState = 'animating';
    playerChoice = player;
    setButtons(false);
    resultAnim = 1;

    setTimeout(() => {
        // AI character ALWAYS plays their fixed move
        aiChoice = getChar().fixed;
        resultAnim = 2;

        setTimeout(() => {
            battleResult = determineWinner(playerChoice, aiChoice);
            resultAnim = 3;

            if (battleResult === 'win') {
                playerWins++; score += 10;
                flashColor = '#4CAF50';
                spawnParticles(W/4, H*0.7, 15, '🎉', '#4CAF50');
            } else if (battleResult === 'lose') {
                aiWins++; score = Math.max(0, score-5);
                flashColor = '#F44336';
                spawnParticles(W*3/4, H*0.35, 10, '😢', '#F44336');
            } else {
                score += 3;
                flashColor = '#FFC107';
                spawnParticles(W/2, H*0.5, 8, '🤝', '#FFC107');
            }

            winsEl.textContent = `Wins: ${playerWins}`;
            scoreEl.textContent = `Score: ${score}`;

            setTimeout(() => {
                charIdx = (charIdx + 1) % 3;
                round++;
                roundEl.textContent = `Round ${round}`;

                if (round > 5 && playerWins > aiWins) {
                    spawnParticles(W/2, H/2, 30, '🏆', '#FFD700');
                    setTimeout(() => showVictory(), 800);
                } else if (round > 5) {
                    setTimeout(() => showDefeat(), 800);
                } else {
                    gameState = 'playing';
                    resultAnim = 0;
                    setButtons(true);
                }
                flashColor = '';
            }, 1200);

        }, 800);
    }, 600);
}

function showVictory() {
    gameState = 'menu';
    overlay.classList.remove('hidden');
    overlay.querySelector('h1').textContent = '🏆 Victory!';
    overlay.querySelector('.sub').innerHTML = `You beat all 3 rivals!<br>Final Score: ${score}`;
    startBtn.textContent = 'Play Again';
}

function showDefeat() {
    gameState = 'menu';
    overlay.classList.remove('hidden');
    overlay.querySelector('h1').textContent = '💪 Try Again!';
    overlay.querySelector('.sub').innerHTML = `You: ${playerWins} wins — ${getChar().name}: ${aiWins}<br>Score: ${score}`;
    startBtn.textContent = 'Battle Again';
}

function startGame() {
    round=1; playerWins=0; aiWins=0; score=0; charIdx=0;
    resultAnim=0; battleResult=''; playerChoice=null; aiChoice=null;
    particles=[];
    winsEl.textContent='Wins: 0'; roundEl.textContent='Round 1'; scoreEl.textContent='Score: 0';
    gameState='playing'; overlay.classList.add('hidden'); setButtons(true);
}

// Button events
btnRock.addEventListener('click', () => playRound('rock'));
btnPaper.addEventListener('click', () => playRound('paper'));
btnScissors.addEventListener('click', () => playRound('scissors'));
for (let btn of [btnRock, btnPaper, btnScissors]) {
    btn.addEventListener('touchstart', e => { e.preventDefault(); btn.classList.add('selected'); }, {passive:false});
    btn.addEventListener('touchend', e => {
        e.preventDefault(); btn.classList.remove('selected');
        playRound(btn===btnRock?'rock':btn===btnPaper?'paper':'scissors');
    }, {passive:false});
}
startBtn.addEventListener('click', startGame);

// Keyboard
document.addEventListener('keydown', e => {
    if (gameState !== 'playing') return;
    if (e.key==='1'||e.key==='a'||e.key==='ArrowLeft') playRound('rock');
    if (e.key==='2'||e.key==='s'||e.key===' ') playRound('paper');
    if (e.key==='3'||e.key==='d'||e.key==='ArrowRight') playRound('scissors');
});

setInterval(() => {
    for (let i=particles.length-1;i>=0;i--) {
        let p=particles[i];
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.15;
        p.rot+=p.rotSpeed; p.life--;
        if(p.life<=0) particles.splice(i,1);
    }
}, 16);

draw();
</script>
</body>
</html>
