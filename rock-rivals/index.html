<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rock Rivals ✊�✌️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: #1a1a2e;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; height: 100dvh;
            font-family: Georgia, serif;
            overflow: hidden;
            touch-action: none;
        }
        #gameContainer {
            position: relative;
            width: 100vmin; height: 100vmin;
            max-width: 480px; max-height: 640px;
            background: linear-gradient(to bottom, #1a1a2e 0%, #16213e 100%);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(100,100,255,0.2);
        }
        canvas { display: block; width: 100%; height: 100%; }
        #ui {
            position: absolute; top: 8px; left: 10px; right: 10px;
            display: flex; justify-content: space-between;
            color: #fff; font-size: 14px; font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            pointer-events: none; z-index: 5;
        }
        #controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            display: flex; justify-content: space-around;
            padding: 8px 8px 16px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            z-index: 10;
        }
        .hand-btn {
            width: 90px; height: 90px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 3px solid rgba(255,255,255,0.4);
            color: #fff; font-size: 36px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; user-select: none; -webkit-user-select: none;
            transition: transform 0.1s, background 0.1s;
            position: relative;
        }
        .hand-btn::after {
            content: attr(data-label);
            position: absolute; bottom: -18px;
            font-size: 11px; color: rgba(255,255,255,0.7);
            white-space: nowrap;
        }
        .hand-btn:active, .hand-btn.selected {
            background: rgba(255,255,255,0.4);
            transform: scale(1.15);
        }
        .hand-btn.disabled { opacity: 0.4; pointer-events: none; }
        #overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,30,0.9);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: #fff; z-index: 20; padding: 20px;
        }
        #overlay h1 { font-size: 28px; margin-bottom: 6px; }
        #overlay .sub { font-size: 13px; color: #aaa; margin-bottom: 16px; text-align: center; }
        #overlay button {
            padding: 10px 32px; font-size: 18px;
            background: linear-gradient(to bottom, #4a4a8a, #2a2a5a);
            color: #fff; border: 3px solid #8888cc;
            border-radius: 24px; cursor: pointer;
        }
        #overlay button:hover { transform: scale(1.05); }
        #overlay.hidden { display: none; }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="game"></canvas>
    <div id="ui">
        <span id="wins">Wins: 0</span>
        <span id="round">Round 1</span>
        <span id="score">Score: 0</span>
    </div>
    <div id="controls">
        <div class="hand-btn disabled" id="btnRock" data-label="Rock">✊</div>
        <div class="hand-btn disabled" id="btnPaper" data-label="Paper">✋</div>
        <div class="hand-btn disabled" id="btnScissors" data-label="Scissors">✌️</div>
    </div>
    <div id="overlay">
        <h1>✊�✌️ Rock Rivals</h1>
        <div class="sub">Battle Doraemon, Crab & Mop in Rock-Paper-Scissors!</div>
        <button id="startBtn">Battle!</button>
    </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 480, H = 640;
canvas.width = W; canvas.height = H;

const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const winsEl = document.getElementById('wins');
const roundEl = document.getElementById('round');
const scoreEl = document.getElementById('score');
const btnRock = document.getElementById('btnRock');
const btnPaper = document.getElementById('btnPaper');
const btnScissors = document.getElementById('btnScissors');

// Game state
let gameState = 'menu'; // menu, playing, animating, result
let round = 1, playerWins = 0, aiWins = 0, score = 0;
let currentChar = null; // { name, emoji, mood }
let playerChoice = null; // 'rock'|'paper'|'scissors'
let aiChoice = null;
let animFrame = 0;
let resultAnim = 0; // 0=idle, 1=player choose, 2=ai choose, 3=result
let resultTimer = 0;
let battleResult = ''; // 'win'|'lose'|'draw'
let lastResult = ''; // for result display
let flashColor = '';

// Characters
const chars = [
    { name: 'Doraemon', emoji: '🤖', color: '#2196F3', bg: '#1565C0', mood: 'happy', moodTimer: 0 },
    { name: 'Crab',     emoji: '🦀', color: '#EF6C00', bg: '#E65100', mood: 'angry', moodTimer: 0 },
    { name: 'Mop',      emoji: '🧹', color: '#607D8B', bg: '#455A64', mood: 'neutral', moodTimer: 0 },
];
let charIdx = 0;
let charMood = 'happy';

function getChar() { return chars[charIdx]; }

// Particles
let particles = [];

function spawnParticles(x, y, color, count, emoji) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            vx: (Math.random()-0.5)*6,
            vy: -Math.random()*4-2,
            life: 50+Math.random()*20,
            maxLife: 70,
            color,
            emoji,
            size: 20+Math.random()*10,
            rot: Math.random()*Math.PI*2,
            rotSpeed: (Math.random()-0.5)*0.2
        });
    }
}

function drawBackground() {
    const c = getChar();
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, c.bg);
    bgGrad.addColorStop(1, '#0a0a1a');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Stars
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    for (let i = 0; i < 30; i++) {
        const sx = (i*73+animFrame*0.05)%W;
        const sy = (i*37)%(H*0.5);
        ctx.beginPath(); ctx.arc(sx, sy, 0.8+i%2, 0, Math.PI*2); ctx.fill();
    }

    // Ground
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(0, H*0.65, W, H*0.35);
}

function drawVS() {
    // VS circle
    ctx.save();
    ctx.font = 'bold 32px Georgia';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFD700';
    ctx.strokeStyle = '#8B6914';
    ctx.lineWidth = 3;
    ctx.strokeText('VS', W/2, H*0.38);
    ctx.fillText('VS', W/2, H*0.38);
    ctx.restore();
}

function drawCharacter(x, y, char, scale, anim) {
    ctx.save();
    ctx.translate(x, y);
    const bounce = Math.sin(anim * 0.15) * (resultAnim === 3 ? 8 : 3) * scale;
    const s = scale;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(0, 55*s, 40*s, 12*s, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.translate(0, bounce);

    if (char.name === 'Doraemon') {
        // Body
        ctx.fillStyle = '#2196F3';
        ctx.beginPath(); ctx.arc(0, 0, 38*s, 0, Math.PI*2); ctx.fill();
        // White belly
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.ellipse(0, 10*s, 26*s, 24*s, 0, 0, Math.PI*2); ctx.fill();
        // Face
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(0, -8*s, 30*s, 0, Math.PI*2); ctx.fill();
        // Eyes
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(-12*s, -14*s, 9*s, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(12*s, -14*s, 9*s, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(-12*s, -13*s, 5*s, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(12*s, -13*s, 5*s, 0, Math.PI*2); ctx.fill();
        // Nose
        ctx.fillStyle = '#F44336';
        ctx.beginPath(); ctx.arc(0, -4*s, 4*s, 0, Math.PI*2); ctx.fill();
        // Mustache
        ctx.strokeStyle = '#555'; ctx.lineWidth = 2*s;
        for (let side of [-1, 1]) {
            ctx.beginPath();
            ctx.moveTo(side*2*s, 2*s);
            ctx.quadraticCurveTo(side*18*s, -2*s, side*24*s, -8*s);
            ctx.stroke();
        }
        // Mouth
        ctx.strokeStyle = '#333'; ctx.lineWidth = 2*s;
        ctx.beginPath(); ctx.arc(0, 2*s, 12*s, 0.1*Math.PI, 0.9*Math.PI); ctx.stroke();
        // Bell
        ctx.fillStyle = '#FFD700';
        ctx.beginPath(); ctx.arc(0, 28*s, 6*s, 0, Math.PI*2); ctx.fill();
        // Red paws
        ctx.fillStyle = '#F44336';
        ctx.beginPath(); ctx.arc(-40*s, 20*s, 12*s, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(40*s, 20*s, 12*s, 0, Math.PI*2); ctx.fill();

    } else if (char.name === 'Crab') {
        // Shell
        ctx.fillStyle = '#EF6C00';
        ctx.beginPath(); ctx.ellipse(0, 0, 38*s, 30*s, 0, 0, Math.PI*2); ctx.fill();
        // Shell pattern
        ctx.strokeStyle = '#BF360C'; ctx.lineWidth = 2*s;
        ctx.beginPath(); ctx.ellipse(0, 0, 28*s, 20*s, 0, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.ellipse(0, 0, 18*s, 12*s, 0, 0, Math.PI*2); ctx.stroke();
        // Eyes on stalks
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(-15*s, -30*s, 9*s, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(15*s, -30*s, 9*s, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(-15*s, -29*s, 5*s, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(15*s, -29*s, 5*s, 0, Math.PI*2); ctx.fill();
        // Claws
        ctx.fillStyle = '#FF8F00';
        ctx.beginPath(); ctx.arc(-44*s, 10*s, 18*s, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(44*s, 10*s, 18*s, 0, Math.PI*2); ctx.fill();
        // Claw pincers
        ctx.strokeStyle = '#BF360C'; ctx.lineWidth = 3*s;
        ctx.beginPath(); ctx.arc(-44*s, 10*s, 14*s, -0.3*Math.PI, 0.3*Math.PI); ctx.stroke();
        ctx.beginPath(); ctx.arc(44*s, 10*s, 14*s, 0.7*Math.PI, 1.3*Math.PI); ctx.stroke();
        // Legs
        ctx.strokeStyle = '#EF6C00'; ctx.lineWidth = 4*s;
        for (let i = 0; i < 3; i++) {
            const legAngle = -0.3 + i*0.3;
            ctx.beginPath(); ctx.moveTo(-32*s, 5*s); ctx.lineTo(-52*s, 15*s+i*5*s); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(32*s, 5*s); ctx.lineTo(52*s, 15*s+i*5*s); ctx.stroke();
        }
        // Mouth
        ctx.strokeStyle = '#BF360C'; ctx.lineWidth = 2*s;
        ctx.beginPath(); ctx.arc(0, 8*s, 8*s, 0.1*Math.PI, 0.9*Math.PI); ctx.stroke();

    } else if (char.name === 'Mop') {
        // Handle
        ctx.fillStyle = '#8B6914';
        roundRect(ctx, -5*s, -60*s, 10*s, 120*s, 4*s); ctx.fill();
        // Handle wood grain
        ctx.strokeStyle = '#6B4910'; ctx.lineWidth = 1*s;
        for (let i = 0; i < 5; i++) {
            ctx.beginPath(); ctx.moveTo(-4*s, -50*s+i*15*s); ctx.lineTo(4*s, -50*s+i*15*s+5*s); ctx.stroke();
        }
        // Mop head
        ctx.fillStyle = '#607D8B';
        ctx.beginPath(); ctx.ellipse(0, 35*s, 32*s, 25*s, 0, 0, Math.PI*2); ctx.fill();
        // Strands
        ctx.strokeStyle = '#546E7A'; ctx.lineWidth = 3*s; ctx.lineCap = 'round';
        for (let i = 0; i < 8; i++) {
            const sx = -24*s + i*7*s;
            const wave = Math.sin(anim*0.1+i)*4;
            ctx.beginPath();
            ctx.moveTo(sx, 48*s);
            ctx.quadraticCurveTo(sx+wave, 65*s, sx+wave*0.5, 75*s);
            ctx.stroke();
        }
        // Eyes
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(-12*s, 20*s, 9*s, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(12*s, 20*s, 9*s, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(-12*s, 21*s, 5*s, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(12*s, 21*s, 5*s, 0, Math.PI*2); ctx.fill();
        // Cute frown
        ctx.strokeStyle = '#333'; ctx.lineWidth = 2*s;
        ctx.beginPath(); ctx.arc(0, 38*s, 8*s, 1.1*Math.PI, 1.9*Math.PI); ctx.stroke();
        // Shine
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.beginPath(); ctx.ellipse(-10*s, 10*s, 12*s, 8*s, -0.3, 0, Math.PI*2); ctx.fill();
    }

    // Mood indicator
    if (resultAnim === 3) {
        const emoji = battleResult === 'win' ? '😢' : battleResult === 'lose' ? '😄' : '😐';
        ctx.font = '28px Georgia'; ctx.textAlign = 'center';
        ctx.fillText(emoji, 0, -50*s);
    }

    ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r); ctx.lineTo(x+w, y+h-r);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h); ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r); ctx.lineTo(x, y+r);
    ctx.quadraticCurveTo(x, y, x+r, y); ctx.closePath();
}

function drawHand(x, y, type, scale, selected) {
    ctx.save();
    ctx.translate(x, y);
    if (selected) {
        ctx.shadowColor = '#FFD700';
        ctx.shadowBlur = 20;
    }
    ctx.font = `${50*scale}px Georgia`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(type === 'rock' ? '✊' : type === 'paper' ? '✋' : '✌️', 0, 0);
    ctx.restore();
}

function drawBattlefield() {
    const c = getChar();

    // Player zone label
    ctx.save();
    ctx.font = 'bold 14px Georgia';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('YOU', W/4, H*0.52);
    ctx.fillText(c.name.toUpperCase(), W*3/4, H*0.52);

    // Player hand (bottom)
    const playerY = H * 0.7;
    if (resultAnim >= 1) {
        drawHand(W/4, playerY, playerChoice, 1.2, true);
    } else {
        ctx.font = '36px Georgia'; ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillText('?', W/4, playerY);
    }

    // AI hand (top)
    const aiY = H * 0.35;
    if (resultAnim >= 2) {
        drawHand(W*3/4, aiY, aiChoice, 1.2, true);
    } else {
        ctx.font = '36px Georgia'; ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillText('?', W*3/4, aiY);
    }

    drawVS();

    // Character
    drawCharacter(W*3/4, H*0.5, c, 1.0, animFrame);

    ctx.restore();
}

function drawParticles() {
    for (let p of particles) {
        ctx.save();
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.font = `${p.size}px Georgia`;
        ctx.textAlign = 'center';
        ctx.fillText(p.emoji, 0, 0);
        ctx.restore();
    }
}

function drawResult() {
    if (resultAnim < 3) return;

    const txt = battleResult === 'win' ? 'YOU WIN!' : battleResult === 'lose' ? 'YOU LOSE!' : 'DRAW!';
    const color = battleResult === 'win' ? '#4CAF50' : battleResult === 'lose' ? '#F44336' : '#FFC107';
    const emoji = battleResult === 'win' ? '🎉' : battleResult === 'lose' ? '😢' : '🤝';

    ctx.save();
    ctx.font = 'bold 36px Georgia';
    ctx.textAlign = 'center';
    ctx.fillStyle = color;
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 4;
    ctx.strokeText(txt, W/2, H*0.62);
    ctx.fillText(txt, W/2, H*0.62);
    ctx.font = '28px Georgia';
    ctx.fillText(emoji, W/2, H*0.68);
    ctx.restore();

    // Flash effect
    if (flashColor) {
        ctx.save();
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = flashColor;
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
    }
}

function drawRoundInfo() {
    ctx.save();
    ctx.font = 'bold 15px Georgia';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.fillText(`Battle ${round}: You VS ${getChar().name}`, W/2, H*0.02 + 30);
    ctx.restore();
}

function draw() {
    animFrame++;
    ctx.clearRect(0, 0, W, H);
    drawBackground();

    if (gameState === 'playing' || gameState === 'animating' || gameState === 'result') {
        drawBattlefield();
        drawParticles();
        drawResult();
        drawRoundInfo();
    }

    requestAnimationFrame(draw);
}

function determineWinner(player, ai) {
    if (player === ai) return 'draw';
    if ((player === 'rock' && ai === 'scissors') ||
        (player === 'paper' && ai === 'rock') ||
        (player === 'scissors' && ai === 'paper')) return 'win';
    return 'lose';
}

function getAIChoice() {
    const r = Math.random();
    if (r < 0.33) return 'rock';
    if (r < 0.66) return 'paper';
    return 'scissors';
}

function setButtons(enabled) {
    [btnRock, btnPaper, btnScissors].forEach(btn => {
        if (enabled) btn.classList.remove('disabled');
        else btn.classList.add('disabled');
    });
}

function playRound(player) {
    if (gameState !== 'playing') return;
    gameState = 'animating';
    playerChoice = player;
    setButtons(false);
    resultAnim = 1;

    // After short delay, AI chooses
    setTimeout(() => {
        aiChoice = getAIChoice();
        resultAnim = 2;

        setTimeout(() => {
            battleResult = determineWinner(playerChoice, aiChoice);
            lastResult = battleResult;
            resultAnim = 3;

            if (battleResult === 'win') {
                playerWins++;
                score += 10;
                flashColor = '#4CAF50';
                spawnParticles(W/4, H*0.7, '#4CAF50', 15, '🎉');
            } else if (battleResult === 'lose') {
                aiWins++;
                score = Math.max(0, score - 5);
                flashColor = '#F44336';
                spawnParticles(W*3/4, H*0.35, '#F44336', 10, '😢');
            } else {
                score += 3;
                flashColor = '#FFC107';
                spawnParticles(W/2, H*0.5, '#FFC107', 8, '🤝');
            }

            winsEl.textContent = `Wins: ${playerWins}`;
            scoreEl.textContent = `Score: ${score}`;

            // After showing result, check if round over or next battle
            setTimeout(() => {
                charIdx = (charIdx + 1) % 3;
                round++;
                roundEl.textContent = `Round ${round}`;

                if (round > 5 && playerWins > aiWins) {
                    // Player wins the set!
                    spawnParticles(W/2, H/2, '#FFD700', 30, '🏆');
                    setTimeout(showVictory, 800);
                } else if (round > 5) {
                    // AI wins the set
                    setTimeout(showDefeat, 800);
                } else {
                    gameState = 'playing';
                    resultAnim = 0;
                    setButtons(true);
                }
                flashColor = '';
            }, 1200);

        }, 600);
    }, 400);
}

function showVictory() {
    gameState = 'menu';
    overlay.classList.remove('hidden');
    overlay.querySelector('h1').textContent = '🏆 Victory!';
    overlay.querySelector('.sub').textContent = `You beat them all! Score: ${score}`;
    startBtn.textContent = 'Play Again';
}

function showDefeat() {
    gameState = 'menu';
    overlay.classList.remove('hidden');
    overlay.querySelector('h1').textContent = '💪 Try Again!';
    overlay.querySelector('.sub').textContent = `You: ${playerWins} — ${getChar().name}: ${aiWins} | Score: ${score}`;
    startBtn.textContent = 'Battle Again';
}

function startGame() {
    round = 1; playerWins = 0; aiWins = 0; score = 0;
    charIdx = 0;
    resultAnim = 0; battleResult = ''; playerChoice = null; aiChoice = null;
    particles = [];
    winsEl.textContent = 'Wins: 0';
    roundEl.textContent = 'Round 1';
    scoreEl.textContent = 'Score: 0';
    gameState = 'playing';
    overlay.classList.add('hidden');
    setButtons(true);
}

// Button events
btnRock.addEventListener('click', () => playRound('rock'));
btnPaper.addEventListener('click', () => playRound('paper'));
btnScissors.addEventListener('click', () => playRound('scissors'));

// Touch events
for (let btn of [btnRock, btnPaper, btnScissors]) {
    btn.addEventListener('touchstart', e => { e.preventDefault(); btn.classList.add('selected'); }, {passive:false});
    btn.addEventListener('touchend', e => {
        e.preventDefault();
        btn.classList.remove('selected');
        const type = btn === btnRock ? 'rock' : btn === btnPaper ? 'paper' : 'scissors';
        playRound(type);
    }, {passive:false});
}

startBtn.addEventListener('click', startGame);

// Update particles
setInterval(() => {
    for (let i = particles.length-1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.15;
        p.rot += p.rotSpeed; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }
}, 16);

// Keyboard support
document.addEventListener('keydown', e => {
    if (gameState !== 'playing') return;
    if (e.key === '1' || e.key === 'a') playRound('rock');
    if (e.key === '2' || e.key === 's') playRound('paper');
    if (e.key === '3' || e.key === 'd') playRound('scissors');
});

draw();
</script>
</body>
</html>
