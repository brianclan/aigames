<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Space Dodge</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 400; canvas.height = 600;
let player = { x: 200, y: 550, w: 30, h: 30, speed: 6 };
let obstacles = []; let score = 0; let gameOver = false;
let touchX = null;
function spawnObstacle() {
  obstacles.push({ x: Math.random() * 370, y: -30, w: 30, h: 30, speed: 2 + Math.random() * 3 });
}
canvas.addEventListener('touchstart', e => { e.preventDefault(); touchX = e.touches[0].clientX; });
canvas.addEventListener('touchmove', e => { e.preventDefault(); const tx = e.touches[0].clientX; const rect = canvas.getBoundingClientRect(); player.x += (tx - rect.left - player.x) * 0.15; });
canvas.addEventListener('touchend', () => { touchX = null; });
document.addEventListener('keydown', e => { if(e.key==='ArrowLeft') player.x -= player.speed; if(e.key==='ArrowRight') player.x += player.speed; });
function update() {
  if(gameOver) return;
  if(Math.random() < 0.03) spawnObstacle();
  obstacles.forEach(o => o.y += o.speed);
  obstacles = obstacles.filter(o => o.y < 620);
  obstacles.forEach(o => { if(o.x < player.x+player.w && o.x+o.w > player.x && o.y < player.y+player.h && o.y+o.h > player.y) gameOver = true; });
  player.x = Math.max(0, Math.min(370, player.x));
  score++;
}
function draw() {
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,400,600);
  ctx.fillStyle = '#0f0'; ctx.fillRect(player.x, player.y, player.w, player.h);
  ctx.fillStyle = '#f00';
  obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));
  ctx.fillStyle = '#fff'; ctx.font = '20px monospace'; ctx.fillText('Score: ' + score, 10, 30);
  if(gameOver) { ctx.fillStyle = '#fff'; ctx.font = '30px monospace'; ctx.fillText('GAME OVER', 100, 300); }
}
function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
