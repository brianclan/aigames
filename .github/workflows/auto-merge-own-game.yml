name: Auto Merge Own Game (Final)
on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Checkout PR Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          path: pr-source

      - name: Verify Ownership
        id: check
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          ALLOW="true"
          FILES=$(git diff --name-only origin/main...HEAD)
          for FILE in $FILES; do
            if [[ "$FILE" == AI_Games/*/* ]]; then
              GAME=$(echo "$FILE" | cut -d/ -f2)
              cd pr-source
              CREATOR=$(git log --follow --format="%an" -- "AI_Games/$GAME" 2>/dev/null | tail -1)
              if [[ -z "$CREATOR" ]]; then CREATOR="$AUTHOR"; fi
              if [[ "$CREATOR" != "$AUTHOR" ]]; then ALLOW="false"; break; fi
              cd ..
            fi
          done
          echo "allow_merge=$ALLOW" >> $GITHUB_OUTPUT

      - name: Install GitHub CLI
        run: sudo apt install -y gh

      - name: Merge PR with App Token
        if: steps.check.outputs.allow_merge == 'true'
        env:
          APP_ID: ${{ secrets.APP_ID }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          echo "$PRIVATE_KEY" > private-key.pem
          gh auth login --app-id "$APP_ID" --private-key private-key.pem --hostname github.com
          gh pr merge ${{ github.event.pull_request.number }} --merge --repo ${{ github.repository }}
