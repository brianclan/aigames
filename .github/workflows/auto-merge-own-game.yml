name: Auto Merge Own Game
on:
  pull_request:
    types: [opened, synchronize] # 只要 PR 被创建或更新，立刻跑

jobs:
  check-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须写这个，允许写入代码
      pull-requests: write # 必须写这个，允许合并 PR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if only modifying own games
        id: check
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          ALLOW="true"
          FILES=$(git diff --name-only origin/main...)

          for FILE in $FILES; do
            if [[ "$FILE" == AI_Games/*/* ]]; then
              GAME=$(echo "$FILE" | cut -d/ -f2)
              GAME_DIR="AI_Games/$GAME"
              CREATOR=$(git log --follow --format="%an" -- "$GAME_DIR" 2>/dev/null | tail -1)
              if [[ -z "$CREATOR" ]]; then
                CREATOR="$AUTHOR"
              fi
              if [[ "$CREATOR" != "$AUTHOR" ]]; then
                ALLOW="false"
                break
              fi
            fi
          done
          echo "allow_merge=$ALLOW" >> $GITHUB_OUTPUT

      - name: Auto merge PR instantly
        if: steps.check.outputs.allow_merge == 'true'
        run: |
          # 直接合并，不需要你点任何按钮
          gh pr merge ${{ github.event.pull_request.number }} --merge --auto --subject "Auto-merged: Own game changes"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }} # 这里使用你的 PAT
