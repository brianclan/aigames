name: Auto Merge Own Game
on: pull_request

jobs:
  check-and-merge:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if only modifying own games
        id: check
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          ALLOW="true"
          FILES=$(git diff --name-only origin/main...)

          for FILE in $FILES; do
            if [[ "$FILE" == AI_Games/*/* ]]; then
              GAME=$(echo "$FILE" | cut -d/ -f2)
              GAME_DIR="AI_Games/$GAME"
              CREATOR=$(git log --follow --format="%an" -- "$GAME_DIR" 2>/dev/null | tail -1)
              if [[ -z "$CREATOR" ]]; then
                CREATOR="$AUTHOR"
              fi
              if [[ "$CREATOR" != "$AUTHOR" ]]; then
                ALLOW="false"
                break
              fi
            fi
          done
          echo "allow_merge=$ALLOW" >> $GITHUB_OUTPUT

      - name: Auto merge PR if allowed
        if: steps.check.outputs.allow_merge == 'true'
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --merge -b " Auto-merged: Only your own game changes."
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
