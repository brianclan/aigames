name: Auto Merge Own Game (No API, No Token)
on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 必须拉取 PR 头部分支
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Check own game
        id: check
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          ALLOW="true"
          FILES=$(git diff --name-only origin/main...)
          for FILE in $FILES; do
            if [[ "$FILE" == AI_Games/*/* ]]; then
              GAME=$(echo "$FILE" | cut -d/ -f2)
              CREATOR=$(git log --follow --format="%an" -- "AI_Games/$GAME" 2>/dev/null | tail -1)
              if [[ -z "$CREATOR" ]]; then CREATOR="$AUTHOR"; fi
              if [[ "$CREATOR" != "$AUTHOR" ]]; then ALLOW="false"; break; fi
            fi
          done
          echo "allow_merge=$ALLOW" >> $GITHUB_OUTPUT

      - name: Merge to main (Git native)
        if: steps.check.outputs.allow_merge == 'true'
        run: |
          git config --global user.name "${{ github.event.pull_request.user.login }}"
          git config --global user.email "${{ github.event.pull_request.user.login }}@users.noreply.github.com"
          git checkout main
          git merge --no-ff ${{ github.event.pull_request.head.sha }} -m "Auto-merge: ${{ github.event.pull_request.title }}"
          git push origin main
