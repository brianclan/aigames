name: Auto Merge Own Game
on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if only modifying own games
        id: check
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          ALLOW="true"
          FILES=$(git diff --name-only origin/main...)

          for FILE in $FILES; do
            if [[ "$FILE" == AI_Games/*/* ]]; then
              GAME=$(echo "$FILE" | cut -d/ -f2)
              CREATOR=$(git log --follow --format="%an" -- "AI_Games/$GAME" 2>/dev/null | tail -1)
              if [[ -z "$CREATOR" ]]; then
                CREATOR="$AUTHOR"
              fi
              if [[ "$CREATOR" != "$AUTHOR" ]]; then
                ALLOW="false"
                break
              fi
            fi
          done
          echo "allow_merge=$ALLOW" >> $GITHUB_OUTPUT

      - name: Enable auto-merge and merge PR instantly
        if: steps.check.outputs.allow_merge == 'true'
        run: |
          # 第一步：为 PR 启用自动合并功能
          curl -X PUT \
            -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/automerge \
            -d '{"merge_method":"merge"}'
          # 第二步：直接发起合并请求
          curl -X PUT \
            -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/merge \
            -d '{"merge_method":"merge"}'
