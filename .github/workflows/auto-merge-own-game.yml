name: Auto Merge Own Game (Final Fixed)
on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Checkout PR Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          path: pr-source

      - name: Verify Ownership
        id: check
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          ALLOW="true"
          FILES=$(git diff --name-only origin/main...HEAD)
          for FILE in $FILES; do
            if [[ "$FILE" == AI_Games/*/* ]]; then
              GAME=$(echo "$FILE" | cut -d/ -f2)
              cd pr-source
              CREATOR=$(git log --follow --format="%an" -- "AI_Games/$GAME" 2>/dev/null | tail -1)
              if [[ -z "$CREATOR" ]]; then CREATOR="$AUTHOR"; fi
              if [[ "$CREATOR" != "$AUTHOR" ]]; then ALLOW="false"; break; fi
              cd ..
            fi
          done
          echo "allow_merge=$ALLOW" >> $GITHUB_OUTPUT

      - name: Generate GitHub App Token
        if: steps.check.outputs.allow_merge == 'true'
        uses: actions/create-github-app-token@v1
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Merge PR with App Token
        if: steps.check.outputs.allow_merge == 'true'
        env:
          TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          curl -v -X PUT \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/merge \
            -d '{"merge_method":"merge"}'
