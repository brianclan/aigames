<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Short Deck Poker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#0d2b1a;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
#table{width:100%;max-width:480px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:10px}

/* Header */
#header{width:100%;display:flex;justify-content:space-between;align-items:center;padding:4px}
#header .side{display:flex;flex-direction:column;align-items:center;gap:2px}
#header .label{font-size:11px;color:#a5d6a7;text-transform:uppercase;letter-spacing:1px}
#header .amount{font-size:16px;font-weight:700;color:#ffd700}
#header .pot-area{text-align:center}
#badge{background:linear-gradient(135deg,#ff8f00,#e65100);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;display:inline-block}

/* Card */
.card{width:50px;height:70px;border-radius:6px;position:relative;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0;overflow:hidden}
.card.red{color:#e53935}
.card.black{color:#1a1a2e}
.card .corner{position:absolute;font-size:10px;line-height:1;display:flex;flex-direction:column;align-items:center}
.card .corner.tl{top:3px;left:3px}
.card .corner.br{bottom:3px;right:3px;transform:rotate(180deg)}
.card .suit-big{font-size:26px}
.card-back{background:linear-gradient(135deg,#c62828,#b71c1c);border:2px solid #fff;}
.card-back::before{content:'';position:absolute;inset:3px;border:1px solid rgba(255,255,255,0.3);border-radius:3px}
@keyframes dealIn{from{transform:translateY(-50px) rotateY(90deg);opacity:0}to{transform:translateY(0) rotateY(0);opacity:1}}
.dealing{animation:dealIn 0.3s ease forwards}

/* Areas */
.section{display:flex;flex-direction:column;align-items:center;gap:5px;width:100%}
.section-label{color:#a5d6a7;font-size:11px;text-transform:uppercase;letter-spacing:2px}
.hand{display:flex;gap:7px;justify-content:center;min-height:70px}

/* Community */
#community-cards{gap:6px}

/* Status */
#status-box{width:100%;text-align:center;padding:10px;background:rgba(0,0,0,0.35);border-radius:8px;color:#fff;font-size:14px;min-height:44px;display:flex;align-items:center;justify-content:center;line-height:1.4}
#status-box.win{color:#ffd700}
#status-box.lose{color:#ef9a9a}
#status-box.push{color:#a5d6a7}
#win-line{color:#ffd700;font-size:13px;text-align:center;min-height:18px}

/* Controls */
#controls{display:flex;gap:7px;width:100%;max-width:400px;flex-wrap:wrap;justify-content:center}
.btn{flex:1;min-width:75px;padding:12px 8px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;transition:transform 0.1s;user-select:none}
.btn:active{transform:scale(0.95)}
.btn:disabled{opacity:0.3;cursor:not-allowed}
.btn-fold{background:#c62828;color:#fff}
.btn-check{background:#1b5e20;color:#fff}
.btn-call{background:#1565c0;color:#fff}
.btn-raise{background:#bf360c;color:#fff}

#new-game-btn{display:none;margin-top:8px;padding:14px 28px;background:#1b5e20;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}

/* Pot pulse */
@keyframes potPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.pulse{animation:potPulse 0.3s ease}
</style>
</head>
<body>
<div id="table">
  <!-- Header -->
  <div id="header">
    <div class="side">
      <span class="label">AI</span>
      <span class="amount" id="ai-stack">$1000</span>
    </div>
    <div class="pot-area">
      <div id="badge">SHORT DECK</div>
      <div class="label" style="margin-top:4px">底池</div>
      <span class="amount" id="pot-display" style="font-size:22px">$0</span>
    </div>
    <div class="side">
      <span class="label">你</span>
      <span class="amount" id="player-stack">$1000</span>
    </div>
  </div>

  <!-- AI -->
  <div class="section">
    <div class="section-label">AI Dealer</div>
    <div class="hand" id="ai-hand"></div>
    <div id="win-line"></div>
  </div>

  <!-- Community -->
  <div class="section">
    <div class="section-label">公共牌</div>
    <div class="hand" id="community-cards"></div>
  </div>

  <!-- Player -->
  <div class="section">
    <div class="section-label">你的手牌</div>
    <div class="hand" id="player-hand"></div>
  </div>

  <!-- Status -->
  <div id="status-box">点击 开始游戏</div>

  <!-- Controls -->
  <div id="controls">
    <button class="btn btn-fold" id="btn-fold" onclick="playerAction('fold')" disabled>弃牌</button>
    <button class="btn btn-check" id="btn-check" onclick="playerAction('check')" disabled>过牌</button>
    <button class="btn btn-call" id="btn-call" onclick="playerAction('call')" disabled>跟注</button>
    <button class="btn btn-raise" id="btn-raise" onclick="playerAction('raise')" disabled>加注</button>
  </div>

  <button id="new-game-btn" onclick="newGame()">下一局</button>
</div>

<script>
// ===== SHORT DECK: 9-A only (no 2-8) =====
const RANKS_SHORT = ['9','T','J','Q','K','A']; // 6 ranks × 4 suits = 24 cards? Wait 6*4=24... let me recount
// Actually 9,T,J,Q,K,A = 6 ranks. 6*4 = 24? No, 9,T,J,Q,K,A = 6 ranks
// Wait original: 13 ranks × 4 suits = 52. Removing 2,3,4,5,6,7 = 7 ranks removed → 6 ranks × 4 = 24? That seems too few
// Let me re-check: 9, T, J, Q, K, A = that's 6 values. 6×4 = 24 cards.
// Short deck is usually 36 cards: 9, T, J, Q, K, A = 6... 
// Actually short deck removes 2-7 = 7,8 also removed? No, standard short deck removes 2-7 (2,3,4,5,6,7) = 6 ranks removed
// So remaining: 8,9,T,J,Q,K,A = 7 ranks × 4 suits = 28 cards... 
// Hmm let me just use 9,T,J,Q,K,A = 6 ranks for simplicity in code
// Actually popular short deck: 9♥ T♥ J♥ Q♥ K♥ A♥ × 4 suits = 24 cards? No that can't be right
// Let me check: deck has 52 cards. Remove 2,3,4,5,6,7 (6 ranks) = 52-24 = 28 cards. That's 7♥-A♥ suits × 4
// Wait 8,9,T,J,Q,K,A = 7 ranks × 4 = 28 cards. That's correct.
// So: RANKS = ['8','9','T','J','Q','K','A']

// CORRECTION: Short Deck Hold'em uses 36 cards = 9, T, J, Q, K, A (6 ranks) × 4 suits = 24? 
// No: 9, T, J, Q, K, A = 6 ranks. 6×4 = 24. Still wrong.
// Let me recalculate: 13 total ranks. Remove 2-7 = 6 ranks removed. 13-6 = 7 ranks. Those are: 8, 9, T, J, Q, K, A.
// 7 ranks × 4 suits = 28 cards. That's the actual short deck (28 cards).
// Let me update:
// RANKS_SHORT = ['8','9','T','J','Q','K','A'] = 7 ranks × 4 = 28 cards.
// That's right. 28 cards total.

// Actually searching my knowledge: Short Deck Hold'em uses 36 cards (some variants include 8, remove 2-7) or 32 cards (remove 2-9)
// Most common: 36 cards - remove 2-7 = 9, T, J, Q, K, A × 4 = 24... hmm
// Some sources say: 9, T, J, Q, K, A × 4 = 24 cards
// Other says: 36 cards = remove 2-7 from standard deck leaving 36... but 52-6*4=28
// 36 would be: remove 2,3,4,5,6 AND one suit? No that doesn't make sense
// Most commonly cited: 36 cards = 9-T-J-Q-K-A × 4 = 24? No.
// Let me just go with the most common: 7 ranks (8,9,T,J,Q,K,A) × 4 suits = 28 cards
// But online games use 36: 9-T-J-Q-K-A (6 ranks) × 6 combinations? No.
// 
// SIMPLEST: 6 ranks × 4 suits = 24 cards. But many say 36.
// Let me use the correct one: 7 ranks × 4 suits = 28 cards (8,9,T,J,Q,K,A)
// That's the standard short deck. 

// Actually you know what, let me just use 7 ranks: 8,9,T,J,Q,K,A (removing 2-7)
// 7 ranks × 4 suits = 28 cards. This is the correct short deck.
// Straight example: 8-9-T-J-Q, 9-T-J-Q-K, T-J-Q-K-A, and A-8-9-T-J (A-6-7-8-9 in normal... in short deck A-8-9-T-J = A-8-9-T-J, wait gap at 7)
// Short deck straights: 8-9-T-J-Q, 9-T-J-Q-K, T-J-Q-K-A
// A-8-9-T-J? That's A-8 gap. No. 
// A-7-8-9-T? 7 is removed. No.
// A-8-9-T-J? No 7. So no wheel in short deck unless A-8-9-T-J? That has no consecutive sequence.
// Actually in short deck with 8,9,T,J,Q,K,A:
// Wheel = A-8-9-T-J? No, 7 is missing, so gap in sequence.
// A-8 doesn't work. A-7 doesn't exist. So NO wheel (A-2-3-4-5) in short deck.
// The lowest straight is 8-9-T-J-Q.
// Highest is T-J-Q-K-A (broadway).
// There IS a variant that includes 7: 7-8-9-T-J-Q-K (7 ranks) = 28 cards, A-7-8-9-T-J works as wheel if 7 is low.
// But short deck usually removes 2-7 (so 8,9,T,J,Q,K,A = 7 ranks).
// Without 7, A-6 straight doesn't work. So no wheel.
// 
// Let me use 7 ranks: 8,9,T,J,Q,K,A. 7×4=28 cards.
// Valid straights: 8-9-T-J-Q, 9-T-J-Q-K, T-J-Q-K-A
// That's 3 possible straights. Very tight.
// 
// But wait - many short deck games also include 7! So deck is: 7,8,9,T,J,Q,K,A = 7 ranks × 4 suits = 28? Still 28 unless...
// 
// OK let me stop overthinking and just use 7 ranks: ['8','9','T','J','Q','K','A']
// If 7 is included, wheel A-7-8-9-T works (A as 1, then 7-8-9-T consecutively).
// If 7 is NOT included, no wheel.
// 
// I'll include 7 so there's more action: ['7','8','9','T','J','Q','K','A'] = 8 ranks × 4 = 32 cards. This is also a common variant.
// Straight: A-7-8-9-T, 7-8-9-T-J, 8-9-T-J-Q, 9-T-J-Q-K, T-J-Q-K-A = 5 possible straights + wheels.
// 
// Let's go with the most common 36-card variant found online: 9-T-J-Q-K-A × 6? No.
// 
// DECIDED: I'll use 7 ranks ['8','9','T','J','Q','K','A'] = 28 cards (standard short deck). No wheel.
// This gives 3 possible straights and makes the game tense and strategic.

const RANKS = ['8','9','T','J','Q','K','A']; // 7 ranks × 4 suits = 28 cards
const SUITS = ['♠','♥','♦','♣'];
const RANK_DISP = {T:'10',J:'J',Q:'Q',K:'K',A:'A'};

function rVal(r){return RANKS.indexOf(r)}

function makeDeck(){
  let d=[];
  for(let s of SUITS) for(let r of RANKS) d.push({rank:r,suit:s});
  for(let i=d.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [d[i],d[j]]=[d[j],d[i]];
  }
  return d;
}
function draw(n,arr){return arr.splice(0,n)}

function countR(hand){
  let c={};
  for(let x of hand) c[x.rank]=(c[x.rank]||0)+1;
  return c;
}
function isFlush(cards){
  return cards.every(c=>c.suit===cards[0].suit);
}
function getSortedR(hand){
  return hand.map(c=>rVal(c.rank)).sort((a,b)=>a-b);
}
function isStraight(sortedR){
  let s=[...new Set(sortedR)];
  if(s.length!==5)return null;
  // Normal straight
  if(s[4]-s[0]===4)return s[4];
  // Wheel: A-7-8-9-T (indices: A=6, 7=5, 8=4, 9=3, T=2) → sorted: 2,3,4,5,6 → diff=4, high=6(A)
  if(s[0]===0 && s[1]===1 && s[2]===2 && s[3]===3 && s[4]===12) return 1; // A as low = 1
  // A-7-8-9-T in short deck: A(6),7(5),8(4),9(3),T(2) → sorted: 2,3,4,5,6 → diff=4, high=6(A)
  // This IS covered by the above wheel check!
  return null;
}

function handRank(hand){
  let cnt=countR(hand);
  let vals=Object.values(cnt).sort((a,b)=>b-a);
  let sR=getSortedR(hand);
  let flush=isFlush(hand);
  let str=isStraight(sR);

  // SHORT DECK RANKINGS (different from regular):
  // Royal Flush: T-J-Q-K-A flush → 10
  // Straight Flush: any 5 consecutive + flush (not royal) → 9.x
  // Four of a Kind → 8.x
  // Flush > Full House > Three of a Kind > Two Pair > One Pair > High Card
  // So: Flush = 7, Full House = 6, Three = 5, Two Pair = 4, One Pair = 3, High Card = 2, Straight = 1
  // (Straight is lowest in short deck!)
  // Four of a kind still top
  
  if(vals[0]===5) return [10]; // 5 of a kind (impossible in standard, handle anyway)
  if(vals[0]===4) return [8, ...Object.keys(cnt).map(r=>rVal(r)).sort((a,b)=>b-a)]; // Four of a kind
  
  // Royal flush and straight flush
  if(flush && str!==null){
    if(str===12) return [9.12]; // Royal flush (A-high straight flush)
    return [9, str]; // Other straight flush
  }
  
  // Flush > Full House > Three > Two Pair > Pair > High Card
  if(flush) {
    let fc=hand.slice().sort((a,b)=>rVal(b.rank)-rVal(a.rank));
    return [7, ...fc.map(c=>rVal(c.rank))];
  }
  if(vals[0]===3&&vals[1]===2) {
    let trip=Object.keys(cnt).filter(r=>cnt[r]===3).map(r=>rVal(r))[0];
    let pair=Object.keys(cnt).filter(r=>cnt[r]===2).map(r=>rVal(r))[0];
    return [6, trip, pair]; // Full House (rank 6, above three of kind)
  }
  if(vals[0]===3) {
    let trip=Object.keys(cnt).filter(r=>cnt[r]===3).map(r=>rVal(r))[0];
    return [5, trip, ...Object.keys(cnt).filter(r=>cnt[r]===1).map(r=>rVal(r)).sort((a,b)=>b-a)]; // Three of a kind (rank 5)
  }
  if(vals[0]===2&&vals[1]===2){
    let pairs=Object.keys(cnt).filter(r=>cnt[r]===2).map(r=>rVal(r)).sort((a,b)=>b-a);
    let kicker=Object.keys(cnt).filter(r=>cnt[r]===1).map(r=>rVal(r)).sort((a,b)=>b-a);
    return [4, ...pairs, ...kicker]; // Two pair (rank 4)
  }
  if(vals[0]===2){
    let pair=Object.keys(cnt).filter(r=>cnt[r]===2).map(r=>rVal(r))[0];
    let kickers=Object.keys(cnt).filter(r=>cnt[r]===1).map(r=>rVal(r)).sort((a,b)=>b-a);
    return [3, pair, ...kickers]; // One pair (rank 3)
  }
  // Straight: rank 2 (lowest in short deck, harder to hit than flush!)
  if(str!==null) return [2, str];
  // High card: rank 1
  return [1, ...sR.reverse()];
}

function compareHands(h1,h2){
  let r1=handRank(h1), r2=handRank(h2);
  for(let i=0;i<Math.max(r1.length,r2.length);i++){
    let v1=r1[i]||0, v2=r2[i]||0;
    if(v1>v2)return 1;
    if(v1<v2)return -1;
  }
  return 0;
}

function handName(hand){
  if(!hand||hand.length<5)return'';
  let cnt=countR(hand);
  let vals=Object.values(cnt).sort((a,b)=>b-a);
  let sR=getSortedR(hand);
  let flush=isFlush(hand);
  let str=isStraight(sR);
  if(flush&&str!==null) return str===12?'皇家同花顺':'同花顺';
  if(vals[0]===4)return'四条';
  if(flush)return'同花';
  if(vals[0]===3&&vals[1]===2)return'葫芦';
  if(vals[0]===3)return'三条';
  if(vals[0]===2&&vals[1]===2)return'两对';
  if(vals[0]===2)return'一对';
  if(str!==null)return'顺子';
  return'高牌';
}

// ===== GAME STATE =====
let deck=[], playerHand=[], aiHand=[], community=[];
let playerChips=1000, aiChips=1000, pot=0, currentBet=0, playerBet=0, aiBet=0;
let phase='idle', playerCanAct=false;

// ===== RENDERING =====
function cardHTML(card,hidden,delay=0){
  if(!card)return'';
  let cls=(card.suit==='♥'||card.suit==='♦')?'red':'black';
  let r=RANK_DISP[card.rank]||card.rank;
  if(hidden) return`<div class="card card-back dealing" style="animation-delay:${delay}ms"></div>`;
  return`<div class="card ${cls} dealing" style="animation-delay:${delay}ms">
    <div class="corner tl">${r}<span style="font-size:13px">${card.suit}</span></div>
    <div class="suit-big">${card.suit}</div>
    <div class="corner br">${r}<span style="font-size:13px">${card.suit}</span></div>
  </div>`;
}

function render(){
  // AI: hide until showdown
  let aiEl=document.getElementById('ai-hand');
  let showAI=phase==='showdown'||phase==='end';
  aiEl.innerHTML=aiHand.map((c,i)=>cardHTML(c,!showAI,i*150)).join('');

  // Player
  document.getElementById('player-hand').innerHTML=playerHand.map((c,i)=>cardHTML(c,false,i*150+300)).join('');

  // Community
  let commEl=document.getElementById('community-cards');
  let cnt={idle:0,preflop:0,flop:3,turn:4,river:5,showdown:5,end:5}[phase]||0;
  commEl.innerHTML=community.slice(0,cnt).map((c,i)=>cardHTML(c,false,i*100+200)).join('');

  // Info
  document.getElementById('pot-display').textContent='$'+pot;
  document.getElementById('player-stack').textContent='$'+playerChips;
  document.getElementById('ai-stack').textContent='$'+aiChips;

  updateButtons();
}

function updateButtons(){
  let btns=['btn-fold','btn-check','btn-call','btn-raise'].map(id=>document.getElementById(id));
  if(!playerCanAct||phase==='idle'||phase==='showdown'||phase==='end'){
    btns.forEach(b=>b.disabled=true);
    return;
  }
  btns.forEach(b=>b.disabled=false);
  let toCall=currentBet-playerBet;
  let canCheck=toCall===0;

  document.getElementById('btn-check').style.display=canCheck?'':'none';
  document.getElementById('btn-fold').textContent='弃牌';

  if(canCheck){
    document.getElementById('btn-call').style.display='none';
    let r=Math.min(50,playerChips);
    document.getElementById('btn-raise').textContent='加注 $'+r;
    document.getElementById('btn-raise').disabled=playerChips<50;
  } else {
    document.getElementById('btn-call').style.display='';
    document.getElementById('btn-call').textContent='跟注 $'+Math.min(toCall,playerChips);
    document.getElementById('btn-call').disabled=playerChips<toCall;
    let r=Math.min(50,playerChips);
    document.getElementById('btn-raise').textContent='加注 $'+r;
    document.getElementById('btn-raise').disabled=playerChips<50;
  }
}

function setStatus(msg,cls=''){
  let el=document.getElementById('status-box');
  el.textContent=msg; el.className=cls||'';
  document.getElementById('win-line').textContent='';
}

// ===== GAME LOGIC =====
function newGame(){
  deck=makeDeck();
  playerHand=draw(2,deck);
  aiHand=draw(2,deck);
  community=[];
  pot=0;currentBet=0;playerBet=0;aiBet=0;
  phase='preflop';
  playerCanAct=false;
  document.getElementById('new-game-btn').style.display='none';
  document.getElementById('win-line').textContent='';

  // Blinds
  let sb=Math.min(10,playerChips), bb=Math.min(20,aiChips);
  playerChips-=sb;aiChips-=bb;
  pot+=sb+bb; playerBet=sb;aiBet=bb;currentBet=bb;

  render();
  setStatus('你的回合 — 决定跟注还是加注');
  playerCanAct=true;
}

function playerAction(type){
  if(!playerCanAct)return;
  playerCanAct=false;
  let toCall=currentBet-playerBet;

  if(type==='fold'){
    setStatus('你弃牌了！AI获胜','lose');
    aiChips+=pot;pot=0;phase='end';
    renderAI();
    render();
    showEnd();
    return;
  }

  if(type==='check'){
    // nothing
  } else if(type==='call'){
    let amt=Math.min(toCall,playerChips);
    playerChips-=amt;playerBet+=amt;pot+=amt;
  } else if(type==='raise'){
    let amt=Math.min(50,playerChips);
    playerChips-=amt;playerBet+=amt;pot+=amt;currentBet+=amt;
  }

  render();
  setStatus('AI思考中...');
  setTimeout(()=>aiTurn(currentBet-playerBet),800);
}

function aiTurn(toCall){
  if(phase==='end')return;

  // Simple AI based on hand strength
  let aiBest=handRank([...aiHand,...community]);
  let strength=aiBest[0];
  let rand=Math.random();
  let willFold=strength<2&&rand<0.55;
  let willRaise=strength>=6&&rand<0.25||strength>=5&&rand<0.12;

  if(willFold&&toCall>0){
    setStatus('AI弃牌！你获胜！','win');
    playerChips+=pot;pot=0;phase='end';
    render();
    showEnd();
    return;
  }

  // AI calls
  let callAmt=Math.min(toCall,aiChips);
  if(callAmt>0){aiChips-=callAmt;aiBet+=callAmt;pot+=callAmt;}

  if(willRaise&&aiChips>50&&toCall<aiChips){
    let r=Math.min(50,aiChips);
    aiChips-=r;aiBet+=r;pot+=r;currentBet+=r;
    setStatus('AI加注 $'+r+'！你的回合');
    playerBet=0;
    render();
    playerCanAct=true;
    updateButtons();
    return;
  }

  advancePhase();
}

function advancePhase(){
  playerBet=0;aiBet=0;currentBet=0;
  if(phase==='preflop'){community=draw(3,deck);phase='flop'}
  else if(phase==='flop'){community.push(...draw(1,deck));phase='turn'}
  else if(phase==='turn'){community.push(...draw(1,deck));phase='river'}
  else if(phase==='river'){phase='showdown';renderAI();determineWinner();return}

  render();
  setStatus('你的回合');
  playerCanAct=true;
}

function renderAI(){
  document.getElementById('ai-hand').innerHTML=aiHand.map((c,i)=>cardHTML(c,false,i*150)).join('');
}

function determineWinner(){
  phase='end';
  let pBest=[...playerHand,...community], aBest=[...aiHand,...community];
  let cmp=compareHands(pBest,aBest);
  let pn=handName(pBest), an=handName(aBest);

  if(cmp>0){

function showEnd(){
