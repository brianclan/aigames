<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cat Jump</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const GRAVITY = 0.5;
const JUMP_FORCE = -12;
const CAT_SIZE = 40;

let gameState = 'start';
let score = 0;
let highScore = 0;

const cat = {
    x: 0, y: 0, vy: 0,
    w: CAT_SIZE, h: CAT_SIZE,
    grounded: false,
    rotation: 0,
    jumpCount: 0
};

let platforms = [];
let fishes = [];
let particles = [];
let stars = [];

function initStars() {
    stars = [];
    for (let i = 0; i < 50; i++) {
        stars.push({
            x: Math.random() * W,
            y: Math.random() * H,
            size: Math.random() * 2 + 0.5,
            twinkle: Math.random() * Math.PI * 2
        });
    }
}

function initGame() {
    score = 0;
    cat.x = W / 2 - CAT_SIZE / 2;
    cat.y = H - 200;
    cat.vy = 0;
    cat.grounded = false;
    cat.jumpCount = 0;
    cat.rotation = 0;
    
    platforms = [];
    fishes = [];
    particles = [];
    
    let startPlat = { x: W / 2 - 60, y: H - 150, w: 120, h: 15, color: '#4a9c6d' };
    platforms.push(startPlat);
    
    for (let i = 0; i < 8; i++) {
        spawnPlatform(H - 150 - i * 90);
    }
    
    initStars();
}

function spawnPlatform(y) {
    let pw = 80 + Math.random() * 60;
    let px = Math.random() * (W - pw);
    let colors = ['#4a9c6d', '#5ba37e', '#3d8b5e', '#6bb88f', '#4caf50'];
    platforms.push({
        x: px, y: y, w: pw, h: 15,
        color: colors[Math.floor(Math.random() * colors.length)]
    });
    
    if (Math.random() > 0.4) {
        let fx = px + pw / 2 - 10;
        let fy = y - 30;
        fishes.push({ x: fx, y: fy, w: 20, h: 14, angle: 0, collected: false });
    }
}

function jump() {
    if (cat.grounded || cat.jumpCount < 2) {
        cat.vy = JUMP_FORCE;
        cat.grounded = false;
        cat.jumpCount++;
        
        for (let i = 0; i < 8; i++) {
            particles.push({
                x: cat.x + cat.w / 2,
                y: cat.y + cat.h,
                vx: (Math.random() - 0.5) * 4,
                vy: Math.random() * 2,
                life: 20,
                color: '#ffffff',
                size: Math.random() * 4 + 2
            });
        }
    }
}

function update() {
    if (gameState !== 'playing') return;
    
    cat.vy += GRAVITY;
    cat.y += cat.vy;
    cat.rotation = Math.min(Math.max(cat.vy * 2, -20), 20);
    
    if (cat.y > H + 100) {
        gameState = 'gameover';
        if (score > highScore) highScore = score;
        return;
    }
    
    cat.grounded = false;
    for (let p of platforms) {
        if (cat.vy >= 0 &&
            cat.x + cat.w > p.x && cat.x < p.x + p.w &&
            cat.y + cat.h > p.y && cat.y + cat.h < p.y + p.h + cat.vy + 5) {
            cat.y = p.y - cat.h;
            cat.vy = 0;
            cat.grounded = true;
            cat.jumpCount = 0;
        }
    }
    
    for (let f of fishes) {
        if (!f.collected &&
            cat.x < f.x + f.w && cat.x + cat.w > f.x &&
            cat.y < f.y + f.h && cat.y + cat.h > f.y) {
            f.collected = true;
            score += 10;
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x: f.x + f.w / 2,
                    y: f.y + f.h / 2,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 25,
                    color: '#ffd700',
                    size: Math.random() * 5 + 3
                });
            }
        }
        f.angle += 0.1;
    }
    
    for (let p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1;
        p.life--;
    }
    particles = particles.filter(p => p.life > 0);
    
    let maxY = Math.min(...platforms.map(p => p.y));
    while (maxY > -50) {
        let newY = maxY - 80 - Math.random() * 30;
        spawnPlatform(newY);
        maxY = Math.min(...platforms.map(p => p.y));
    }
    
    platforms = platforms.filter(p => p.y < H + 50);
    fishes = fishes.filter(f => f.y < H + 50);
    
    let topPlat = Math.min(...platforms.map(p => p.y));
    if (cat.y < topPlat + 100) {
        score++;
        let diff = topPlat - (cat.y - 100);
        for (let p of platforms) p.y += diff;
        for (let f of fishes) f.y += diff;
    }
}

function drawCat(x, y, w, h, rot) {
    ctx.save();
    ctx.translate(x + w / 2, y + h / 2);
    ctx.rotate(rot * Math.PI / 180);
    
    let bodyColor = '#f5a623';
    let darkColor = '#d4850c';
    let lightColor = '#ffcc66';
    
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.ellipse(0, 2, w * 0.45, h * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.ellipse(0, -h * 0.25, w * 0.35, h * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.moveTo(-w * 0.3, -h * 0.35);
    ctx.lineTo(-w * 0.15, -h * 0.65);
    ctx.lineTo(-w * 0.05, -h * 0.35);
    ctx.fill();
    
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.moveTo(w * 0.05, -h * 0.35);
    ctx.lineTo(w * 0.15, -h * 0.65);
    ctx.lineTo(w * 0.3, -h * 0.35);
    ctx.fill();
    
    ctx.fillStyle = darkColor;
    ctx.beginPath();
    ctx.moveTo(-w * 0.28, -h * 0.36);
    ctx.lineTo(-w * 0.15, -h * 0.58);
    ctx.lineTo(-w * 0.08, -h * 0.36);
    ctx.fill();
    
    ctx.fillStyle = darkColor;
    ctx.beginPath();
    ctx.moveTo(w * 0.08, -h * 0.36);
    ctx.lineTo(w * 0.15, -h * 0.58);
    ctx.lineTo(w * 0.28, -h * 0.36);
    ctx.fill();
    
    ctx.fillStyle = '#2d2d2d';
    ctx.beginPath();
    ctx.ellipse(-w * 0.12, -h * 0.28, w * 0.08, h * 0.1, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(w * 0.12, -h * 0.28, w * 0.08, h * 0.1, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(-w * 0.1, -h * 0.3, w * 0.03, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(w * 0.14, -h * 0.3, w * 0.03, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#ff9999';
    ctx.beginPath();
    ctx.moveTo(0, -h * 0.15);
    ctx.lineTo(-w * 0.04, -h * 0.08);
    ctx.lineTo(w * 0.04, -h * 0.08);
    ctx.fill();
    
    ctx.strokeStyle = '#2d2d2d';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-w * 0.05, -h * 0.1);
    ctx.lineTo(-w * 0.15, -h * 0.05);
    ctx.moveTo(-w * 0.05, -h * 0.1);
    ctx.lineTo(-w * 0.15, -h * 0.12);
    ctx.moveTo(w * 0.05, -h * 0.1);
    ctx.lineTo(w * 0.15, -h * 0.05);
    ctx.moveTo(w * 0.05, -h * 0.1);
    ctx.lineTo(w * 0.15, -h * 0.12);
    ctx.stroke();
    
    ctx.strokeStyle = darkColor;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-w * 0.4, 0);
    ctx.quadraticCurveTo(-w * 0.5, h * 0.3, -w * 0.45, h * 0.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(w * 0.4, 0);
    ctx.quadraticCurveTo(w * 0.5, h * 0.3, w * 0.45, h * 0.5);
    ctx.stroke();
    
    ctx.restore();
}

function drawFish(x, y, w, h, angle) {
    ctx.save();
    ctx.translate(x + w / 2, y + h / 2);
    ctx.rotate(Math.sin(angle) * 0.2);
    
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.ellipse(0, 0, w * 0.5, h * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#ffec8b';
    ctx.beginPath();
    ctx.ellipse(w * 0.1, -h * 0.1, w * 0.25, h * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.moveTo(-w * 0.4, 0);
    ctx.lineTo(-w * 0.7, -h * 0.35);
    ctx.lineTo(-w * 0.7, h * 0.35);
    ctx.fill();
    
    ctx.fillStyle = '#2d2d2d';
    ctx.beginPath();
    ctx.arc(w * 0.25, -h * 0.1, w * 0.08, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.restore();
}

function draw() {
    let gradient = ctx.createLinearGradient(0, 0, 0, H);
    gradient.addColorStop(0, '#0f0c29');
    gradient.addColorStop(0.5, '#302b63');
    gradient.addColorStop(1, '#24243e');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, W, H);
    
    for (let s of stars) {
        s.twinkle += 0.05;
        let alpha = 0.3 + Math.sin(s.twinkle) * 0.3 + 0.4;
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
    }
    
    if (gameState === 'start') {
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('CAT JUMP', W / 2, H / 3);
        
        ctx.font = '20px Arial';
        ctx.fillStyle = '#aaaaaa';
        ctx.fillText('Tap or Click to Start', W / 2, H / 2);
        ctx.fillText('Jump between platforms', W / 2, H / 2 + 35);
        ctx.fillText('Collect fish for bonus points!', W / 2, H / 2 + 65);
        
        drawCat(W / 2 - 30, H / 2 + 100, 60, 60, 0);
        return;
    }
    
    if (gameState === 'gameover') {
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 42px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', W / 2, H / 3);
        
        ctx.font = '28px Arial';
        ctx.fillText('Score: ' + score, W / 2, H / 2 - 20);
        ctx.fillStyle = '#ffd700';
        ctx.fillText('Best: ' + highScore, W / 2, H / 2 + 20);
        
        ctx.font = '22px Arial';
        ctx.fillStyle = '#aaaaaa';
        ctx.fillText('Tap to Play Again', W / 2, H / 2 + 80);
        return;
    }
    
    for (let p of platforms) {
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.roundRect(p.x, p.y, p.w, p.h, 6);
        ctx.fill();
        
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillRect(p.x + 4, p.y + 2, p.w - 8, 4);
    }
    
    for (let f of fishes) {
        if (!f.collected) {
            drawFish(f.x, f.y, f.w, f.h, f.angle);
        }
    }
    
    drawCat(cat.x, cat.y, cat.w, cat.h, cat.rotation);
    
    for (let p of particles) {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life / 25;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
    
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 24px Arial';
    ctx.textAlign = 'left';
    ctx.fillText('Score: ' + score, 20, 40);
}

function handleInput() {
    if (gameState === 'start') {
        gameState = 'playing';
        initGame();
    } else if (gameState === 'playing') {
        jump();
    } else if (gameState === 'gameover') {
        gameState = 'playing';
        initGame();
    }
}

canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    handleInput();
});

canvas.addEventListener('mousedown', function(e) {
    e.preventDefault();
    handleInput();
});

canvas.addEventListener('keydown', function(e) {
    if (e.code === 'Space') {
        e.preventDefault();
        handleInput();
    }
});

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

initStars();
gameLoop();
</script>
</body>
</html>
