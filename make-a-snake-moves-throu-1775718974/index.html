<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>make a snake moves throu</title>
  <style>
    html,body{margin:0;height:100%;background:#10131f;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;overflow:hidden}
    .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
    .tip{opacity:.8;font-size:13px;padding:0 20px;text-align:center}
    .btn{appearance:none;border:none;border-radius:14px;padding:16px 26px;background:#7ef29a;color:#111;font-size:28px;font-weight:800}
    .meta{font-size:14px;opacity:.75}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="meta">make a snake moves throu</div>
    <button class="btn" id="tap">Tap 0</button>
    <div class="tip">make a snake moves through a grid,eating food to grow longer while avoiding hidden mines,classic snake mechanics meet minesweeper tension</div>
    <div class="tip">鼠标点击或触摸都可玩</div>
  </div>
  <script>
    let n = 0;
    const el = document.getElementById('tap');
    const inc = () => { n += 1; el.textContent = 'Tap ' + n; };
    el.addEventListener('click', inc);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); inc(); }, { passive: false });
  </script>
</body>
</html>
