<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>游艇建造师</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh; overflow: hidden; font-family: sans-serif; }
canvas { display: block; border-radius: 6px; box-shadow: 0 0 40px rgba(0,255,200,0.15); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// CANVAS
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
function resize() {
  var mw = Math.min(window.innerWidth * 0.96, 480);
  var mh = window.innerHeight * 0.96;
  var r = 9 / 16;
  var w = mw;
  var h = w / r;
  if (h > mh) { h = mh; w = h * r; }
  canvas.width = Math.floor(w);
  canvas.height = Math.floor(h);
}
resize();

// GAME STATE: 0=menu, 1=build, 2=win
var STATE = 0;
var time = 0;
var pulse = 0;
var score = 0;
var best = parseInt(localStorage.getItem('yachtBuilderBest') || '0');

// Parts data
var PARTS_DEF = [
  { id:'hull',     name:'船体',  emoji:'🟫', hint:'HULL',    color:'#8B4513', dx:-0.28, dy:-0.1, dw:0.56, dh:0.22 },
  { id:'deck',     name:'甲板',  emoji:'🟫', hint:'DECK',    color:'#D2691E', dx:-0.22, dy:-0.22, dw:0.44, dh:0.14 },
  { id:'cabin',    name:'船舱',  emoji:'🏠', hint:'CABIN',   color:'#ecf0f1', dx:-0.14, dy:-0.3, dw:0.28, dh:0.16 },
  { id:'window',   name:'舷窗',  emoji:'🪟', hint:'WINDOW',  color:'#00d4ff', dx:-0.06, dy:-0.3, dw:0.12, dh:0.1 },
  { id:'mast',     name:'桅杆',  emoji:'🚩', hint:'MAST',    color:'#aaa',    dx:0.1,   dy:-0.48, dw:0.06, dh:0.3  },
  { id:'sail',     name:'船帆',  emoji:'⛵', hint:'SAIL',    color:'#fff',    dx:0.16,  dy:-0.38, dw:0.2,  dh:0.22 },
  { id:'antenna',  name:'天线',  emoji:'📡', hint:'ANTENNA', color:'#888',    dx:-0.01, dy:-0.46, dw:0.04, dh:0.18 },
  { id:'engine',   name:'引擎',  emoji:'⚙️', hint:'ENGINE',  color:'#666',    dx:-0.1,  dy:0.06,  dw:0.2,  dh:0.12 },
  { id:'prop',     name:'螺旋桨',emoji:'🔩', hint:'PROP',    color:'#555',    dx:0.15,  dy:0.08,  dw:0.12, dh:0.08 },
];

// Floating parts (in the build area)
var floatingParts = [];
var selectedPart = null;
var placedParts = {};
var hoverPart = null;

// Sparkles
var sparkles = [];

// Stars
var time_s = 0;

function initFloatingParts() {
  floatingParts = [];
  var shuffled = PARTS_DEF.slice().sort(function() { return Math.random() - 0.5; });
  var cols = 3;
  shuffled.forEach(function(p, i) {
    var col = i % cols;
    var row = Math.floor(i / cols);
    floatingParts.push({
      part: p,
      x: canvas.width * 0.1 + col * canvas.width * 0.28,
      y: canvas.height * 0.7 + row * canvas.height * 0.12,
      sz: canvas.width * 0.08,
      pulse: Math.random() * Math.PI * 2
    });
  });
}

function initGame() {
  placedParts = {};
  selectedPart = null;
  hoverPart = null;
  sparkles = [];
  score = 100;
  initFloatingParts();
}

// INPUT - with drag support
var isDragging = false;
var dragOffsetX = 0;
var dragOffsetY = 0;
var dragPart = null; // the floatingPart being dragged

function getPos(e) {
  var r = canvas.getBoundingClientRect();
  var cx = e.clientX !== undefined ? e.clientX : e.pageX;
  var cy = e.clientY !== undefined ? e.clientY : e.pageY;
  return {
    x: (cx - r.left) * (canvas.width / r.width),
    y: (cy - r.top) * (canvas.height / r.height)
  };
}

function onDown(e) {
  e.preventDefault();
  var pos = getPos(e);

  // Menu / win screen
  if (STATE === 0) { STATE = 1; initGame(); return; }
  if (STATE === 2) { STATE = 0; return; }

  // Check if clicking a floating part
  for (var i = floatingParts.length - 1; i >= 0; i--) {
    var fp = floatingParts[i];
    if (Math.abs(pos.x - fp.x) < fp.sz * 1.5 && Math.abs(pos.y - fp.y) < fp.sz * 1.5) {
      // Start dragging this part
      dragPart = fp;
      dragOffsetX = pos.x - fp.x;
      dragOffsetY = pos.y - fp.y;
      isDragging = true;
      selectedPart = fp;
      return;
    }
  }
}

function onMove(e) {
  e.preventDefault();
  var pos = getPos(e);

  // Update hovered part (for glow effect)
  hoverPart = null;
  if (!isDragging) {
    for (var i = floatingParts.length - 1; i >= 0; i--) {
      var fp = floatingParts[i];
      if (Math.abs(pos.x - fp.x) < fp.sz * 1.5 && Math.abs(pos.y - fp.y) < fp.sz * 1.5) {
        hoverPart = fp;
        break;
      }
    }
  }

  // Drag selected part
  if (isDragging && dragPart) {
    dragPart.x = pos.x - dragOffsetX;
    dragPart.y = pos.y - dragOffsetY;
  }
}

function onUp(e) {
  e.preventDefault();
  if (!isDragging || !dragPart) { isDragging = false; dragPart = null; return; }

  var pos = getPos(e);
  var p = dragPart.part;

  // Check if over the correct yacht slot
  var bx = canvas.width * 0.5 + p.dx * canvas.width;
  var by = canvas.height * 0.32 + p.dy * canvas.height;
  var bw = p.dw * canvas.width;
  var bh = p.dh * canvas.height;

  if (pos.x > bx - bw/2 - 20 && pos.x < bx + bw/2 + 20 &&
      pos.y > by - bh/2 - 20 && pos.y < by + bh/2 + 20) {
    // Correct placement!
    placedParts[p.id] = p;
    floatingParts.splice(floatingParts.indexOf(dragPart), 1);
    selectedPart = null;

    // Sparkle burst
    for (var s = 0; s < 15; s++) {
      var a = Math.random() * Math.PI * 2;
      var spd = 2 + Math.random() * 4;
      sparkles.push({ x: bx, y: by, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, life: 1, color: p.color });
    }

    // Check win
    if (Object.keys(placedParts).length === PARTS_DEF.length) {
      STATE = 2;
      score = Math.floor(100 + Math.max(0, 60 - time) * 5);
      if (score > best) { best = score; localStorage.setItem('yachtBuilderBest', best); }
      for (var k = 0; k < 50; k++) {
        var ka = Math.random() * Math.PI * 2;
        var ks = 1 + Math.random() * 6;
        sparkles.push({ x: canvas.width/2, y: canvas.height*0.3, vx: Math.cos(ka)*ks, vy: Math.sin(ka)*ks - 2, life: 1.5, color: ['#ff6b6b','#ffd93d','#6bcb77','#00ffcc','#ff9ff3'][Math.floor(Math.random()*5)] });
      }
    }
  } else {
    // Snap back to original position
    var col = PARTS_DEF.indexOf(p) % 3;
    var row = Math.floor(PARTS_DEF.indexOf(p) / 3);
    dragPart.x = canvas.width * 0.1 + col * canvas.width * 0.28;
    dragPart.y = canvas.height * 0.7 + row * canvas.height * 0.12;
    score = Math.max(0, score - 5);
    for (var ws = 0; ws < 5; ws++) {
      sparkles.push({ x: pos.x, y: pos.y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life: 0.5, color: '#ff4444' });
    }
  }

  isDragging = false;
  dragPart = null;
}

canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', onDown, {passive:false});
canvas.addEventListener('touchmove', onMove, {passive:false});
canvas.addEventListener('touchend', onUp, {passive:false});

function update(dt) {
  if (STATE === 1) {
    time += dt;
    // Auto-deselect if wrong placement
    if (score <= 0) { STATE = 2; score = 0; }
  }
  time_s += dt;
  pulse += dt * 2;

  floatingParts.forEach(function(fp) { fp.pulse += dt * 2; });

  sparkles = sparkles.filter(function(s) {
    s.x += s.vx; s.y += s.vy;
    s.vy += 0.08;
    s.life -= dt * 1.5;
    return s.life > 0;
  });
}

// DRAW
function drawBG() {
  // Dark background
  var g = ctx.createLinearGradient(0, 0, 0, canvas.height);
  g.addColorStop(0, '#0a0a1a');
  g.addColorStop(0.5, '#0d0d25');
  g.addColorStop(1, '#101030');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Stars
  ctx.fillStyle = '#fff';
  for (var si = 0; si < 25; si++) {
    var sx = (si * 137 + time_s * 2) % canvas.width;
    var sy = (si * 83) % (canvas.height * 0.55);
    var ss = 0.5 + Math.sin(time_s * 3 + si) * 0.5;
    ctx.globalAlpha = 0.2 + ss * 0.5;
    ctx.beginPath();
    ctx.arc(sx, sy, ss + 0.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // City skyline
  var cityH = canvas.height * 0.32;
  for (var ci = 0; ci < 14; ci++) {
    var bw = canvas.width * (0.06 + (ci % 3) * 0.02);
    var bh = cityH * (0.25 + (ci % 5) * 0.15);
    var bx = (ci / 14) * canvas.width;
    var by = canvas.height * 0.55 - bh;
    ctx.fillStyle = '#1a1a3a';
    ctx.fillRect(bx, by, bw, bh + 10);
    var neonColors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4ecdc4', '#ff9ff3', '#00d4ff'];
    ctx.fillStyle = neonColors[ci % neonColors.length];
    ctx.globalAlpha = 0.35 + Math.sin(time_s * 2.5 + ci) * 0.3;
    for (var wi = 0; wi < 3; wi++) {
      for (var wj = 0; wj < 5; wj++) {
        ctx.fillRect(bx + 2 + wi * (bw / 3.5), by + 4 + wj * (bh / 6), bw / 5, bh / 8);
      }
    }
    ctx.globalAlpha = 1;
  }

  // Dark water
  var wg = ctx.createLinearGradient(0, canvas.height * 0.75, 0, canvas.height);
  wg.addColorStop(0, '#0d1a2d');
  wg.addColorStop(1, '#050a14');
  ctx.fillStyle = wg;
  ctx.fillRect(0, canvas.height * 0.75, canvas.width, canvas.height * 0.25);
}

function drawBuildArea() {
  // Draw yacht ghost outline
  var cx = canvas.width / 2;
  var cy = canvas.height * 0.32;

  // Ghost hull
  ctx.strokeStyle = 'rgba(0,255,200,0.2)';
  ctx.lineWidth = 2;
  ctx.setLineDash([5, 5]);
  ctx.beginPath();
  ctx.moveTo(cx - canvas.width * 0.28, cy);
  ctx.bezierCurveTo(cx - canvas.width * 0.28, cy + canvas.height * 0.1, cx + canvas.width * 0.2, cy + canvas.height * 0.1, cx + canvas.width * 0.2, cy);
  ctx.lineTo(cx + canvas.width * 0.28, cy);
  ctx.stroke();
  ctx.setLineDash([]);

  // Draw placed parts
  Object.keys(placedParts).forEach(function(id) {
    var p = placedParts[id];
    var bx = cx + p.dx * canvas.width;
    var by = cy + p.dy * canvas.height;
    var bw = p.dw * canvas.width;
    var bh = p.dh * canvas.height;

    ctx.save();
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 12;

    if (p.id === 'hull') {
      var hg = ctx.createLinearGradient(bx - bw/2, 0, bx + bw/2, 0);
      hg.addColorStop(0, '#8B4513'); hg.addColorStop(0.5, '#D2691E'); hg.addColorStop(1, '#8B4513');
      ctx.fillStyle = hg;
      ctx.beginPath();
      ctx.moveTo(bx - bw/2, by - bh/2);
      ctx.lineTo(bx - bw*0.6, by + bh/2);
      ctx.lineTo(bx + bw*0.6, by + bh/2);
      ctx.lineTo(bx + bw/2, by - bh/2);
      ctx.closePath();
      ctx.fill();
    } else if (p.id === 'deck') {
      ctx.fillStyle = '#D2691E';
      ctx.fillRect(bx - bw/2, by - bh/2, bw, bh);
    } else if (p.id === 'cabin') {
      ctx.fillStyle = '#ecf0f1';
      ctx.fillRect(bx - bw/2, by - bh/2, bw, bh);
      ctx.fillStyle = '#00d4ff';
      ctx.globalAlpha = 0.6;
      ctx.fillRect(bx - bw/2 + 4, by - bh/2 + 2, bw - 8, bh * 0.5);
      ctx.globalAlpha = 1;
    } else if (p.id === 'window') {
      ctx.fillStyle = '#00d4ff';
      ctx.shadowColor = '#00d4ff';
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.arc(bx, by, bw * 0.4, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.id === 'mast') {
      ctx.strokeStyle = '#aaa'; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(bx, by + bh/2); ctx.lineTo(bx, by - bh/2); ctx.stroke();
    } else if (p.id === 'sail') {
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.shadowColor = '#fff'; ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(bx - bw/2, by + bh/2);
      ctx.quadraticCurveTo(bx, by - bh/2, bx + bw/2, by + bh/2);
      ctx.closePath();
      ctx.fill();
    } else if (p.id === 'antenna') {
      ctx.strokeStyle = '#888'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(bx, by + bh/2); ctx.lineTo(bx, by - bh/2); ctx.stroke();
      ctx.fillStyle = '#ff4444'; ctx.shadowColor = '#ff4444'; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(bx, by - bh/2, 3, 0, Math.PI * 2); ctx.fill();
    } else if (p.id === 'engine') {
      ctx.fillStyle = '#555';
      ctx.fillRect(bx - bw/2, by - bh/2, bw, bh);
      ctx.fillStyle = '#888';
      ctx.fillRect(bx - bw/4, by - bh/2 - 4, bw/2, 4);
    } else if (p.id === 'prop') {
      ctx.fillStyle = '#555';
      ctx.fillRect(bx - bw/2, by - bh/2, bw, bh);
      ctx.strokeStyle = '#888'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(bx - bw*0.4, by); ctx.lineTo(bx + bw*0.4, by); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx, by - bh*0.4); ctx.lineTo(bx, by + bh*0.4); ctx.stroke();
    }

    ctx.shadowBlur = 0;
    ctx.restore();
  });

  // Highlight next correct target if a part is selected
  if (selectedPart) {
    var remaining = PARTS_DEF.filter(function(p) { return !placedParts[p.id]; });
    if (remaining.length > 0) {
      var next = remaining[0];
      var bx = cx + next.dx * canvas.width;
      var by = cy + next.dy * canvas.height;
      var bw = next.dw * canvas.width;
      var bh = next.dh * canvas.height;

      var glow = 0.5 + Math.sin(pulse * 3) * 0.5;
      ctx.save();
      ctx.strokeStyle = '#00ffcc';
      ctx.shadowColor = '#00ffcc';
      ctx.shadowBlur = 20 * glow;
      ctx.lineWidth = 3;
      ctx.setLineDash([6, 4]);
      ctx.strokeRect(bx - bw/2 - 5, by - bh/2 - 5, bw + 10, bh + 10);
      ctx.setLineDash([]);
      ctx.shadowBlur = 0;
      ctx.restore();
    }
  }
}

function drawFloatingParts() {
  floatingParts.forEach(function(fp) {
    var isSelected = (fp === selectedPart);
    var isHovered = (fp === hoverPart);
    var bob = Math.sin(fp.pulse) * 3;

    ctx.save();
    ctx.translate(fp.x, fp.y + bob);

    if (isSelected) {
      ctx.shadowColor = '#00ffcc';
      ctx.shadowBlur = 20;
      ctx.strokeStyle = '#00ffcc';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(0, 0, fp.sz * 1.5, 0, Math.PI * 2);
      ctx.stroke();
    }

    if (isHovered && !isSelected) {
      ctx.shadowColor = '#ffd700';
      ctx.shadowBlur = 12;
    }

    // Draw part icon
    ctx.font = Math.floor(fp.sz * 1.4) + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(fp.part.emoji, 0, 0);

    // Label
    ctx.font = Math.floor(canvas.width * 0.028) + 'px sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText(fp.part.name, 0, fp.sz * 1.6);

    ctx.shadowBlur = 0;
    ctx.restore();
  });
}

function drawHUD() {
  var pad = canvas.width * 0.04;

  // Progress
  var placed = Object.keys(placedParts).length;
  var total = PARTS_DEF.length;

  // Progress bar
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.roundRect(pad - 4, pad - 4, canvas.width * 0.4, canvas.height * 0.05, 8); ctx.fill();
  ctx.fillStyle = '#00ffcc';
  ctx.shadowColor = '#00ffcc'; ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.roundRect(pad - 4, pad - 4, canvas.width * 0.4 * (placed/total), canvas.height * 0.05, 8); ctx.fill();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + Math.floor(canvas.width * 0.045) + 'px sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(placed + '/' + total + ' 零件', pad, pad + canvas.height * 0.055);

  // Score
  ctx.fillStyle = '#ffd700';
  ctx.font = Math.floor(canvas.width * 0.05) + 'px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('🏆 ' + score, canvas.width - pad, pad);

  // Hint
  if (selectedPart) {
    ctx.fillStyle = 'rgba(0,255,200,0.8)';
    ctx.font = Math.floor(canvas.width * 0.04) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('点击高亮位置安装零件', canvas.width / 2, canvas.height * 0.62);
  }
}

function drawSparkles() {
  sparkles.forEach(function(s) {
    ctx.save();
    ctx.globalAlpha = s.life;
    ctx.fillStyle = s.color;
    ctx.shadowColor = s.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(s.x, s.y, 3 * s.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

function drawMenu() {
  drawBG();

  var cx = canvas.width / 2;
  var cy = canvas.height / 2;

  // Big yacht icon
  ctx.save();
  ctx.shadowColor = '#00ffcc';
  ctx.shadowBlur = 25 + Math.sin(pulse) * 10;
  ctx.font = Math.floor(canvas.width * 0.35) + 'px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🛥️', cx, canvas.height * 0.35);
  ctx.shadowBlur = 0;
  ctx.restore();

  // Title box
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, canvas.width, canvas.height * 0.5);

  var glow = 0.5 + Math.sin(pulse) * 0.4;
  ctx.shadowColor = '#00ffcc';
  ctx.shadowBlur = 25 * glow;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + Math.floor(canvas.width * 0.13) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('游艇建造师', cx, canvas.height * 0.17);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#00ffcc';
  ctx.font = Math.floor(canvas.width * 0.05) + 'px sans-serif';
  ctx.fillText('YACHT BUILDER', cx, canvas.height * 0.27);

  var alpha = 0.6 + Math.sin(pulse * 2) * 0.4;
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#00e5cc';
  ctx.font = 'bold ' + Math.floor(canvas.width * 0.06) + 'px sans-serif';
  ctx.fillText('▶  点我开始  ▶', cx, canvas.height * 0.39);
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#ffd700';
  ctx.font = Math.floor(canvas.width * 0.048) + 'px sans-serif';
  ctx.fillText('🏆 最高分 ' + best, cx, canvas.height * 0.45);

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = Math.floor(canvas.width * 0.036) + 'px sans-serif';
  ctx.fillText('点击零件 → 点击游艇位置安装 | 快速完成得高分', cx, canvas.height - canvas.height * 0.04);
}

function drawWin() {
  drawBG();
  drawSparkles();

  var cx = canvas.width / 2;
  var cy = canvas.height / 2;

  // Completed yacht
  Object.keys(placedParts).forEach(function(id) {
    var p = placedParts[id];
    // (reuse placement logic from drawBuildArea)
    var bx = cx + p.dx * canvas.width;
    var by = cy + p.dy * canvas.height;
    var bw = p.dw * canvas.width;
    var bh = p.dh * canvas.height;
    ctx.save();
    ctx.shadowColor = p.color; ctx.shadowBlur = 15;

    if (p.id === 'hull') {
      var hg = ctx.createLinearGradient(bx-bw/2,0,bx+bw/2,0);
      hg.addColorStop(0,'#8B4513'); hg.addColorStop(0.5,'#D2691E'); hg.addColorStop(1,'#8B4513');
      ctx.fillStyle = hg;
      ctx.beginPath();
      ctx.moveTo(bx-bw/2,by-bh/2); ctx.lineTo(bx-bw*0.6,by+bh/2); ctx.lineTo(bx+bw*0.6,by+bh/2); ctx.lineTo(bx+bw/2,by-bh/2);
      ctx.closePath(); ctx.fill();
    } else if (p.id === 'deck') {
      ctx.fillStyle='#D2691E'; ctx.fillRect(bx-bw/2,by-bh/2,bw,bh);
    } else if (p.id === 'cabin') {
      ctx.fillStyle='#ecf0f1'; ctx.fillRect(bx-bw/2,by-bh/2,bw,bh);
    } else if (p.id === 'window') {
      ctx.fillStyle='#00d4ff'; ctx.shadowColor='#00d4ff'; ctx.shadowBlur=20;
      ctx.beginPath(); ctx.arc(bx,by,bw*0.4,0,Math.PI*2); ctx.fill();
    } else if (p.id === 'mast') {
      ctx.strokeStyle='#aaa'; ctx.lineWidth=4;
      ctx.beginPath(); ctx.moveTo(bx,by+bh/2); ctx.lineTo(bx,by-bh/2); ctx.stroke();
    } else if (p.id === 'sail') {
      ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.shadowColor='#fff'; ctx.shadowBlur=10;

    // 通过消息发送开关控制
    sendToggleMessage: function sendToggleMessage(enabled) {
      window.parent.postMessage({
        type: 'iframe-highlight-status',
        enabled: enabled || highlightEnabled,
        source: 'iframe-highlight-injector'
      }, '*');
    }
  };

  // 通知父窗口脚本已加载
  try {
    window.parent.postMessage({
      type: "iframe-highlight-ready",
      data: {
        url: window.location.href,
        userAgent: navigator.userAgent,
        timestamp: Date.now()
      },
      source: "iframe-highlight-injector"
    }, "*");
  } catch (error) {
    console.warn("无法发送就绪消息到父窗口:", error);
  }

  // 清理函数
  window.__iframeHighlightCleanup = function () {
    fullyDisableHighlight();
    window.removeEventListener("message", handleParentMessage);
    if (overlay.parentElement) {
      overlay.parentElement.removeChild(overlay);
    }
    delete window.__iframeHighlightInitialized;
    delete window.__iframeHighlightCleanup;
  };
})();

</script>
</body>
</html>
