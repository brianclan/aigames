<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>维港疾航</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  font-family: 'ZCOOL KuaiLe', cursive;
  touch-action: none;
}
#c {
  display: block;
  border-radius: 12px;
  box-shadow: 0 0 40px rgba(0,150,255,0.3);
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ─── Canvas Setup ──────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  const maxW = window.innerWidth * 0.96;
  const maxH = window.innerHeight * 0.96;
  const ratio = 9 / 16;
  let w = maxW;
  let h = w / ratio;
  if (h > maxH) { h = maxH; w = h * ratio; }
  canvas.width = Math.min(450, w);
  canvas.height = canvas.width / ratio;
}
resize();
window.addEventListener('resize', resize);

const W = () => canvas.width;
const H = () => canvas.height;

// ─── Audio ─────────────────────────────────────────────────────
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, dur, type='sine', vol=0.15) {
  try {
    const ac = getAudio();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.start(); o.stop(ac.currentTime + dur);
  } catch(e){}
}
const sfx = {
  coin: () => { playTone(880, 0.12, 'sine', 0.12); setTimeout(()=>playTone(1320,0.1,'sine',0.08),80); },
  hit:  () => playTone(200, 0.25, 'sawtooth', 0.2),
  fuel: () => { playTone(440,0.1,'sine',0.1); setTimeout(()=>playTone(660,0.15,'sine',0.1),100); },
  die:  () => { for(let i=0;i<4;i++) setTimeout(()=>playTone(300-i*40,0.15,'sawtooth',0.15),i*120); },
  start:() => { playTone(523,0.1,'sine',0.1); setTimeout(()=>playTone(659,0.1,'sine',0.1),100); setTimeout(()=>playTone(784,0.15,'sine',0.1),200); }
};

// ─── Game State ────────────────────────────────────────────────
const S = { MENU:0, PLAY:1, OVER:2 };
let state = S.MENU;
let score = 0, highScore = parseInt(localStorage.getItem('hkYachtHS')||'0');
let lives = 3;
let fuel = 100;
let speed = 2.5;
let time = 0;
let dragX = null; // null = not dragging, number = current pointer X
let menuPulse = 0;

// ─── Yacht ─────────────────────────────────────────────────────
const yacht = {
  x: 0, y: 0, w: 0, h: 0,
  targetX: 0, tilt: 0,
  init() { this.w = W()*0.14; this.h = this.w*1.7; this.x = W()/2; this.y = H()*0.76; this.targetX = this.x; }
};

// ─── Obstacles & Items ─────────────────────────────────────────
let obstacles = [];
let items = [];
let particles = [];
let wakeLines = [];

const OBS_TYPES = [
  { type:'ferry',    emoji:'🛥️', w:0.18, h:0.055, speed:0.9,  color:'#e74c3c', pts:2 },
  { type:'cargo',    emoji:'🚢', w:0.28, h:0.07,  speed:0.5,  color:'#7f8c8d', pts:3 },
  { type:'fishing',  emoji:'🐟', w:0.14, h:0.048, speed:1.1,  color:'#e67e22', pts:1 },
  { type:'patrol',   emoji:'🚤', w:0.12, h:0.042, speed:1.3,  color:'#2980b9', pts:1 },
];
const ITEM_TYPES = [
  { type:'coin',   emoji:'🪙', pts:10,  fuel:0  },
  { type:'diamond',emoji:'💎', pts:50,  fuel:0  },
  { type:'fuel',   emoji:'⛽', pts:0,   fuel:30 },
];

function spawnObs() {
  const T = OBS_TYPES[Math.floor(Math.random()*OBS_TYPES.length)];
  const ow = W() * T.w;
  const ox = ow/2 + Math.random()*(W()-ow);
  obstacles.push({
    x: ox, y: -H()*T.h,
    w: ow, h: H()*T.h,
    type: T.type, emoji: T.emoji,
    color: T.color, speed: T.speed,
    tilt: 0, driftDir: (Math.random()-0.5)*0.5,
    wave: Math.random()*Math.PI*2
  });
}

function spawnItem() {
  const T = ITEM_TYPES[Math.floor(Math.random()*ITEM_TYPES.length)];
  const sz = W()*0.09;
  items.push({
    x: sz/2 + Math.random()*(W()-sz),
    y: -sz,
    size: sz,
    type: T.type, emoji: T.emoji,
    pts: T.pts, fuel: T.fuel,
    rot: 0, glow: 0
  });
}

// ─── Background & Scene ─────────────────────────────────────────
const scenes = [
  { name:'日间维港',   water1:'#0077be', water2:'#004488', sky1:'#87CEEB', sky2:'#4FC3F7', bldg:'#1a5276', accent:'#ff6b6b', sun:true  },
  { name:'黄昏维港',   water1:'#c0392b', water2:'#8e44ad', sky1:'#f39c12', sky2:'#e74c3c', bldg:'#2c3e50', accent:'#ffd93d', sun:false },
  { name:'夜色维港',   water1:'#0a0a2e', water2:'#050520', sky1:'#1a1a3e', sky2:'#0d0d2b', bldg:'#111133', accent:'#00ffcc', sun:false }
];
let sceneIdx = 0;
let sceneTime = 0;
let waveOffset = 0;
let bgBuildings = [];

function genBuildings() {
  bgBuildings = [];
  const count = 12;
  for (let i = 0; i < count; i++) {
    const bw = W() * (0.06 + Math.random()*0.1);
    const bh = H() * (0.12 + Math.random()*0.22);
    bgBuildings.push({ x: (i/count)*W(), w: bw, h: bh, windows: Math.floor(Math.random()*8)+2 });
  }
}
genBuildings();

// ─── Particles ────────────────────────────────────────────────
function spawnParticle(x, y, color, count=8) {
  for (let i=0;i<count;i++) {
    const angle = Math.random()*Math.PI*2;
    const spd = 1+Math.random()*3;
    particles.push({
      x, y,
      vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd,
      life: 1, decay: 0.03+Math.random()*0.03,
      r: 3+Math.random()*5, color
    });
  }
}

// ─── Input ─────────────────────────────────────────────────────
let pointerDown = false;

function getPointerX(e) {
  const rect = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  return (clientX - rect.left) * (canvas.width / rect.width);
}

canvas.addEventListener('mousedown', e => {
  pointerDown = true;
  dragX = getPointerX(e);
  if (state === S.MENU) { state=S.PLAY; sfx.start(); resetGame(); }
  else if (state === S.OVER) { state=S.MENU; }
});
canvas.addEventListener('mousemove', e => {
  if (!pointerDown) return;
  const nx = getPointerX(e);
  yacht.targetX += (nx - dragX) * 1.5;
  yacht.targetX = Math.max(yacht.w/2, Math.min(W()-yacht.w/2, yacht.targetX));
  dragX = nx;
});
canvas.addEventListener('mouseup', () => { pointerDown = false; dragX = null; });

canvas.addEventListener('touchstart', e => { e.preventDefault(); pointerDown = true; dragX = getPointerX(e);
  if (state === S.MENU) { state=S.PLAY; sfx.start(); resetGame(); }
  else if (state === S.OVER) { state=S.MENU; }
}, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault();
  if (!pointerDown) return;
  const nx = getPointerX(e);
  yacht.targetX += (nx - dragX) * 1.5;
  yacht.targetX = Math.max(yacht.w/2, Math.min(W()-yacht.w/2, yacht.targetX));
  dragX = nx;
}, {passive:false});
canvas.addEventListener('touchend', e => { e.preventDefault(); pointerDown = false; dragX = null; }, {passive:false});

// ─── Reset ─────────────────────────────────────────────────────
function resetGame() {
  score = 0; lives = 3; fuel = 100; speed = 2.5; time = 0;
  obstacles = []; items = []; particles = [];
  sceneIdx = 0; sceneTime = 0;
  yacht.init();
}

// ─── Update ────────────────────────────────────────────────────
let obsTimer = 0;
let itemTimer = 0;

function update(dt) {
  if (state !== S.PLAY) { menuPulse += dt*2; return; }
  time += dt;

  // Scene cycle
  sceneTime += dt;
  if (sceneTime > 45) { sceneTime = 0; sceneIdx = (sceneIdx+1)%3; }

  // Yacht movement
  const ease = 0.12;
  yacht.x += (yacht.targetX - yacht.x) * ease;
  yacht.tilt += ((yacht.targetX - yacht.x)*0.008 - yacht.tilt)*0.15;

  // Wake lines
  if (Math.random() < 0.4) {
    wakeLines.push({ x: yacht.x + (Math.random()-0.5)*yacht.w*0.5, y: yacht.y + yacht.h*0.4, life:1 });
  }
  wakeLines = wakeLines.filter(w => { w.y += speed*0.5; w.life -= 0.04; return w.life > 0; });

  // Fuel depletes
  fuel -= dt * (3 + speed*0.5);
  if (fuel <= 0) { fuel = 0; state=S.OVER; sfx.die(); if(score>highScore){highScore=score;localStorage.setItem('hkYachtHS',highScore);} return; }

  // Score
  score += dt * speed * 3;

  // Speed increase
  speed = 2.5 + Math.floor(score/500)*0.4;
  speed = Math.min(speed, 7);

  // Spawn obstacles
  obsTimer += dt;
  const obsInterval = Math.max(0.6, 1.8 - speed*0.12);
  if (obsTimer > obsInterval) { obsTimer = 0; spawnObs(); }

  // Spawn items
  itemTimer += dt;
  if (itemTimer > 3.5) { itemTimer = 0; spawnItem(); }

  // Update obstacles
  const scene = scenes[sceneIdx];
  obstacles = obstacles.filter(o => {
    o.y += speed * o.speed;
    o.wave += 0.05;
    o.x += Math.sin(o.wave)*o.driftDir;
    o.x = Math.max(o.w/2, Math.min(W()-o.w/2, o.x));

    // Collision
    const dx = Math.abs(o.x - yacht.x);
    const dy = Math.abs(o.y - yacht.y);
    const cxThresh = (o.w + yacht.w)*0.38;
    const cyThresh = (o.h + yacht.h)*0.35;
    if (dx < cxThresh && dy < cyThresh) {
      lives--;
      spawnParticle(yacht.x, yacht.y, '#fff', 15);
      sfx.hit();
      if (lives <= 0) {
        state=S.OVER; sfx.die();
        if(score>highScore){highScore=score;localStorage.setItem('hkYachtHS',highScore);}
      }
      return false;
    }
    return o.y < H()+o.h;
  });

  // Update items
  items = items.filter(it => {
    it.y += speed * 0.8;
    it.rot += 0.04;
    it.glow = 0.5 + Math.sin(time*5)*0.5;

    const dx = Math.abs(it.x - yacht.x);
    const dy = Math.abs(it.y - yacht.y);
    if (dx < (it.size + yacht.w)*0.4 && dy < (it.size + yacht.h)*0.4) {
      score += it.pts;
      fuel = Math.min(100, fuel + it.fuel);
      spawnParticle(it.x, it.y, scene.accent, 12);
      if (it.type==='fuel') sfx.fuel(); else sfx.coin();
      return false;
    }
    return it.y < H()+it.size;
  });

  // Update particles
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.05; p.life -= p.decay;
    return p.life > 0;
  });

  waveOffset += speed;
}

// ─── Draw ──────────────────────────────────────────────────────
function drawBG(scene) {
  // Water gradient
  const grad = ctx.createLinearGradient(0,0,0,H());
  grad.addColorStop(0, scene.water1);
  grad.addColorStop(1, scene.water2);
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W(),H());

  // Wave lines
  ctx.globalAlpha = 0.15;
  for (let i=0;i<12;i++) {
    const wy = ((i*80 + waveOffset*0.5) % (H()+80)) - 40;
    ctx.beginPath();
    ctx.moveTo(0, wy);
    for (let x=0;x<=W();x+=20) {
      ctx.lineTo(x, wy + Math.sin((x+waveOffset*2)*0.04)*5);
    }
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Building silhouettes (skyline)
  bgBuildings.forEach(b => {
    ctx.fillStyle = scene.bldg;
    ctx.fillRect(b.x, H()*0.0 - b.h, b.w, b.h);
    // Windows
    ctx.fillStyle = scene.accent;
    ctx.globalAlpha = 0.6 + Math.sin(time*2+b.x)*0.3;
    for (let wi=0; wi<b.windows; wi++) {
      const wy = H()*0.0 - b.h + 6 + wi*Math.floor(b.h/(b.windows+1));
      const ww = b.w - 6;
      if (ww > 4 && wy > 0) {
        ctx.fillRect(b.x+3, wy, ww, 4);
      }
    }
    ctx.globalAlpha = 1;
  });

  // Sparkle on water
  ctx.globalAlpha = 0.4;
  for (let i=0;i<20;i++) {
    const sx = ((i*97 + waveOffset*1.3) % W());
    const sy = ((i*73 + waveOffset*2.1) % H());
    const sr = 1+Math.sin(time*4+i)*1.5;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawYacht(x, y, w, h, tilt, alpha=1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  ctx.rotate(tilt);

  // Hull shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(3, 3, w*0.38, h*0.45, 0, 0, Math.PI*2);
  ctx.fill();

  // Hull body
  const hullGrad = ctx.createLinearGradient(-w/2,0,w/2,0);
  hullGrad.addColorStop(0, '#1a5');
  hullGrad.addColorStop(0.5, '#2e8b57');
  hullGrad.addColorStop(1, '#1a5');
  ctx.fillStyle = hullGrad;
  ctx.beginPath();
  ctx.moveTo(0, -h*0.5);
  ctx.bezierCurveTo(w*0.45, -h*0.3, w*0.42, h*0.3, w*0.25, h*0.45);
  ctx.lineTo(-w*0.25, h*0.45);
  ctx.bezierCurveTo(-w*0.42, h*0.3, -w*0.45, -h*0.3, 0, -h*0.5);
  ctx.fill();

  // Hull stripe
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.3;
  ctx.fillRect(-w*0.05, -h*0.35, w*0.1, h*0.65);
  ctx.globalAlpha = alpha;

  // Deck cabin
  const cabW = w*0.5; const cabH = h*0.25;
  ctx.fillStyle = '#ecf0f1';
  ctx.beginPath();
  ctx.roundRect(-cabW/2, -h*0.1, cabW, cabH, 4);
  ctx.fill();
  ctx.fillStyle = '#95a5a6';
  ctx.fillRect(-cabW/2+2, -h*0.05, cabW-4, 3);

  // Windshield
  ctx.fillStyle = 'rgba(100,200,255,0.7)';
  ctx.beginPath();
  ctx.roundRect(-cabW/2+4, -h*0.1+2, cabW-8, cabH*0.5, 2);
  ctx.fill();

  // Antenna
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, -h*0.35);
  ctx.lineTo(0, -h*0.52);
  ctx.stroke();
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.arc(0, -h*0.52, 2.5, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

function drawObstacle(o) {
  ctx.save();
  ctx.translate(o.x, o.y);
  ctx.rotate(Math.sin(o.wave)*0.06);
  ctx.font = `${o.h*0.9}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(o.emoji, 0, 0);
  ctx.restore();
}

function drawItem(it) {
  ctx.save();
  ctx.translate(it.x, it.y);
  ctx.rotate(it.rot);
  ctx.font = `${it.size * (0.7 + it.glow*0.15)}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = scenes[sceneIdx].accent;
  ctx.shadowBlur = 10 + it.glow*10;
  ctx.fillText(it.emoji, 0, 0);
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawHUD(scene) {
  const pad = W()*0.03;
  const barW = W()*0.25;
  const barH = H()*0.018;

  // Score
  ctx.fillStyle = '#fff';
  ctx.font = `${W()*0.07}px 'ZCOOL KuaiLe', cursive`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(`🪙 ${Math.floor(score)}`, pad, pad);

  // High score
  ctx.font = `${W()*0.04}px 'ZCOOL KuaiLe', cursive`;
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillText(`最高 ${highScore}`, pad, pad + H()*0.07);

  // Fuel bar
  const fuelX = W() - pad - barW;
  const fuelY = pad;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.roundRect(fuelX, fuelY, barW, barH, barH/2);
  ctx.fill();
  const fuelColor = fuel > 50 ? '#6bcb77' : fuel > 25 ? '#ffd93d' : '#e74c3c';
  ctx.fillStyle = fuelColor;
  ctx.beginPath();
  ctx.roundRect(fuelX, fuelY, barW * (fuel/100), barH, barH/2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = `${W()*0.035}px 'ZCOOL KuaiLe', cursive`;
  ctx.textAlign = 'center';
  ctx.fillText('⛽', fuelX - W()*0.04, fuelY + barH*0.5);

  // Lives
  ctx.font = `${W()*0.07}px serif`;
  ctx.textAlign = 'right';
  let livesStr = '';
  for (let i=0;i<3;i++) livesStr += i<lives ? '❤️' : '🖤';
  ctx.fillText(livesStr, W()-pad, pad);

  // Speed indicator
  ctx.font = `${W()*0.038}px 'ZCOOL KuaiLe', cursive`;
  ctx.fillStyle = scene.accent;
  ctx.textAlign = 'left';
  ctx.fillText(`⚡ ${speed.toFixed(1)}x`, pad, H()-pad-H()*0.04);

  // Scene name
  ctx.font = `${W()*0.038}px 'ZCOOL KuaiLe', cursive`;
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.textAlign = 'right';
  ctx.fillText(scene.name, W()-pad, H()-pad-H()*0.04);
}

function drawMenu() {
  const scene = scenes[sceneIdx];
  drawBG(scene);

  // Darken
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0,0,W(),H());

  const cx = W()/2;
  const cy = H()/2;

  // Title glow
  const glow = 0.5 + Math.sin(menuPulse)*0.3;
  ctx.shadowColor = scene.accent;
  ctx.shadowBlur = 20*glow;
  ctx.fillStyle = '#fff';
  ctx.font = `${W()*0.13}px 'ZCOOL KuaiLe', cursive`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('维港疾航', cx, cy - H()*0.18);
  ctx.shadowBlur = 0;

  ctx.font = `${W()*0.055}px 'ZCOOL KuaiLe', cursive`;
  ctx.fillStyle = scene.accent;
  ctx.fillText('🌊 Victoria Harbour Rush 🌊', cx, cy - H()*0.06);

  // Yacht icon
  drawYacht(cx, cy + H()*0.08, W()*0.2, W()*0.2*1.7, Math.sin(menuPulse*0.7)*0.1);

  // Tap to start (pulse)
  const tapAlpha = 0.6 + Math.sin(menuPulse*2)*0.4;
  ctx.globalAlpha = tapAlpha;
  ctx.fillStyle = '#fff';
  ctx.font = `${W()*0.065}px 'ZCOOL KuaiLe', cursive`;
  ctx.fillText('👉 点我开始 👈', cx, cy + H()*0.28);
  ctx.globalAlpha = 1;

  // High score
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = `${W()*0.05}px 'ZCOOL KuaiLe', cursive`;
  ctx.fillText(`🏆 最高分 ${highScore}`, cx, cy + H()*0.38);

  // Instructions
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = `${W()*0.04}px 'ZCOOL KuaiLe', cursive`;
  ctx.fillText('左右滑动躲避船只 | 收集金币补给燃料', cx, H() - H()*0.06);
}

function drawGameOver() {
  // Darken
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0,0,W(),H());

  const cx = W()/2;
  const cy = H()/2;
  const scene = scenes[sceneIdx];

  ctx.shadowColor = '#e74c3c';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#e74c3c';
  ctx.font = `${W()*0.12}px 'ZCOOL KuaiLe', cursive`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('💥 撞毁啦!', cx, cy - H()*0.22);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#fff';
  ctx.font = `${W()*0.07}px 'ZCOOL KuaiLe', cursive`;
  ctx.fillText(`得分 ${Math.floor(score)}`, cx, cy - H()*0.06);

  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#ffd93d';
    ctx.font = `${W()*0.055}px 'ZCOOL KuaiLe', cursive`;
    ctx.fillText('🎉 新纪录! 🎉', cx, cy + H()*0.04);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = `${W()*0.05}px 'ZCOOL KuaiLe', cursive`;
    ctx.fillText(`最高分 ${highScore}`, cx, cy + H()*0.04);
  }

  const tapAlpha = 0.6 + Math.sin(menuPulse*2)*0.4;
