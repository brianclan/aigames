<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>猫咪接鱼</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #8fd3ff 0%, #dff7ff 55%, #fff2d8 100%);
      font-family: Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      touch-action: none;
    }
    body {
      display: flex;
      align-items: stretch;
      justify-content: center;
    }
    #game {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    let w = 0;
    let h = 0;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);

    function resize() {
      w = window.innerWidth;
      h = window.innerHeight;
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      groundY = h - 110;
      cat.y = groundY;
      cat.width = Math.max(86, w * 0.18);
      cat.height = cat.width * 0.72;
      cat.x = Math.min(Math.max(cat.x, cat.width * 0.6), w - cat.width * 0.6);
    }

    const state = {
      running: false,
      gameOver: false,
      score: 0,
      missed: 0,
      best: 0,
      spawnTimer: 0,
      speedBase: 220,
      lastTime: 0,
      clouds: []
    };

    const cat = {
      x: 180,
      y: 0,
      width: 100,
      height: 72,
      moveTo(targetX) {
        this.x = Math.max(this.width * 0.6, Math.min(w - this.width * 0.6, targetX));
      }
    };

    let groundY = 0;
    const fishes = [];
    const splashes = [];

    function resetGame() {
      state.running = true;
      state.gameOver = false;
      state.score = 0;
      state.missed = 0;
      state.spawnTimer = 0;
      state.speedBase = 220;
      fishes.length = 0;
      splashes.length = 0;
      cat.x = w * 0.5;
    }

    function initClouds() {
      state.clouds = [];
      for (let i = 0; i < 5; i++) {
        state.clouds.push({
          x: Math.random() * w,
          y: 40 + Math.random() * (h * 0.25),
          r: 24 + Math.random() * 30,
          s: 8 + Math.random() * 14
        });
      }
    }

    function spawnFish() {
      const size = 16 + Math.random() * 12;
      const lanePad = 26;
      fishes.push({
        x: lanePad + Math.random() * (w - lanePad * 2),
        y: -30,
        size,
        vy: state.speedBase + Math.random() * 120 + state.score * 4,
        sway: Math.random() * Math.PI * 2,
        spin: Math.random() * Math.PI * 2,
        colorA: Math.random() > 0.5 ? '#6ecbff' : '#ffd166',
        colorB: Math.random() > 0.5 ? '#ff8fab' : '#7ae582'
      });
    }

    function addSplash(x, y, color) {
      for (let i = 0; i < 8; i++) {
        splashes.push({
          x,
          y,
          vx: (Math.random() - 0.5) * 120,
          vy: -30 - Math.random() * 120,
          life: 0.5 + Math.random() * 0.25,
          t: 0,
          color
        });
      }
    }

    function update(dt) {
      for (const cloud of state.clouds) {
        cloud.x += cloud.s * dt;
        if (cloud.x - cloud.r * 2 > w) cloud.x = -cloud.r * 2;
      }

      if (!state.running) return;

      state.spawnTimer -= dt;
      const interval = Math.max(0.38, 0.95 - state.score * 0.015);
      if (state.spawnTimer <= 0) {
        spawnFish();
        state.spawnTimer = interval;
      }

      for (let i = fishes.length - 1; i >= 0; i--) {
        const f = fishes[i];
        f.sway += dt * 5;
        f.spin += dt * 7;
        f.y += f.vy * dt;
        f.x += Math.sin(f.sway) * 30 * dt;

        const catchZoneW = cat.width * 0.72;
        const catchZoneH = cat.height * 0.35;
        const caught = Math.abs(f.x - cat.x) < catchZoneW * 0.5 + f.size * 0.4 &&
          f.y + f.size > cat.y - catchZoneH &&
          f.y - f.size < cat.y + catchZoneH;

        if (caught) {
          state.score += 1;
          state.best = Math.max(state.best, state.score);
          addSplash(f.x, f.y, f.colorA);
          fishes.splice(i, 1);
          continue;
        }

        if (f.y - f.size > h + 10) {
          state.missed += 1;
          addSplash(f.x, h - 30, '#8ecae6');
          fishes.splice(i, 1);
          if (state.missed >= 5) {
            state.running = false;
            state.gameOver = true;
          }
        }
      }

      for (let i = splashes.length - 1; i >= 0; i--) {
        const p = splashes[i];
        p.t += dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 220 * dt;
        if (p.t >= p.life) splashes.splice(i, 1);
      }
    }

    function roundRect(x, y, width, height, radius, fillStyle) {
      const r = Math.min(radius, width * 0.5, height * 0.5);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + width, y, x + width, y + height, r);
      ctx.arcTo(x + width, y + height, x, y + height, r);
      ctx.arcTo(x, y + height, x, y, r);
      ctx.arcTo(x, y, x + width, y, r);
      ctx.closePath();
      ctx.fillStyle = fillStyle;
      ctx.fill();
    }

    function drawBackground() {
      const sky = ctx.createLinearGradient(0, 0, 0, h);
      sky.addColorStop(0, '#8fd3ff');
      sky.addColorStop(0.58, '#dff7ff');
      sky.addColorStop(1, '#fff2d8');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, w, h);

      for (const cloud of state.clouds) {
        ctx.globalAlpha = 0.75;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(cloud.x, cloud.y, cloud.r, 0, Math.PI * 2);
        ctx.arc(cloud.x + cloud.r * 0.95, cloud.y + 2, cloud.r * 0.8, 0, Math.PI * 2);
        ctx.arc(cloud.x - cloud.r * 0.9, cloud.y + 6, cloud.r * 0.7, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      ctx.fillStyle = '#b8e986';
      ctx.fillRect(0, groundY + cat.height * 0.18, w, h - groundY);
      ctx.fillStyle = '#93d15b';
      for (let i = 0; i < w; i += 24) {
        ctx.beginPath();
        ctx.moveTo(i, h);
        ctx.lineTo(i + 12, groundY + 24);
        ctx.lineTo(i + 24, h);
        ctx.fill();
      }
    }

    function drawCat() {
      const x = cat.x;
      const y = cat.y;
      const bw = cat.width;
      const bh = cat.height;

      ctx.save();
      ctx.translate(x, y);

      ctx.fillStyle = '#ffb347';
      ctx.beginPath();
      ctx.moveTo(-bw * 0.36, -bh * 0.38);
      ctx.lineTo(-bw * 0.16, -bh * 0.95);
      ctx.lineTo(0, -bh * 0.42);
      ctx.closePath();
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(bw * 0.36, -bh * 0.38);
      ctx.lineTo(bw * 0.16, -bh * 0.95);
      ctx.lineTo(0, -bh * 0.42);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#ffc76a';
      ctx.beginPath();
      ctx.ellipse(0, -bh * 0.15, bw * 0.42, bh * 0.45, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#fff2d8';
      ctx.beginPath();
      ctx.ellipse(0, bh * 0.02, bw * 0.2, bh * 0.18, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#2b2d42';
      ctx.beginPath();
      ctx.arc(-bw * 0.14, -bh * 0.18, bw * 0.038, 0, Math.PI * 2);
      ctx.arc(bw * 0.14, -bh * 0.18, bw * 0.038, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = '#2b2d42';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, -bh * 0.02);
      ctx.lineTo(-bw * 0.18, bh * 0.02);
      ctx.moveTo(0, 0);
      ctx.lineTo(-bw * 0.2, bh * 0.08);
      ctx.moveTo(0, -bh * 0.02);
      ctx.lineTo(bw * 0.18, bh * 0.02);
      ctx.moveTo(0, 0);
      ctx.lineTo(bw * 0.2, bh * 0.08);
      ctx.stroke();

      ctx.fillStyle = '#ff6b6b';
      ctx.beginPath();
      ctx.moveTo(0, -bh * 0.04);
      ctx.lineTo(-bw * 0.035, bh * 0.035);
      ctx.lineTo(bw * 0.035, bh * 0.035);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = '#c97f25';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(-bw * 0.5, bh * 0.18);
      ctx.quadraticCurveTo(-bw * 0.72, -bh * 0.35, -bw * 0.56, -bh * 0.58);
      ctx.stroke();

      ctx.restore();
    }

    function drawFish(f) {
      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.rotate(Math.sin(f.spin) * 0.4);

      ctx.fillStyle = f.colorA;
      ctx.beginPath();
      ctx.ellipse(0, 0, f.size * 1.05, f.size * 0.68, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = f.colorB;
      ctx.beginPath();
      ctx.moveTo(-f.size * 0.9, 0);
      ctx.lineTo(-f.size * 1.55, -f.size * 0.65);
      ctx.lineTo(-f.size * 1.55, f.size * 0.65);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(f.size * 0.35, -f.size * 0.08, f.size * 0.15, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#1d3557';
      ctx.beginPath();
      ctx.arc(f.size * 0.38, -f.size * 0.08, f.size * 0.07, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawSplashes() {
      for (const p of splashes) {
        const alpha = 1 - p.t / p.life;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3 + alpha * 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawHud() {
      roundRect(12, 12, w - 24, 64, 20, 'rgba(255,255,255,0.78)');
      ctx.fillStyle = '#223';
      ctx.font = 'bold 22px Arial';
      ctx.textAlign = 'left';
      ctx.fillText('得分 ' + state.score, 26, 40);
      ctx.textAlign = 'right';
      ctx.fillText('漏接 ' + state.missed + '/5', w - 26, 40);
      ctx.font = '16px Arial';
      ctx.fillStyle = '#445';
      ctx.textAlign = 'center';
      ctx.fillText('按住屏幕左右移动猫咪', w / 2, 62);
    }

    function drawOverlay() {
      ctx.fillStyle = 'rgba(18, 32, 56, 0.3)';
      ctx.fillRect(0, 0, w, h);
      roundRect(w * 0.1, h * 0.22, w * 0.8, h * 0.32, 24, 'rgba(255,255,255,0.92)');
      ctx.textAlign = 'center';
      ctx.fillStyle = '#222';
      ctx.font = 'bold 34px Arial';
      ctx.fillText(state.gameOver ? '游戏结束' : '猫咪接鱼', w / 2, h * 0.31);
      ctx.font = '20px Arial';
      ctx.fillStyle = '#444';
      if (state.gameOver) {
        ctx.fillText('本局得分：' + state.score, w / 2, h * 0.38);
        ctx.fillText('最高分：' + state.best, w / 2, h * 0.43);
      } else {
        ctx.fillText('接住掉下来的小鱼，别让它们掉太多', w / 2, h * 0.39);
      }
      roundRect(w * 0.24, h * 0.48, w * 0.52, 58, 18, '#ff9f1c');
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 24px Arial';
      ctx.fillText(state.gameOver ? '再玩一次' : '开始游戏', w / 2, h * 0.518);
    }

    function draw() {
      drawBackground();
      for (const f of fishes) drawFish(f);
      drawSplashes();
      drawCat();
      drawHud();
      if (!state.running) drawOverlay();
    }

    function loop(ts) {
      if (!state.lastTime) state.lastTime = ts;
      const dt = Math.min(0.033, (ts - state.lastTime) / 1000);
      state.lastTime = ts;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    function pointerX(e) {
      if (e.touches && e.touches.length) return e.touches[0].clientX;
      if (e.changedTouches && e.changedTouches.length) return e.changedTouches[0].clientX;
      return e.clientX;
    }

    function interact(clientX, clientY) {
      if (!state.running) {
        resetGame();
        return;
      }
      cat.moveTo(clientX);
    }

    window.addEventListener('resize', () => {
      resize();
      initClouds();
    });

    canvas.addEventListener('mousedown', (e) => interact(pointerX(e), e.clientY));
    canvas.addEventListener('mousemove', (e) => { if (e.buttons) cat.moveTo(pointerX(e)); });
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      interact(pointerX(e), e.touches[0].clientY);
    }, { passive: false });
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      cat.moveTo(pointerX(e));
    }, { passive: false });

    resize();
    initClouds();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
