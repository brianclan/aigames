<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Punch - 办公室吃苹果</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#1a1a2e;
  display:flex; justify-content:center; align-items:center;
  width:100vw; height:100vh; overflow:hidden;
  font-family:'ZCOOL KuaiLe', cursive;
  touch-action:none; user-select:none;
}
#c { display:block; border-radius:12px; box-shadow:0 0 50px rgba(255,100,50,0.25); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ═══════════════════════════════════════
//  SETUP
// ═══════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  const maxW = window.innerWidth * 0.96;
  const maxH = window.innerHeight * 0.96;
  const ratio = 9/16;
  let w = maxW;
  let h = w / ratio;
  if (h > maxH) { h = maxH; w = h * ratio; }
  canvas.width = Math.min(450, Math.floor(w));
  canvas.height = canvas.width / ratio;
}
resize();

const W = () => canvas.width;
const H = () => canvas.height;

// ═══════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════
let AC = null;
function ac() { if (!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); return AC; }
function tone(f, d, type='sine', vol=0.14, delay=0) {
  try {
    const a=ac(), o=a.createOscillator(), g=a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type=type; o.frequency.value=f;
    const t=a.currentTime+delay;
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+d);
    o.start(t); o.stop(t+d);
  } catch(e){}
}
const sfx = {
  nom:    () => { tone(600,0.08); tone(900,0.08,'',0.1,0.06); tone(1200,0.06,'',0.08,0.12); },
  nomBig: () => { tone(400,0.1,'triangle'); tone(800,0.15,'',0.12,0.08); },
  hit:    () => tone(200,0.3,'sawtooth',0.2),
  die:    () => [0,1,2,3].forEach(i=>tone(300-i*50,0.2,'square',0.15,i*0.15)),
  start:  () => { tone(523,0.1); tone(659,0.1,'',0.1,0.1); tone(784,0.15,'',0.1,0.2); },
  combo:  () => { tone(880,0.1); tone(1100,0.1,'',0.1,0.08); tone(1320,0.12,'',0.1,0.16); },
};

// ═══════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════
const S = { MENU:0, PLAY:1, OVER:2 };
let state = S.MENU;
let score = 0, highScore = parseInt(localStorage.getItem('punchHS')||'0');
let combo = 0, comboTimer = 0;
let lives = 3, time = 0, speed = 2;
let menuPulse = 0;

// ═══════════════════════════════════════
//  PERSON (always visible)
// ═══════════════════════════════════════
const person = {
  x: 0, y: 0, w: 0, h: 0,
  targetX: 0, tilt: 0,
  mouthOpen: 0,  // for nom animation
  init() {
    this.w = W()*0.22;
    this.h = this.w * 1.6;
    this.x = W()/2;
    this.y = H()*0.78;
    this.targetX = this.x;
    this.tilt = 0;
    this.mouthOpen = 0;
  }
};
person.init(); // always init at startup

// ═══════════════════════════════════════
//  OFFICE BACKGROUND
// ═══════════════════════════════════════
let bgOff = 0;
const desks = [];
for (let i=0;i<5;i++) {
  desks.push({
    x: (i/5)*W() + W()*0.1,
    y: H()*0.15 + i*H()*0.13,
    w: W()*0.25,
    h: H()*0.08
  });
}

// ═══════════════════════════════════════
//  ITEMS & HAZARDS
// ═══════════════════════════════════════
let APPLES=[], HAZARDS=[], PARTS=[], POPPINGS=[];

const APPLE_TYPES = [
  {t:'apple',     e:'🍎', p:10,  sz:0.09},
  {t:'greenapple',e:'🍏', p:15,  sz:0.085},
  {t:'golden',    e:'🍑', p:30,  sz:0.075},
  {t:'bomb',      e:'💣', p:-20, sz:0.09, hazard:true},
  {t:'coffee',    e:'☕', p:0,   sz:0.07, hazard:true},
  {t:'stapler',   e:'🖇️', p:0,   sz:0.065, hazard:true},
];

function spawnApple() {
  const T = APPLE_TYPES[Math.floor(Math.random()*APPLE_TYPES.length)];
  const sz = W()*T.sz;
  const x = sz/2 + Math.random()*(W()-sz);
  const spd = speed * (0.7 + Math.random()*0.6);
  APPLES.push({x, y:-sz, sz, T, rot:0, spd,
    sway: Math.random()*Math.PI*2, swayAmp: 0.3+Math.random()*0.5});
}

function spawnWave() {
  // every 8-15 apples, a wave of many apples
  const count = 3 + Math.floor(Math.random()*4);
  for (let i=0;i<count;i++) {
    setTimeout(()=>{
      if(state===S.PLAY) spawnApple();
    }, i*120);
  }
}

let waveT=0;
function updateSpawns(dt) {
  waveT += dt;
  const interval = Math.max(0.4, 1.2 - speed*0.08);
  if (waveT > interval) {
    waveT = 0;
    if (Math.random() < 0.3) {
      spawnWave();
    } else {
      spawnApple();
    }
  }
}

// ═══════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════
let dragging=false, dragX=0;

function px(e) {
  const r=canvas.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  return (cx-r.left)*(canvas.width/r.width);
}
canvas.addEventListener('mousedown',e=>{ dragging=true; dragX=px(e);
  if(state===S.MENU){state=S.PLAY;sfx.start();resetGame();}
  else if(state===S.OVER){state=S.MENU;}
});
canvas.addEventListener('mousemove',e=>{
  if(!dragging)return;
  const nx=px(e);
  person.targetX += (nx-dragX)*1.8;
  person.targetX = Math.max(person.w/2, Math.min(W()-person.w/2, person.targetX));
  dragX=nx;
});
canvas.addEventListener('mouseup',()=>{dragging=false;});
canvas.addEventListener('touchstart',e=>{e.preventDefault();dragging=true;dragX=px(e);
  if(state===S.MENU){state=S.PLAY;sfx.start();resetGame();}
  else if(state===S.OVER){state=S.MENU;}
},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();
  if(!dragging)return;
  const nx=px(e);
  person.targetX += (nx-dragX)*1.8;
  person.targetX = Math.max(person.w/2, Math.min(W()-person.w/2, person.targetX));
  dragX=nx;
},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();dragging=false;},{passive:false});

// ═══════════════════════════════════════
//  RESET
// ═══════════════════════════════════════
function resetGame() {
  score=0; lives=3; time=0; speed=2; combo=0; comboTimer=0;
  APPLES=[]; HAZARDS=[]; PARTS=[]; POPPINGS=[]; waveT=0;
  person.init();
}

// ═══════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════
function update(dt) {
  if(state!==S.PLAY){ menuPulse+=dt*2; return; }
  time+=dt;

  // speed up over time
  speed = 2 + Math.floor(time/20)*0.5;
  speed = Math.min(speed, 7);

  // person movement
  person.x += (person.targetX - person.x)*0.14;
  person.tilt += ((person.targetX-person.x)*0.007 - person.tilt)*0.2;
  // mouth nom animation decay
  person.mouthOpen *= 0.85;

  // spawn
  updateSpawns(dt);

  // combo timer
  if (combo>1) {
    comboTimer -= dt;
    if (comboTimer <= 0) { combo=0; comboTimer=0; }
  }

  // update apples
  bgOff += speed;
  APPLES = APPLES.filter(a => {
    a.y += a.spd;
    a.rot += 0.03;
    a.x += Math.sin(a.sway + bgOff*0.01)*a.swayAmp;

    // collision with person mouth
    const mhX = person.x;
    const mhY = person.y - person.h*0.25;
    const dx = Math.abs(a.x - mhX);
    const dy = Math.abs(a.y - mhY);
    const catchR = (a.sz + person.w)*0.38;

    if (dx < catchR && dy < catchR*1.1) {
      if (a.T.hazard) {
        lives--;
        score = Math.max(0, score + a.T.p);
        combo=0; comboTimer=0;
        burst(a.x, a.y, '#ff4444', 16);
        sfx.hit();
        if (lives<=0) { over(); }
      } else {
        score += a.T.p;
        combo++;
        comboTimer = 2.5;
        if (combo>1 && combo%5===0) sfx.combo();
        else sfx.nom();
        person.mouthOpen = 1;
        pop(a.x, a.y, a.T.e, a.T.p);
      }
      return false;
    }

    return a.y < H()+a.sz;
  });

  // particles
  PARTS = PARTS.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.06;p.l-=p.d;return p.l>0;});
  POPPINGS = POPPINGS.filter(p=>{p.y-=1.5;p.l-=0.04;return p.l>0;});
}

function over() { state=S.OVER; sfx.die();
  if(score>highScore){highScore=score;localStorage.setItem('punchHS',highScore);}
}

function burst(x,y,c,n){ for(let i=0;i<n;i++){
  const a=Math.random()*Math.PI*2, s=1+Math.random()*4;
  PARTS.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,l:1,d:0.025+Math.random()*0.03,r:3+Math.random()*6,c});
}}
function pop(x,y,emoji,pts){
  POPPINGS.push({x,y,emoji,pts,text:pts>0?`+${pts}`:`${pts}`,l:1});
}

// ═══════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════
function drawBG() {
  // wall
  const wall = ctx.createLinearGradient(0,0,0,H());
  wall.addColorStop(0,'#2d3a4a');
  wall.addColorStop(1,'#1e2836');
  ctx.fillStyle=wall; ctx.fillRect(0,0,W(),H());

  // floor
  ctx.fillStyle='#8b6914';
  ctx.fillRect(0, H()*0.62, W(), H()*0.38);
  // floor tiles
  ctx.strokeStyle='rgba(0,0,0,0.15)';
  ctx.lineWidth=1;
  const tileW = W()/6;
  for(let i=0;i<7;i++){
    ctx.beginPath();
    ctx.moveTo(i*tileW, H()*0.62);
    ctx.lineTo(i*tileW, H());
    ctx.stroke();
  }

  // desks scrolling
  const scroll = bgOff*0.3 % (H()*0.65);
  desks.forEach((d,i)=>{
    const dy = d.y + scroll;
    const wrap = dy > H()+d.h ? dy - H()*0.65 - d.h : dy;
    // desk surface
    ctx.fillStyle='#6d4c2a';
    ctx.beginPath(); ctx.roundRect(d.x, wrap, d.w, d.h, 3); ctx.fill();
    // monitor
    const monW=d.w*0.55, monH=d.h*0.7, monX=d.x+(d.w-monW)/2, monY=wrap-monH*0.9;
    ctx.fillStyle='#222';
    ctx.beginPath(); ctx.roundRect(monX, monY, monW, monH, 3); ctx.fill();
    ctx.fillStyle='#4fc3f7';
    ctx.fillRect(monX+3, monY+3, monW-6, monH-8);
    // stand
    ctx.fillStyle='#333';
    ctx.fillRect(monX+monW/2-3, monY+monH, 6, d.h*0.4);
    ctx.fillRect(monX+monW/2-10, monY+monH+d.h*0.3, 20, 4);
  });

  // ambient sparkles (office dust)
  ctx.globalAlpha=0.25;
  for(let i=0;i<15;i++){
    const sx=(i*89+bgOff*0.8)%W(), sy=(i*67+bgOff*1.2)%H();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(sx,sy,1,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawPerson(x,y,w,h,tilt,mouth) {
  ctx.save();
  ctx.translate(x,y); ctx.rotate(tilt);

  // chair
  ctx.fillStyle='#555';
  ctx.beginPath(); ctx.roundRect(-w*0.38, h*0.1, w*0.76, h*0.35, 4); ctx.fill();
  // chair back
  ctx.fillStyle='#444';
  ctx.beginPath(); ctx.roundRect(-w*0.35, -h*0.1, w*0.7, h*0.22, 3); ctx.fill();

  // body / shirt
  const shirtGrad = ctx.createLinearGradient(-w/2,0,w/2,0);
  shirtGrad.addColorStop(0,'#2980b9');
  shirtGrad.addColorStop(0.5,'#3498db');
  shirtGrad.addColorStop(1,'#2980b9');
  ctx.fillStyle=shirtGrad;
  ctx.beginPath();
  ctx.moveTo(-w*0.35,-h*0.05);
  ctx.bezierCurveTo(-w*0.4,h*0.15,-w*0.28,h*0.3,-w*0.2,h*0.42);
  ctx.lineTo(w*0.2,h*0.42);
  ctx.bezierCurveTo(w*0.28,h*0.3,w*0.4,h*0.15,w*0.35,-h*0.05);
  ctx.closePath(); ctx.fill();

  // tie
  ctx.fillStyle='#e74c3c';
  ctx.beginPath();
  ctx.moveTo(0,-h*0.05);
  ctx.lineTo(w*0.06,h*0.1);
  ctx.lineTo(0,h*0.3);
  ctx.lineTo(-w*0.06,h*0.1);
  ctx.closePath(); ctx.fill();

  // neck
  ctx.fillStyle='#fdbf6f';
  ctx.fillRect(-w*0.08,-h*0.12,w*0.16,h*0.1);

  // head
  ctx.fillStyle='#fdbf6f';
  ctx.beginPath(); ctx.arc(0,-h*0.28,w*0.3,0,Math.PI*2); ctx.fill();

  // hair
  ctx.fillStyle='#2c2c2c';
  ctx.beginPath(); ctx.arc(0,-h*0.33,w*0.3,Math.PI,Math.PI*2); ctx.fill();

  // eyes (looking up toward falling apples)
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.arc(-w*0.1,-h*0.29,w*0.05,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(w*0.1,-h*0.29,w*0.05,0,Math.PI*2); ctx.fill();
  // pupils (look up)
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-w*0.1,-h*0.3,w*0.025,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(w*0.1,-h*0.3,w*0.025,0,Math.PI*2); ctx.fill();

  // mouth — opens when eating
  const mo = mouth * w * 0.15;
  ctx.fillStyle='#c0392b';
  ctx.beginPath();
  ctx.ellipse(0,-h*0.2, mo+w*0.04, mo*0.6+w*0.02, 0, 0, Math.PI*2);
  ctx.fill();

  // ears
  ctx.fillStyle='#fdbf6f';
  ctx.beginPath(); ctx.ellipse(-w*0.3,-h*0.28,w*0.05,w*0.07,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(w*0.3,-h*0.28,w*0.05,w*0.07,0,0,Math.PI*2); ctx.fill();

  // arms reaching up toward mouth
  ctx.strokeStyle='#fdbf6f'; ctx.lineWidth=w*0.06; ctx.lineCap='round';
  // left arm
  ctx.beginPath(); ctx.moveTo(-w*0.3,h*0.05); ctx.quadraticCurveTo(-w*0.25,-h*0.1,-w*0.1,-h*0.18); ctx.stroke();
  // right arm
  ctx.beginPath(); ctx.moveTo(w*0.3,h*0.05); ctx.quadraticCurveTo(w*0.25,-h*0.1,w*0.1,-h*0.18); ctx.stroke();

  ctx.restore();
}

function drawApple(a) {
  ctx.save();
  ctx.translate(a.x,a.y); ctx.rotate(a.rot);
  ctx.font=`${a.sz}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(a.T.e,0,0);
  ctx.restore();
}

function drawHUD() {
  const pad=W()*0.03;

  // score
  ctx.fillStyle='#fff';
  ctx.font=`${W()*0.08}px 'ZCOOL KuaiLe',cursive`;
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText(`🍎 ${Math.floor(score)}`,pad,pad);

  // hi score
  ctx.font=`${W()*0.04}px 'ZCOOL KuaiLe',cursive`;
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillText(`最高 ${highScore}`,pad,pad+W()*0.08);

  // combo
  if (combo>1) {
    ctx.font=`${W()*0.07}px 'ZCOOL KuaiLe',cursive`;
    ctx.fillStyle=`hsl(${Math.min(combo*10,40)},100%,60%)`;
    ctx.textAlign='center';
    ctx.fillText(`🔥 ${combo}x COMBO!`,W()/2,pad);
  }

  // lives
  ctx.font=`${W()*0.08}px serif`; ctx.textAlign='right';
  let ls=''; for(let i=0;i<3;i++) ls+=i<lives?'❤️':'🖤';
  ctx.fillText(ls,W()-pad,pad);

  // speed
  ctx.font=`${W()*0.038}px 'ZCOOL KuaiLe',cursive`;
  ctx.fillStyle='#ffd93d'; ctx.textAlign='left';
  ctx.fillText(`⚡${speed.toFixed(1)}x`,pad,H()-pad-W()*0.04);

  // time
  ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.textAlign='right';
  ctx.fillText(`${Math.floor(time)}s`,W()-pad,H()-pad-W()*0.04);
}

function drawMenu() {
  const cx=W()/2, cy=H()/2;
  drawBG();

  // darken
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W(),H());

  // demo person
  drawPerson(cx, H()*0.7, W()*0.22, W()*0.22*1.6, Math.sin(menuPulse)*0.05, Math.sin(menuPulse*2)*0.3+0.2);

  // floating 🍎
  ctx.font=`${W()*0.12}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const fy = cy - H()*0.15 + Math.sin(menuPulse)*5;
  ctx.shadowColor='#e74c3c'; ctx.shadowBlur=15;
  ctx.fillText('🍎', cx, fy); ctx.shadowBlur=0;

  // title
  ctx.shadowColor='#ff6b35'; ctx.shadowBlur=20*(0.5+Math.sin(menuPulse)*0.3);
  ctx.fillStyle='#fff'; ctx.font=`${W()*0.15}px 'ZCOOL KuaiLe',cursive`;
  ctx.fillText('PUNCH', cx, cy-H()*0.28); ctx.shadowBlur=0;

  ctx.fillStyle='#ffd93d'; ctx.font=`${W()*0.055}px 'ZCOOL KuaiLe',cursive`;
  ctx.fillText('办公室吃苹果 🍎', cx, cy-H()*0.15);

  // tap
  ctx.globalAlpha=0.6+Math.sin(menuPulse*2)*0.4;
  ctx.fillStyle='#fff'; ctx.font=`${W()*0.062}px 'ZCOOL KuaiLe',cursive`;
  ctx.fillText('👉 点我开始 👈', cx, cy+H()*0.2); ctx.globalAlpha=1;

  ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font=`${W()*0.046}px 'ZCOOL KuaiLe',cursive`;
  ctx.fillText(`🏆 最高分 ${highScore}`, cx, cy+H()*0.32);

  ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font=`${W()*0.038}px 'ZCOOL KuaiLe',cursive`;
  ctx.fillText('左右滑动接住苹果 | 小心炸弹和咖啡 ☕', cx, H()-H()*0.06);
}

function drawOver() {
  ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W(),H());
  const cx=W()/2, cy=H()/2;
  ctx.shadowColor='#ff4444'; ctx.shadowBlur=20;
  ctx.fillStyle='#ff6b6b'; ctx.font=`${W()*0.13}px 'ZCOOL KuaiLe',cursive`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('💥 游戏结束!',cx,cy-H()*0.24); ctx.shadowBlur=0;
  ctx.fillStyle='#fff'; ctx.font=`${W()*0.07}px 'ZCOOL KuaiLe',cursive`;
  ctx.fillText(`得分 ${Math.floor(score)}`,cx,cy-H()*0.06);
  if(score>=highScore&&score>0){
    ctx.fillStyle='#ffd93d'; ctx.font=`${W()*0.055}px 'ZCOOL KuaiLe',cursive`;
    ctx.fillText('🎉 新纪录! 🎉',cx,cy+H()*0.04);
  } else {
    ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font=`${W()*0.05}px 'ZCOOL KuaiLe',cursive`;
    ctx.fillText(`最高分 ${highScore}`,cx,cy+H()*0.04);
  }
  ctx.globalAlpha=0.6+Math.sin(menuPulse*2)*0.4;
  ctx.fillStyle='#fff'; ctx.font=`${W()*0.055}px 'ZCOOL KuaiLe',cursive`;
  ctx.fillText('点我返回主页',cx,cy+H()*0.18); ctx.globalAlpha=1;
}

function draw() {
  ctx.clearRect(0,0,W(),H());
  if(state===S.MENU){ drawMenu(); return; }

  drawBG();
  APPLES.forEach(drawApple);

  // particles
  PARTS.forEach(p=>{
    ctx.globalAlpha=p.l; ctx.fillStyle=p.c;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  // score popups
  POPPINGS.forEach(p=>{
    ctx.globalAlpha=p.l;
    ctx.font=`${W()*0.06}px 'ZCOOL KuaiLe',cursive`;
    ctx.fillStyle=p.text.startsWith('+')?'#ffd93d':'#ff4444';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(p.text,p.x,p.y);
  });
  ctx.globalAlpha=1;

  // person
  drawPerson(person.x, person.y, person.w, person.h, person.tilt, person.mouthOpen);

  drawHUD();
  if(state===S.OVER) drawOver();
}

// ═══════════════════════════════════════
//  LOOP
