<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Flow 2D Cat Fish</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #98D8C8 100%);
            font-family: 'Comic Sans MS', 'Chalkboard', cursive;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        #ui.active {
            pointer-events: auto;
        }
        .hidden {
            display: none !important;
        }
        #startScreen, #gameOverScreen {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 90%;
            width: 320px;
        }
        h1 {
            color: #FF6B9D;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0 #FFD93D;
        }
        h2 {
            color: #FF6B9D;
            font-size: 24px;
            margin-bottom: 15px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .score-display {
            font-size: 20px;
            color: #4ECDC4;
            margin: 15px 0;
        }
        .high-score {
            font-size: 16px;
            color: #FFD93D;
            margin-bottom: 15px;
        }
        .btn {
            background: linear-gradient(180deg, #FF6B9D 0%, #FF8FB1 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 5px 0 #D14D7A;
            transition: all 0.1s;
            margin: 10px 5px;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #D14D7A;
        }
        .instructions {
            font-size: 12px;
            color: #888;
            margin-top: 15px;
            line-height: 1.5;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            pointer-events: none;
        }
        .hud-item {
            background: rgba(0,0,0,0.3);
            padding: 8px 15px;
            border-radius: 20px;
        }
        .combo {
            color: #FFD93D;
            font-weight: bold;
        }
        .hearts {
            display: flex;
            gap: 5px;
        }
        .heart {
            color: #FF6B9D;
            font-size: 20px;
        }
        .heart.empty {
            color: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="hud" class="hidden">
        <div class="hud-item">Score: <span id="scoreText">0</span></div>
        <div class="hud-item combo">Combo: <span id="comboText">x1</span></div>
        <div class="hud-item">
            <div class="hearts" id="hearts">
                <span class="heart">♥</span>
                <span class="heart">♥</span>
                <span class="heart">♥</span>
            </div>
        </div>
    </div>
    
    <div id="ui" class="active">
        <div id="startScreen">
            <h1>🐱 Cat Fish 🌊</h1>
            <p class="subtitle">A cute catch 'em all game!</p>
            <div style="font-size: 60px; margin: 20px 0;">🐟</div>
            <button class="btn" id="startBtn">Play!</button>
            <p class="instructions">
                Tap or drag to move the cat<br>
                Catch falling fish to score points<br>
                Don't miss too many fish!
            </p>
        </div>
        
        <div id="gameOverScreen" class="hidden">
            <h2>Game Over!</h2>
            <div class="score-display">Score: <span id="finalScore">0</span></div>
            <div class="high-score">Best: <span id="highScore">0</span></div>
            <button class="btn" id="restartBtn">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const hud = document.getElementById('hud');
        const ui = document.getElementById('ui');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const scoreText = document.getElementById('scoreText');
        const comboText = document.getElementById('comboText');
        const finalScore = document.getElementById('finalScore');
        const highScoreEl = document.getElementById('highScore');
        const heartsEl = document.getElementById('hearts');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        let width, height;
        let gameState = 'start';
        let score = 0;
        let combo = 1;
        let lives = 3;
        let highScore = localStorage.getItem('catFishHighScore') || 0;
        
        let cat = { x: 0, y: 0, width: 80, height: 60 };
        let fishes = [];
        let bubbles = [];
        let particles = [];
        
        let lastTime = 0;
        let spawnTimer = 0;
        let spawnInterval = 1500;
        
        let isDragging = false;
        let touchX = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            cat.y = height - 100;
            cat.x = width / 2;
        }

        window.addEventListener('resize', resize);
        resize();

        function drawCat(x, y) {
            ctx.save();
            ctx.translate(x, y);
            
            // Body
            ctx.fillStyle = '#FFB347';
            ctx.beginPath();
            ctx.ellipse(0, 0, 40, 30, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Head
            ctx.fillStyle = '#FFB347';
            ctx.beginPath();
            ctx.arc(25, -15, 28, 0, Math.PI * 2);
            ctx.fill();
            
            // Ears
            ctx.fillStyle = '#FFB347';
            ctx.beginPath();
            ctx.moveTo(10, -35);
            ctx.lineTo(20, -55);
            ctx.lineTo(30, -35);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(35, -35);
            ctx.lineTo(45, -55);
            ctx.lineTo(55, -35);
            ctx.fill();
            
            // Inner ears
            ctx.fillStyle = '#FFB6C1';
            ctx.beginPath();
            ctx.moveTo(15, -38);
            ctx.lineTo(20, -50);
            ctx.lineTo(27, -38);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(38, -38);
            ctx.lineTo(45, -50);
            ctx.lineTo(52, -38);
            ctx.fill();
            
            // Eyes
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.ellipse(15, -18, 10, 12, 0, 0, Math.PI * 2);
            ctx.ellipse(35, -18, 10, 12, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(18, -16, 5, 0, Math.PI * 2);
            ctx.arc(38, -16, 5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(20, -18, 2, 0, Math.PI * 2);
            ctx.arc(40, -18, 2, 0, Math.PI * 2);
            ctx.fill();
            
            // Nose
            ctx.fillStyle = '#FF6B9D';
            ctx.beginPath();
            ctx.moveTo(25, -5);
            ctx.lineTo(22, 0);
            ctx.lineTo(28, 0);
            ctx.fill();
            
            // Mouth
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(25, 0);
            ctx.lineTo(25, 5);
            ctx.moveTo(20, 7);
            ctx.quadraticCurveTo(25, 12, 30, 7);
            ctx.stroke();
            
            // Whiskers
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            for (let i = -1; i <= 1; i++) {
                ctx.beginPath();
                ctx.moveTo(5, -3 + i * 5);
                ctx.lineTo(-15, -6 + i * 8);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(45, -3 + i * 5);
                ctx.lineTo(65, -6 + i * 8);
                ctx.stroke();
            }
            
            // Tail
            ctx.strokeStyle = '#FFB347';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(-35, 5);
            ctx.quadraticCurveTo(-55, -10, -50, -30);
            ctx.stroke();
            
            // Paws
            ctx.fillStyle = '#FFB347';
            ctx.beginPath();
            ctx.ellipse(-15, 25, 12, 8, 0, 0, Math.PI * 2);
            ctx.ellipse(15, 25, 12, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        function drawFish(fish) {
            ctx.save();
            ctx.translate(fish.x, fish.y);
            ctx.rotate(fish.rotation || 0);
            
            // Colors based on fish type
            const colors = {
                orange: { body: '#FF6B6B', fin: '#FF8E8E' },
                blue: { body: '#4ECDC4', fin: '#7EDDD6' },
                gold: { body: '#FFD93D', fin: '#FFE566' },
                purple: { body: '#A66CFF', fin: '#C4A3FF' }
            };
            const color = colors[fish.type] || colors.orange;
            
            // Body
            ctx.fillStyle = color.body;
            ctx.beginPath();
            ctx.ellipse(0, 0, 25, 15, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Tail
            ctx.fillStyle = color.fin;
            ctx.beginPath();
            ctx.moveTo(-20, 0);
            ctx.lineTo(-40, -15);
            ctx.lineTo(-40, 15);
            ctx.closePath();
            ctx.fill();
            
            // Dorsal fin
            ctx.beginPath();
            ctx.moveTo(-5, -12);
            ctx.lineTo(5, -25);
            ctx.lineTo(15, -12);
            ctx.closePath();
            ctx.fill();
            
            // Eye
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(12, -3, 7, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(14, -3, 3, 0, Math.PI * 2);
            ctx.fill();
            
            // Smile
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(8, 3, 6, 0.2, Math.PI - 0.2);
            ctx.stroke();
            
            ctx.restore();
        }

        function spawnFish() {
            const types = ['orange', 'blue', 'gold', 'purple'];
            const type = types[Math.floor(Math.random() * types.length)];
            const basePoints = type === 'gold' ? 30 : type === 'purple' ? 25 : 15;
            
            fishes.push({
                x: Math.random() * (width - 60) + 30,
                y: -30,
                speed: 150 + Math.random() * 100 + (score / 100) * 20,
                type: type,
                points: basePoints,
                rotation: 0,
                wobble: Math.random() * Math.PI * 2,
                wobbleSpeed: 3 + Math.random() * 2
            });
        }

        function spawnBubble(x, y) {
            bubbles.push({
                x: x + (Math.random() - 0.5) * 30,
                y: y,
                size: 5 + Math.random() * 10,
                speed: 50 + Math.random() * 50,
                alpha: 1
            });
        }

        function spawnParticle(x, y, color) {
            for (let i = 0; i < 8; i++) {
                const angle = (Math.PI * 2 / 8) * i;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * (100 + Math.random() * 50),
                    vy: Math.sin(angle) * (100 + Math.random() * 50),
                    size: 5 + Math.random() * 5,
                    color: color,
                    alpha: 1,
                    life: 0.5 + Math.random() * 0.3
                });
            }
        }

        function update(dt) {
            if (gameState !== 'playing') return;
            
            // Smooth cat movement
            if (isDragging) {
                const targetX = Math.max(cat.width/2, Math.min(width - cat.width/2, touchX));
                cat.x += (targetX - cat.x) * 10 * dt;
            }
            
            // Spawn fish
            spawnTimer += dt * 1000;
            if (spawnTimer >= spawnInterval) {
                spawnFish();
                spawnTimer = 0;
                spawnInterval = Math.max(600, 1500 - score * 2);
            }
            
            // Update fish
            for (let i = fishes.length - 1; i >= 0; i--) {
                const fish = fishes[i];
                fish.y += fish.speed * dt;
                fish.wobble += fish.wobbleSpeed * dt;
                fish.x += Math.sin(fish.wobble) * 30 * dt;
                fish.rotation = Math.sin(fish.wobble) * 0.2;
                
                // Check collision with cat
                const dx = fish.x - cat.x;
                const dy = fish.y - (cat.y - 10);
                if (Math.abs(dx) < 50 && Math.abs(dy) < 35) {
                    score += fish.points * combo;
                    combo = Math.min(combo + 1, 10);
                    spawnParticle(fish.x, fish.y, fish.type === 'gold' ? '#FFD93D' : fish.type === 'blue' ? '#4ECDC4' : '#FF6B6B');
                    for (let j = 0; j < 3; j++) spawnBubble(fish.x, fish.y);
                    fishes.splice(i, 1);
                    updateHUD();
                    continue;
                }
                
                // Fish fell off screen
                if (fish.y > height + 30) {
                    fishes.splice(i, 1);
                    lives--;
                    combo = 1;
                    updateHUD();
                    if (lives <= 0) {
                        gameOver();
                    }
                }
            }
            
            // Update bubbles
            for (let i = bubbles.length - 1; i >= 0; i--) {
                const b = bubbles[i];
                b.y -= b.speed * dt;
                b.alpha -= dt * 2;
                if (b.alpha <= 0) bubbles.splice(i, 1);
            }
            
            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.vy += 200 * dt;
                p.life -= dt;
                p.alpha = p.life / 0.8;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function draw() {
            // Background - water effect
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(0.5, '#B8E6FF');
            gradient.addColorStop(1, '#98D8C8');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // Draw water waves at bottom
            ctx.fillStyle = 'rgba(152, 216, 200, 0.5)';
            ctx.beginPath();
            ctx.moveTo(0, height - 40);
            for (let x = 0; x <= width; x += 20) {
                const y = height - 40 + Math.sin(x * 0.05 + Date.now() * 0.002) * 10;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(width, height);
            ctx.lineTo(0, height);
            ctx.fill();
            
            // Draw bubbles
            bubbles.forEach(b => {
                ctx.fillStyle = `rgba(255, 255, 255, ${b.alpha * 0.5})`;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = `rgba(255, 255, 255, ${b.alpha * 0.8})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            });
            
            // Draw fish
            fishes.forEach(fish => drawFish(fish));
            
            // Draw particles
            particles.forEach(p => {
                ctx.fillStyle = p.color || '#FFD93D';
                ctx.globalAlpha = p.alpha;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            });
            
            // Draw cat
            drawCat(cat.x, cat.y);
        }

        function updateHUD() {
            scoreText.textContent = score;
            comboText.textContent = 'x' + combo;
            
            const hearts = heartsEl.querySelectorAll('.heart');
            hearts.forEach((h, i) => {
                h.classList.toggle('empty', i >= lives);
            });
        }

        function gameLoop(timestamp) {
            const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
            lastTime = timestamp;
            
            update(dt);
            draw();
            
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            gameState = 'playing';
            score = 0;
            combo = 1;
            lives = 3;
            fishes = [];
            bubbles = [];
            particles = [];
            spawnTimer = 0;
            spawnInterval = 1500;
            cat.x = width / 2;
            
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            ui.classList.remove('active');
            hud.classList.remove('hidden');
            
            updateHUD();
        }

        function gameOver() {
            gameState = 'gameover';
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('catFishHighScore', highScore);
            }
            
            finalScore.textContent = score;
            highScoreEl.textContent = highScore;
            
            hud.classList.add('hidden');
            gameOverScreen.classList.remove('hidden');
            ui.classList.add('active');
        }

        // Input handling
        function handleStart(x) {
            if (gameState === 'playing') {
                isDragging = true;
                touchX = x;
            }
        }

        function handleMove(x) {
            if (gameState === 'playing' && isDragging) {
                touchX = x;
            }
        }

        function handleEnd() {
            isDragging = false;
        }

        // Touch events
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const touch = e.touches[0];
            handleStart(touch.clientX);
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const touch = e.touches[0];
            handleMove(touch.clientX);
        }, { passive: false });

        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            handleEnd();
        }, { passive: false });

        // Mouse events
        canvas.addEventListener('mousedown', e => {
            handleStart(e.clientX);
        });

        canvas.addEventListener('mousemove', e => {
            handleMove(e.clientX);
        });

        canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('mouseleave', handleEnd);

        // Button events
        startBtn.addEventListener('click', startGame);
        startBtn.addEventListener('touchend', e => {
            e.preventDefault();
            startGame();
        });

        restartBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('touchend', e => {
            e.preventDefault();
            startGame();
        });

        // Start
        highScoreEl.textContent = highScore;
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
