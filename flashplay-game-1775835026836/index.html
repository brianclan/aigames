<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>猫咪接鱼</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #8fe3ff 0%, #c5f3ff 45%, #fff7d1 100%);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      touch-action: none;
    }
    #game {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    .hud {
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      box-sizing: border-box;
      padding: calc(env(safe-area-inset-top) + 10px) 14px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      color: #18314f;
      text-shadow: 0 2px 0 rgba(255,255,255,0.35);
      font-weight: 800;
    }
    .pill {
      background: rgba(255,255,255,0.78);
      border: 2px solid rgba(24,49,79,0.14);
      border-radius: 999px;
      padding: 8px 12px;
      box-shadow: 0 8px 20px rgba(24,49,79,0.08);
      font-size: 14px;
    }
    .center {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      padding: 24px;
      box-sizing: border-box;
    }
    .panel {
      width: min(88vw, 420px);
      background: rgba(255,255,255,0.9);
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(24,49,79,0.18);
      border: 2px solid rgba(24,49,79,0.08);
      padding: 22px 18px;
      text-align: center;
      color: #18314f;
      pointer-events: auto;
    }
    .title {
      font-size: 30px;
      font-weight: 900;
      margin: 0 0 8px;
    }
    .desc {
      font-size: 15px;
      line-height: 1.6;
      opacity: 0.9;
      margin: 0 0 16px;
    }
    .btn {
      appearance: none;
      border: 0;
      background: linear-gradient(180deg, #ffb347 0%, #ff8a3d 100%);
      color: white;
      font-size: 18px;
      font-weight: 900;
      padding: 14px 24px;
      border-radius: 999px;
      box-shadow: 0 10px 20px rgba(255,138,61,0.3);
      min-width: 160px;
    }
    .tip {
      margin-top: 12px;
      font-size: 13px;
      opacity: 0.75;
    }
    #toast {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 20px);
      transform: translateX(-50%);
      background: rgba(24,49,79,0.88);
      color: #fff;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      opacity: 0;
      transition: opacity .2s ease;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="hud">
    <div class="pill" id="score">分数 0</div>
    <div class="pill" id="time">时间 45</div>
    <div class="pill" id="combo">连击 x1</div>
  </div>
  <div class="center" id="overlay">
    <div class="panel">
      <div class="title">猫咪接鱼</div>
      <p class="desc">点击或按住屏幕移动小猫，接住小鱼加分，接连命中会提升连击倍率。</p>
      <button class="btn" id="startBtn">开始游戏</button>
      <div class="tip">小心别漏太多鱼，时间结束后结算成绩。</div>
    </div>
  </div>
  <div id="toast">喵！</div>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('time');
    const comboEl = document.getElementById('combo');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');
    const toast = document.getElementById('toast');

    let W = 0, H = 0, DPR = Math.min(2, window.devicePixelRatio || 1);
    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    const state = {
      running: false,
      score: 0,
      time: 45,
      combo: 1,
      comboHits: 0,
      miss: 0,
      lastTime: 0,
      spawnTimer: 0,
      pointerX: null,
      particles: [],
      fishes: [],
      clouds: []
    };

    const cat = {
      x: 0,
      y: 0,
      w: 84,
      h: 64,
      speed: 0,
      targetX: 0,
      blink: 0
    };

    function resetGame() {
      state.running = true;
      state.score = 0;
      state.time = 45;
      state.combo = 1;
      state.comboHits = 0;
      state.miss = 0;
      state.spawnTimer = 0;
      state.particles = [];
      state.fishes = [];
      state.clouds = Array.from({length: 5}, (_, i) => ({
        x: (i / 5) * W,
        y: 50 + i * 30,
        r: 26 + (i % 3) * 8,
        s: 8 + i
      }));
      cat.w = Math.max(72, Math.min(96, W * 0.2));
      cat.h = cat.w * 0.76;
      cat.x = W * 0.5;
      cat.targetX = cat.x;
      cat.y = H - Math.max(110, H * 0.14);
      updateHud();
      overlay.style.display = 'none';
      state.lastTime = performance.now();
      requestAnimationFrame(loop);
    }

    function updateHud() {
      scoreEl.textContent = '分数 ' + state.score;
      timeEl.textContent = '时间 ' + Math.ceil(state.time);
      comboEl.textContent = '连击 x' + state.combo;
    }

    function showToast(text) {
      toast.textContent = text;
      toast.style.opacity = '1';
      clearTimeout(showToast.tid);
      showToast.tid = setTimeout(() => toast.style.opacity = '0', 600);
    }

    function spawnFish() {
      const good = Math.random() > 0.15;
      const scale = 0.8 + Math.random() * 0.5;
      const size = 22 * scale;
      state.fishes.push({
        x: 24 + Math.random() * (W - 48),
        y: -30,
        vx: (Math.random() - 0.5) * 28,
        vy: 130 + Math.random() * 110 + (45 - state.time) * 2.3,
        size,
        good,
        rot: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 2.5
      });
    }

    function burst(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = 40 + Math.random() * 120;
        state.particles.push({
          x, y,
          vx: Math.cos(a) * sp,
          vy: Math.sin(a) * sp - 20,
          life: 0.7 + Math.random() * 0.4,
          t: 0,
          r: 2 + Math.random() * 4,
          color
        });
      }
    }

    function inputX(e) {
      if (e.touches && e.touches[0]) return e.touches[0].clientX;
      return e.clientX;
    }

    function onMove(e) {
      state.pointerX = inputX(e);
      cat.targetX = state.pointerX;
      if (e.cancelable) e.preventDefault();
    }

    function onEnd() {
      state.pointerX = null;
    }

    window.addEventListener('mousemove', onMove, { passive: false });
    window.addEventListener('mousedown', onMove, { passive: false });
    window.addEventListener('touchstart', onMove, { passive: false });
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('mouseup', onEnd, { passive: true });
    window.addEventListener('touchend', onEnd, { passive: true });

    startBtn.addEventListener('click', resetGame);

    function drawCloud(x, y, r) {
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.arc(x + r * 0.8, y + 4, r * 0.85, 0, Math.PI * 2);
      ctx.arc(x - r * 0.8, y + 6, r * 0.7, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawFish(f) {
      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.rotate(f.rot);
      const s = f.size;
      if (f.good) {
        ctx.fillStyle = '#4aa3ff';
        ctx.beginPath();
        ctx.ellipse(0, 0, s * 0.95, s * 0.58, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#2e78cf';
        ctx.beginPath();
        ctx.moveTo(-s * 0.95, 0);
        ctx.lineTo(-s * 1.5, -s * 0.5);
        ctx.lineTo(-s * 1.5, s * 0.5);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(s * 0.45, -s * 0.08, s * 0.12, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#18314f';
        ctx.beginPath();
        ctx.arc(s * 0.48, -s * 0.08, s * 0.05, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillStyle = '#ff6b6b';
        ctx.beginPath();
        ctx.moveTo(0, -s);
        ctx.lineTo(s * 0.95, 0);
        ctx.lineTo(0, s);
        ctx.lineTo(-s * 0.95, 0);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(-s * 0.35, -s * 0.35);
        ctx.lineTo(s * 0.35, s * 0.35);
        ctx.moveTo(s * 0.35, -s * 0.35);
        ctx.lineTo(-s * 0.35, s * 0.35);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawCat() {
      const bob = Math.sin(performance.now() * 0.008) * 2;
      const x = cat.x;
      const y = cat.y + bob;
      const w = cat.w;
      const h = cat.h;
      ctx.save();
      ctx.translate(x, y);
      ctx.fillStyle = '#ffb86b';
      ctx.beginPath();
      ctx.roundRect(-w * 0.5, -h * 0.34, w, h * 0.72, h * 0.25);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-w * 0.28, -h * 0.15);
      ctx.lineTo(-w * 0.13, -h * 0.62);
      ctx.lineTo(-w * 0.02, -h * 0.2);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(w * 0.28, -h * 0.15);
      ctx.lineTo(w * 0.13, -h * 0.62);
      ctx.lineTo(w * 0.02, -h * 0.2);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#ffe9cb';
      ctx.beginPath();
      ctx.ellipse(0, h * 0.02, w * 0.28, h * 0.22, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#18314f';
      ctx.beginPath();
      ctx.arc(-w * 0.15, -h * 0.02, w * 0.045, 0, Math.PI * 2);
      ctx.arc(w * 0.15, -h * 0.02, w * 0.045, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#18314f';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-w * 0.1, h * 0.12);
      ctx.quadraticCurveTo(0, h * 0.2, w * 0.1, h * 0.12);
      ctx.stroke();
      ctx.strokeStyle = 'rgba(24,49,79,0.45)';
      for (let i = 0; i < 3; i++) {
        const yy = h * (0.03 + i * 0.07);
        ctx.beginPath();
        ctx.moveTo(-w * 0.22, yy);
        ctx.lineTo(-w * 0.42, yy - 2 + i);
        ctx.moveTo(w * 0.22, yy);
        ctx.lineTo(w * 0.42, yy - 2 + i);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawBackground(t) {
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, '#8fe3ff');
      g.addColorStop(0.55, '#c8f4ff');
      g.addColorStop(1, '#fff2bc');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
      for (const c of state.clouds) {
        c.x += c.s * t;
        if (c.x - c.r * 2 > W) c.x = -c.r * 3;
        drawCloud(c.x, c.y, c.r);
      }
      ctx.fillStyle = '#f7d87b';
      ctx.fillRect(0, H - 72, W, 72);
      ctx.fillStyle = '#eac96a';
      for (let i = 0; i < W; i += 28) {
        ctx.beginPath();
        ctx.arc(i, H - 72, 18, Math.PI, Math.PI * 2);
        ctx.fill();
      }
    }

    function endGame() {
      state.running = false;
      overlay.style.display = 'flex';
      overlay.querySelector('.title').textContent = '游戏结束';
      overlay.querySelector('.desc').textContent = '本次得分 ' + state.score + ' 分，最高连击 x' + state.combo + '。再来一局试试更高分。';
      startBtn.textContent = '再次开始';
    }

    function loop(now) {
      if (!state.running) return;
      const dt = Math.min(0.033, (now - state.lastTime) / 1000 || 0.016);
      state.lastTime = now;
      state.time -= dt;
      if (state.time <= 0) {
        state.time = 0;
        updateHud();
        drawBackground(dt);
        drawCat();
        endGame();
        return;
      }

      drawBackground(dt);

      state.spawnTimer -= dt;
      const spawnGap = Math.max(0.24, 0.58 - (45 - state.time) * 0.006);
      if (state.spawnTimer <= 0) {
        spawnFish();
        state.spawnTimer = spawnGap;
      }

      const target = cat.targetX == null ? W * 0.5 : cat.targetX;
      const dx = target - cat.x;
      cat.x += dx * Math.min(1, dt * 10);
      cat.x = Math.max(cat.w * 0.55, Math.min(W - cat.w * 0.55, cat.x));

      for (let i = state.fishes.length - 1; i >= 0; i--) {
        const f = state.fishes[i];
        f.x += f.vx * dt;
        f.y += f.vy * dt;
        f.rot += f.spin * dt;
        if (f.x < 12 || f.x > W - 12) f.vx *= -1;

        const catchZoneW = cat.w * 0.72;
        const catchZoneH = cat.h * 0.55;
        const hit = Math.abs(f.x - cat.x) < catchZoneW * 0.5 + f.size * 0.6 &&
                    Math.abs(f.y - (cat.y - cat.h * 0.02)) < catchZoneH * 0.5 + f.size * 0.4;
        if (hit) {
          if (f.good) {
            state.comboHits++;
            state.combo = Math.min(9, 1 + Math.floor(state.comboHits / 4));
            state.score += 10 * state.combo;
            burst(f.x, f.y, '#4aa3ff', 10);
            if (state.combo >= 3 && state.comboHits % 4 === 0) showToast('连击 x' + state.combo);
          } else {
            state.comboHits = 0;
            state.combo = 1;
            state.score = Math.max(0, state.score - 15);
            burst(f.x, f.y, '#ff6b6b', 12);
            showToast('咸鱼炸弹！');
          }
          state.fishes.splice(i, 1);
          updateHud();
          continue;
        }

        if (f.y > H + 40) {
          state.fishes.splice(i, 1);
          if (f.good) {
            state.comboHits = 0;
            state.combo = 1;
            state.miss++;
            updateHud();
            if (state.miss % 3 === 0) showToast('别让鱼跑掉啦');
          }
          continue;
        }

        drawFish(f);
      }

      for (let i = state.particles.length - 1; i >= 0; i--) {
        const p = state.particles[i];
        p.t += dt;
        if (p.t >= p.life) {
          state.particles.splice(i, 1);
          continue;
        }
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 120 * dt;
        ctx.globalAlpha = 1 - p.t / p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      drawCat();
      updateHud();
      requestAnimationFrame(loop);
    }

    overlay.querySelector('.title').textContent = '猫咪接鱼';
    startBtn.textContent = '开始游戏';
  </script>
</body>
</html>
