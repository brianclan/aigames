<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Route Smoke Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none}
body{background:#1a1a2e;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
#hud{width:100%;max-width:480px;display:flex;justify-content:space-between;align-items:center;padding:16px 20px;color:#e2e2e2;font-size:18px;letter-spacing:2px}
#score-wrap{display:flex;flex-direction:column;align-items:center}
#score-label{font-size:11px;opacity:0.6;letter-spacing:3px}
#score-val{font-size:32px;font-weight:bold;color:#00ffcc;text-shadow:0 0 10px #00ffcc88}
#timer-wrap{display:flex;flex-direction:column;align-items:center}
#timer-label{font-size:11px;opacity:0.6;letter-spacing:3px}
#timer-val{font-size:24px;color:#ff6b6b;text-shadow:0 0 8px #ff6b6b88}
#combo{font-size:14px;color:#ffd93d;opacity:0;transition:opacity 0.3s;text-align:center;margin-top:4px;letter-spacing:1px}
#canvas-wrap{position:relative;flex:1;width:100%;max-width:480px;overflow:hidden}
canvas{display:block;width:100%;height:100%}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(26,26,46,0.92);z-index:10}
#overlay h1{color:#00ffcc;font-size:28px;letter-spacing:4px;margin-bottom:12px;text-shadow:0 0 20px #00ffcc66}
#overlay p{color:#aaa;font-size:13px;margin:6px 0;letter-spacing:1px;text-align:center;max-width:280px;line-height:1.6}
#overlay .hint{color:#ffd93d;font-size:12px;margin-top:4px}
.btn{display:margin-top:24px;background:#00ffcc;color:#1a1a2e;border:none;padding:14px 40px;font-size:16px;letter-spacing:3px;cursor:pointer;font-family:'Courier New',monospace;font-weight:bold;border-radius:4px;transition:all 0.2s;text-transform:uppercase}
.btn:hover,.btn:active{background:#00e6b8;transform:scale(1.05);box-shadow:0 0 20px #00ffcc66}
#final-score{font-size:48px;color:#ffd93d;text-shadow:0 0 15px #ffd93d66;margin:8px 0}
#final-label{font-size:12px;color:#aaa;letter-spacing:3px}
</style>
</head>
<body>
<div id="hud">
<div id="score-wrap"><span id="score-label">SCORE</span><span id="score-val">0</span><span id="combo"></span></div>
<div id="timer-wrap"><span id="timer-label">TIME</span><span id="timer-val">30</span></div>
</div>
<div id="canvas-wrap"><canvas id="c"></canvas>
<div id="overlay">
<h1>ROUTE SMOKE</h1>
<p>Tap the drifting smoke puffs before they fade away.</p>
<p class="hint">Chain taps quickly for combo bonus!</p>
<button class="btn" id="startBtn">START</button>
</div>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('canvas-wrap');
const scoreEl=document.getElementById('score-val');
const timerEl=document.getElementById('timer-val');
const comboEl=document.getElementById('combo');
const overlay=document.getElementById('overlay');
const startBtn=document.getElementById('startBtn');

let W,H;
function resize(){
 const r=wrap.getBoundingClientRect();
 W=canvas.width=r.width;
 H=canvas.height=r.height;
}
resize();
window.addEventListener('resize',resize);

const GAME_DUR=30;
let score=0,timeLeft=GAME_DUR,combo=0,lastTap=-99,active=false;
let puffs=[];
let tapFx=[];
let startTime=0;
let animId=null;

class SmokePuff{
 constructor(){
  const margin=60;
  const side=Math.random();
  if(side<0.4){
   this.x=-margin;this.y=H*0.25+Math.random()*H*0.5;
   this.vx=1.5+Math.random()*1.5;this.vy=(Math.random()-0.5)*0.6;
  } else if(side<0.8){
   this.x=W+margin;this.y=H*0.25+Math.random()*H*0.5;
   this.vx=-(1.5+Math.random()*1.5);this.vy=(Math.random()-0.5)*0.6;
  } else {
   this.x=Math.random()*W;this.y=H+margin;
   this.vx=(Math.random()-0.5)*0.8;this.vy=-(1.5+Math.random()*1.5);
  }
  this.r=22+Math.random()*18;
  this.alpha=0.35+Math.random()*0.25;
  this.maxAlpha=this.alpha;
  this.fadeRate=0.004+Math.random()*0.004;
  this.phase=Math.random()*Math.PI*2;
  this.phaseSpd=0.03+Math.random()*0.04;
  this.hue=180+Math.random()*40;
  this.hit=false;
  this.spawnT=performance.now();
 }
 update(dt){
  this.phase+=this.phaseSpd;
  this.x+=this.vx*dt*0.06;
  this.y+=this.vy*dt*0.06;
  if(!this.hit) this.alpha-=this.fadeRate*dt*0.06;
  else this.alpha-=0.025*dt*0.06;
  if(this.alpha<0)this.alpha=0;
 }
 draw(){
  if(this.alpha<=0)return;
  const wobble=Math.sin(this.phase)*this.r*0.2;
  ctx.save();
  ctx.globalAlpha=this.alpha;
  const grd=ctx.createRadialGradient(this.x,this.y+wobble,0,this.x,this.y+wobble,this.r);
  grd.addColorStop(0,`hsla(${this.hue},70%,75%,0.8)`);
  grd.addColorStop(0.5,`hsla(${this.hue},60%,60%,0.4)`);
  grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;
  ctx.beginPath();
  ctx.arc(this.x,this.y+wobble,this.r,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
 }
 isGone(){return this.alpha<=0}
 contains(px,py){
  const wobble=Math.sin(this.phase)*this.r*0.2;
  const dx=px-this.x,dy=py-(this.y+wobble);
  return dx*dx+dy*dy<this.r*this.r*1.8;
 }
}

class TapFX{
 constructor(x,y,pts){
  this.x=x;this.y=y;this.pts=pts;this.life=1;this.age=0;
  this.vy=-1.5;
 }
 update(dt){this.age+=dt*0.06;this.life-=0.022*dt*0.06;this.y+=this.vy*dt*0.06}
 draw(){
  if(this.life<=0)return;
  ctx.save();
  ctx.globalAlpha=Math.max(0,this.life);
  ctx.fillStyle='#ffd93d';
  ctx.font=`bold ${20+this.pts*2}px 'Courier New'`;
  ctx.textAlign='center';
  ctx.fillText(`+${this.pts}`,this.x,this.y);
  ctx.restore();
 }
 isGone(){return this.life<=0}
}

function spawnPuff(){
 if(active)puffs.push(new SmokePuff());
}

function doTap(px,py){
 if(!active)return;
 for(let i=puffs.length-1;i>=0;i--){
  const p=puffs[i];
  if(!p.hit&&p.contains(px,py)){
   p.hit=true;
   const now=performance.now();
   if(now-lastTap<600){combo++;} else {combo=1;}
   lastTap=now;
   const mult=combo>1?combo:1;
   const pts=10*mult;
   score+=pts;
   scoreEl.textContent=score;
   tapFx.push(new TapFX(p.x,p.y,pts));
   if(combo>1){
    comboEl.textContent=`×${combo} COMBO`;
    comboEl.style.opacity='1';
   }
   return;
  }
 }
}

canvas.addEventListener('click',function(e){
 const r=canvas.getBoundingClientRect();
 const sx=W/(r.width||1),sy=H/(r.height||1);
 doTap((e.clientX-r.left)*sx,(e.clientY-r.top)*sy);
});
canvas.addEventListener('touchstart',function(e){
 e.preventDefault();
 const r=canvas.getBoundingClientRect();
 const sx=W/(r.width||1),sy=H/(r.height||1);
 for(let t of e.changedTouches){
  doTap((t.clientX-r.left)*sx,(t.clientY-r.top)*sy);
 }
},{passive:false});

function drawRoute(){
 ctx.save();
 ctx.strokeStyle='rgba(0,255,204,0.08)';
 ctx.lineWidth=2;
 ctx.setLineDash([8,12]);
 ctx.beginPath();
 ctx.moveTo(W*0.1,H*0.2);
 ctx.bezierCurveTo(W*0.3,H*0.1,W*0.7,H*0.9,W*0.9,H*0.8);
 ctx.stroke();
 ctx.setLineDash([]);
 ctx.restore();
}

function drawBG(t){
 ctx.fillStyle='#1a1a2e';
 ctx.fillRect(0,0,W,H);
 drawRoute();
 // ambient particles
 ctx.save();
 for(let i=0;i<18;i++){
  const px=(Math.sin(t*0.0003+i*1.7)*0.5+0.5)*W;
  const py=(Math.cos(t*0.0002+i*2.3)*0.5+0.5)*H;
  ctx.globalAlpha=0.06+Math.sin(t*0.001+i)*0.03;
  ctx.fillStyle='#00ffcc';
  ctx.beginPath();
  ctx.arc(px,py,2,0,Math.PI*2);
  ctx.fill();
 }
 ctx.restore();
}

function loop(timestamp){
 const dt=Math.min(32,16);
 drawBG(timestamp);
 
 // Spawn
 if(active&&Math.random()<0.04){
  spawnPuff();
 }
 
 // Update & draw puffs
 for(let i=puffs.length-1;i>=0;i--){
  puffs[i].update(dt);
  puffs[i].draw();
  if(puffs[i].isGone())puffs.splice(i,1);
 }
 // Draw FX
 for(let i=tapFx.length-1;i>=0;i--){
  tapFx[i].update(dt);
  tapFx[i].draw();
  if(tapFx[i].isGone())tapFx.splice(i,1);
 }
 
 animId=requestAnimationFrame(loop);
}

function startGame(){
 score=0;timeLeft=GAME_DUR;combo=0;lastTap=-99;
 scoreEl.textContent='0';
 timerEl.textContent=GAME_DUR;
 comboEl.style.opacity='0';
 puffs=[];tapFx=[];
 active=true;
 overlay.style.display='none';
 startTime=performance.now();
 gameLoop();
}

function endGame(){
 active=false;
 overlay.innerHTML=`<h1>GAME OVER</h1><span id="final-label">FINAL SCORE</span><div id="final-score">${score}</div><p style="color:#aaa;font-size:12px;letter-spacing:1px">${score<100?'Keep practicing!':score<300?'Nice work!':score<600?'Great job!':'Incredible!'}</p><button class="btn" id="restartBtn">PLAY AGAIN</button>`;
 overlay.style.display='flex';
 document.getElementById('restartBtn').addEventListener('click',startGame);
}

let lastTimerUpdate=0;
function gameLoop(){
 if(!active)return;
 const now=performance.now();
 const elapsed=(now-startTime)/1000;
 timeLeft=Math.max(0,GAME_DUR-Math.floor(elapsed));
 timerEl.textContent=timeLeft;
 if(timeLeft<=0){endGame();return;}
 if(now-lastTimerUpdate>100){
  lastTimerUpdate=now;
 }
 // Combo fade
 if(combo>1&&now-lastTap>900){combo=0;comboEl.style.opacity='0';}
 requestAnimationFrame(gameLoop);
}

startBtn.addEventListener('click',startGame);
requestAnimationFrame(loop);
</script>
</body>
</html>
