<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>猫咪接鱼</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#8ed6ff;font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;touch-action:none}body{display:flex;align-items:stretch;justify-content:center}#game{position:relative;width:100vw;height:100vh;overflow:hidden;background:linear-gradient(180deg,#8ed6ff 0%,#b9ecff 58%,#fff4cf 58%,#fff4cf 100%)}.cloud{position:absolute;background:rgba(255,255,255,.85);border-radius:999px;filter:blur(.2px)}#hud{position:absolute;left:0;top:0;width:100%;padding:env(safe-area-inset-top) 14px 0;display:flex;justify-content:space-between;align-items:flex-start;z-index:5;pointer-events:none}.panel{margin-top:14px;background:rgba(255,255,255,.78);color:#17425f;padding:10px 14px;border-radius:16px;font-weight:700;font-size:16px;box-shadow:0 6px 18px rgba(0,0,0,.08)}#centerMsg{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);width:min(86vw,420px);background:rgba(255,255,255,.88);border-radius:24px;padding:22px 18px;text-align:center;z-index:6;color:#18425d;box-shadow:0 10px 30px rgba(0,0,0,.14)}#centerMsg h1{margin:0 0 10px;font-size:32px}#centerMsg p{margin:8px 0;font-size:16px;line-height:1.5}#startBtn,#restartBtn{margin-top:12px;border:none;background:linear-gradient(180deg,#ffb84d,#ff8d3a);color:#fff;font-size:18px;font-weight:800;padding:14px 26px;border-radius:999px;box-shadow:0 8px 18px rgba(255,141,58,.35)}#hint{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);color:#17425f;background:rgba(255,255,255,.7);padding:8px 14px;border-radius:999px;font-size:14px;z-index:4;pointer-events:none}.hidden{display:none}canvas{display:block;width:100%;height:100%}</style></head><body><div id="game"><div class="cloud" style="width:96px;height:34px;left:9%;top:10%"></div><div class="cloud" style="width:74px;height:28px;left:16%;top:13%"></div><div class="cloud" style="width:110px;height:38px;right:10%;top:12%"></div><div class="cloud" style="width:82px;height:30px;right:18%;top:15%"></div><canvas id="canvas"></canvas><div id="hud"><div class="panel" id="score">得分 0</div><div class="panel" id="best">最高 0</div></div><div id="centerMsg"><h1>猫咪接鱼</h1><p>按住屏幕左右拖动，或点击移动小猫。</p><p>接住小鱼加分，漏掉太多游戏结束。</p><button id="startBtn">开始游戏</button><button id="restartBtn" class="hidden">再来一局</button></div><div id="hint">接鱼 10 条后速度会变快</div></div><script>(function(){const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');const gameEl=document.getElementById('game');const scoreEl=document.getElementById('score');const bestEl=document.getElementById('best');const centerMsg=document.getElementById('centerMsg');const startBtn=document.getElementById('startBtn');const restartBtn=document.getElementById('restartBtn');const hint=document.getElementById('hint');let w=0,h=0,dpr=1;let running=false;let lastTime=0;let spawnTimer=0;let score=0;let misses=0;let best=Number(localStorage.getItem('catCatchFishBest')||0);let pointerX=0;let fishes=[];let particles=[];const cat={x:0,y:0,w:88,h:66,targetX:0,speed:0.22};bestEl.textContent='最高 '+best;function resize(){dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1));w=gameEl.clientWidth;h=gameEl.clientHeight;canvas.width=Math.floor(w*dpr);canvas.height=Math.floor(h*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);cat.w=Math.max(82,Math.min(110,w*0.22));cat.h=cat.w*0.75;cat.y=h-cat.h-28;cat.x=Math.min(Math.max(cat.x||w/2,w*0.08),w-cat.w-w*0.08);cat.targetX=cat.x}function reset(){score=0;misses=0;spawnTimer=0;fishes=[];particles=[];pointerX=w/2;cat.x=w/2-cat.w/2;cat.targetX=cat.x;running=true;lastTime=0;updateHud();centerMsg.classList.add('hidden');restartBtn.classList.add('hidden');startBtn.classList.add('hidden');hint.textContent='接鱼 10 条后速度会变快';requestAnimationFrame(loop)}function gameOver(){running=false;if(score>best){best=score;localStorage.setItem('catCatchFishBest',String(best));}bestEl.textContent='最高 '+best;centerMsg.classList.remove('hidden');startBtn.classList.add('hidden');restartBtn.classList.remove('hidden');centerMsg.querySelector('h1').textContent='游戏结束';centerMsg.querySelector('p').textContent='本局接住 '+score+' 条小鱼，漏掉 '+misses+' 条。';const ps=centerMsg.querySelectorAll('p');if(ps[1])ps[1].textContent='点击“再来一局”继续挑战最高分。'}function updateHud(){scoreEl.textContent='得分 '+score;bestEl.textContent='最高 '+best}function spawnFish(){const size=18+Math.random()*14;const fastLevel=Math.floor(score/10);fishes.push({x:12+Math.random()*(w-24-size),y:-size-10,size:size,vy:180+Math.random()*90+fastLevel*28,wobble:Math.random()*Math.PI*2,wobbleSpeed:1.2+Math.random()*1.8,drift:(Math.random()-.5)*(20+fastLevel*4),color:Math.random()>.5?'#6ec6ff':'#9be370'});}function addBurst(x,y,color){for(let i=0;i<10;i++){const a=Math.random()*Math.PI*2;const s=40+Math.random()*100;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-20,life:.6+Math.random()*.4,color,size:2+Math.random()*4});}}function update(dt){cat.targetX=Math.max(10,Math.min(pointerX-cat.w/2,w-cat.w-10));cat.x+=((cat.targetX-cat.x)*Math.min(1,cat.speed*dt*60));const interval=Math.max(.34,.9-score*0.012);spawnTimer+=dt;while(spawnTimer>=interval){spawnTimer-=interval;spawnFish()}for(let i=fishes.length-1;i>=0;i--){const f=fishes[i];f.wobble+=f.wobbleSpeed*dt;f.x+=Math.sin(f.wobble)*f.drift*dt;f.y+=f.vy*dt;if(f.y+f.size>cat.y+10&&f.y<cat.y+cat.h&&f.x+f.size>cat.x+8&&f.x<cat.x+cat.w-8){score++;updateHud();addBurst(f.x+f.size/2,f.y+f.size/2,f.color);fishes.splice(i,1);if(score===10)hint.textContent='速度提升，继续接鱼';continue}if(f.y>h+20){misses++;fishes.splice(i,1);if(misses>=5){gameOver();return}}if(f.x<-40)f.x=-40;if(f.x>w+40)f.x=w+40}for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.life-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=180*dt;if(p.life<=0)particles.splice(i,1)}}function drawBackground(){ctx.clearRect(0,0,w,h);ctx.fillStyle='#e8c98b';ctx.fillRect(0,h-84,w,84);ctx.fillStyle='rgba(255,255,255,.35)';for(let i=0;i<5;i++){const yy=h-70+i*9;ctx.fillRect(0,yy,w,2)}}function drawCat(){const x=cat.x,y=cat.y,wc=cat.w,hc=cat.h;ctx.save();ctx.translate(x,y);ctx.fillStyle='#f8b95f';roundRect(0,18,wc,hc-16,24,true);ctx.beginPath();ctx.moveTo(16,24);ctx.lineTo(27,0);ctx.lineTo(39,22);ctx.closePath();ctx.moveTo(wc-16,24);ctx.lineTo(wc-27,0);ctx.lineTo(wc-39,22);ctx.closePath();ctx.fill();ctx.fillStyle='#ffe4b6';roundRect(12,28,wc-24,hc-24,20,true);ctx.fillStyle='#2e2e2e';ctx.beginPath();ctx.arc(wc*0.36,34,3.5,0,Math.PI*2);ctx.arc(wc*0.64,34,3.5,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#2e2e2e';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(wc*0.5,40);ctx.lineTo(wc*0.5,46);ctx.stroke();ctx.beginPath();ctx.arc(wc*0.5,46,6,0,Math.PI);ctx.stroke();ctx.strokeStyle='#6b4b2a';ctx.beginPath();ctx.moveTo(12,42);ctx.lineTo(-4,39);ctx.moveTo(12,48);ctx.lineTo(-6,49);ctx.moveTo(wc-12,42);ctx.lineTo(wc+4,39);ctx.moveTo(wc-12,48);ctx.lineTo(wc+6,49);ctx.stroke();ctx.strokeStyle='#a56b2a';ctx.lineWidth=5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(wc-8,hc-18);ctx.quadraticCurveTo(wc+18,hc-34,wc+8,hc-52);ctx.stroke();ctx.restore()}function drawFish(f){ctx.save();ctx.translate(f.x,f.y);const s=f.size;ctx.fillStyle=f.color;ctx.beginPath();ctx.ellipse(s*.5,s*.5,s*.38,s*.24,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.moveTo(s*.15,s*.5);ctx.lineTo(-s*.15,s*.22);ctx.lineTo(-s*.15,s*.78);ctx.closePath();ctx.fill();ctx.fillStyle='rgba(255,255,255,.75)';ctx.beginPath();ctx.arc(s*.64,s*.44,2,0,Math.PI*2);ctx.fill();ctx.restore()}function drawParticles(){for(const p of particles){ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}function drawLives(){const left=14;const top=62+parseInt(getComputedStyle(document.documentElement).getPropertyValue('env(safe-area-inset-top)')||0,10)||62;for(let i=0;i<5;i++){const x=left+i*22;ctx.fillStyle=i<5-misses?'#ff7f96':'rgba(0,0,0,.12)';ctx.beginPath();ctx.moveTo(x+7,top+6);ctx.arc(x+4,top+6,4,0,Math.PI,true);ctx.arc(x+10,top+6,4,0,Math.PI,true);ctx.lineTo(x+7,top+16);ctx.closePath();ctx.fill()}ctx.fillStyle='#17425f';ctx.font='12px Arial';ctx.fillText('容错',left+118,top+12)}function roundRect(x,y,w,h,r,fill){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();if(fill)ctx.fill()}function draw(){drawBackground();for(const f of fishes)drawFish(f);drawCat();drawParticles();drawLives()}function loop(ts){if(!running)return;if(!lastTime)lastTime=ts;const dt=Math.min(.033,(ts-lastTime)/1000);lastTime=ts;update(dt);draw();if(running)requestAnimationFrame(loop)}function setPointer(clientX){const rect=canvas.getBoundingClientRect();pointerX=clientX-rect.left}canvas.addEventListener('pointerdown',e=>{setPointer(e.clientX)});canvas.addEventListener('pointermove',e=>{if(e.buttons||e.pointerType==='touch')setPointer(e.clientX)});canvas.addEventListener('click',e=>{setPointer(e.clientX)});window.addEventListener('resize',resize);startBtn.addEventListener('click',reset);restartBtn.addEventListener('click',()=>{centerMsg.querySelector('h1').textContent='猫咪接鱼';const ps=centerMsg.querySelectorAll('p');if(ps[0])ps[0].textContent='按住屏幕左右拖动，或点击移动小猫。';if(ps[1])ps[1].textContent='接住小鱼加分，漏掉太多游戏结束。';reset()});resize();draw();})();</script></body></html>
