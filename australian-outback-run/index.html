<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Australian Outback Run</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(180deg, #87CEEB 0%, #CD853F 100%);
      overflow: hidden;
      touch-action: none;
      font-family: 'Segoe UI', sans-serif;
    }
    #gameCanvas { display: block; margin: 0 auto; background: transparent; }
    #ui {
      position: absolute; top: 10px; left: 10px; right: 10px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 10; pointer-events: none;
    }
    .score-box {
      background: rgba(0,0,0,0.5); color: #FFD700;
      padding: 8px 16px; border-radius: 20px; font-size: 18px; font-weight: bold;
    }
    #startScreen, #gameOverScreen {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 20;
      background: rgba(0,0,0,0.7);
    }
    #gameOverScreen { display: none; }
    h1 { color: #FFD700; font-size: 36px; text-shadow: 2px 2px 4px #000; margin-bottom: 10px; }
    h2 { color: #FF6B35; font-size: 28px; text-shadow: 2px 2px 4px #000; margin-bottom: 20px; }
    p { color: #fff; font-size: 16px; margin-bottom: 20px; text-align: center; max-width: 300px; }
    .btn {
      background: linear-gradient(180deg, #FFD700, #FFA500);
      border: none; padding: 15px 40px; font-size: 20px; font-weight: bold;
      border-radius: 30px; cursor: pointer; color: #333;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .btn:active { transform: scale(0.95); }
    .emoji-badge { font-size: 60px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="ui">
    <div class="score-box">🏆 Score: <span id="score">0</span></div>
    <div class="score-box">⏱️ Best: <span id="best">0</span></div>
  </div>
  <div id="startScreen">
    <div class="emoji-badge">🦘</div>
    <h1>Australian Outback Run</h1>
    <p>Help the kangaroo collect gold nuggets and boomerangs! Jump over snakes and cacti!</p>
    <p>🕹️ Tap or Press Space to Jump</p>
    <button class="btn" id="startBtn">Start Game</button>
  </div>
  <div id="gameOverScreen">
    <div class="emoji-badge">🦘</div>
    <h2>Game Over!</h2>
    <p id="finalScore">Score: 0</p>
    <button class="btn" id="restartBtn">Play Again</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width = window.innerWidth;
    const H = canvas.height = window.innerHeight;

    const GROUND_Y = H - 80;
    let score = 0, best = parseInt(localStorage.getItem('outbackBest') || '0');
    let gameRunning = false, gameOver = false;
    let speed = 5, frame = 0;

    document.getElementById('best').textContent = best;

    // Player (Kangaroo)
    const player = {
      x: 100, y: GROUND_Y - 60, w: 50, h: 60,
      vy: 0, grounded: true,
      jumpPower: -18, gravity: 0.8
    };

    // Items
    let items = [], obstacles = [], particles = [];
    let spawnTimer = 0, itemTimer = 0;

    function spawnObstacle() {
      const type = Math.random() < 0.5 ? 'snake' : 'cactus';
      obstacles.push({
        x: W + 50, y: type === 'cactus' ? GROUND_Y - 50 : GROUND_Y - 25,
        w: 60, h: type === 'cactus' ? 50 : 25, type
      });
    }

    function spawnItem() {
      const types = ['gold', 'boomerang', 'emu'];
      const type = types[Math.floor(Math.random() * types.length)];
      let value = 10, emoji = '🥇';
      if (type === 'boomerang') { value = 15; emoji = '🪃'; }
      if (type === 'emu') { value = 20; emoji = '🦃'; }
      items.push({
        x: W + 50, y: GROUND_Y - 100 - Math.random() * 100,
        w: 40, h: 40, type, value, emoji
      });
    }

    function createParticles(x, y, color) {
      for (let i = 0; i < 8; i++) {
        particles.push({
          x, y, vx: (Math.random() - 0.5) * 10, vy: -Math.random() * 8,
          life: 30, color
        });
      }
    }

    function jump() {
      if (player.grounded) {
        player.vy = player.jumpPower;
        player.grounded = false;
      }
    }

    function update() {
      if (!gameRunning) return;
      frame++;
      score++;

      // Player physics
      player.vy += player.gravity;
      player.y += player.vy;
      if (player.y >= GROUND_Y - player.h) {
        player.y = GROUND_Y - player.h;
        player.vy = 0;
        player.grounded = true;
      }

      // Spawn
      spawnTimer++;
      if (spawnTimer > 80 - Math.min(score / 50, 30)) {
        spawnObstacle();
        spawnTimer = 0;
      }
      itemTimer++;
      if (itemTimer > 60) {
        spawnItem();
        itemTimer = 0;
      }

      // Update items
      items = items.filter(item => {
        item.x -= speed;
        // Collision with player
        if (rectsCollide(player, item)) {
          score += item.value;
          createParticles(item.x, item.y, '#FFD700');
          return false;
        }
        return item.x > -50;
      });

      // Update obstacles
      obstacles = obstacles.filter(obs => {
        obs.x -= speed;
        if (rectsCollide(player, obs)) {
          gameEnd();
        }
        return obs.x > -100;
      });

      // Particles
      particles = particles.filter(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.5;
        p.life--; return p.life > 0;
      });

      document.getElementById('score').textContent = score;
    }

    function rectsCollide(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x &&
             a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Sky & Ground
      const gradient = ctx.createLinearGradient(0, 0, 0, H);
      gradient.addColorStop(0, '#87CEEB');
      gradient.addColorStop(0.7, '#DEB887');
      gradient.addColorStop(1, '#8B4513');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, W, H);

      // Sun
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(W - 100, 80, 50, 0, Math.PI * 2);
      ctx.fill();

      // Clouds
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      for (let i = 0; i < 3; i++) {
        const cx = ((frame * 0.5 + i * 200) % (W + 200)) - 100;
        drawCloud(cx, 60 + i * 30);
      }

      // Ground
      ctx.fillStyle = '#228B22';
      ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(0, GROUND_Y + 30, W, H);

      // Items
      items.forEach(item => {
        ctx.font = '35px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(item.emoji, item.x + item.w/2, item.y + item.h/2 + 12);
      });

      // Obstacles
      obstacles.forEach(obs => {
        if (obs.type === 'snake') {
          ctx.font = '40px Arial';
          ctx.textAlign = 'center';
          ctx.fillText('🐍', obs.x + obs.w/2, obs.y + obs.h);
        } else {
          ctx.font = '50px Arial';
          ctx.textAlign = 'center';
          ctx.fillText('🌵', obs.x + obs.w/2, obs.y + obs.h);
        }
      });

      // Kangaroo
      drawKangaroo();

      // Particles
      particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life / 30;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      });
    }

    function drawCloud(x, y) {
      ctx.beginPath();
      ctx.arc(x, y, 25, 0, Math.PI * 2);
      ctx.arc(x + 25, y - 10, 30, 0, Math.PI * 2);
      ctx.arc(x + 50, y, 25, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawKangaroo() {
      ctx.font = '50px Arial';
      ctx.textAlign = 'center';
      const bounce = player.grounded ? 0 : Math.sin(frame * 0.3) * 3;
      ctx.fillText('🦘', player.x + player.w/2, player.y + player.h + bounce);
    }

    function gameEnd() {
      gameRunning = false;
      gameOver = true;
      if (score > best) {
        best = score;
        localStorage.setItem('outbackBest', best);
        document.getElementById('best').textContent = best;
      }
      document.getElementById('finalScore').textContent = `Score: ${score}`;
      document.getElementById('gameOverScreen').style.display = 'flex';
    }

    function startGame() {
      score = 0; frame = 0; spawnTimer = 0; itemTimer = 0;
      player.y = GROUND_Y - player.h;
      player.vy = 0; player.grounded = true;
      items = []; obstacles = []; particles = [];
      document.getElementById('score').textContent = '0';
      document.getElementById('startScreen').style.display = 'none';
      document.getElementById('gameOverScreen').style.display = 'none';
      gameRunning = true; gameOver = false;
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // Controls
    document.addEventListener('keydown', e => {
      if (e.code === 'Space') { e.preventDefault(); jump(); }
    });
    canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); });
    canvas.addEventListener('mousedown', jump);
    document.getElementById('startBtn').onclick = startGame;
    document.getElementById('restartBtn').onclick = startGame;

    gameLoop();
  </script>
</body>
</html>
