<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cat Catch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            font-family: 'Arial', sans-serif;
        }
        body {
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let cat, fishes, score, gameState, timeLeft, combo, maxCombo;
        let lastTime = 0;
        let fishSpawnTimer = 0;
        let difficulty = 1;
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        function init() {
            resize();
            score = 0;
            combo = 0;
            maxCombo = 0;
            timeLeft = 30;
            difficulty = 1;
            fishSpawnTimer = 0;
            fishes = [];
            cat = {
                x: width / 2,
                y: height - 120,
                width: 80,
                height: 60,
                targetX: width / 2,
                tailAngle: 0
            };
            gameState = 'start';
        }
        
        function spawnFish() {
            const types = ['normal', 'fast', 'golden'];
            const type = types[Math.floor(Math.random() * types.length)];
            const fish = {
                x: Math.random() * (width - 60) + 30,
                y: -40,
                width: 50,
                height: 30,
                speed: (type === 'fast' ? 2.5 : 1.5) * (1 + difficulty * 0.2),
                type: type,
                wobble: Math.random() * Math.PI * 2,
                points: type === 'golden' ? 50 : type === 'fast' ? 20 : 10
            };
            fishes.push(fish);
        }
        
        function drawCat(x, y, scale = 1) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            
            // Body
            ctx.fillStyle = '#FF9F43';
            ctx.beginPath();
            ctx.ellipse(0, 0, 35, 25, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Head
            ctx.fillStyle = '#FF9F43';
            ctx.beginPath();
            ctx.arc(0, -30, 25, 0, Math.PI * 2);
            ctx.fill();
            
            // Ears
            ctx.beginPath();
            ctx.moveTo(-20, -45);
            ctx.lineTo(-10, -55);
            ctx.lineTo(-5, -45);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(20, -45);
            ctx.lineTo(10, -55);
            ctx.lineTo(5, -45);
            ctx.fill();
            
            // Inner ears
            ctx.fillStyle = '#FFB8B8';
            ctx.beginPath();
            ctx.moveTo(-17, -46);
            ctx.lineTo(-10, -52);
            ctx.lineTo(-8, -46);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(17, -46);
            ctx.lineTo(10, -52);
            ctx.lineTo(8, -46);
            ctx.fill();
            
            // Eyes
            ctx.fillStyle = '#2C3E50';
            ctx.beginPath();
            ctx.ellipse(-10, -32, 6, 8, 0, 0, Math.PI * 2);
            ctx.ellipse(10, -32, 6, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Eye shine
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(-8, -34, 2, 0, Math.PI * 2);
            ctx.arc(12, -34, 2, 0, Math.PI * 2);
            ctx.fill();
            
            // Nose
            ctx.fillStyle = '#E74C3C';
            ctx.beginPath();
            ctx.moveTo(0, -22);
            ctx.lineTo(-4, -18);
            ctx.lineTo(4, -18);
            ctx.closePath();
            ctx.fill();
            
            // Whiskers
            ctx.strokeStyle = '#2C3E50';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(-25, -25);
            ctx.lineTo(-40, -28);
            ctx.moveTo(-25, -20);
            ctx.lineTo(-40, -20);
            ctx.moveTo(25, -25);
            ctx.lineTo(40, -28);
            ctx.moveTo(25, -20);
            ctx.lineTo(40, -20);
            ctx.stroke();
            
            // Tail
            ctx.strokeStyle = '#FF9F43';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            const tailWag = Math.sin(cat.tailAngle) * 15;
            ctx.beginPath();
            ctx.moveTo(30, 5);
            ctx.quadraticCurveTo(50 + tailWag, -10, 55 + tailWag, -30);
            ctx.stroke();
            
            // Paws
            ctx.fillStyle = '#FF9F43';
            ctx.beginPath();
            ctx.ellipse(-20, 20, 12, 8, 0, 0, Math.PI * 2);
            ctx.ellipse(20, 20, 12, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }
        
        function drawFish(fish) {
            ctx.save();
            ctx.translate(fish.x, fish.y);
            
            const wobbleOffset = Math.sin(fish.wobble) * 3;
            ctx.translate(wobbleOffset, 0);
            
            let color, finColor;
            if (fish.type === 'golden') {
                color = '#F1C40F';
                finColor = '#F39C12';
            } else if (fish.type === 'fast') {
                color = '#3498DB';
                finColor = '#2980B9';
            } else {
                color = '#95A5A6';
                finColor = '#7F8C8D';
            }
            
            // Body
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.ellipse(0, 0, 25, 12, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Tail
            ctx.fillStyle = finColor;
            ctx.beginPath();
            ctx.moveTo(20, 0);
            ctx.lineTo(35, -12);
            ctx.lineTo(35, 12);
            ctx.closePath();
            ctx.fill();
            
            // Dorsal fin
            ctx.beginPath();
            ctx.moveTo(-5, -10);
            ctx.lineTo(5, -20);
            ctx.lineTo(15, -10);
            ctx.closePath();
            ctx.fill();
            
            // Eye
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(-12, -2, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#2C3E50';
            ctx.beginPath();
            ctx.arc(-12, -2, 3, 0, Math.PI * 2);
            ctx.fill();
            
            // Shine
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.beginPath();
            ctx.arc(-14, -4, 2, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }
        
        function drawStartScreen() {
            // Background overlay
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, width, height);
            
            // Title
            ctx.fillStyle = '#FF9F43';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Cat Catch', width / 2, height / 3);
            
            // Instructions
            ctx.fillStyle = 'white';
            ctx.font = '20px Arial';
            ctx.fillText('Tap or drag to move the cat', width / 2, height / 2 - 20);
            ctx.fillText('Catch the falling fish!', width / 2, height / 2 + 20);
            ctx.fillText('Golden fish = 50 pts | Fast fish = 20 pts', width / 2, height / 2 + 60);
            
            // Start button
            const btnWidth = 200;
            const btnHeight = 60;
            const btnX = width / 2 - btnWidth / 2;
            const btnY = height * 0.7;
            
            ctx.fillStyle = '#2ECC71';
            ctx.beginPath();
            ctx.roundRect(btnX, btnY, btnWidth, btnHeight, 15);
            ctx.fill();
            
            ctx.fillStyle = 'white';
            ctx.font = 'bold 24px Arial';
            ctx.fillText('START', width / 2, btnY + 38);
            
            // Store button bounds for click detection
            window.startBtn = { x: btnX, y: btnY, width: btnWidth, height: btnHeight };
        }
        
        function drawGameUI() {
            // Score
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.beginPath();
            ctx.roundRect(10, 10, 150, 50, 10);
            ctx.fill();
            
            ctx.fillStyle = 'white';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('Score: ' + score, 25, 45);
            
            // Combo
            if (combo > 1) {
                ctx.fillStyle = '#F1C40F';
                ctx.font = 'bold 18px Arial';
                ctx.fillText('Combo x' + combo, 25, 65);
            }
            
            // Time
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.beginPath();
            ctx.roundRect(width - 110, 10, 100, 50, 10);
            ctx.fill();
            
            ctx.fillStyle = timeLeft <= 10 ? '#E74C3C' : 'white';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(Math.ceil(timeLeft) + 's', width - 60, 45);
        }
        
        function drawGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, width, height);
            
            ctx.fillStyle = '#E74C3C';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Game Over!', width / 2, height / 3);
            
            ctx.fillStyle = 'white';
            ctx.font = 'bold 32px Arial';
            ctx.fillText('Score: ' + score, width / 2, height / 2 - 30);
            
            ctx.font = '20px Arial';
            ctx.fillText('Max Combo: x' + maxCombo, width / 2, height / 2 + 20);
            
            // Restart button
            const btnWidth = 200;
            const btnHeight = 60;
            const btnX = width / 2 - btnWidth / 2;
            const btnY = height * 0.65;
            
            ctx.fillStyle = '#3498DB';
            ctx.beginPath();
            ctx.roundRect(btnX, btnY, btnWidth, btnHeight, 15);
            ctx.fill();
            
            ctx.fillStyle = 'white';
            ctx.font = 'bold 24px Arial';
            ctx.fillText('PLAY AGAIN', width / 2, btnY + 38);
            
            window.restartBtn = { x: btnX, y: btnY, width: btnWidth, height: btnHeight };
        }
        
        function update(deltaTime) {
            if (gameState !== 'playing') return;
            
            // Update timer
            timeLeft -= deltaTime;
            if (timeLeft <= 0) {
                gameState = 'gameover';
                return;
            }
            
            // Increase difficulty over time
            difficulty = 1 + (30 - timeLeft) / 15;
            
            // Smooth cat movement
            cat.x += (cat.targetX - cat.x) * 0.15;
            cat.x = Math.max(cat.width / 2, Math.min(width - cat.width / 2, cat.x));
            
            // Tail animation
            cat.tailAngle += deltaTime * 8;
            
            // Spawn fish
            fishSpawnTimer += deltaTime;
            const spawnInterval = Math.max(0.4, 1.2 - difficulty * 0.1);
            if (fishSpawnTimer >= spawnInterval) {
                spawnFish();
                fishSpawnTimer = 0;
            }
            
            // Update fish
            for (let i = fishes.length - 1; i >= 0; i--) {
                const fish = fishes[i];
                fish.y += fish.speed * 60 * deltaTime;
                fish.wobble += deltaTime * 5;
                
                // Check collision with cat
                const dx = fish.x - cat.x;
                const dy = fish.y - cat.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < (fish.width + cat.width) / 2.5) {
                    score += fish.points * (1 + combo * 0.2);
                    combo++;
                    maxCombo = Math.max(maxCombo, combo);
                    fishes.splice(i, 1);
                    continue;
                }
                
                // Remove fish if off screen
                if (fish.y > height + 50) {
                    combo = 0;
                    fishes.splice(i, 1);
                }
            }
        }
        
        function draw() {
            ctx.clearRect(0, 0, width, height);
            
            if (gameState === 'start') {
                drawStartScreen();
            } else if (gameState === 'playing') {
                // Draw fish
                fishes.forEach(fish => drawFish(fish));
                
                // Draw cat
                drawCat(cat.x, cat.y);
                
                // Draw UI
                drawGameUI();
            } else if (gameState === 'gameover') {
                fishes.forEach(fish => drawFish(fish));
                drawCat(cat.x, cat.y);
                drawGameOver();
            }
        }
        
        function gameLoop(timestamp) {
            const deltaTime = Math.min((timestamp - lastTime) / 1000, 0.1);
            lastTime = timestamp;
            
            update(deltaTime);
            draw();
            
            requestAnimationFrame(gameLoop);
        }
        
        function handleInput(clientX) {
            if (gameState === 'playing') {
                cat.targetX = clientX;
            }
        }
        
        function handleClick(clientX, clientY) {
            if (gameState === 'start' && window.startBtn) {
                const btn = window.startBtn;
                if (clientX >= btn.x && clientX <= btn.x + btn.width &&
                    clientY >= btn.y && clientY <= btn.y + btn.height) {
                    gameState = 'playing';
                    return;
                }
            }
            
            if (gameState === 'gameover' && window.restartBtn) {
                const btn = window.restartBtn;
                if (clientX >= btn.x && clientX <= btn.x + btn.width &&
                    clientY >= btn.y && clientY <= btn.y + btn.height) {
                    init();
                    gameState = 'playing';
                    return;
                }
            }
            
            handleInput(clientX);
        }
        
        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            handleClick(touch.clientX - rect.left, touch.clientY - rect.top);
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            handleInput(touch.clientX - rect.left);
        });
        
        // Mouse events
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            handleClick(e.clientX - rect.left, e.clientY - rect.top);
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (e.buttons === 1) {
                const rect = canvas.getBoundingClientRect();
                handleInput(e.clientX - rect.left);
            }
        });
        
        // Resize handler
        window.addEventListener('resize', () => {
            resize();
            if (gameState !== 'start') {
                cat.y = height - 120;
            }
        });
        
        // Start game
        init();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
