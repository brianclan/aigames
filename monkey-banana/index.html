<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>猴子接香蕉 🍌</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a4a1a;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        #gameCanvas {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 设置画布大小
        const WIDTH = 400;
        const HEIGHT = 600;
        canvas.width = WIDTH;
        canvas.height = HEIGHT;

        // 游戏状态
        let gameState = 'playing'; // playing, gameover
        let score = 0;
        let lives = 3;
        let bananaCount = 0;
        let speedLevel = 1;
        let baseSpeed = 3;

        // 猴子
        const monkey = {
            x: WIDTH / 2,
            y: HEIGHT - 80,
            width: 60,
            height: 70,
            speed: 6,
            movingLeft: false,
            movingRight: false
        };

        // 香蕉数组
        let bananas = [];

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') monkey.movingLeft = true;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') monkey.movingRight = true;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') monkey.movingLeft = false;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') monkey.movingRight = false;
        });

        // 触摸控制
        let touchStartX = 0;
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touchX = e.touches[0].clientX;
            const diff = touchX - touchStartX;
            if (diff < -5) {
                monkey.movingLeft = true;
                monkey.movingRight = false;
            } else if (diff > 5) {
                monkey.movingRight = true;
                monkey.movingLeft = false;
            }
            touchStartX = touchX;
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            monkey.movingLeft = false;
            monkey.movingRight = false;
        });

        // 点击重玩
        canvas.addEventListener('click', (e) => {
            if (gameState === 'gameover') {
                const rect = canvas.getBoundingClientRect();
                const scaleX = WIDTH / rect.width;
                const scaleY = HEIGHT / rect.height;
                const x = (e.clientX - rect.left) * scaleX;
                const y = (e.clientY - rect.top) * scaleY;
                
                // 重玩按钮区域
                if (x >= WIDTH/2 - 60 && x <= WIDTH/2 + 60 &&
                    y >= HEIGHT/2 + 50 && y <= HEIGHT/2 + 90) {
                    resetGame();
                }
            }
        });

        // 重置游戏
        function resetGame() {
            gameState = 'playing';
            score = 0;
            lives = 3;
            bananaCount = 0;
            speedLevel = 1;
            baseSpeed = 3;
            bananas = [];
            monkey.x = WIDTH / 2;
        }

        // 生成香蕉
        function spawnBanana() {
            bananas.push({
                x: Math.random() * (WIDTH - 40) + 20,
                y: -30,
                width: 30,
                height: 45,
                speed: baseSpeed + (speedLevel - 1) * 0.5
            });
        }

        // 绘制丛林背景
        function drawBackground() {
            // 天空渐变
            const skyGradient = ctx.createLinearGradient(0, 0, 0, HEIGHT);
            skyGradient.addColorStop(0, '#2d5a27');
            skyGradient.addColorStop(0.6, '#3d7a37');
            skyGradient.addColorStop(1, '#4a8a42');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            // 绘制一些叶子装饰
            ctx.fillStyle = 'rgba(30, 80, 30, 0.3)';
            for (let i = 0; i < 8; i++) {
                const x = (i * 60 + 20) % WIDTH;
                const y = 50 + (i % 3) * 30;
                drawLeaf(x, y, 30, 15);
            }

            // 草地
            const grassGradient = ctx.createLinearGradient(0, HEIGHT - 60, 0, HEIGHT);
            grassGradient.addColorStop(0, '#3d8a37');
            grassGradient.addColorStop(1, '#2d6a27');
            ctx.fillStyle = grassGradient;
            ctx.fillRect(0, HEIGHT - 60, WIDTH, 60);

            // 草地纹理
            ctx.strokeStyle = '#4a9a42';
            ctx.lineWidth = 2;
            for (let i = 0; i < WIDTH; i += 10) {
                ctx.beginPath();
                ctx.moveTo(i, HEIGHT - 60);
                ctx.lineTo(i + 3, HEIGHT - 65 - Math.random() * 10);
                ctx.stroke();
            }
        }

        // 绘制叶子
        function drawLeaf(x, y, w, h) {
            ctx.beginPath();
            ctx.ellipse(x, y, w, h, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        // 绘制猴子
        function drawMonkey() {
            const x = monkey.x;
            const y = monkey.y;

            // 尾巴
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(x + 25, y + 20);
            ctx.quadraticCurveTo(x + 50, y + 10, x + 45, y - 10);
            ctx.quadraticCurveTo(x + 40, y - 25, x + 30, y - 15);
            ctx.stroke();

            // 身体
            ctx.fillStyle = '#CD853F';
            ctx.beginPath();
            ctx.ellipse(x, y + 15, 22, 28, 0, 0, Math.PI * 2);
            ctx.fill();

            // 肚子
            ctx.fillStyle = '#DEB887';
            ctx.beginPath();
            ctx.ellipse(x, y + 20, 14, 18, 0, 0, Math.PI * 2);
            ctx.fill();

            // 头
            ctx.fillStyle = '#CD853F';
            ctx.beginPath();
            ctx.arc(x, y - 20, 22, 0, Math.PI * 2);
            ctx.fill();

            // 脸部
            ctx.fillStyle = '#DEB887';
            ctx.beginPath();
            ctx.ellipse(x, y - 15, 14, 12, 0, 0, Math.PI * 2);
            ctx.fill();

            // 眼睛
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x - 6, y - 20, 4, 0, Math.PI * 2);
            ctx.arc(x + 6, y - 20, 4, 0, Math.PI * 2);
            ctx.fill();

            // 眼白
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(x - 5, y - 21, 1.5, 0, Math.PI * 2);
            ctx.arc(x + 7, y - 21, 1.5, 0, Math.PI * 2);
            ctx.fill();

            // 鼻子
            ctx.fillStyle = '#8B4513';
            ctx.beginPath();
            ctx.ellipse(x, y - 12, 4, 3, 0, 0, Math.PI * 2);
            ctx.fill();

            // 嘴巴
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x, y - 8, 5, 0.2, Math.PI - 0.2);
            ctx.stroke();

            // 耳朵
            ctx.fillStyle = '#CD853F';
            ctx.beginPath();
            ctx.arc(x - 20, y - 22, 8, 0, Math.PI * 2);
            ctx.arc(x + 20, y - 22, 8, 0, Math.PI * 2);
            ctx.fill();

            // 耳朵内部
            ctx.fillStyle = '#DEB887';
            ctx.beginPath();
            ctx.arc(x - 20, y - 22, 5, 0, Math.PI * 2);
            ctx.arc(x + 20, y - 22, 5, 0, Math.PI * 2);
            ctx.fill();

            // 左臂
            ctx.fillStyle = '#CD853F';
            ctx.beginPath();
            ctx.ellipse(x - 28, y + 5, 8, 18, -0.3, 0, Math.PI * 2);
            ctx.fill();

            // 右臂
            ctx.beginPath();
            ctx.ellipse(x + 28, y + 5, 8, 18, 0.3, 0, Math.PI * 2);
            ctx.fill();

            // 手
            ctx.fillStyle = '#DEB887';
            ctx.beginPath();
            ctx.arc(x - 30, y + 20, 6, 0, Math.PI * 2);
            ctx.arc(x + 30, y + 20, 6, 0, Math.PI * 2);
            ctx.fill();

            // 腿
            ctx.fillStyle = '#CD853F';
            ctx.beginPath();
            ctx.ellipse(x - 10, y + 40, 8, 10, 0, 0, Math.PI * 2);
            ctx.ellipse(x + 10, y + 40, 8, 10, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        // 绘制香蕉
        function drawBanana(banana) {
            const x = banana.x;
            const y = banana.y;

            ctx.save();
            ctx.translate(x, y);

            // 香蕉主体 - 弯月形
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.moveTo(-10, -18);
            ctx.quadraticCurveTo(-15, 0, -8, 15);
            ctx.quadraticCurveTo(0, 22, 8, 15);
            ctx.quadraticCurveTo(15, 0, 10, -18);
            ctx.quadraticCurveTo(0, -22, -10, -18);
            ctx.fill();

            // 香蕉高光
            ctx.fillStyle = '#FFEC8B';
            ctx.beginPath();
            ctx.ellipse(0, 0, 5, 12, 0, 0, Math.PI * 2);
            ctx.fill();

            // 棕色蒂
            ctx.fillStyle = '#8B4513';
            ctx.beginPath();
            ctx.moveTo(-3, -18);
            ctx.lineTo(0, -24);
            ctx.lineTo(3, -18);
            ctx.closePath();
            ctx.fill();

            // 香蕉顶部小帽子
            ctx.fillStyle = '#654321';
            ctx.beginPath();
            ctx.arc(0, -22, 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // 绘制UI
        function drawUI() {
            // 分数
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'left';
            ctx.shadowColor = '#000';
            ctx.shadowBlur = 4;
            ctx.fillText(`分数: ${score}`, 15, 35);

            // 生命
            ctx.fillText('生命: ', 15, 65);
            ctx.shadowBlur = 0;

            // 绘制爱心
            for (let i = 0; i < 3; i++) {
                const heartX = 90 + i * 28;
                const heartY = 57;
                if (i < lives) {
                    drawHeart(heartX, heartY, '#FF4444');
                } else {
                    drawHeart(heartX, heartY, '#444444');
                }
            }

            // 速度等级
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'right';
            ctx.fillText(`速度: x${speedLevel.toFixed(1)}`, WIDTH - 15, 35);

            // 提示
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.font = '14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('← → 或 A D 移动 | 触摸滑动', WIDTH / 2, HEIGHT - 15);
        }

        // 绘制爱心
        function drawHeart(x, y, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y + 4);
            ctx.bezierCurveTo(x, y, x - 8, y, x - 8, y + 4);
            ctx.bezierCurveTo(x - 8, y + 8, x, y + 14, x, y + 14);
            ctx.bezierCurveTo(x, y + 14, x + 8, y + 8, x + 8, y + 4);
            ctx.bezierCurveTo(x + 8, y, x, y, x, y + 4);
            ctx.fill();
        }

        // 绘制游戏结束画面
        function drawGameOver() {
            // 半透明遮罩
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            // 游戏结束文字
            ctx.fillStyle = '#FF4444';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.shadowColor = '#000';
            ctx.shadowBlur = 6;
            ctx.fillText('游戏结束!', WIDTH / 2, HEIGHT / 2 - 50);

            // 最终分数
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 32px Arial';
            ctx.fillText(`最终分数: ${score}`, WIDTH / 2, HEIGHT / 2);

            // 速度等级
            ctx.fillStyle = '#fff';
            ctx.font = '20px Arial';
            ctx.fillText(`达到速度等级: x${speedLevel.toFixed(1)}`, WIDTH / 2, HEIGHT / 2 + 30);

            // 重玩按钮
            ctx.fillStyle = '#4CAF50';
            ctx.beginPath();
            ctx.roundRect(WIDTH / 2 - 60, HEIGHT / 2 + 50, 120, 40, 10);
            ctx.fill();

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 20px Arial';
            ctx.fillText('重新开始', WIDTH / 2, HEIGHT / 2 + 78);
            ctx.shadowBlur = 0;
        }

        // 碰撞检测
        function checkCollision(banana) {
            const monkeyLeft = monkey.x - 30;
            const monkeyRight = monkey.x + 30;
            const monkeyTop = monkey.y - 10;
            const monkeyBottom = monkey.y + 50;

            const bananaLeft = banana.x - 15;
            const bananaRight = banana.x + 15;
            const bananaTop = banana.y - 22;
            const bananaBottom = banana.y + 22;

            return !(monkeyRight < bananaLeft ||
                     monkeyLeft > bananaRight ||
                     monkeyBottom < bananaTop ||
                     monkeyTop > bananaBottom);
        }

        // 更新游戏
        let lastTime = 0;
        let spawnTimer = 0;
        const spawnInterval = 1500;

        function update(currentTime) {
            if (gameState !== 'playing') return;

            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            // 移动猴子
            if (monkey.movingLeft) {
                monkey.x -= monkey.speed;
            }
            if (monkey.movingRight) {
                monkey.x += monkey.speed;
            }

            // 边界检测
            monkey.x = Math.max(30, Math.min(WIDTH - 30, monkey.x));

            // 生成香蕉
            spawnTimer += deltaTime;
            if (spawnTimer >= spawnInterval / speedLevel) {
                spawnBanana();
                spawnTimer = 0;
            }

            // 更新香蕉
            for (let i = bananas.length - 1; i >= 0; i--) {
                const banana = bananas[i];
                banana.y += banana.speed;

                // 检测碰撞
                if (checkCollision(banana)) {
                    score++;
                    bananaCount++;
                    bananas.splice(i, 1);

                    // 每10个香蕉加速
                    if (bananaCount % 10 === 0) {
                        speedLevel += 0.2;
                    }
                    continue;
                }

                // 超出屏幕
                if (banana.y > HEIGHT + 30) {
                    bananas.splice(i, 1);
                    lives--;

                    if (lives <= 0) {
                        gameState = 'gameover';
                    }
                }
            }
        }

        // 渲染
        function render() {
            drawBackground();

            // 绘制香蕉
            bananas.forEach(banana => drawBanana(banana));

            // 绘制猴子
            drawMonkey();

            // 绘制UI
            drawUI();

            // 游戏结束
            if (gameState === 'gameover') {
                drawGameOver();
            }
        }

        // 游戏主循环
        function gameLoop(currentTime) {
            update(currentTime);
            render();
            requestAnimationFrame(gameLoop);
        }

        // 响应式调整
        function resizeCanvas() {
            const maxWidth = window.innerWidth;
            const maxHeight = window.innerHeight;
            const scale = Math.min(maxWidth / WIDTH, maxHeight / HEIGHT);
            canvas.style.width = (WIDTH * scale) + 'px';
            canvas.style.height = (HEIGHT * scale) + 'px';
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 启动游戏
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
