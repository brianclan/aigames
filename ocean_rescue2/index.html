<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>海洋救援 Ocean Rescue</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#001d3d;
    display:flex;align-items:center;justify-content:center;
    height:100vh;overflow:hidden;
    font-family:'PingFang SC','Microsoft YaHei',sans-serif;
    touch-action:none;user-select:none;
  }
  #hud{
    position:fixed;top:0;left:0;right:0;
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 18px;color:#fff;font-size:15px;z-index:10;
  }
  #scoreEl{color:#00e5ff;font-size:21px;font-weight:700}
  #bestEl{color:#ffd700;font-size:15px}
  #levelEl{color:#a29bfe;font-size:14px}
  canvas{display:block;background:transparent}
  #overlay{
    position:fixed;inset:0;
    background:rgba(0,20,50,.93);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:20;color:#fff;
  }
  #overlay h1{
    font-size:38px;margin-bottom:4px;
    background:linear-gradient(135deg,#00e5ff,#00b4d8);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  }
  #overlay p{color:#90e0ef;font-size:13px;margin-bottom:22px;text-align:center;max-width:280px;line-height:1.7}
  .btn{
    padding:12px 34px;border:none;border-radius:40px;
    font-size:16px;font-weight:700;cursor:pointer;
    transition:transform .15s;margin:6px;
  }
  .btn:active{transform:scale(.94)}
  .btn-primary{
    background:linear-gradient(135deg,#00e5ff,#0096c7);color:#001d3d;
    box-shadow:0 4px 18px rgba(0,229,255,.35);
  }
  .score-pop{
    position:fixed;pointer-events:none;
    font-size:20px;font-weight:900;
    color:#00e5ff;text-shadow:0 0 10px rgba(0,229,255,.9);
    animation:sp .7s ease-out forwards;z-index:30;
  }
  @keyframes sp{
    0%{transform:translateY(0) scale(1);opacity:1}
    100%{transform:translateY(-60px) scale(1.4);opacity:0}
  }
  .bonus-pop{
    position:fixed;pointer-events:none;
    font-size:24px;font-weight:900;
    color:#ffd700;text-shadow:0 0 12px rgba(255,215,0,.9);
    animation:bp .9s ease-out forwards;z-index:31;
  }
  @keyframes bp{
    0%{transform:translateY(0) scale(1);opacity:1}
    100%{transform:translateY(-80px) scale(1.6);opacity:0}
  }
  .danger-pop{
    position:fixed;pointer-events:none;
    font-size:22px;font-weight:900;
    color:#ff4444;text-shadow:0 0 12px rgba(255,68,68,.9);
    animation:dp .8s ease-out forwards;z-index:32;
  }
  @keyframes dp{
    0%{transform:translateY(0) scale(1);opacity:1}
    100%{transform:translateY(-70px) scale(1.3);opacity:0}
  }
</style>
</head>
<body>
<div id="hud">
  <div id="scoreEl">🏆 0</div>
  <div id="levelEl">🌊 Lv1</div>
  <div id="bestEl">⭐ 0</div>
</div>
<canvas id="c"></canvas>
<div id="overlay">
  <h1>🌊 海洋救援</h1>
  <p>点击清除海洋垃圾和石油污染！<br>漏掉垃圾 -1生命 · 漏掉石油 -2生命<br>救到海豚/海龟额外加分！</p>
  <button class="btn btn-primary" id="startBtn">开始清洁</button>
</div>
<script>
(function(){
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const scoreEl = document.getElementById('scoreEl');
  const bestEl = document.getElementById('bestEl');
  const levelEl = document.getElementById('levelEl');

  let W, H;
  let running = false, gameOver = false;
  let score = 0;
  let lives = 5;
  const MAX_LIVES = 5;
  let items = [];
  let bubbles = [];
  let particles = [];
  let spawnTimer = 0;
  let spawnInterval = 55;
  let level = 1;
  let diffTimer = 0;
  let best = 0;

  const TRASH = [
    { emoji:'🍶', lifeLoss:1 },
    { emoji:'🧴', lifeLoss:1 },
    { emoji:'🥫', lifeLoss:1 },
    { emoji:'🥤', lifeLoss:1 },
    { emoji:'🍕', lifeLoss:1 },
    { emoji:'🎈', lifeLoss:1 },
    { emoji:'🛢️', lifeLoss:1 },
    { emoji:'🥡', lifeLoss:1 },
    { emoji:'🧴', lifeLoss:1 },
  ];

  const CREATURES = [
    { emoji:'🐬', pts:10 },
    { emoji:'🐢', pts:10 },
    { emoji:'🐠', pts:5  },
    { emoji:'🦈', pts:15 },
    { emoji:'🐳', pts:15 },
  ];

  const CREATURE_CHANCE  = 0.09;
  const OIL_CHANCE       = 0.14;

  function resize(){
    W = canvas.width = Math.min(window.innerWidth, 500);
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function drawBg(){
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#001d3d');
    g.addColorStop(.4,'#003566');
    g.addColorStop(1,'#0096c7');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    // Light rays
    ctx.save();
    ctx.globalAlpha = .06;
    for(let i=0;i<5;i++){
      const x = (W/5)*i+W/10;
      ctx.fillStyle = '#48cae4';
      ctx.beginPath();
      ctx.moveTo(x,0);
      ctx.lineTo(x+W*.2,0);
      ctx.lineTo(x+W*.1,H);
      ctx.lineTo(x-W*.05,H);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();

    // Life indicators
    for(let i=0;i<MAX_LIVES;i++){
      const hx = W/2 - (MAX_LIVES*24)/2 + i*24 + 12;
      ctx.font = '20px sans-serif';
      ctx.textAlign = 'center';
      ctx.globalAlpha = i<lives ? 1 : .2;
      ctx.fillText('❤️', hx, 32);
    }
    ctx.globalAlpha = 1;
  }

  function drawBubbleBg(){
    if(Math.random()<.25){
      bubbles.push({
        x: Math.random()*W,
        y: H+10,
        r: 3+Math.random()*5,
        vy: -.7-Math.random()*1.2,
        wobble: Math.random()*Math.PI*2
      });
    }
    for(let i=bubbles.length-1;i>=0;i--){
      const b = bubbles[i];
      b.wobble += .04;
      b.x += Math.sin(b.wobble)*.4;
      b.y += b.vy;
      ctx.save();
      ctx.globalAlpha = .18;
      ctx.strokeStyle = '#ade8f4';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      ctx.stroke();
      ctx.restore();
      if(b.y < -10) bubbles.splice(i,1);
    }
  }

  function spawnItem(){
    const r = Math.random();
    let type, emoji, pts, lifeLoss, size, isCreature, isOil;

    if(r < CREATURE_CHANCE){
      isCreature = true; isOil = false;
      const c = CREATURES[Math.floor(Math.random()*CREATURES.length)];
      emoji = c.emoji; pts = c.pts; lifeLoss = 0; size = 46;
    } else if(r < CREATURE_CHANCE + OIL_CHANCE){
      isOil = true; isCreature = false;
      emoji = null; pts = 3; lifeLoss = 2; size = 52;
    } else {
      isCreature = false; isOil = false;
      const t = TRASH[Math.floor(Math.random()*TRASH.length)];
      emoji = t.emoji; pts = 1; lifeLoss = t.lifeLoss; size = 36;
    }

    const x = size + Math.random()*(W-size*2);
    const speed = 1.2 + level*0.18;
    items.push({
      type, emoji, pts, lifeLoss, size, isCreature, isOil,
      x, y: -size,
      vx: (Math.random()-.5)*0.6,
      vy: speed + Math.random()*0.4,
      rotation: 0, rotSpeed: (Math.random()-.5)*.06,
      wobble: Math.random()*Math.PI*2,
      wobbleSpeed: .03+Math.random()*.03,
      oilPhase: 0,       // for oil animation
      clickCount: 0,     // clicks needed to remove oil
      maxClicks: 3
    });
  }

  function drawOil(x, y, size, phase){
    const s = size * (1 + Math.sin(phase)*.08);
    ctx.save();
    ctx.translate(x, y);

    // Outer dark glow
    ctx.shadowColor = '#1a1a1a';
    ctx.shadowBlur = 15;

    // Main oil blob
    ctx.fillStyle = '#1c1c1c';
    ctx.beginPath();
    ctx.ellipse(0, 0, s*.55, s*.38, 0, 0, Math.PI*2);
    ctx.fill();

    // Oil sheen highlight
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#3a3a3a';
    ctx.beginPath();
    ctx.ellipse(-s*.12, -s*.08, s*.22, s*.14, -.3, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#5a5a5a';
    ctx.beginPath();
    ctx.ellipse(s*.08, s*.05, s*.1, s*.07, .2, 0, Math.PI*2);
    ctx.fill();

    // iridescent sheen
    ctx.globalAlpha = .4 + Math.sin(phase)*.2;
    ctx.fillStyle = '#4488aa';
    ctx.beginPath();
    ctx.ellipse(-s*.2, -s*.12, s*.1, s*.06, -.4, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#885544';
    ctx.beginPath();
    ctx.ellipse(s*.15, s*.1, s*.08, s*.05, .5, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
  }

  function drawItem(it){
    const wobX = Math.sin(it.wobble)*7;
    const sx = it.x + wobX;
    const sy = it.y;

    if(it.isOil){
      drawOil(sx, sy, it.size, it.oilPhase);
      // Progress ring
      const prog = it.clickCount / it.maxClicks;
      ctx.save();
      ctx.strokeStyle = 'rgba(0,229,255,.6)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(sx, sy, it.size*.7, -Math.PI/2, -Math.PI/2 + prog*Math.PI*2);
      ctx.stroke();
      ctx.fillStyle = 'rgba(0,229,255,.15)';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(it.clickCount+'/'+it.maxClicks, sx, sy);
      ctx.restore();
      return;
    }

    ctx.save();
    ctx.font = it.size+'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if(it.isCreature){
      ctx.shadowColor = '#ffd700';
      ctx.shadowBlur = 18;
    }
    ctx.fillText(it.emoji, sx, sy);
    ctx.restore();
  }

  function spawnParticles(x,y,color,n){
    for(let i=0;i<n;i++){
      const ang=Math.random()*Math.PI*2, spd=1+Math.random()*3;
      particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,color,life:1,r:3+Math.random()*4});
    }
  }

  function updateParticles(){
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.x+=p.vx; p.y+=p.vy; p.vy+=.08; p.life-=.025;
      if(p.life<=0) particles.splice(i,1);
    }
  }

  function drawParticles(){
    for(const p of particles){
      ctx.save(); ctx.globalAlpha=p.life;
      ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill(); ctx.restore();
    }
  }

  function popScore(x,y,pts,cls){
    const el=document.createElement('div');
    el.className=cls;
    el.textContent=pts>0?('+'+pts):pts;
    el.style.left=Math.min(Math.max(x-30,10),W-60)+'px';
    el.style.top=Math.min(Math.max(y-40,10),H-40)+'px';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),800);
  }

  function handleTap(x,y){
    if(!running) return;
    for(let i=items.length-1;i>=0;i--){
      const it=items[i];
      const dx=x-it.x, dy=y-it.y;
      if(Math.sqrt(dx*dx+dy*dy) < it.size*.8){
        if(it.isOil){
          it.clickCount++;
          spawnParticles(it.x, it.y, '#444', 4);
          if(it.clickCount >= it.maxClicks){
            items.splice(i,1);
            score += it.pts;
            scoreEl.textContent='🏆 '+score;
            spawnParticles(it.x, it.y, '#ffd700', 14);
            popScore(it.x, it.y, it.pts, 'bonus-pop');
          }
          return;
        }
        items.splice(i,1);
        score += it.pts;
        scoreEl.textContent='🏆 '+score;
        const col = it.isCreature?'#ffd700':'#00e5ff';
        spawnParticles(it.x, it.y, col, it.isCreature?14:8);
        popScore(it.x, it.y, it.pts, it.isCreature?'bonus-pop':'score-pop');
        return;
      }
    }
  }

  canvas.addEventListener('click', e=>{
    const r=canvas.getBoundingClientRect();
    handleTap(e.clientX-r.left, e.clientY-r.top);
  });
  canvas.addEventListener('touchstart', e=>{
    e.preventDefault();
    const r=canvas.getBoundingClientRect();
    for(const t of e.changedTouches) handleTap(t.clientX-r.left, t.clientY-r.top);
  },{passive:false});

  function gameLoop(){
    if(gameOver) return;
    ctx.clearRect(0,0,W,H);
    drawBg();
    drawBubbleBg();
    drawParticles();

    spawnTimer++;
    if(spawnTimer>=spawnInterval){
      spawnItem(); spawnTimer=0;
    }

    for(let i=items.length-1;i>=0;i--){
      const it=items[i];
      it.wobble += it.wobbleSpeed;
      it.x += it.vx;
      it.y += it.vy;
      it.rotation += it.rotSpeed;
      if(it.isOil) it.oilPhase += .1;

      if(it.x<it.size/2){it.x=it.size/2;it.vx*=-1;}
      if(it.x>W-it.size/2){it.x=W-it.size/2;it.vx*=-1;}

      if(it.y > H+it.size){
        items.splice(i,1);
        if(it.type==='trash'){
          lives = Math.max(0, lives-it.lifeLoss);
          spawnParticles(it.x, H-20, '#ff6b6b', 6);
          popScore(it.x, H-30, -it.lifeLoss, 'danger-pop');
          if(lives<=0){endGame();return;}
        } else if(it.type==='oil'){
          lives = Math.max(0, lives-2);
          spawnParticles(it.x, H-20, '#333', 8);
          popScore(it.x, H-30, -2, 'danger-pop');
          if(lives<=0){endGame();return;}
        }
        continue;
      }

      drawItem(it);
    }

    updateParticles();

    diffTimer++;
    if(diffTimer%350===0){
      level++;
      spawnInterval = Math.max(22, 55-level*3);
      levelEl.textContent='🌊 Lv'+level;
    }

    requestAnimationFrame(gameLoop);
  }

  function startGame(){
    score=0; lives=MAX_LIVES; gameOver=false;
    items=[]; bubbles=[]; particles=[];
    spawnTimer=0; spawnInterval=55; level=1; diffTimer=0;
    scoreEl.textContent='🏆 0';
    bestEl.textContent='⭐ '+(localStorage.getItem('oceanBest2')||0);
    levelEl.textContent='🌊 Lv1';
    overlay.style.display='none';
    running=true;
    gameLoop();
  }

  function endGame(){
    gameOver=true; running=false;
    best=parseInt(localStorage.getItem('oceanBest2')||'0');
    if(score>best) localStorage.setItem('oceanBest2',score);
    setTimeout(()=>{
      overlay.innerHTML=
        '<h1>游戏结束</h1>'+
        '<div style="font-size:60px;color:#00e5ff;font-weight:900;margin:8px 0 16px">'+score+'</div>'+
        '<p style="color:#90e0ef;font-size:14px;margin-bottom:22px">最高纪录：'+Math.max(score,best)+'</p>'+
        '<button class="btn btn-primary" id="reBtn">再玩一次</button>';
      overlay.style.display='flex';
      document.getElementById('reBtn').onclick=startGame;
    },500);
  }

  document.getElementById('startBtn').onclick=startGame;
  bestEl.textContent='⭐ '+(localStorage.getItem('oceanBest2')||0);
})();
</script>

<script>
/**
 * Iframe 元素高亮注入脚本
 * 需要在目标网站中引入此脚本来支持跨域 iframe 高亮功能
 *
 * 使用方法：
 * 1. 将此脚本添加到目标网站的 HTML 中
 * 2. 或通过浏览器扩展、用户脚本等方式注入
 */

(function () {
  "use strict";

  // 检查是否在 iframe 中
  if (window.self === window.top) {
    return; // 不在 iframe 中，不执行
  }

  // 检查是否已经初始化过
  if (window.__iframeHighlightInitialized) {
    return;
  }
  window.__iframeHighlightInitialized = true;
  console.log("Iframe 高亮脚本已加载");

  // 创建高亮覆盖层
  var overlay = document.createElement("div");
  overlay.id = "iframe-highlight-overlay";
  overlay.style.cssText = "\n    position: fixed;\n    top: 0;\n    left: 0;\n    width: 100vw;\n    height: 100vh;\n    pointer-events: none;\n    z-index: 999999;\n    overflow: hidden;\n  ";

  // 创建悬停高亮框（虚线边框）
