<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            color: #fff;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88;
            color: #00ff88;
        }

        .game-container {
            background: #0a0a0a;
            border: 4px solid #00ff88;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }

        #gameCanvas {
            display: block;
            background: #111;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 1rem;
        }

        .score-item {
            background: #222;
            padding: 10px 20px;
            border-radius: 4px;
            border: 2px solid #00ff88;
        }

        .score-label {
            color: #888;
            font-size: 0.7rem;
            margin-bottom: 5px;
        }

        .score-value {
            color: #00ff88;
            font-size: 1.2rem;
        }

        .controls {
            margin-top: 20px;
            text-align: center;
        }

        .btn {
            background: #00ff88;
            color: #1a1a2e;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn:hover {
            background: #00cc6a;
            transform: scale(1.05);
        }

        .instructions {
            margin-top: 20px;
            font-size: 0.6rem;
            color: #666;
            text-align: center;
            line-height: 1.8;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border: 4px solid #ff0055;
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        .game-over h2 {
            color: #ff0055;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .game-over p {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>🐍 像素贪吃蛇</h1>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div class="score-board">
            <div class="score-item">
                <div class="score-label">得分</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">最高分</div>
                <div class="score-value" id="highScore">0</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" id="startBtn">开始游戏</button>
    </div>

    <div class="instructions">
        使用方向键 ↑ ↓ ← → 或 W A S D 控制蛇的移动<br>
        吃到食物得分，撞墙或撞到自己游戏结束
    </div>

    <div class="game-over" id="gameOver">
        <h2>游戏结束!</h2>
        <p>得分：<span id="finalScore">0</span></p>
        <button class="btn" id="restartBtn">再来一局</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let gameSpeed = 100;
        let isGameRunning = false;

        highScoreEl.textContent = highScore;

        function initGame() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            scoreEl.textContent = score;
            spawnFood();
            gameOverEl.style.display = 'none';
        }

        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function drawPixelRect(x, y, color, glow = false) {
            ctx.fillStyle = color;
            if (glow) {
                ctx.shadowColor = color;
                ctx.shadowBlur = 10;
            }
            ctx.fillRect(x * gridSize + 1, y * gridSize + 1, gridSize - 2, gridSize - 2);
            ctx.shadowBlur = 0;
            
            // Pixel highlight
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(x * gridSize + 2, y * gridSize + 2, gridSize / 2 - 1, gridSize / 2 - 1);
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw snake
            snake.forEach((segment, index) => {
                const gradient = index === 0 ? '#00ff88' : `hsl(${140 - index * 5}, 100%, 50%)`;
                drawPixelRect(segment.x, segment.y, gradient, index === 0);
            });

            // Draw food
            drawPixelRect(food.x, food.y, '#ff0055', true);
        }

        function update() {
            direction = { ...nextDirection };
            
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // Check wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // Check self collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                if (score > highScore) {
                    highScore = score;
                    highScoreEl.textContent = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                spawnFood();
                // Speed up slightly
                if (gameSpeed > 50) {
                    clearInterval(gameLoop);
                    gameSpeed -= 2;
                    gameLoop = setInterval(update, gameSpeed);
                }
            } else {
                snake.pop();
            }
        }

        function gameOver() {
            isGameRunning = false;
            clearInterval(gameLoop);
            finalScoreEl.textContent = score;
            gameOverEl.style.display = 'block';
            startBtn.textContent = '开始游戏';
        }

        function startGame() {
            if (isGameRunning) return;
            initGame();
            isGameRunning = true;
            gameSpeed = 100;
            gameLoop = setInterval(update, gameSpeed);
            startBtn.textContent = '游戏中...';
        }

        // Event listeners
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', () => {
            gameOverEl.style.display = 'none';
            startGame();
        });

        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) {
                if (e.key === ' ' || e.key === 'Enter') {
                    startGame();
                }
                return;
            }

            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        });

        // Initial draw
        initGame();
        draw();
    </script>
</body>
</html>
