<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>小本蛋糕工坊</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fce4ec; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'PingFang SC', sans-serif; }
canvas { border-radius: 16px; box-shadow: 0 8px 40px rgba(0,0,0,0.2); max-width: 100vw; max-height: 100vh; cursor: pointer; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize() {
  const w = Math.min(window.innerWidth, 500);
  const h = Math.min(window.innerHeight, 850);
  canvas.width = w;
  canvas.height = h;
}
resize();
window.addEventListener('resize', () => { resize(); buildUI(); });

// ============ 状态 ============
const STATE = { MENU: 0, DECORATE: 1, COMPARE: 2 };
let state = STATE.MENU;
let score = 0;
let timer = 60;
let timerInterval = null;

// 蛋糕数据
const cake = {
  layers: 3,        // 层数 1-3
  layerColors: ['#8B4513', '#D2691E', '#A0522D'], // 蛋糕胚颜色
  layerHeights: [40, 35, 30],
  frosting: '#FFB6C1',  // 奶油颜色
  frostingDrip: true,
  topping: '草莓',      // 草莓/蓝莓/巧克力/无
  toppingColor: '#ff1744',
  cherry: true,
  candle: true,
  candleColor: '#ff6f00',
  stars: 0
};

// 评分系统
function calcScore() {
  let s = 0;
  if (cake.layers === 3) s += 30;
  else if (cake.layers === 2) s += 15;
  const toppingScore = { '草莓': 25, '蓝莓': 20, '巧克力': 15, '无': 0 };
  s += toppingScore[cake.topping] || 0;
  if (cake.frostingDrip) s += 20;
  if (cake.cherry) s += 10;
  if (cake.candle) s += 15;
  cake.stars = s >= 80 ? 3 : s >= 50 ? 2 : s >= 20 ? 1 : 0;
  return s;
}

// 蛋糕绘制
function drawCake(cx, cy, scale = 1, showScore = false) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  const totalH = cake.layerHeights.slice(0, cake.layers).reduce((a,b)=>a+b,0);
  const baseY = totalH / 2;

  // 盘子
  ctx.fillStyle = '#e0e0e0';
  ctx.beginPath();
  ctx.ellipse(0, baseY + 10, 80, 15, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#bbb';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 蛋糕层
  let y = baseY;
  for (let i = 0; i < cake.layers; i++) {
    const lh = cake.layerHeights[i];
    const lw = 140 - i * 10;
    // 主体
    ctx.fillStyle = cake.layerColors[i];
    ctx.beginPath();
    ctx.roundRect(-lw/2, y - lh, lw, lh, 8);
    ctx.fill();
    // 高光
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.roundRect(-lw/2 + 5, y - lh + 5, lw/3, lh - 10, 4);
    ctx.fill();
    y -= lh;
  }

  // 奶油外层
  if (cake.frosting) {
    const topW = 140 - (cake.layers - 1) * 10;
    const topY = baseY - totalH;
    ctx.fillStyle = cake.frosting;
    ctx.beginPath();
    ctx.ellipse(0, topY, topW/2, 18, 0, 0, Math.PI * 2);
    ctx.fill();
    // 奶油花纹
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(0, topY, topW/2 - 8, 10, 0, 0, Math.PI * 2);
    ctx.stroke();
    // 奶油滴
    if (cake.frostingDrip) {
      ctx.fillStyle = cake.frosting;
      const drips = [[-55, 20], [-30, 35], [0, 45], [30, 32], [55, 22]];
      drips.forEach(([dx, dh]) => {
        const lx = dx;
        const ly = topY;
        ctx.beginPath();
        ctx.ellipse(lx, ly + dh, 8, dh + 5, 0, 0, Math.PI * 2);
        ctx.fill();
      });
    }
    // 侧面奶油条
    const sideDrips = [[-60, 30], [-35, 50], [0, 60], [35, 48], [60, 28]];
    for (let i = 0; i < cake.layers; i++) {
      const lh = cake.layerHeights[i];
      const lw = 140 - i * 10;
      const ly = baseY - cake.layerHeights.slice(0, i).reduce((a,b)=>a+b, 0) - lh;
      sideDrips.slice(0, 2 + i).forEach(([dx, dh]) => {
        const lx = Math.max(-lw/2+5, Math.min(lw/2-5, dx));
        ctx.fillStyle = cake.frosting;
        ctx.beginPath();
        ctx.ellipse(lx, ly + lh - 3, 7, 12, 0, 0, Math.PI * 2);
        ctx.fill();
      });
    }
  }

  // 配料
  if (cake.topping === '草莓' && cake.toppingColor) {
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * Math.PI * 2;
      const r = 45;
      const tx = Math.cos(angle) * r;
      const ty = -totalH - 5 + Math.sin(angle) * 10;
      drawStrawberry(tx, ty);
    }
  } else if (cake.topping === '蓝莓') {
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2;
      const r = 40;
      const tx = Math.cos(angle) * r;
      const ty = -totalH - 3 + Math.sin(angle) * 8;
      drawBlueberry(tx, ty);
    }
  } else if (cake.topping === '巧克力') {
    for (let i = 0; i < 5; i++) {
      const angle = (i / 5) * Math.PI * 2;
      const r = 42;
      const tx = Math.cos(angle) * r;
      const ty = -totalH - 2 + Math.sin(angle) * 6;
      drawChocoChip(tx, ty);
    }
  }

  // 樱桃
  if (cake.cherry) {
    const topY2 = -totalH - 5;
    drawCherry(0, topY2 - 20, true);
    drawCherry(-25, topY2 - 8, false);
    drawCherry(28, topY2 - 10, false);
  }

  // 蜡烛
  if (cake.candle) {
    const topY3 = -totalH - 5;
    for (let i = -1; i <= 1; i++) {
      const cx2 = i * 30;
      drawCandle(cx2, topY3 - 20, i === 0);
    }
  }

  // 分数显示
  if (showScore) {
    const s = calcScore();
    const starY = -totalH - 80;
    for (let i = 0; i < 3; i++) {
      ctx.fillStyle = i < cake.stars ? '#FFD700' : '#ccc';
      ctx.font = '28px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('⭐', -30 + i * 30, starY);
    }
    ctx.fillStyle = '#333';
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText(`${s}分`, 0, starY + 25);
  }

  ctx.restore();
}

function drawStrawberry(x, y) {
  ctx.fillStyle = '#ff1744';
  ctx.beginPath();
  ctx.arc(x, y, 9, 0, Math.PI * 2);
  ctx.fill();
  // 叶子
  ctx.fillStyle = '#2e7d32';
  ctx.beginPath();
  ctx.ellipse(x, y - 8, 6, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  // 点
  ctx.fillStyle = '#ffeb3b';
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.arc(x + (Math.random()-0.5)*10, y + (Math.random()-0.5)*10, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBlueberry(x, y) {
  ctx.fillStyle = '#3f51b5';
  ctx.beginPath();
  ctx.arc(x, y, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(x - 2, y - 2, 3, 0, Math.PI * 2);
  ctx.fill();
}

function drawChocoChip(x, y) {
  ctx.fillStyle = '#3e2723';
  ctx.beginPath();
  ctx.roundRect(x - 6, y - 4, 12, 8, 3);
  ctx.fill();
}

function drawCherry(x, y, big) {
  // 茎
  ctx.strokeStyle = '#2e7d32';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.quadraticCurveTo(x + 5, y - 15, x + 8, y - 25);
  ctx.stroke();
  // 果
  ctx.fillStyle = big ? '#b71c1c' : '#c62828';
  ctx.beginPath();
  ctx.arc(x, y, big ? 13 : 10, 0, Math.PI * 2);
  ctx.fill();
  // 高光
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.arc(x - 4, y - 4, big ? 5 : 3, 0, Math.PI * 2);
  ctx.fill();
}

function drawCandle(x, y, lit) {
  ctx.fillStyle = cake.candleColor;
  ctx.fillRect(x - 4, y, 8, 25);
  // 花纹
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillRect(x - 4, y + 5, 8, 3);
  ctx.fillRect(x - 4, y + 15, 8, 3);
  if (lit) {
    // 火焰
    const flicker = Math.sin(Date.now() / 100) * 2;
    ctx.fillStyle = '#ff6f00';
    ctx.beginPath();
    ctx.ellipse(x, y - 8 + flicker, 5, 9, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffeb3b';
    ctx.beginPath();
    ctx.ellipse(x, y - 6 + flicker, 3, 6, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ============ 菜单 ============
function drawMenu() {
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#fce4ec');
  grad.addColorStop(0.5, '#f8bbd0');
  grad.addColorStop(1, '#f48fb1');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 标题装饰
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(canvas.width/2, 120, 80, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#880e4f';
  ctx.font = 'bold 38px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('🍰 小本蛋糕工坊', canvas.width/2, 80);

  ctx.fillStyle = '#ad1457';
  ctx.font = '16px sans-serif';
  ctx.fillText('亲手装饰你的专属蛋糕！', canvas.width/2, 110);

  // 预览蛋糕
  drawCake(canvas.width/2, canvas.height/2 + 20, 1.1);

  // 按钮
  const btnY = canvas.height - 160;
  drawMenuButton(canvas.width/2, btnY, '#e91e63', '🧁 开始制作', () => {
    state = STATE.DECORATE;
    timer = 60;
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timer--;
      if (timer <= 0) {
        clearInterval(timerInterval);
        state = STATE.COMPARE;
      }
    }, 1000);
  });
  drawMenuButton(canvas.width/2, btnY + 80, '#9c27b0', '⭐ 直接评分', () => {
    calcScore();
    state = STATE.COMPARE;
  });
}

function drawMenuButton(x, y, color, text, cb) {
  const bw = 220, bh = 55;
  // 阴影
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.roundRect(x - bw/2 + 3, y - bh/2 + 4, bw, bh, 27);
  ctx.fill();
  // 按钮
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(x - bw/2, y - bh/2, bw, bh, 27);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.beginPath();
  ctx.roundRect(x - bw/2, y - bh/2, bw, bh/2, 27);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(text, x, y + 6);
  menuButtons.push({ x: x - bw/2, y: y - bh/2, w: bw, h: bh, cb });
}
let menuButtons = [];

// ============ 制作界面 ============
let selectedOption = null;
let options = [];

function buildUI() {
  options = [
    { label: '层数', key: 'layers', values: [1, 2, 3], labels: ['1层', '2层', '3层'] },
    { label: '奶油', key: 'frosting', values: ['#FFB6C1', '#FFFACD', '#E1BEE7', '#B2DFDB'], labels: ['粉色', '柠檬', '薰衣草', '薄荷'] },
    { label: '奶油滴', key: 'frostingDrip', values: [true, false], labels: ['有滴落', '无滴落'] },
    { label: '配料', key: 'topping', values: ['草莓', '蓝莓', '巧克力', '无'], labels: ['🍓草莓', '🫐蓝莓', '🍫巧克力', '❌无'] },
    { label: '樱桃', key: 'cherry', values: [true, false], labels: ['有 🍒', '无'] },
    { label: '蜡烛', key: 'candle', values: [true, false], labels: ['有 🕯️', '无'] },
  ];
}

function drawDecorate() {
  // 背景
  ctx.fillStyle = '#fce4ec';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 顶栏
  ctx.fillStyle = '#e91e63';
  ctx.fillRect(0, 0, canvas.width, 55);
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(0, 0, canvas.width, 27);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('🍰 小本蛋糕工坊', canvas.width/2, 36);

  // 计时器
  const timeColor = timer <= 10 ? '#ff1744' : '#fff';
  ctx.fillStyle = timeColor;
  ctx.font = 'bold 22px sans-serif';
  ctx.fillText(`⏱️ ${timer}s`, canvas.width - 60, 36);

  // 当前分数
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 18px sans-serif';
  ctx.fillText(`⭐ ${calcScore()}分`, 60, 36);

  // 蛋糕展示区
  const cakeY = 260;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath();
  ctx.roundRect(20, 80, canvas.width - 40, 340, 20);
  ctx.fill();
  drawCake(canvas.width/2, cakeY, 1.3);

  // 选项卡
  const startY = 440;
  const rowH = 58;
  options.forEach((opt, i) => {
    const y = startY + i * rowH;
    const selectedVal = cake[opt.key];
    const selIdx = opt.values.indexOf(selectedVal);
    const val = opt.values[selIdx < 0 ? 0 : selIdx];

    // 标签
    ctx.fillStyle = '#880e4f';
    ctx.font = 'bold 15px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(opt.label, 20, y + 20);

    // 选项按钮
    const btnW = 72;
    const totalW = opt.labels.length * (btnW + 6) - 6;
    let bx = canvas.width - totalW - 15;
    opt.labels.forEach((lbl, j) => {
      const isSelected = opt.values[j] === cake[opt.key];
      const bx2 = bx + j * (btnW + 6);
      if (isSelected) {
        ctx.fillStyle = '#e91e63';
        ctx.beginPath();
        ctx.roundRect(bx2, y + 2, btnW, 36, 10);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.beginPath();
        ctx.roundRect(bx2, y + 2, btnW, 18, 10);
        ctx.fill();
      } else {
        ctx.fillStyle = '#f8bbd0';
        ctx.beginPath();
        ctx.roundRect(bx2, y + 2, btnW, 36, 10);
        ctx.fill();
        ctx.strokeStyle = '#f48fb1';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
      ctx.fillStyle = isSelected ? '#fff' : '#c2185b';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(lbl, bx2 + btnW/2, y + 26);
    });
  });

  // 完成按钮
  const completeY = canvas.height - 85;
  const pulse = 0.9 + 0.1 * Math.sin(Date.now() / 200);
  ctx.save();
  ctx.translate(canvas.width/2, completeY);
  ctx.scale(pulse, pulse);
  ctx.fillStyle = '#4caf50';
  ctx.beginPath();
  ctx.roundRect(-110, -28, 220, 56, 28);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.beginPath();
  ctx.roundRect(-110, -28, 220, 28, 28);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('🎉 完成蛋糕！', 0, 8);
  ctx.restore();
}

function handleDecorateClick(x, y) {
  // 完成按钮
  const completeY = canvas.height - 85;
  if (y > completeY - 30 && y < completeY + 30 && x > canvas.width/2 - 110 && x < canvas.width/2 + 110) {
    clearInterval(timerInterval);
    state = STATE.COMPARE;
    return;
  }
  // 选项
  const startY = 440;
  const rowH = 58;
  options.forEach((opt, i) => {
    const oy = startY + i * rowH;
    if (y > oy && y < oy + 40) {
      const btnW = 72;
      const totalW = opt.labels.length * (btnW + 6) - 6;
      let bx = canvas.width - totalW - 15;
      opt.labels.forEach((_, j) => {
        const bx2 = bx + j * (btnW + 6);
        if (x > bx2 && x < bx2 + btnW) {
          cake[opt.key] = opt.values[j];
        }
      });
    }
  });
}

// ============ 评分界面 ============
let animScore = 0;
let animating = false;

function startScoreAnim() {
  const target = calcScore();
  animScore = 0;
  animating = true;
  const step = () => {
    if (animScore < target) {
      animScore = Math.min(animScore + Math.ceil(target / 30), target);
      requestAnimationFrame(step);
    } else {
      animScore = target;
      animating = false;
    }
  };
  step();
}

function drawCompare() {
  // 渐变背景
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  if (cake.stars >= 2) {
    grad.addColorStop(0, '#fff9c4');
    grad.addColorStop(1, '#fff59d');
  } else {
    grad.addColorStop(0, '#fce4ec');
    grad.addColorStop(1, '#f8bbd0');
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 标题
  ctx.fillStyle = '#880e4f';
  ctx.font = 'bold 30px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('🍰 蛋糕评分中...', canvas.width/2, 60);

  // 蛋糕展示
  drawCake(canvas.width/2, canvas.height/2 - 20, 1.4, true);

  // 星星动画
  const starY = 80;
  for (let i = 0; i < 3; i++) {
    const delay = i * 0.3;
    const t = Math.max(0, (Date.now() / 1000 - startTime + delay) % 3);
    const scale = t < 0.5 ? t * 2 : 1;
    const glow = t < 0.8 ? i < cake.stars ? 15 : 0 : 0;
    ctx.save();
    ctx.translate(canvas.width/2 - 60 + i * 60, starY);
    if (glow) { ctx.shadowColor = '#FFD700'; ctx.shadowBlur = glow; }
    ctx.scale(scale, scale);
    ctx.font = '50px sans-serif';
    ctx.fillStyle = i < cake.stars ? '#FFD700' : '#ccc';
    ctx.textAlign = 'center';
    ctx.fillText('⭐', 0, 0);
    ctx.restore();
  }

  // 评语
  const msgs = [
    '下次再努力！💪',
    '还不错哦！😊',
    '太棒了！🌟',
    '完美蛋糕！🏆'
  ];
  ctx.fillStyle = '#880e4f';
  ctx.font = 'bold 22px sans-serif';
  ctx.fillText(msgs[cake.stars], canvas.width/2, canvas.height/2 + 230);

  // 分数
  ctx.fillStyle = '#333';
  ctx.font = 'bold 48px sans-serif';
  ctx.fillText(`${animScore}分`, canvas.width/2, canvas.height/2 + 280);

  // 再来按钮
  const btnY = canvas.height - 80;
  ctx.fillStyle = '#e91e63';
  ctx.beginPath();
  ctx.roundRect(canvas.width/2 - 110, btnY - 28, 220, 56, 28);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.beginPath();
  ctx.roundRect(canvas.width/2 - 110, btnY - 28, 220, 28, 28);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px sans-serif';
  ctx.fillText('🔄 再做一个', canvas.width/2, btnY + 6);
}
let startTime = Date.now() / 1000;

// ============ 点击处理 ============
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);

  if (state === STATE.MENU) {
    for (const btn of menuButtons) {
      if (x > btn.x && x < btn.x + btn.w && y > btn.y && y < btn.y + btn.h) {
        btn.cb();
        break;
      }
    }
  } else if (state === STATE.DECORATE) {
    handleDecorateClick(x, y);
  } else if (state === STATE.COMPARE) {
    const btnY = canvas.height - 80;
    if (y > btnY - 28 && y < btnY + 28 && x > canvas.width/2 - 110 && x < canvas.width/2 + 110) {
      state = STATE.MENU;
    }
  }
});

// ============ 主循环 ============
menuButtons = [];
let lastState = -1;

function loop() {
  if (state !== lastState) {
    lastState = state;
    menuButtons = [];
    if (state === STATE.COMPARE) {
      startTime = Date.now() / 1000;
      startScoreAnim();
    }
  }

  if (state === STATE.MENU) {
    drawMenu();
  } else if (state === STATE.DECORATE) {
    drawDecorate();
  } else if (state === STATE.COMPARE) {
    drawCompare();
  }

  requestAnimationFrame(loop);
}

buildUI();
loop();
</script>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
