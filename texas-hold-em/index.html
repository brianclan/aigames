<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Texas Hold'em</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#1a4d2e;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
#table{width:100%;max-width:480px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:12px}

/* Header */
#header{width:100%;display:flex;justify-content:space-between;align-items:center;padding:8px 4px;color:#c8e6c9;font-size:14px}
#header .pot{font-size:18px;font-weight:700;color:#ffd700;text-align:center;flex:1}
#header .label{font-size:11px;color:#a5d6a7;text-transform:uppercase;letter-spacing:1px}

/* Community Cards */
#community-area{width:100%;display:flex;flex-direction:column;align-items:center;gap:6px}
#community-label{color:#a5d6a7;font-size:12px;text-transform:uppercase;letter-spacing:2px}
#community-cards{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}

/* Card */
.card{width:52px;height:72px;border-radius:6px;position:relative;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;flex-shrink:0;overflow:hidden}
.card.red{color:#e53935}
.card.black{color:#1a1a2e}
.card .corner{position:absolute;font-size:11px;line-height:1;display:flex;flex-direction:column;align-items:center}
.card .corner.tl{top:3px;left:4px}
.card .corner.br{bottom:3px;right:4px;transform:rotate(180deg)}
.card .suit-big{font-size:28px}
.card-back{background:linear-gradient(135deg,#c62828,#b71c1c);border:2px solid #fff;}
.card-back::after{content:'♠♥♦♣';position:absolute;font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:-1px}
.card-back::before{content:'';position:absolute;inset:4px;border:1px solid rgba(255,255,255,0.3);border-radius:3px}
.card.hidden{background:#2e7d32}

/* Hands */
#player-area,#ai-area{width:100%;display:flex;flex-direction:column;align-items:center;gap:6px}
#ai-label{color:#a5d6a7;font-size:12px;text-transform:uppercase;letter-spacing:2px}
.hand{display:flex;gap:8px;justify-content:center}

/* Status Message */
#status-box{width:100%;text-align:center;padding:10px;background:rgba(0,0,0,0.3);border-radius:8px;color:#fff;font-size:15px;min-height:44px;display:flex;align-items:center;justify-content:center;line-height:1.4}
#status-box.win{color:#ffd700}
#status-box.lose{color:#ef9a9a}
#status-box.push{color:#a5d6a7}

/* Controls */
#controls{display:flex;gap:8px;width:100%;max-width:400px;flex-wrap:wrap;justify-content:center;margin-top:4px}
.btn{padding:12px 16px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;flex:1;min-width:80px;transition:transform 0.1s,opacity 0.1s;active:transform:scale(0.96)}
.btn:active{transform:scale(0.96)}
.btn-fold{background:#c62828;color:#fff}
.btn-check{background:#2e7d32;color:#fff}
.btn-call{background:#1565c0;color:#fff}
.btn-raise{background:#e65100;color:#fff}
.btn:disabled{opacity:0.35;cursor:not-allowed}

/* Chip Stack */
#stacks{display:flex;justify-content:space-between;width:100%;max-width:440px;padding:0 8px;color:#c8e6c9;font-size:13px}
#stacks .stack{display:flex;flex-direction:column;align-items:center;gap:2px}
#stacks .amount{font-size:16px;font-weight:700;color:#ffd700}

/* Win line */
#win-line{color:#ffd700;font-size:13px;text-align:center;min-height:18px}

/* New game button */
#new-game-btn{display:none;margin-top:10px;padding:14px 32px;background:#2e7d32;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}

/* Pot animation */
@keyframes potPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.pulse{animation:potPulse 0.3s ease}

/* Deal animation */
@keyframes dealIn{from{transform:translateY(-60px) rotateY(90deg);opacity:0}to{transform:translateY(0) rotateY(0);opacity:1}}
.dealing{animation:dealIn 0.35s ease forwards}
</style>
</head>
<body>
<div id="table">

  <!-- Header -->
  <div id="header">
    <div style="display:flex;flex-direction:column;align-items:center">
      <span class="label">AI</span>
      <span class="amount" id="ai-stack">$1000</span>
    </div>
    <div>
      <div id="header-center">
        <div class="label">底池</div>
        <div class="pot" id="pot-display">$0</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center">
      <span class="label">你</span>
      <span class="amount" id="player-stack">$1000</span>
    </div>
  </div>

  <!-- AI Cards -->
  <div id="ai-area">
    <div id="ai-label">AI Dealer</div>
    <div class="hand" id="ai-hand"></div>
    <div id="win-line"></div>
  </div>

  <!-- Community Cards -->
  <div id="community-area">
    <div id="community-label">公共牌</div>
    <div id="community-cards"></div>
  </div>

  <!-- Player Cards -->
  <div id="player-area">
    <div id="player-label" style="color:#a5d6a7;font-size:12px;text-transform:uppercase;letter-spacing:2px">你的手牌</div>
    <div class="hand" id="player-hand"></div>
  </div>

  <!-- Status -->
  <div id="status-box">点击 开始游戏</div>

  <!-- Controls -->
  <div id="controls">
    <button class="btn btn-fold" id="btn-fold" onclick="playerAction('fold')" disabled>弃牌</button>
    <button class="btn btn-check" id="btn-check" onclick="playerAction('check')" disabled>过牌</button>
    <button class="btn btn-call" id="btn-call" onclick="playerAction('call')" disabled>跟注</button>
    <button class="btn btn-raise" id="btn-raise" onclick="playerAction('raise')" disabled>加注</button>
  </div>

  <button id="new-game-btn" onclick="newGame()">下一局</button>
</div>

<script>
// ===== CONSTANTS =====
const RANKS = ['2','3','4','5','6','7','8','9','T','J','Q','K','A'];
const SUITS = ['♠','♥','♦','♣'];
const RANK_DISPLAY = {T:'10',J:'J',Q:'Q',K:'K',A:'A'};

// ===== STATE =====
let deck = [];
let playerHand = [], aiHand = [], community = [];
let playerChips = 1000, aiChips = 1000;
let pot = 0, currentBet = 0, playerBet = 0, aiBet = 0;
let phase = 'idle'; // idle, preflop, flop, turn, river, showdown, end
let playerCanAct = false;
let raiseAmount = 0; // current raise size (not bet-to-match)
let lastWinner = '';

// ===== DECK =====
function createDeck(){
  let d = [];
  for(let s of SUITS) for(let r of RANKS) d.push({rank:r,suit:s});
  // Fisher-Yates shuffle
  for(let i=d.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [d[i],d[j]]=[d[j],d[i]];
  }
  return d;
}

function draw(n){return deck.splice(0,n);}

// ===== HAND RANKING =====
function rankToVal(r){return RANKS.indexOf(r)} // 0-12

function getSortedRanks(hand){
  return hand.map(c=>rankToVal(c.rank)).sort((a,b)=>a-b);
}

function countRanks(hand){
  let cnt={};
  for(let c of hand) cnt[c.rank]=(cnt[c.rank]||0)+1;
  return cnt;
}

function isFlush(cards){
  let s=cards[0].suit;
  return cards.every(c=>c.suit===s);
}

function isStraight(sortedRanks){
  // A-5 low straight
  let s=[...new Set(sortedRanks)];
  if(s.length!==5)return false;
  if(s[4]-s[0]===4)return s[0];
  // wheel A-2-3-4-5
  if(s[0]===0&&s[1]===1&&s[2]===2&&s[3]===3&&s[4]===12)return 1; // A-low = 1
  return null;
}

function handRank(hand){
  // Returns [priority, tieBreaker...] higher = better
  let all7 = hand;
  let cnt = countRanks(all7);
  let vals = Object.values(cnt).sort((a,b)=>b-a);
  let sortedRanks = getSortedRanks(all7);
  let hasFlush = isFlush(all7);
  let straightHigh = isStraight(sortedRanks);
  let isStrFlush = hasFlush && straightHigh!==null;

  if(isStrFlush){
    // Royal or straight flush
    let high = straightHigh===1 ? 5 : sortedRanks[sortedRanks.length-1];
    let isRoyal = high===12; // A-high
    return [9+high/100, high]; // priority 9 (royal=9.12, straight=9.low)
  }
  if(vals[0]===4)return [8, ...Object.keys(cnt).map(r=>rankToVal(r)).sort((a,b)=>cnt[RANKS[a]]<cnt[RANKS[b]]?1:-1)];
  if(vals[0]===3&&vals[1]===2)return [7, ...Object.keys(cnt).filter(r=>cnt[r]===3).map(r=>rankToVal(r)), ...Object.keys(cnt).filter(r=>cnt[r]===2).map(r=>rankToVal(r))];
  if(hasFlush){
    let flushCards = all7.slice().sort((a,b)=>rankToVal(b.rank)-rankToVal(a.rank));
    return [6, ...flushCards.map(c=>rankToVal(c.rank))];
  }
  if(straightHigh!==null){
    let high = straightHigh===1 ? sortedRanks.includes(12)?12:1 : sortedRanks[sortedRanks.length-1];
    return [5, high];
  }
  if(vals[0]===3)return [4, ...Object.keys(cnt).filter(r=>cnt[r]===3).map(r=>rankToVal(r))];
  if(vals[0]===2&&vals[1]===2){
    let pairs = Object.keys(cnt).filter(r=>cnt[r]===2).map(r=>rankToVal(r)).sort((a,b)=>b-a);
    let kickers = Object.keys(cnt).filter(r=>cnt[r]===1).map(r=>rankToVal(r)).sort((a,b)=>b-a);
    return [3, ...pairs, ...kickers];
  }
  if(vals[0]===2){
    let pair = Object.keys(cnt).filter(r=>cnt[r]===2).map(r=>rankToVal(r))[0];
    let kickers = Object.keys(cnt).filter(r=>cnt[r]===1).map(r=>rankToVal(r)).sort((a,b)=>b-a);
    return [2, pair, ...kickers];
  }
  // High card
  return [1, ...sortedRanks.reverse()];
}

function compareHands(h1,h2){
  let r1=handRank(h1), r2=handRank(h2);
  for(let i=0;i<Math.max(r1.length,r2.length);i++){
    let v1=r1[i]||0, v2=r2[i]||0;
    if(v1>v2)return 1;
    if(v1<v2)return -1;
  }
  return 0;
}

function handName(hand){
  if(!hand||hand.length<5)return '';
  let all7=hand;
  let cnt=countRanks(all7);
  let vals=Object.values(cnt).sort((a,b)=>b-a);
  let sortedRanks=getSortedRanks(all7);
  let hasFlush=isFlush(all7);
  let straightHigh=isStraight(sortedRanks);
  let isStrFlush=hasFlush&&straightHigh!==null;
  if(isStrFlush){
    if(sortedRanks.includes(12)||(straightHigh===1&&sortedRanks.includes(12)))return '皇家同花顺';
    return '同花顺';
  }
  if(vals[0]===4)return '四条';
  if(vals[0]===3&&vals[1]===2)return '葫芦';
  if(hasFlush)return '同花';
  if(straightHigh!==null)return '顺子';
  if(vals[0]===3)return '三条';
  if(vals[0]===2&&vals[1]===2)return '两对';
  if(vals[0]===2)return '一对';
  return '高牌';
}

// ===== RENDERING =====
function cardHTML(card, hidden, delay){
  if(!card)return '';
  let cls = (card.suit==='♥'||card.suit==='♦')?'red':'black';
  let rankDisp = RANK_DISPLAY[card.rank]||card.rank;
  if(hidden){
    return `<div class="card card-back" style="animation-delay:${delay}ms"></div>`;
  }
  return `<div class="card ${cls} dealing" style="animation-delay:${delay}ms">
    <div class="corner tl">${rankDisp}<span style="font-size:14px">${card.suit}</span></div>
    <div class="suit-big">${card.suit}</div>
    <div class="corner br">${rankDisp}<span style="font-size:14px">${card.suit}</span></div>
  </div>`;
}

function render(){
  // AI hand
  let aiEl=document.getElementById('ai-hand');
  if(aiHand.length===0) aiEl.innerHTML='';
  else {
    let shown = (phase==='showdown'||phase==='end') ? false : true; // hide until showdown
    aiEl.innerHTML = aiHand.map((c,i)=>cardHTML(c, shown, i*150)).join('');
  }

  // Player hand
  let pEl=document.getElementById('player-hand');
  pEl.innerHTML = playerHand.map((c,i)=>cardHTML(c,false,i*150+300)).join('');

  // Community
  let commEl=document.getElementById('community-cards');
  let showCount = {preflop:0, flop:3, turn:4, river:5, showdown:5, end:5}[phase]||0;
  commEl.innerHTML = community.slice(0,showCount).map((c,i)=>cardHTML(c,false,i*100+200)).join('');

  // Pot & stacks
  document.getElementById('pot-display').textContent='$'+pot;
  document.getElementById('player-stack').textContent='$'+playerChips;
  document.getElementById('ai-stack').textContent='$'+aiChips;

  // Buttons
  updateButtons();
}

function updateButtons(){
  let fold=document.getElementById('btn-fold');
  let check=document.getElementById('btn-check');
  let call=document.getElementById('btn-call');
  let raise=document.getElementById('btn-raise');
  if(!playerCanAct||phase==='idle'||phase==='showdown'||phase==='end'){
    [fold,check,call,raise].forEach(b=>{b.disabled=true;b.style.display=''});
    return;
  }
  [fold,check,call,raise].forEach(b=>{b.disabled=false;b.style.display=''});
  let toCall = currentBet - playerBet;
  let canCheck = toCall===0;
  check.style.display = canCheck?'':'none';
  fold.textContent = '弃牌';

  if(canCheck){
    call.style.display='none';
    raise.textContent = '加注 $'+Math.min(50, playerChips);
    raise.disabled = playerChips < 50;
  } else {
    call.style.display='';
    call.textContent = '跟注 $'+Math.min(toCall, playerChips);
    call.disabled = playerChips < toCall;
    raise.textContent = '加注 $'+Math.min(50, playerChips);
    raise.disabled = playerChips < 50;
  }
  if(playerChips <= 0){
    [fold,check,call,raise].forEach(b=>b.disabled=true);
  }
}

// ===== GAME LOGIC =====
function setStatus(msg,cls){
  let el=document.getElementById('status-box');
  el.textContent=msg;
  el.className=cls||'';
  document.getElementById('win-line').textContent='';
}

function newGame(){
  deck=createDeck();
  playerHand=draw(2);
  aiHand=draw(2);
  community=[];
  pot=0; currentBet=0; playerBet=0; aiBet=0;
  phase='preflop';
  playerCanAct=false;

  document.getElementById('new-game-btn').style.display='none';
  document.getElementById('win-line').textContent='';

  // Blinds
  let sb=Math.min(10,playerChips);
  let bb=Math.min(20,aiChips);
  playerChips-=sb; aiChips-=bb;
  pot+=sb+bb;
  playerBet=sb; aiBet=bb;
  currentBet=bb;

  render();
  setStatus('你的回合 — 决定跟注还是加注');
  playerCanAct=true;
  updateButtons();

  // AI auto-acts after short delay if player is big blind already all-in etc
  setTimeout(()=>{
    // auto small blind check
    render();
  },100);
}

function playerAction(type){
  if(!playerCanAct)return;
  playerCanAct=false;

  if(type==='fold'){
    setStatus('你弃牌了！AI获胜','lose');
    aiChips+=pot; pot=0;
    phase='end';
    revealAI();
    render();
    showEndButtons();
    return;
  }

  let toCall = currentBet - playerBet;

  if(type==='check'){
    // nothing to add
  } else if(type==='call'){
    let callAmt = Math.min(toCall, playerChips);
    playerChips-=callAmt;
    playerBet+=callAmt;
    pot+=callAmt;
    // if all-in, adjust current bet
    if(playerChips===0 && toCall>0){
      // all-in, proceed
    }
  } else if(type==='raise'){
    let raiseAmt = Math.min(50, playerChips);
    let totalPut = playerBet + raiseAmt;
    playerChips-=raiseAmt;
    playerBet+=raiseAmt;
    pot+=raiseAmt;
    currentBet+=raiseAmt;
    toCall = currentBet - playerBet;
  }

  render();

  // AI's turn
  setStatus('AI思考中...');
  setTimeout(()=>aiAction(toCall),800);
}

function aiAction(toCall){
  if(phase==='end')return;
  // Simple AI: fold if very weak, call if decent, raise occasionally
  let rank=handRank([...aiHand,...community.slice(0,3)]); // evaluate pre-flop/river with what we have
  let handStrength=rank[0];
  // Add some randomness
  let rand=Math.random();

  // AI has seen the community cards
  let aiBest = handRank([...aiHand,...community]);
  let aiStrength=aiBest[0];

  let willFold=false;
  let willRaise=false;

  if(community.length===0){
    // Pre-flop: only 2 cards
    let cnt=countRanks(aiHand);
    let vals=Object.values(cnt).sort((a,b)=>b-a);
    let pair=vals[0]>=2;
    let suited=aiHand[0].suit===aiHand[1].suit;
    let hiCard=Math.max(rankToVal(aiHand[0].rank),rankToVal(aiHand[1].rank));
    let strength = pair?(2+vals[0]/10):(suited?hiCard/30:hiCard/50);

    if(strength<0.3 && rand<0.7) willFold=true;
    else if(strength>0.7 && rand<0.3) willRaise=true;
    else if(strength>0.5 && rand<0.15) willRaise=true;
  } else {
    // Post-flop: evaluate full hand
    if(aiStrength<1 && rand<0.6) willFold=true;
    else if(aiStrength>=5 && rand<0.2) willRaise=true;
    else if(aiStrength>=4 && rand<0.1) willRaise=true;
  }

  let aiCallAmt=0;
  if(!willFold){
    aiCallAmt=Math.min(toCall, aiChips);
    if(aiCallAmt<toCall && toCall>0){
      // AI goes all-in
    }
  }

  // Execute AI actions
  if(willFold && toCall>0){
    setStatus('AI弃牌！你获胜','win');
    playerChips+=pot; pot=0;
    phase='end';
    render();
    showEndButtons();
    return;
  }

  // AI calls
  if(aiCallAmt>0){
    aiChips-=aiCallAmt;
    aiBet+=aiCallAmt;
    pot+=aiCallAmt;
  } else if(toCall===0){
    // AI checks
  }

  if(willRaise && aiChips>50 && toCall<aiChips){
    let raiseAmt=Math.min(50, aiChips);
    aiChips-=raiseAmt;
    aiBet+=raiseAmt;
    pot+=raiseAmt;
    currentBet+=raiseAmt;
    // Player must respond
    setStatus('AI加注 $'+raiseAmt+'！你的回合');
    playerBet=0; // reset for player (will recompute toCall)
    toCall=currentBet-0; // player's current bet is 0
    render();
    playerCanAct=true;
    updateButtons();
    return;
  }

  // Advance phase
  advancePhase();
}

function advancePhase(){
  playerBet=0; aiBet=0; currentBet=0;

  if(phase==='preflop'){
    community=draw(3);
    phase='flop';
  } else if(phase==='flop'){
    community.push(...draw(1));
    phase='turn';
  } else if(phase==='turn'){
    community.push(...draw(1));
    phase='river';
  } else if(phase==='river'){
    phase='showdown';
    revealAI();
    determineWinner();
    return;
  }

  render();
  setStatus('你的回合');
  playerCanAct=true;
  updateButtons();
}

function revealAI(){
  let aiEl=document.getElementById('ai-hand');
  aiEl.innerHTML=aiHand.map((c,i)=>cardHTML(c,false,i*150)).join('');
}

function determineWinner(){
  phase='end';
  let playerBest=[...playerHand,...community];
  let aiBest=[...aiHand,...community];
  let cmp=compareHands(playerBest,aiBest);

  let playerName=handName(playerBest);
  let aiName=handName(aiBest);

  if(cmp>0){
    setStatus(`你获胜！${playerName} 胜过 ${aiName}！`,'win');
    document.getElementById('win-line').textContent=`你的: ${playerName}`;
    playerChips+=pot;
  } else if(cmp<0){
    setStatus(`AI获胜！${aiName} 胜过 ${playerName}`,'lose');
    document.getElementById('win-line').textContent=`AI: ${aiName}`;
    aiChips+=pot;
  } else {
    setStatus(`平局！双方都是${playerName}`,'push');
    let half=Math.floor(pot/2);
    playerChips+=half;
    aiChips+=pot-half;
  }
  pot=0;
  render();
  showEndButtons();
}

function showEndButtons(){
  let ng=document.getElementById('new-game-btn');
  ng.style.display='';
  if(playerChips<=0){
    ng.textContent='游戏结束 — 再来一局';
    playerChips=1000; aiChips=1000;
  } else if(aiChips<=0){
    ng.textContent='AI破产！你获胜 — 再来一局';
    playerChips=1000; aiChips=1000;
  } else {
    ng.textContent='下一局';
  }
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded',()=>{
  render();
  setStatus('点击 开始游戏 开始');
  // Auto-start on load
  setTimeout(newGame,300);
});
</script>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
}

.inland-security-footer {
  position: fixed;
  z-index: 10;
  bottom: 0;
  right: 0;
  width: fit-content;
  display: flex;
  justify-content: flex-end;
}

.tooltip-container {
  position: relative;
}

.trigger-content {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  padding: 8px;
  background-color: transparent;
  border-radius: 8px;
  cursor: pointer;
}

.minimax-link {
  display: flex;
  align-items: center;
  cursor: pointer;
  font-weight: 300;
  color: #adadad;
  text-decoration: none;
}

.minimax-link:visited {
  color: #adadad;
}

.minimax-link:hover {
  color: #666666;
}

.tooltip-content {
  position: absolute;
  bottom: 100%;
  right: 0;
