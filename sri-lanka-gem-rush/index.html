<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sri Lanka Gem Rush</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(180deg, #87CEEB 0%, #E8D5B7 100%);
      overflow: hidden;
      touch-action: none;
      font-family: 'Segoe UI', sans-serif;
    }
    #gameCanvas {
      display: block;
      margin: 0 auto;
      background: transparent;
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #fff;
      font-size: 18px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    #startScreen, #gameOverScreen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.7);
      color: #fff;
    }
    #gameOverScreen { display: none; }
    h1 { font-size: 28px; margin-bottom: 10px; color: #FFD700; }
    p { font-size: 14px; margin-bottom: 20px; text-align: center; padding: 0 20px; }
    button {
      padding: 15px 40px;
      font-size: 20px;
      background: #FF6B35;
      color: #fff;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255,107,53,0.4);
    }
    button:active { transform: scale(0.95); }
    .gems { font-size: 40px; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="ui">Score: <span id="score">0</span></div>
  
  <div id="startScreen">
    <div class="gems">💎🔴🟡</div>
    <h1>Sri Lanka Gem Rush</h1>
    <p>Drag to move the mining truck!<br>Collect gems: Blue +20, Red +15, Yellow +10<br>Avoid the rocks!</p>
    <button onclick="startGame()">START</button>
  </div>
  
  <div id="gameOverScreen">
    <div class="gems">💎</div>
    <h1>Game Over!</h1>
    <p>Final Score: <span id="finalScore">0</span></p>
    <button onclick="restartGame()">PLAY AGAIN</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let W, H;
    let score = 0;
    let gameRunning = false;
    let truck = { x: 0, y: 0, size: 55 };
    let gems = [];
    let rocks = [];
    let lastTime = 0;
    let spawnTimer = 0;
    let bgOffset = 0;
    
    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();
    
    // Touch/Mouse control
    let targetX, targetY;
    function updateInput(x, y) {
      targetX = x;
      targetY = y;
    }
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      updateInput(e.touches[0].clientX, e.touches[0].clientY);
    });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      updateInput(e.touches[0].clientX, e.touches[0].clientY);
    });
    canvas.addEventListener('mousedown', e => updateInput(e.clientX, e.clientY));
    canvas.addEventListener('mousemove', e => {
      if (e.buttons === 1) updateInput(e.clientX, e.clientY);
    });
    
    function startGame() {
      document.getElementById('startScreen').style.display = 'none';
      score = 0;
      document.getElementById('score').textContent = '0';
      truck.x = W / 2;
      truck.y = H - 100;
      targetX = truck.x;
      targetY = truck.y;
      gems = [];
      rocks = [];
      spawnTimer = 0;
      bgOffset = 0;
      gameRunning = true;
      lastTime = performance.now();
      requestAnimationFrame(gameLoop);
    }
    
    function restartGame() {
      document.getElementById('gameOverScreen').style.display = 'none';
      startGame();
    }
    
    function gameOver() {
      gameRunning = false;
      document.getElementById('finalScore').textContent = score;
      document.getElementById('gameOverScreen').style.display = 'flex';
    }
    
    function spawnGem() {
      const types = [
        { type: 'blue', color: '#1E90FF', points: 20, size: 22 },
        { type: 'red', color: '#DC143C', points: 15, size: 20 },
        { type: 'yellow', color: '#FFD700', points: 10, size: 18 }
      ];
      const t = types[Math.floor(Math.random() * types.length)];
      gems.push({
        x: Math.random() * (W - 40) + 20,
        y: -30,
        ...t,
        speed: 2 + Math.random() * 1.5,
        rotation: Math.random() * Math.PI * 2
      });
    }
    
    function spawnRock() {
      rocks.push({
        x: Math.random() * (W - 50) + 25,
        y: -40,
        size: 35 + Math.random() * 15,
        speed: 2.5 + Math.random() * 2
      });
    }
    
    function drawTruck(x, y, size) {
      ctx.save();
      ctx.translate(x, y);
      // Wheels
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(-size * 0.35, size * 0.35, size * 0.12, 0, Math.PI * 2);
      ctx.arc(size * 0.35, size * 0.35, size * 0.12, 0, Math.PI * 2);
      ctx.fill();
      // Body
      ctx.fillStyle = '#FF8C00';
      ctx.fillRect(-size * 0.4, -size * 0.2, size * 0.8, size * 0.4);
      // Cabin
      ctx.fillStyle = '#FFA500';
      ctx.fillRect(size * 0.1, -size * 0.35, size * 0.3, size * 0.2);
      // Window
      ctx.fillStyle = '#87CEEB';
      ctx.fillRect(size * 0.15, -size * 0.3, size * 0.2, size * 0.1);
      // Bed
      ctx.fillStyle = '#CD853F';
      ctx.fillRect(-size * 0.4, -size * 0.1, size * 0.7, size * 0.15);
      ctx.restore();
    }
    
    function drawGem(g) {
      ctx.save();
      ctx.translate(g.x, g.y);
      ctx.rotate(g.rotation);
      ctx.fillStyle = g.color;
      // Diamond shape
      ctx.beginPath();
      ctx.moveTo(0, -g.size);
      ctx.lineTo(g.size * 0.7, 0);
      ctx.lineTo(0, g.size);
      ctx.lineTo(-g.size * 0.7, 0);
      ctx.closePath();
      ctx.fill();
      // Shine
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath();
      ctx.moveTo(0, -g.size * 0.5);
      ctx.lineTo(g.size * 0.3, -g.size * 0.2);
      ctx.lineTo(0, 0);
      ctx.lineTo(-g.size * 0.3, -g.size * 0.2);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
    
    function drawRock(r) {
      ctx.save();
      ctx.translate(r.x, r.y);
      ctx.fillStyle = '#696969';
      ctx.beginPath();
      ctx.moveTo(-r.size * 0.5, 0);
      ctx.lineTo(-r.size * 0.3, -r.size * 0.5);
      ctx.lineTo(r.size * 0.2, -r.size * 0.6);
      ctx.lineTo(r.size * 0.5, -r.size * 0.3);
      ctx.lineTo(r.size * 0.4, r.size * 0.1);
      ctx.lineTo(-r.size * 0.2, r.size * 0.3);
      ctx.lineTo(-r.size * 0.5, r.size * 0.1);
      ctx.closePath();
      ctx.fill();
      // Cracks
      ctx.strokeStyle = '#505050';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-r.size * 0.2, -r.size * 0.2);
      ctx.lineTo(r.size * 0.1, r.size * 0.1);
      ctx.moveTo(r.size * 0.1, -r.size * 0.3);
      ctx.lineTo(r.size * 0.2, r.size * 0);
      ctx.stroke();
      ctx.restore();
    }
    
    function drawBackground() {
      // Sky gradient
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, '#87CEEB');
      grad.addColorStop(0.5, '#F0E68C');
      grad.addColorStop(1, '#DEB887');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
      
      // Mountains (Sri Lanka style)
      ctx.fillStyle = '#228B22';
      ctx.beginPath();
      ctx.moveTo(0, H * 0.6);
      ctx.lineTo(W * 0.2, H * 0.4);
      ctx.lineTo(W * 0.4, H * 0.55);
      ctx.lineTo(W * 0.6, H * 0.35);
      ctx.lineTo(W * 0.8, H * 0.5);
      ctx.lineTo(W, H * 0.45);
      ctx.lineTo(W, H);
      ctx.lineTo(0, H);
      ctx.closePath();
      ctx.fill();
      
      // Ground
      ctx.fillStyle = '#DAA520';
      ctx.fillRect(0, H * 0.75, W, H * 0.25);
      
      // Road
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(0, H * 0.8, W, H * 0.15);
      ctx.strokeStyle = '#FFF';
      ctx.setLineDash([20, 20]);
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, H * 0.875);
      ctx.lineTo(W, H * 0.875);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    
    function gameLoop(timestamp) {
      if (!gameRunning) return;
      const dt = Math.min((timestamp - lastTime) / 16.67, 2);
      lastTime = timestamp;
      
      // Move truck
      truck.x += (targetX - truck.x) * 0.12;
      truck.y += (targetY - truck.y) * 0.12;
      truck.x = Math.max(truck.size * 0.5, Math.min(W - truck.size * 0.5, truck.x));
      truck.y = Math.max(truck.size * 0.5, Math.min(H - truck.size * 0.5, truck.y));
      
      // Spawn
      spawnTimer++;
      if (spawnTimer > 35) {
        spawnTimer = 0;
        if (Math.random() > 0.35) spawnGem();
        if (Math.random() > 0.5) spawnRock();
      }
      
      // Update gems
      for (let i = gems.length - 1; i >= 0; i--) {
        const g = gems[i];
        g.y += g.speed * dt;
        g.rotation += 0.02 * dt;
        // Collision
        const dx = g.x - truck.x;
        const dy = g.y - truck.y;
        if (Math.sqrt(dx*dx + dy*dy) < g.size + truck.size * 0.4) {
          score += g.points;
          document.getElementById('score').textContent = score;
          gems.splice(i, 1);
          continue;
        }
        if (g.y > H + 30) gems.splice(i, 1);
      }
      
      // Update rocks
      for (let i = rocks.length - 1; i >= 0; i--) {
        const r = rocks[i];
        r.y += r.speed * dt;
        // Collision
        const dx = r.x - truck.x;
        const dy = r.y - truck.y;
        if (Math.sqrt(dx*dx + dy*dy) < r.size * 0.5 + truck.size * 0.4) {
          gameOver();
          return;
        }
        if (r.y > H + 50) rocks.splice(i, 1);
      }
      
      // Draw
      drawBackground();
      gems.forEach(drawGem);
      rocks.forEach(drawRock);
      drawTruck(truck.x, truck.y, truck.size);
      
      requestAnimationFrame(gameLoop);
    }
  </script>
</body>
</html>
