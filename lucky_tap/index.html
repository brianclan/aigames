<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lucky Tap</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    touch-action: none;
    user-select: none;
  }
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    color: #fff;
    font-size: 18px;
    z-index: 10;
  }
  #hud span { font-weight: 700; }
  #score { color: #ffd700; font-size: 22px; }
  #timer { color: #7fffd4; font-size: 22px; }
  #canvas {
    display: block;
    cursor: pointer;
  }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,15,26,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    color: #fff;
  }
  #overlay h1 {
    font-size: 48px;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #ffd700, #ff6b6b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  #overlay p {
    color: #aaa;
    font-size: 16px;
    margin-bottom: 32px;
    text-align: center;
    max-width: 300px;
    line-height: 1.6;
  }
  #overlay .final-score {
    font-size: 64px;
    color: #ffd700;
    font-weight: 900;
    margin: 8px 0 24px;
  }
  .btn {
    padding: 14px 40px;
    border: none;
    border-radius: 40px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    margin: 6px;
  }
  .btn:active { transform: scale(0.95); }
  .btn-primary {
    background: linear-gradient(135deg, #ffd700, #ff9500);
    color: #1a1a2e;
    box-shadow: 0 4px 20px rgba(255,215,0,0.4);
  }
  .btn-primary:hover { box-shadow: 0 4px 30px rgba(255,215,0,0.6); }
  #hint {
    position: fixed;
    bottom: 16px;
    left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 13px;
    pointer-events: none;
    z-index: 5;
  }
  .combo-pop {
    position: fixed;
    pointer-events: none;
    font-size: 24px;
    font-weight: 900;
    color: #ffd700;
    text-shadow: 0 0 10px rgba(255,215,0,0.8);
    animation: popAnim 0.6s ease-out forwards;
    z-index: 30;
  }
  @keyframes popAnim {
    0%   { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-60px) scale(1.4); opacity: 0; }
  }
  .miss-flash {
    position: fixed;
    inset: 0;
    background: rgba(255,50,50,0.15);
    pointer-events: none;
    animation: flash 0.3s ease-out forwards;
    z-index: 15;
  }
  @keyframes flash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>

<div id="hud">
  <div>⏱ <span id="timer">30</span>s</div>
  <div>🏆 <span id="score">0</span></div>
</div>

<canvas id="canvas"></canvas>

<div id="overlay">
  <h1>🎯 Lucky Tap</h1>
  <p>快速点击屏幕上出现的彩色圆圈，得分！<br>连击越多，分数越高！</p>
  <button class="btn btn-primary" id="startBtn">开始游戏</button>
</div>

<div id="hint">👆 点击圆圈得分，别让它们跑掉！</div>

<script>
(function(){
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const scoreEl = document.getElementById('score');
  const timerEl = document.getElementById('timer');

  let W, H;
  let running = false;
  let score = 0;
  let timeLeft = 30;
  let timerInterval = null;
  let circles = [];
  let combo = 0;
  let particles = [];

  const COLORS = [
    '#ff6b6b','#ffd700','#4ecdc4','#a29bfe','#fd79a8',
    '#00cec9','#e17055','#74b9ff','#55efc4','#fab1a0'
  ];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function randomColor() {
    return COLORS[Math.floor(Math.random() * COLORS.length)];
  }

  function spawnCircle() {
    const radius = 28 + Math.random() * 28;
    const x = radius + Math.random() * (W - radius * 2);
    const y = radius + 60 + Math.random() * (H - radius * 2 - 60);
    const color = randomColor();
    const life = 1.4 + Math.random() * 0.8; // seconds
    const maxScale = 0.7 + Math.random() * 0.6;
    return { x, y, radius, color, born: Date.now(), life, maxScale, alpha: 1, scale: 0, phase: 'grow' };
  }

  function spawnParticles(x, y, color) {
    for (let i = 0; i < 8; i++) {
      const angle = (Math.PI * 2 / 8) * i + Math.random() * 0.3;
      const speed = 2 + Math.random() * 3;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        color,
        life: 1,
        size: 3 + Math.random() * 4
      });
    }
  }

  function showCombo(x, y, points) {
    const el = document.createElement('div');
    el.className = 'combo-pop';
    el.textContent = '+' + points + (points >= 10 ? ' COMBO!' : '');
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 600);
  }

  function missFlash() {
    const el = document.createElement('div');
    el.className = 'miss-flash';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 300);
  }

  function getCircleAge(c) {
    return (Date.now() - c.born) / 1000;
  }

  function drawCircle(c) {
    const age = getCircleAge(c);
    // Animate scale: grow then shrink
    const growDur = 0.15;
    const shrinkStart = c.life - 0.2;
    if (age < growDur) {
      c.scale = age / growDur;
    } else if (age > shrinkStart) {
      c.scale = 1 - (age - shrinkStart) / (c.life - shrinkStart);
    } else {
      c.scale = 1;
    }
    c.alpha = c.scale;

    const r = c.radius * c.scale;
    if (r <= 0) return;

    ctx.save();
    ctx.globalAlpha = Math.min(c.alpha, 1);

    // Glow
    const grad = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, r * 1.5);
    grad.addColorStop(0, c.color + 'cc');
    grad.addColorStop(1, c.color + '00');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(c.x, c.y, r * 1.5, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.fillStyle = c.color;
    ctx.beginPath();
    ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
    ctx.fill();

    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.arc(c.x - r * 0.3, c.y - r * 0.3, r * 0.35, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawParticle(p) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function loop() {
    if (!running) return;
    ctx.clearRect(0, 0, W, H);

    // Background dots
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    for (let i = 0; i < 40; i++) {
      const bx = (i * 137.5) % W;
      const by = (i * 97.3) % H;
      ctx.beginPath();
      ctx.arc(bx, by, 2, 0, Math.PI * 2);
      ctx.fill();
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.1;
      p.life -= 0.03;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      drawParticle(p);
    }

    // Circles
    for (let i = circles.length - 1; i >= 0; i--) {
      const c = circles[i];
      const age = getCircleAge(c);
      if (age >= c.life) {
        if (c.clicked) { circles.splice(i, 1); continue; }
        // Missed
        combo = 0;
        missFlash();
        circles.splice(i, 1);
        continue;
      }
      drawCircle(c);
    }

    // Spawn
    if (Math.random() < 0.045) {
      circles.push(spawnCircle());
    }

    requestAnimationFrame(loop);
  }

  function handleTap(x, y) {
    if (!running) return;
    let hit = false;
    for (let i = 0; i < circles.length; i++) {
      const c = circles[i];
      const age = getCircleAge(c);
      const r = c.radius * c.scale;
      const dx = x - c.x, dy = y - c.y;
      if (dx*dx + dy*dy <= r*r && age < c.life) {
        c.clicked = true;
        combo++;
        const pts = combo >= 5 ? 3 : (combo >= 3 ? 2 : 1);
        score += pts * 10;
        scoreEl.textContent = score;
        spawnParticles(c.x, c.y, c.color);
        showCombo(c.x, c.y, pts * 10);
        hit = true;
        break;
      }
    }
    if (!hit) {
      combo = 0;
      missFlash();
    }
  }

  canvas.addEventListener('click', e => {
    handleTap(e.clientX, e.clientY);
  });
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    for (let t of e.changedTouches) {
      handleTap(t.clientX, t.clientY);
    }
  }, { passive: false });

  function startGame() {
    score = 0;
    timeLeft = 30;
    combo = 0;
    circles = [];
    particles = [];
    scoreEl.textContent = '0';
    timerEl.textContent = '30';
    running = true;
    overlay.style.display = 'none';
    loop();
    timerInterval = setInterval(() => {
      timeLeft--;
      timerEl.textContent = timeLeft;
      if (timeLeft <= 0) {
        endGame();
      }
    }, 1000);
  }

  function endGame() {
    running = false;
    clearInterval(timerInterval);
    setTimeout(() => {
      const best = localStorage.getItem('luckyTapBest') || 0;
      if (score > best) localStorage.setItem('luckyTapBest', score);
      overlay.innerHTML = `
        <h1>游戏结束！</h1>
        <div class="final-score">${score}</div>
        <p>历史最高：${Math.max(score, best)}</p>
        <button class="btn btn-primary" id="restartBtn">再来一次</button>
      `;
      overlay.style.display = 'flex';
      document.getElementById('restartBtn').addEventListener('click', startGame);
    }, 500);
  }

  startBtn.addEventListener('click', startGame);
})();
</script>
</body>
</html>
