<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Beans</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:linear-gradient(180deg,#fff7e8,#ffd8a8);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{display:flex;align-items:stretch;justify-content:center}
#app{position:relative;width:100vw;height:100vh;overflow:hidden}
canvas{display:block;width:100%;height:100%}
#ui{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;color:#5a341a}
.panel{position:absolute;left:12px;right:12px;top:12px;display:flex;justify-content:space-between;gap:10px}
.card{background:rgba(255,255,255,.78);backdrop-filter:blur(6px);border:2px solid rgba(115,64,30,.15);border-radius:16px;padding:10px 12px;box-shadow:0 8px 24px rgba(140,83,31,.12);min-width:92px}
.label{font-size:12px;opacity:.7}
.value{font-size:22px;font-weight:800;line-height:1.1}
#hint{position:absolute;left:50%;top:92px;transform:translateX(-50%);background:rgba(90,52,26,.9);color:#fff;padding:8px 14px;border-radius:999px;font-size:13px;pointer-events:none;opacity:.92}
#bottom{position:absolute;left:12px;right:12px;bottom:max(12px,env(safe-area-inset-bottom));display:flex;justify-content:space-between;align-items:center;gap:10px}
#goal{flex:1;background:rgba(255,255,255,.78);border:2px solid rgba(115,64,30,.15);border-radius:16px;padding:10px 12px;font-size:14px;line-height:1.35}
button{pointer-events:auto;border:none;border-radius:16px;padding:12px 18px;background:#7c4b2b;color:#fff;font-size:16px;font-weight:800;box-shadow:0 8px 20px rgba(124,75,43,.28)}
#overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(72,40,17,.28);pointer-events:auto}
#dialog{width:min(88vw,360px);background:#fff7ee;border-radius:24px;padding:22px;text-align:center;box-shadow:0 16px 40px rgba(73,36,9,.22);border:2px solid rgba(122,73,41,.12)}
#dialog h2{margin:0 0 8px;font-size:28px;color:#6b3e1f}
#dialog p{margin:8px 0 18px;color:#7a5536;font-size:16px;line-height:1.5}
</style>
</head>
<body>
<div id="app">
<canvas id="game"></canvas>
<div id="ui">
<div class="panel">
<div class="card"><div class="label">分数</div><div class="value" id="score">0</div></div>
<div class="card"><div class="label">步数</div><div class="value" id="moves">30</div></div>
<div class="card"><div class="label">连击</div><div class="value" id="combo">x1</div></div>
</div>
<div id="hint">点两个相邻豆子即可交换</div>
<div id="bottom">
<div id="goal">连续消除会加分更高，30 步后结算。</div>
<button id="restart">重开</button>
</div>
<div id="overlay">
<div id="dialog">
<h2>本局结束</h2>
<p id="finalText"></p>
<button id="again">再来一局</button>
</div>
</div>
</div>
</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const movesEl = document.getElementById('moves');
  const comboEl = document.getElementById('combo');
  const overlay = document.getElementById('overlay');
  const finalText = document.getElementById('finalText');
  const restartBtn = document.getElementById('restart');
  const againBtn = document.getElementById('again');
  const hint = document.getElementById('hint');

  const COLS = 6;
  const ROWS = 8;
  const TYPES = 6;
  const MOVE_LIMIT = 30;
  const BEANS = [
    { fill:'#f25f5c', edge:'#b43835' },
    { fill:'#70c1b3', edge:'#3b7f74' },
    { fill:'#ffe066', edge:'#bf9d16' },
    { fill:'#247ba0', edge:'#13526d' },
    { fill:'#b388eb', edge:'#6d48a2' },
    { fill:'#ff9f1c', edge:'#b56a09' }
  ];

  let dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  let w = 0, h = 0, boardX = 0, boardY = 0, cell = 0;
  let board = [];
  let selected = null;
  let score = 0;
  let moves = MOVE_LIMIT;
  let combo = 1;
  let busy = false;
  let particles = [];
  let pulse = 0;

  function resize() {
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const topPad = 132;
    const bottomPad = 110;
    const maxBoardW = Math.min(w - 24, 430);
    const maxBoardH = h - topPad - bottomPad;
    cell = Math.floor(Math.min(maxBoardW / COLS, maxBoardH / ROWS));
    boardX = Math.floor((w - cell * COLS) / 2);
    boardY = Math.floor(topPad + (maxBoardH - cell * ROWS) / 2);
  }

  function randType() {
    return (Math.random() * TYPES) | 0;
  }

  function makeCell(type, row, col) {
    return { type, row, col, offsetY: 0, scale: 1, alpha: 1 };
  }

  function causesMatch(r, c, type) {
    if (c >= 2 && board[r][c-1].type === type && board[r][c-2].type === type) return true;
    if (r >= 2 && board[r-1][c].type === type && board[r-2][c].type === type) return true;
    return false;
  }

  function initBoard() {
    board = [];
    for (let r = 0; r < ROWS; r++) {
      const row = [];
      for (let c = 0; c < COLS; c++) {
        let t = randType();
        let guard = 0;
        while (causesMatchForTemp(r, c, row, t) && guard++ < 20) t = randType();
        row.push(makeCell(t, r, c));
      }
      board.push(row);
    }
  }

  function causesMatchForTemp(r, c, tempRow, type) {
    if (c >= 2 && tempRow[c-1].type === type && tempRow[c-2].type === type) return true;
    if (r >= 2 && board[r-1][c].type === type && board[r-2][c].type === type) return true;
    return false;
  }

  function resetGame() {
    score = 0;
    moves = MOVE_LIMIT;
    combo = 1;
    selected = null;
    busy = false;
    particles = [];
    overlay.style.display = 'none';
    initBoard();
    updateUI();
  }

  function updateUI() {
    scoreEl.textContent = score;
    movesEl.textContent = moves;
    comboEl.textContent = 'x' + combo;
  }

  function getCellAt(x, y) {
    const c = Math.floor((x - boardX) / cell);
    const r = Math.floor((y - boardY) / cell);
    if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return null;
    return { r, c };
  }

  function adjacent(a, b) {
    return Math.abs(a.r - b.r) + Math.abs(a.c - b.c) === 1;
  }

  function swap(a, b) {
    const t = board[a.r][a.c];
    board[a.r][a.c] = board[b.r][b.c];
    board[b.r][b.c] = t;
    board[a.r][a.c].row = a.r; board[a.r][a.c].col = a.c;
    board[b.r][b.c].row = b.r; board[b.r][b.c].col = b.c;
  }

  function findMatches() {
    const marks = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
    let found = false;
    for (let r = 0; r < ROWS; r++) {
      let len = 1;
      for (let c = 1; c <= COLS; c++) {
        const same = c < COLS && board[r][c].type === board[r][c-1].type;
        if (same) len++;
        else {
          if (len >= 3) {
            found = true;
            for (let k = 0; k < len; k++) marks[r][c-1-k] = true;
          }
          len = 1;
        }
      }
    }
    for (let c = 0; c < COLS; c++) {
      let len = 1;
      for (let r = 1; r <= ROWS; r++) {
        const same = r < ROWS && board[r][c].type === board[r-1][c].type;
        if (same) len++;
        else {
          if (len >= 3) {
            found = true;
            for (let k = 0; k < len; k++) marks[r-1-k][c] = true;
          }
          len = 1;
        }
      }
    }
    return found ? marks : null;
  }

  function spawnBurst(x, y, color) {
    for (let i = 0; i < 9; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 1 + Math.random() * 3;
      particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1.4, life: 28 + Math.random() * 14, color, size: 3 + Math.random() * 5 });
    }
  }

  function collapseMatches(marks) {
    let removed = 0;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (marks[r][c]) {
          removed++;
          const x = boardX + c * cell + cell / 2;
          const y = boardY + r * cell + cell / 2;
          spawnBurst(x, y, BEANS[board[r][c].type].fill);
        }
      }
    }
    score += removed * 10 * combo;
    combo = Math.min(combo + 1, 9);
    for (let c = 0; c < COLS; c++) {
      const kept = [];
      for (let r = ROWS - 1; r >= 0; r--) if (!marks[r][c]) kept.push(board[r][c]);
      let writeR = ROWS - 1;
      for (let i = 0; i < kept.length; i++) {
        const bean = kept[i];
        bean.row = writeR;
        bean.col = c;
        board[writeR][c] = bean;
        writeR--;
      }
      while (writeR >= 0) {
        const bean = makeCell(randType(), writeR, c);
        bean.offsetY = -(writeR + 1) * cell * 0.7;
        board[writeR][c] = bean;
        writeR--;
      }
    }
    updateUI();
  }

  function anyMovesLeft() {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const dirs = [[1,0],[0,1]];
        for (const d of dirs) {
          const nr = r + d[0], nc = c + d[1];
          if (nr >= ROWS || nc >= COLS) continue;
          swap({r,c},{r:nr,c:nc});
          const ok = !!findMatches();
          swap({r,c},{r:nr,c:nc});
          if (ok) return true;
        }
      }
    }
    return false;
  }

  async function resolveBoard() {
    while (true) {
      const marks = findMatches();
      if (!marks) break;
      collapseMatches(marks);
      await wait(180);
    }
    if (!anyMovesLeft()) {
      initBoard();
    }
    combo = 1;
    updateUI();
  }

  function wait(ms) {
    return new Promise(res => setTimeout(res, ms));
  }

  async function trySwap(a, b) {
    if (busy || moves <= 0) return;
    busy = true;
    swap(a, b);
    await wait(120);
    const matched = findMatches();
    if (matched) {
      moves--;
      updateUI();
      collapseMatches(matched);
      await wait(180);
      await resolveBoard();
      if (moves <= 0) endGame();
    } else {
      swap(a, b);
      combo = 1;
      updateUI();
      hint.textContent = '这次没有配对成功';
      setTimeout(() => { if (moves > 0) hint.textContent = '点两个相邻豆子即可交换'; }, 900);
    }
    selected = null;
    busy = false;
  }

  function endGame() {
    overlay.style.display = 'flex';
    finalText.textContent = '你获得了 ' + score + ' 分。继续挑战更高分吧。';
  }

  function handlePick(clientX, clientY) {
    if (busy || moves <= 0) return;
    const p = getCellAt(clientX, clientY);
    if (!p) {
      selected = null;
      return;
    }
    if (!selected) {
      selected = p;
      hint.textContent = '再点一个相邻豆子完成交换';
      return;
    }
    if (selected.r === p.r && selected.c === p.c) {
      selected = null;
      hint.textContent = '点两个相邻豆子即可交换';
      return;
    }
    if (!adjacent(selected, p)) {
      selected = p;
      hint.textContent = '只能交换相邻豆子';
      return;
    }
    hint.textContent = '正在交换...';
    trySwap(selected, p);
  }

  canvas.addEventListener('pointerdown', e => handlePick(e.clientX, e.clientY));
  restartBtn.addEventListener('click', resetGame);
  againBtn.addEventListener('click', resetGame);
  window.addEventListener('resize', resize);

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawBean(x, y, size, bean, isSel) {
    const s = isSel ? 1.08 + Math.sin(pulse * 0.16) * 0.02 : 1;
    const rx = size * 0.34 * s;
    const ry = size * 0.28 * s;
    ctx.save();
    ctx.translate(x, y + bean.offsetY);
    ctx.fillStyle = BEANS[bean.type].edge;
    ctx.beginPath();
    ctx.ellipse(0, size * 0.06, rx, ry, -0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = BEANS[bean.type].fill;
    ctx.beginPath();
    ctx.ellipse(0, 0, rx, ry, -0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,.45)';
    ctx.lineWidth = Math.max(2, size * 0.04);
    ctx.beginPath();
    ctx.ellipse(-size * 0.08, -size * 0.06, rx * 0.35, ry * 0.18, -0.4, 0, Math.PI * 2);
    ctx.stroke();
    if (isSel) {
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = Math.max(3, size * 0.06);
      ctx.beginPath();
      ctx.ellipse(0, 0, rx + 5, ry + 5, -0.2, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawBoard() {
    const bw = cell * COLS;
    const bh = cell * ROWS;
    const bg1 = ctx.createLinearGradient(0, boardY, 0, boardY + bh);
    bg1.addColorStop(0, 'rgba(255,255,255,.88)');
    bg1.addColorStop(1, 'rgba(255,241,222,.94)');
    ctx.fillStyle = bg1;
    roundRect(boardX - 10, boardY - 10, bw + 20, bh + 20, 24);
    ctx.fill();
    ctx.strokeStyle = 'rgba(109,72,38,.12)';
    ctx.lineWidth = 2;
    ctx.stroke();

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const x = boardX + c * cell;
        const y = boardY + r * cell;
        ctx.fillStyle = (r + c) % 2 ? 'rgba(255,224,192,.55)' : 'rgba(255,235,210,.75)';
        roundRect(x + 3, y + 3, cell - 6, cell - 6, 14);
        ctx.fill();
      }
    }

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const bean = board[r][c];
        bean.offsetY *= 0.72;
        const cx = boardX + c * cell + cell / 2;
        const cy = boardY + r * cell + cell / 2;
        const isSel = selected && selected.r === r && selected.c === c;
        drawBean(cx, cy, cell, bean, isSel);
      }
    }
  }

  function drawParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= 1;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.08;
      if (p.life <= 0) {
        particles.splice(i, 1);
        continue;
      }
      ctx.globalAlpha = Math.max(0, p.life / 40);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (p.life / 35), 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  function drawBg() {
    const g = ctx.createLinearGradient(0, 0, 0, h);
    g.addColorStop(0, '#fff9ef');
    g.addColorStop(0.55, '#ffe7c5');
    g.addColorStop(1, '#ffd5a1');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = 'rgba(255,255,255,.34)';
    for (let i = 0; i < 6; i++) {
      const rx = (i * 73 + pulse * 0.3) % (w + 120) - 60;
      const ry = 80 + i * 118;
      ctx.beginPath();
      ctx.ellipse(rx, ry, 54, 22, 0.25, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function loop() {
    pulse++;
    drawBg();
    drawBoard();
    drawParticles();
    requestAnimationFrame(loop);
  }

  resize();
  resetGame();
  loop();
})();
</script>
</body>
</html>
