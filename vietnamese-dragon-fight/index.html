<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Vietnamese Dragon Fight</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      overflow: hidden;
      touch-action: none;
      font-family: 'Segoe UI', sans-serif;
    }
    #gameCanvas { display: block; margin: 0 auto; }
    #ui {
      position: absolute; top: 10px; left: 10px; right: 10px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 10; pointer-events: none;
    }
    .hp-bar {
      width: 150px; height: 25px; background: #333; border-radius: 15px;
      border: 3px solid #FFD700; overflow: hidden;
    }
    .hp-fill {
      height: 100%; background: linear-gradient(90deg, #ff4444, #ff6b6b);
      transition: width 0.3s;
    }
    .hp-fill.player2 {
      background: linear-gradient(90deg, #44aaff, #6bb3ff);
    }
    .player-label {
      color: #FFD700; font-size: 14px; font-weight: bold;
      margin-bottom: 5px; text-shadow: 1px 1px 2px #000;
    }
    .score-display {
      background: rgba(0,0,0,0.6); color: #FFD700;
      padding: 8px 16px; border-radius: 20px; font-size: 18px; font-weight: bold;
    }
    #startScreen, #gameOverScreen {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 20;
      background: rgba(0,0,0,0.85);
    }
    #gameOverScreen { display: none; }
    h1 { color: #FFD700; font-size: 32px; text-shadow: 2px 2px 4px #000; margin-bottom: 10px; }
    h2 { color: #FF4444; font-size: 28px; text-shadow: 2px 2px 4px #000; margin-bottom: 20px; }
    p { color: #fff; font-size: 16px; margin-bottom: 15px; text-align: center; max-width: 320px; }
    .btn {
      background: linear-gradient(180deg, #FFD700, #FFA500);
      border: none; padding: 15px 40px; font-size: 20px; font-weight: bold;
      border-radius: 30px; cursor: pointer; color: #333;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin: 5px;
    }
    .btn:active { transform: scale(0.95); }
    .emoji-badge { font-size: 60px; margin-bottom: 15px; }
    .controls-hint {
      display: flex; gap: 20px; margin-top: 10px;
    }
    .key-hint {
      background: rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 10px;
      color: #fff; font-size: 14px;
    }
    .key-hint span { color: #FFD700; font-weight: bold; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="ui">
    <div>
      <div class="player-label">🐉 Player 1 (Red Dragon)</div>
      <div class="hp-bar"><div class="hp-fill" id="hp1" style="width:100%"></div></div>
    </div>
    <div class="score-display">Wins: <span id="p1Wins">0</span> - <span id="p2Wins">0</span> :Wins 🐉</div>
    <div>
      <div class="player-label">🌀 Player 2 (Blue Dragon)</div>
      <div class="hp-bar"><div class="hp-fill player2" id="hp2" style="width:100%"></div></div>
    </div>
  </div>
  <div id="startScreen">
    <div class="emoji-badge">🐉⚔️🌀</div>
    <h1>Vietnamese Dragon Fight</h1>
    <p>传统越南龙战游戏！控制两条龙进行对决！</p>
    <p>Player 1: A/D移动, W攻击</p>
    <p>Player 2: ←/→移动, ↑攻击</p>
    <button class="btn" id="startBtn">开始战斗!</button>
  </div>
  <div id="gameOverScreen">
    <div class="emoji-badge" id="winnerEmoji">🐉</div>
    <h2 id="winnerText">Player 1 获胜!</h2>
    <p id="finalScore">本回合比分: 0 - 0</p>
    <button class="btn" id="restartBtn">再来一局!</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width = window.innerWidth;
    const H = canvas.height = window.innerHeight;
    const GROUND_Y = H - 100;

    let gameRunning = false;
    let p1Wins = parseInt(localStorage.getItem('dragonP1Wins') || '0');
    let p2Wins = parseInt(localStorage.getItem('dragonP2Wins') || '0');
    
    document.getElementById('p1Wins').textContent = p1Wins;
    document.getElementById('p2Wins').textContent = p2Wins;

    // Players
    const p1 = {
      x: 150, y: GROUND_Y - 80, w: 60, h: 80,
      vx: 0, vy: 0, hp: 100, maxHp: 100,
      facing: 1, attacking: false, attackFrame: 0,
      grounded: true, name: 'Red Dragon', color: '#ff4444'
    };
    
    const p2 = {
      x: W - 210, y: GROUND_Y - 80, w: 60, h: 80,
      vx: 0, vy: 0, hp: 100, maxHp: 100,
      facing: -1, attacking: false, attackFrame: 0,
      grounded: true, name: 'Blue Dragon', color: '#4488ff'
    };

    // Controls
    const keys = {};
    document.addEventListener('keydown', e => keys[e.code] = true);
    document.addEventListener('keyup', e => keys[e.code] = false);

    function handleInput() {
      // Player 1 controls (A/D/W)
      p1.vx = 0;
      if (keys['KeyA']) p1.vx = -6;
      if (keys['KeyD']) p1.vx = 6;
      if (keys['KeyW'] && !p1.attacking) {
        p1.attacking = true;
        p1.attackFrame = 20;
      }
      
      // Player 2 controls (Arrow keys)
      p2.vx = 0;
      if (keys['ArrowLeft']) p2.vx = -6;
      if (keys['ArrowRight']) p2.vx = 6;
      if (keys['ArrowUp'] && !p2.attacking) {
        p2.attacking = true;
        p2.attackFrame = 20;
      }
    }

    function updatePlayer(p, other) {
      // Movement
      p.x += p.vx;
      p.y += p.vy;
      
      // Gravity
      if (!p.grounded) {
        p.vy += 0.8;
      }
      
      // Ground collision
      if (p.y >= GROUND_Y - p.h) {
        p.y = GROUND_Y - p.h;
        p.vy = 0;
        p.grounded = true;
      }
      
      // Wall collision
      if (p.x < 0) p.x = 0;
      if (p.x > W - p.w) p.x = W - p.w;
      
      // Face opponent
      p.facing = other.x > p.x ? 1 : -1;
      
      // Attack
      if (p.attacking) {
        p.attackFrame--;
        if (p.attackFrame <= 0) {
          p.attacking = false;
        }
        // Check hit
        const attackBox = {
          x: p.facing > 0 ? p.x + p.w : p.x - 50,
          y: p.y, w: 50, h: p.h
        };
        if (rectsCollide(attackBox, other) && p.attackFrame > 10) {
          other.hp -= 3;
          other.x += p.facing * 5;
        }
      }
    }

    function rectsCollide(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x &&
             a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function update() {
      if (!gameRunning) return;
      
      handleInput();
      updatePlayer(p1, p2);
      updatePlayer(p2, p1);
      
      // Check KO
      if (p1.hp <= 0 || p2.hp <= 0) {
        gameEnd();
      }
      
      // Update HP bars
      document.getElementById('hp1').style.width = Math.max(0, p1.hp) + '%';
      document.getElementById('hp2').style.width = Math.max(0, p2.hp) + '%';
    }

    function drawDragon(x, y, w, h, color, facing, attacking, name) {
      ctx.save();
      ctx.translate(x + w/2, y + h/2);
      if (facing < 0) ctx.scale(-1, 1);
      
      // Body
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(0, 0, w/2, h/2, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Dragon head
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(w/2 + 15, -10, 25, 20, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Eyes
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(w/2 + 20, -15, 5, 0, Math.PI * 2);
      ctx.fill();
      
      // Horns
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.moveTo(w/2 + 5, -30);
      ctx.lineTo(w/2 + 15, -45);
      ctx.lineTo(w/2 + 25, -30);
      ctx.fill();
      
      // Attack effect
      if (attacking) {
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(w/2 + 40, 0, 20, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#FF6B00';
        ctx.beginPath();
        ctx.arc(w/2 + 40, 0, 12, 0, Math.PI * 2);
        ctx.fill();
      }
      
      ctx.restore();
      
      // Name
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 14px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(name, x + w/2, y - 10);
    }

    function draw() {
      // Background - Vietnamese style
      const gradient = ctx.createLinearGradient(0, 0, 0, H);
      gradient.addColorStop(0, '#1a1a2e');
      gradient.addColorStop(0.5, '#16213e');
      gradient.addColorStop(1, '#0f3460');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, W, H);
      
      // Traditional pattern (dragon scale pattern)
      ctx.strokeStyle = 'rgba(255, 215, 0, 0.1)';
      ctx.lineWidth = 1;
      for (let i = 0; i < W; i += 40) {
        for (let j = 0; j < H; j += 40) {
          ctx.beginPath();
          ctx.arc(i, j, 15, 0, Math.PI * 2);
          ctx.stroke();
        }
      }
      
      // Ground
      ctx.fillStyle = '#8B0000';
      ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
      ctx.fillStyle = '#CD5C5C';
      ctx.fillRect(0, GROUND_Y, W, 10);
      
      // Torches
      for (let i = 1; i < 5; i++) {
        const tx = i * W / 5;
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(tx - 5, GROUND_Y - 80, 10, 80);
        // Flame
        ctx.fillStyle = '#FF4500';
        ctx.beginPath();
        ctx.arc(tx, GROUND_Y - 90, 15 + Math.random() * 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(tx, GROUND_Y - 90, 8, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // Draw players
      drawDragon(p1.x, p1.y, p1.w, p1.h, p1.color, p1.facing, p1.attacking, '🐉 Red');
      drawDragon(p2.x, p2.y, p2.w, p2.h, p2.color, p2.facing, p2.attacking, '🌀 Blue');
      
      // VS text
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 24px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('⚔️ VS ⚔️', W/2, 80);
    }

    function gameEnd() {
      gameRunning = false;
      let winner = '';
      let emoji = '';
      
      if (p1.hp <= 0) {
        p2Wins++;
        localStorage.setItem('dragonP2Wins', p2Wins);
        winner = 'Player 2 (Blue Dragon) 获胜!';
        emoji = '🌀';
      } else {
        p1Wins++;
        localStorage.setItem('dragonP1Wins', p1Wins);
        winner = 'Player 1 (Red Dragon) 获胜!';
        emoji = '🐉';
      }
      
      document.getElementById('p1Wins').textContent = p1Wins;
      document.getElementById('p2Wins').textContent = p2Wins;
      document.getElementById('winnerEmoji').textContent = emoji;
      document.getElementById('winnerText').textContent = winner;
      document.getElementById('finalScore').textContent = `总比分: ${p1Wins} - ${p2Wins}`;
      document.getElementById('gameOverScreen').style.display = 'flex';
    }

    function startGame() {
      p1.x = 150; p1.y = GROUND_Y - 80;
      p1.hp = 100; p1.vx = 0; p1.vy = 0;
      p1.attacking = false; p1.facing = 1;
      
      p2.x = W - 210; p2.y = GROUND_Y - 80;
      p2.hp = 100; p2.vx = 0; p2.vy = 0;
      p2.attacking = false; p2.facing = -1;
      
      document.getElementById('hp1').style.width = '100%';
      document.getElementById('hp2').style.width = '100%';
      document.getElementById('startScreen').style.display = 'none';
      document.getElementById('gameOverScreen').style.display = 'none';
      gameRunning = true;
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // Touch controls for mobile
    let touchStartX = null;
    canvas.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      if (e.touches[0].clientY < H / 2) {
        // Top half - attack
        if (touchStartX < W / 2) keys['KeyW'] = true;
        else keys['ArrowUp'] = true;
      }
    });
    canvas.addEventListener('touchmove', e => {
      if (touchStartX !== null) {
        const dx = e.touches[0].clientX - touchStartX;
        if (Math.abs(dx) > 30) {
          if (dx > 0) {
            keys['KeyD'] = true; keys['KeyA'] = false;
            keys['ArrowRight'] = true; keys['ArrowLeft'] = false;
          } else {
            keys['KeyA'] = true; keys['KeyD'] = false;
            keys['ArrowLeft'] = true; keys['ArrowRight'] = false;
          }
        }
      }
    });
    canvas.addEventListener('touchend', () => {
      touchStartX = null;
      keys['KeyA'] = keys['KeyD'] = keys['KeyW'] = false;
      keys['ArrowLeft'] = keys['ArrowRight'] = keys['ArrowUp'] = false;
    });

    document.getElementById('startBtn').onclick = startGame;
    document.getElementById('restartBtn').onclick = startGame;

    gameLoop();
  </script>
</body>
</html>
