<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cat Catch</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;background:#87CEEB}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();
addEventListener('resize',resize);

const cat={x:0,y:0,w:80,h:70,targetX:0};
const items=[];
const clouds=[];
let score=0,highScore=0,lives=3,gameOver=false,startTime=0;

function init(){
  cat.x=W/2;cat.y=H-100;cat.targetX=W/2;
  items.length=0;
  score=0;lives=3;gameOver=false;
  startTime=Date.now();
  for(let i=0;i<5;i++)clouds.push({x:Math.random()*W,y:Math.random()*H*0.4,s:0.5+Math.random()*0.5});
}

function drawCat(x,y){
  ctx.save();
  ctx.translate(x,y);
  ctx.fillStyle='#FFB347';
  ctx.beginPath();
  ctx.ellipse(0,10,35,30,0,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#FFA500';
  ctx.beginPath();
  ctx.ellipse(-25,-15,15,20,-0.3,0,Math.PI*2);
  ctx.ellipse(25,-15,15,20,0.3,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#FFB347';
  ctx.beginPath();
  ctx.arc(0,-5,28,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#FFE4B5';
  ctx.beginPath();
  ctx.ellipse(0,5,20,18,0,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#333';
  ctx.beginPath();
  ctx.ellipse(-10,-8,4,5,0,0,Math.PI*2);
  ctx.ellipse(10,-8,4,5,0,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.arc(-9,-9,2,0,Math.PI*2);
  ctx.arc(11,-9,2,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#FFB6C1';
  ctx.beginPath();
  ctx.ellipse(-8,3,3,2,0,0,Math.PI*2);
  ctx.ellipse(8,3,3,2,0,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#333';
  ctx.beginPath();
  ctx.moveTo(-3,5);
  ctx.lineTo(0,10);
  ctx.lineTo(3,5);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-15,0);
  ctx.quadraticCurveTo(-25,-3,-20,5);
  ctx.moveTo(15,0);
  ctx.quadraticCurveTo(25,-3,20,5);
  ctx.stroke();
  ctx.fillStyle='#FFB347';
  ctx.beginPath();
  ctx.moveTo(45,10);
  ctx.lineTo(70,5);
  ctx.lineTo(70,15);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawFish(x,y,rot){
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(rot||0);
  ctx.fillStyle='#4169E1';
  ctx.beginPath();
  ctx.ellipse(0,0,20,12,0,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(18,0);
  ctx.lineTo(32,-10);
  ctx.lineTo(32,10);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle='#6495ED';
  ctx.beginPath();
  ctx.ellipse(-5,-3,8,5,0,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#333';
  ctx.beginPath();
  ctx.arc(-12,-2,3,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.arc(-11,-3,1.5,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle='#333';
  ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(5,6);ctx.lineTo(5,10);
  ctx.moveTo(10,6);ctx.lineTo(10,10);
  ctx.stroke();
  ctx.restore();
}

function drawApple(x,y,rot){
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(rot||0);
  ctx.fillStyle='#E74C3C';
  ctx.beginPath();
  ctx.arc(0,3,22,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#C0392B';
  ctx.beginPath();
  ctx.arc(5,8,15,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#8B4513';
  ctx.fillRect(-2,-22,4,12);
  ctx.fillStyle='#27AE60';
  ctx.beginPath();
  ctx.ellipse(8,-18,10,5,0.5,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.ellipse(-8,-5,6,8,-0.3,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function spawnItem(){
  const type=Math.random()<0.6?'fish':'apple';
  items.push({x:50+Math.random()*(W-100),y:-30,type,vx:Math.random()*2-1,vy:2+Math.random()*2,rot:0,rotV:Math.random()*0.1-0.05});
}

function update(){
  if(gameOver)return;
  const t=Date.now()-startTime;
  cat.x+=(cat.targetX-cat.x)*0.15;
  cat.x=Math.max(cat.w/2,Math.min(W-cat.w/2,cat.x));
  if(Math.random()<0.03+t/100000)spawnItem();
  for(let i=items.length-1;i>=0;i--){
    const it=items[i];
    it.y+=it.vy;
    it.x+=it.vx;
    it.rot+=it.rotV;
    if(it.y>H+50){items.splice(i,1);lives--;if(lives<=0)gameOver=true;continue}
    const dx=it.x-cat.x,dy=it.y-(cat.y-10);
    if(Math.abs(dx)<50&&Math.abs(dy)<45){
      score+=it.type==='fish'?10:5;
      items.splice(i,1);
    }
  }
  clouds.forEach(c=>{c.x+=0.3*c.s;if(c.x>W+100)c.x=-100});
}

function draw(){
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#87CEEB');
  grad.addColorStop(0.7,'#98D8C8');
  grad.addColorStop(1,'#7CFC00');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,0.8)';
  clouds.forEach(c=>{ctx.beginPath();ctx.arc(c.x,c.y,30*c.s,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle='#90EE90';
  ctx.beginPath();
  ctx.moveTo(0,H);
  ctx.lineTo(0,H-20);
  for(let x=0;x<=W;x+=50){ctx.lineTo(x+25,H-25-Math.sin(x*0.05)*10)}
  ctx.lineTo(W,H-20);
  ctx.lineTo(W,H);
  ctx.closePath();
  ctx.fill();
  items.forEach(it=>{
    if(it.type==='fish')drawFish(it.x,it.y,it.rot);
    else drawApple(it.x,it.y,it.rot);
  });
  drawCat(cat.x,cat.y);
  ctx.fillStyle='rgba(0,0,0,0.5)';
  roundRect(10,10,180,70,10);
  ctx.fill();
  ctx.fillStyle='#fff';
  ctx.font='bold 20px sans-serif';
  ctx.fillText('分数: '+score,20,38);
  ctx.font='16px sans-serif';
  ctx.fillText('生命: '+'❤'.repeat(lives),20,65);
  if(gameOver){
    ctx.fillStyle='rgba(0,0,0,0.7)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';
    ctx.font='bold 40px sans-serif';
    ctx.textAlign='center';
    ctx.fillText('游戏结束!',W/2,H/2-40);
    ctx.font='24px sans-serif';
    ctx.fillText('得分: '+score,W/2,H/2+10);
    ctx.fillText('最高分: '+highScore,W/2,H/2+45);
    ctx.font='20px sans-serif';
    ctx.fillStyle='#FFD700';
    ctx.fillText('点击重新开始',W/2,H/2+90);
    ctx.textAlign='left';
  }
}

function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}

function loop(){update();draw();requestAnimationFrame(loop)}

function handleInput(clientX){
  if(gameOver){
    if(score>highScore)highScore=score;
    init();return;
  }
  cat.targetX=clientX;
}

canvas.addEventListener('mousemove',e=>handleInput(e.clientX));
canvas.addEventListener('touchmove',e=>{e.preventDefault();handleInput(e.touches[0].clientX)},{passive:false});
canvas.addEventListener('touchstart',e=>{e.preventDefault();handleInput(e.touches[0].clientX)},{passive:false});
canvas.addEventListener('click',e=>handleInput(e.clientX));

init();
loop();
</script>
</body>
</html>
