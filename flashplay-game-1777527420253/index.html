<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cat Catch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        #gameContainer {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }
        #sky {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 70%;
            background: linear-gradient(180deg, #5BA3C6 0%, #87CEEB 100%);
        }
        #water {
            position: absolute;
            top: 65%;
            left: 0;
            width: 100%;
            height: 35%;
            background: linear-gradient(180deg, #4A90B0 0%, #2E6B8A 100%);
            border-top: 4px solid #6BBFDE;
        }
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50px;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            font-size: 20px;
            color: #333;
            text-shadow: 2px 2px 0 #fff;
        }
        .hud-item {
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 16px;
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        #cat {
            position: absolute;
            bottom: 15%;
            width: 80px;
            height: 80px;
            transition: left 0.05s ease-out;
            z-index: 50;
        }
        .fish {
            position: absolute;
            width: 50px;
            height: 35px;
            z-index: 30;
            animation: swim 2s linear forwards;
        }
        @keyframes swim {
            0% { transform: translateX(0); }
            100% { transform: translateX(-110vw); }
        }
        @keyframes wobble {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-5px) rotate(5deg); }
        }
        @keyframes splash {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .splash {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            animation: splash 0.3s ease-out forwards;
            pointer-events: none;
            z-index: 60;
        }
        .score-popup {
            position: absolute;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            font-size: 28px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 2px 2px 0 #FF6B00;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 100;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
        }
        #startScreen, #endScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            font-family: 'Comic Sans MS', cursive, sans-serif;
        }
        #startScreen h1, #endScreen h1 {
            font-size: 48px;
            color: #FFD700;
            text-shadow: 4px 4px 0 #FF6B00;
            margin-bottom: 20px;
        }
        #endScreen h1 {
            font-size: 36px;
        }
        .subtitle {
            font-size: 20px;
            color: #fff;
            margin-bottom: 30px;
        }
        .btn {
            padding: 15px 50px;
            font-size: 24px;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(180deg, #FFD700 0%, #FFA500 100%);
            border: none;
            border-radius: 30px;
            color: #333;
            cursor: pointer;
            box-shadow: 0 6px 0 #CC8400, 0 8px 15px rgba(0,0,0,0.3);
            transition: all 0.1s;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #CC8400, 0 4px 8px rgba(0,0,0,0.3);
        }
        .final-score {
            font-size: 60px;
            color: #FFD700;
            text-shadow: 3px 3px 0 #FF6B00;
            margin: 20px 0;
        }
        .wave {
            position: absolute;
            top: 0;
            left: -100%;
            width: 300%;
            height: 20px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 20"><path d="M0,10 Q25,0 50,10 T100,10 L100,20 L0,20 Z" fill="rgba(255,255,255,0.3)"/></svg>');
            background-size: 100px 20px;
            animation: wave 3s linear infinite;
        }
        @keyframes wave {
            0% { transform: translateX(0); }
            100% { transform: translateX(100px); }
        }
        #instructions {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="sky">
            <div class="cloud" style="width:100px;height:40px;top:15%;left:20%;"></div>
            <div class="cloud" style="width:80px;height:30px;top:25%;left:60%;"></div>
            <div class="cloud" style="width:120px;height:50px;top:10%;left:75%;"></div>
        </div>
        <div id="water">
            <div class="wave"></div>
        </div>
        
        <div id="hud">
            <div class="hud-item" id="scoreDisplay">Score: 0</div>
            <div class="hud-item" id="timerDisplay">Time: 30</div>
        </div>
        
        <div id="cat">
            <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="40" cy="55" rx="28" ry="22" fill="#FF9966"/>
                <ellipse cx="40" cy="55" rx="24" ry="18" fill="#FFBB88"/>
                <circle cx="40" cy="35" r="22" fill="#FF9966"/>
                <polygon points="20,20 15,38 28,32" fill="#FF9966"/>
                <polygon points="60,20 65,38 52,32" fill="#FF9966"/>
                <polygon points="22,22 18,36 27,31" fill="#FFB6C1"/>
                <polygon points="58,22 62,36 53,31" fill="#FFB6C1"/>
                <ellipse cx="32" cy="32" rx="5" ry="6" fill="white"/>
                <ellipse cx="48" cy="32" rx="5" ry="6" fill="white"/>
                <circle cx="33" cy="33" r="3" fill="#333"/>
                <circle cx="49" cy="33" r="3" fill="#333"/>
                <circle cx="34" cy="32" r="1" fill="white"/>
                <circle cx="50" cy="32" r="1" fill="white"/>
                <ellipse cx="40" cy="42" rx="3" ry="2" fill="#FF6B6B"/>
                <path d="M37,45 Q40,48 43,45" stroke="#333" stroke-width="1.5" fill="none"/>
                <line x1="15" y1="38" x2="5" y2="35" stroke="#333" stroke-width="1"/>
                <line x1="15" y1="40" x2="5" y2="40" stroke="#333" stroke-width="1"/>
                <line x1="15" y1="42" x2="5" y2="45" stroke="#333" stroke-width="1"/>
                <line x1="65" y1="38" x2="75" y2="35" stroke="#333" stroke-width="1"/>
                <line x1="65" y1="40" x2="75" y2="40" stroke="#333" stroke-width="1"/>
                <line x1="65" y1="42" x2="75" y2="45" stroke="#333" stroke-width="1"/>
                <path d="M60,58 Q70,62 65,72" stroke="#FF9966" stroke-width="8" fill="none" stroke-linecap="round"/>
            </svg>
        </div>
        
        <div id="startScreen">
            <h1>Cat Catch</h1>
            <p class="subtitle">Help the hungry cat catch all the fish!</p>
            <button class="btn" onclick="startGame()">PLAY</button>
            <p id="instructions">Tap left or right side of screen to move</p>
        </div>
        
        <div id="endScreen" style="display:none;">
            <h1>Time's Up!</h1>
            <p class="subtitle">Fish Caught:</p>
            <div class="final-score" id="finalScore">0</div>
            <button class="btn" onclick="startGame()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const cat = document.getElementById('cat');
        const gameContainer = document.getElementById('gameContainer');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const startScreen = document.getElementById('startScreen');
        const endScreen = document.getElementById('endScreen');
        const finalScore = document.getElementById('finalScore');
        
        let score = 0;
        let timeLeft = 30;
        let gameRunning = false;
        let catX = window.innerWidth / 2 - 40;
        let targetX = catX;
        let fishInterval;
        let timerInterval;
        let touchStartX = null;
        
        const catSpeed = 12;
        
        function createFish() {
            if (!gameRunning) return;
            
            const fish = document.createElement('div');
            fish.className = 'fish';
            
            const fishTypes = [
                `<svg viewBox="0 0 50 35" xmlns="http://www.w3.org/2000/svg">
                    <ellipse cx="22" cy="17" rx="18" ry="12" fill="#FFD700"/>
                    <polygon points="40,17 50,8 50,26" fill="#FFD700"/>
                    <ellipse cx="22" cy="17" rx="14" ry="9" fill="#FFEC8B"/>
                    <circle cx="12" cy="14" r="3" fill="white"/>
                    <circle cx="13" cy="14" r="1.5" fill="#333"/>
                    <path d="M5,17 Q8,14 5,11" stroke="#FF8C00" stroke-width="2" fill="none"/>
                </svg>`,
                `<svg viewBox="0 0 50 35" xmlns="http://www.w3.org/2000/svg">
                    <ellipse cx="22" cy="17" rx="18" ry="12" fill="#87CEEB"/>
                    <polygon points="40,17 50,8 50,26" fill="#87CEEB"/>
                    <ellipse cx="22" cy="17" rx="14" ry="9" fill="#B0E0E6"/>
                    <circle cx="12" cy="14" r="3" fill="white"/>
                    <circle cx="13" cy="14" r="1.5" fill="#333"/>
                    <path d="M5,17 Q8,14 5,11" stroke="#4169E1" stroke-width="2" fill="none"/>
                </svg>`,
                `<svg viewBox="0 0 50 35" xmlns="http://www.w3.org/2000/svg">
                    <ellipse cx="22" cy="17" rx="18" ry="12" fill="#FF6B6B"/>
                    <polygon points="40,17 50,8 50,26" fill="#FF6B6B"/>
                    <ellipse cx="22" cy="17" rx="14" ry="9" fill="#FFB6B6"/>
                    <circle cx="12" cy="14" r="3" fill="white"/>
                    <circle cx="13" cy="14" r="1.5" fill="#333"/>
                    <path d="M5,17 Q8,14 5,11" stroke="#DC143C" stroke-width="2" fill="none"/>
                </svg>`
            ];
            
            fish.innerHTML = fishTypes[Math.floor(Math.random() * fishTypes.length)];
            
            const startX = window.innerWidth + 50;
            const startY = window.innerHeight * 0.35 + Math.random() * (window.innerHeight * 0.25);
            const duration = 2.5 + Math.random() * 1.5;
            
            fish.style.left = startX + 'px';
            fish.style.top = startY + 'px';
            fish.style.animationDuration = duration + 's';
            
            gameContainer.appendChild(fish);
            
            setTimeout(() => {
                if (fish.parentNode) {
                    fish.remove();
                }
            }, duration * 1000);
        }
        
        function checkCollision(fish) {
            const catRect = {
                left: catX + 15,
                right: catX + 65,
                top: window.innerHeight * 0.85 - 60,
                bottom: window.innerHeight * 0.85
            };
            
            const fishRect = {
                left: parseFloat(fish.style.left),
                right: parseFloat(fish.style.left) + 50,
                top: parseFloat(fish.style.top),
                bottom: parseFloat(fish.style.top) + 35
            };
            
            return !(catRect.right < fishRect.left || 
                     catRect.left > fishRect.right || 
                     catRect.bottom < fishRect.top || 
                     catRect.top > fishRect.bottom);
        }
        
        function createSplash(x, y) {
            const splash = document.createElement('div');
            splash.className = 'splash';
            splash.style.left = (x - 20) + 'px';
            splash.style.top = (y - 20) + 'px';
            gameContainer.appendChild(splash);
            setTimeout(() => splash.remove(), 300);
        }
        
        function createScorePopup(x, y) {
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.textContent = '+1';
            popup.style.left = (x - 20) + 'px';
            popup.style.top = y + 'px';
            gameContainer.appendChild(popup);
            setTimeout(() => popup.remove(), 800);
        }
        
        function updateCatPosition() {
            if (gameRunning) {
                if (catX < targetX) {
                    catX = Math.min(catX + catSpeed, targetX);
                } else if (catX > targetX) {
                    catX = Math.max(catX - catSpeed, targetX);
                }
                
                catX = Math.max(0, Math.min(window.innerWidth - 80, catX));
                cat.style.left = catX + 'px';
            }
            requestAnimationFrame(updateCatPosition);
        }
        
        function moveCat(direction) {
            const moveAmount = 40;
            if (direction === 'left') {
                targetX = Math.max(0, targetX - moveAmount);
            } else {
                targetX = Math.min(window.innerWidth - 80, targetX + moveAmount);
            }
        }
        
        function handleTouchStart(e) {
            if (!gameRunning) return;
            e.preventDefault();
            touchStartX = e.touches ? e.touches[0].clientX : e.clientX;
        }
        
        function handleTouchEnd(e) {
            if (!gameRunning) return;
            e.preventDefault();
            const touchEndX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
            const screenCenter = window.innerWidth / 2;
            
            if (touchEndX < screenCenter) {
                moveCat('left');
            } else {
                moveCat('right');
            }
        }
        
        function handleMouseClick(e) {
            if (!gameRunning) return;
            const clickX = e.clientX;
            const screenCenter = window.innerWidth / 2;
            
            if (clickX < screenCenter) {
                moveCat('left');
            } else {
                moveCat('right');
            }
        }
        
        function startGame() {
            score = 0;
            timeLeft = 30;
            gameRunning = true;
            catX = window.innerWidth / 2 - 40;
            targetX = catX;
            cat.style.left = catX + 'px';
            
            startScreen.style.display = 'none';
            endScreen.style.display = 'none';
            scoreDisplay.textContent = 'Score: 0';
            timerDisplay.textContent = 'Time: 30';
            
            document.querySelectorAll('.fish').forEach(f => f.remove());
            
            fishInterval = setInterval(createFish, 800);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = 'Time: ' + timeLeft;
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }
        
        function endGame() {
            gameRunning = false;
            clearInterval(fishInterval);
            clearInterval(timerInterval);
            
            document.querySelectorAll('.fish').forEach(f => f.remove());
            
            finalScore.textContent = score;
            endScreen.style.display = 'flex';
        }
        
        setInterval(() => {
            if (!gameRunning) return;
            const fishes = document.querySelectorAll('.fish');
            fishes.forEach(fish => {
                if (checkCollision(fish)) {
                    score++;
                    scoreDisplay.textContent = 'Score: ' + score;
                    createSplash(parseFloat(fish.style.left), parseFloat(fish.style.top));
                    createScorePopup(parseFloat(fish.style.left), parseFloat(fish.style.top));
                    fish.remove();
                }
            });
        }, 50);
        
        gameContainer.addEventListener('touchstart', handleTouchStart, { passive: false });
        gameContainer.addEventListener('touchend', handleTouchEnd, { passive: false });
        gameContainer.addEventListener('click', handleMouseClick);
        
        updateCatPosition();
        
        window.addEventListener('resize', () => {
            catX = Math.min(catX, window.innerWidth - 80);
            targetX = Math.min(targetX, window.innerWidth - 80);
        });
    </script>
</body>
</html>
