<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>狗狗大追捕 Kid Run</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#87CEEB;
    display:flex;align-items:center;justify-content:center;
    height:100vh;overflow:hidden;
    font-family:'PingFang SC','Microsoft YaHei',sans-serif;
    touch-action:none;user-select:none;
  }
  #hud{
    position:fixed;top:0;left:0;right:0;
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 18px;color:#fff;z-index:10;
  }
  #scoreEl{color:#fff;font-size:20px;font-weight:700;text-shadow:0 2px 4px rgba(0,0,0,.4)}
  #distEl{color:#ffd700;font-size:16px;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.5)}
  #dogEl{color:#ff9966;font-size:14px;text-shadow:0 1px 3px rgba(0,0,0,.4)}
  canvas{display:block}
  #overlay{
    position:fixed;inset:0;
    background:rgba(30,60,90,.88);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:20;color:#fff;
  }
  #overlay h1{
    font-size:36px;margin-bottom:4px;
    background:linear-gradient(135deg,#ffd700,#ff9966);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  }
  #overlay p{color:#cce8f4;font-size:13px;margin-bottom:20px;text-align:center;max-width:270px;line-height:1.7}
  .btn{
    padding:12px 34px;border:none;border-radius:40px;
    font-size:16px;font-weight:700;cursor:pointer;
    transition:transform .15s;margin:6px;
  }
  .btn:active{transform:scale(.94)}
  .btn-primary{
    background:linear-gradient(135deg,#ffd700,#ff9966);color:#5a3000;
    box-shadow:0 4px 18px rgba(255,180,0,.4);
  }
  .hud-bar{
    position:fixed;top:48px;left:18px;right:18px;height:6px;
    background:rgba(255,255,255,.2);border-radius:3px;overflow:hidden;z-index:10;
  }
  #dogBar{height:100%;background:#ff6b6b;border-radius:3px;transition:width .3s}
  .score-pop{
    position:fixed;pointer-events:none;font-size:20px;font-weight:900;
    color:#ffd700;text-shadow:0 0 8px rgba(255,200,0,.9);
    animation:sp .7s ease-out forwards;z-index:30;
  }
  @keyframes sp{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-55px) scale(1.4);opacity:0}}
</style>
</head>
<body>
<div id="hud">
  <div id="scoreEl">🏆 0</div>
  <div id="distEl">🏃 0m</div>
  <div id="dogEl">🐕 距离</div>
</div>
<div class="hud-bar"><div id="dogBar" style="width:20%"></div></div>
<canvas id="c"></canvas>
<div id="overlay">
  <h1>🐕 狗狗大追捕</h1>
  <p>点击跳跃躲避障碍！<br>收集骨头🍖可让狗狗跑慢一点<br>狗狗追上你 = 游戏结束</p>
  <button class="btn btn-primary" id="startBtn">开始逃跑</button>
</div>
<script>
(function(){
  const canvas=document.getElementById('c');
  const ctx=canvas.getContext('2d');
  const overlay=document.getElementById('overlay');
  const scoreEl=document.getElementById('scoreEl');
  const distEl=document.getElementById('distEl');
  const dogBar=document.getElementById('dogBar');
  const dogEl=document.getElementById('dogEl');

  let W,H;
  let running=false, gameOver=false;
  let score=0, distance=0, best=0;
  let GROUND_Y, JUMP_V, GRAV, GROUND_H=60;
  let gameSpeed=4;
  let dogDist=80;  // how close dog is (0=caught, 100=safe)
  let dogSlowTimer=0;
  let bgX=0, bgX2=0;
  let invincible=0;

  // kid
  let kid={x:0,y:0,vy:0,w:36,h:50,jumping:false,canDouble:true,runFrame:0};

  // world objects
  let obstacles=[], collectibles=[], dustParticles=[];

  const LANES=[0,1,2]; // 0=ground, 1=mid-air platform height, 2=higher
  // ground obstacles: cone, trash, hydrant, fence
  const OBSTACLES=[
    {emoji:'🚧',w:40,h:40,pts:1,lane:0},
    {emoji:'🗑️',w:44,h:52,pts:1,lane:0},
    {emoji:'🔥',w:40,h:54,pts:1,lane:0},
    {emoji:'🪨',w:36,h:34,pts:1,lane:0},
    {emoji:'🐕',w:50,h:50,pts:0,lane:0,isDog:true}, // dog shortcut obstacle
  ];
  const COLLECTIBLES=[
    {emoji:'🍖',pts:5,isBone:true},
    {emoji:'👟',pts:8},
    {emoji:'⭐',pts:15},
  ];

  function resize(){
    W=canvas.width=Math.min(window.innerWidth,500);
    H=canvas.height=window.innerHeight;
    GROUND_Y=H-GROUND_H;
    JUMP_V=-(14+H*.012);
    GRAV=0.65+H*.0028;
  }
  window.addEventListener('resize',resize);
  resize();

  function resetGame(){
    score=0; distance=0; gameSpeed=4;
    dogDist=80; dogSlowTimer=0; invincible=0;
    obstacles=[]; collectibles=[]; dustParticles=[];
    kid={x:W*.28,y:GROUND_Y,w:36,h:50,vy:0,jumping:false,canDouble:true,runFrame:0};
    bgX=0; bgX2=W;
    scoreEl.textContent='🏆 0';
    distEl.textContent='🏃 0m';
  }

  function spawnObstacle(){
    const o=OBSTACLES[Math.floor(Math.random()*OBSTACLES.length)];
    obstacles.push({
      x:W+50, y:GROUND_Y-o.h,
      w:o.w, h:o.h, emoji:o.emoji, pts:o.pts, lane:o.lane, isDog:!!o.isDog,
      passed:false
    });
  }

  function spawnCollectible(){
    const c=COLLECTIBLES[Math.floor(Math.random()*COLLECTIBLES.length)];
    // spawn in air or ground
    const inAir=Math.random()<.5;
    collectibles.push({
      x:W+50,
      y: inAir ? GROUND_Y-70-Math.random()*50 : GROUND_Y-28,
      size:30, emoji:c.emoji, pts:c.pts, isBone:!!c.isBone, collected:false
    });
  }

  function addDust(x,y,n,col){
    for(let i=0;i<n;i++){
      dustParticles.push({
        x,y, vx:(Math.random()-.5)*3, vy:-Math.random()*3,
        life:1, r:3+Math.random()*4, color:col||'#e8d5b0'
      });
    }
  }

  function popScore(x,y,pts,cls){
    const el=document.createElement('div');
    el.className='score-pop';
    el.textContent='+'+pts;
    el.style.left=Math.min(Math.max(x-20,10),W-60)+'px';
    el.style.top=Math.min(Math.max(y-30,10),H-40)+'px';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),750);
  }

  // ── Drawing ──────────────────────────────────────────────

  function drawBg(){
    // Sky
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#87CEEB'); sky.addColorStop(1,'#cce8f4');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

    // Clouds
    ctx.font='38px sans-serif';
    const clouds=[
      {x:(bgX*0.15+50)%(W+200)-100,y:55,s:'☁️'},
      {x:(bgX*0.12+250)%(W+200)-100,y:90,s:'☁️'},
      {x:(bgX*0.18+400)%(W+200)-100,y:40,s:'☁️'},
    ];
    for(const c of clouds){
      ctx.globalAlpha=.85;
      ctx.fillText(c.s,c.x,c.y);
    }
    ctx.globalAlpha=1;

    // Sun
    ctx.save();
    ctx.font='36px sans-serif';
    ctx.shadowColor='#ffd700'; ctx.shadowBlur=20;
    ctx.fillText('🌞',W-55,55);
    ctx.restore();

    // Buildings (parallax)
    const bldColors=['#d4a574','#c19a6b','#e8c9a0','#bfa07a'];
    for(let i=0;i<8;i++){
      const bx=((bgX*0.3+i*90)%(W+180))-90;
      const bh=80+((i*37)%60);
      ctx.fillStyle=bldColors[i%4];
      ctx.fillRect(bx,H-GROUND_H-bh,70,bh);
      // windows
      ctx.fillStyle='#f5e6c8';
      for(let wy=0;wy<bh-20;wy+=22){
        for(let wx=8;wx<62;wx+=20){
          if(Math.random()>.3){
            ctx.fillRect(bx+wx, H-GROUND_H-bh+10+wy, 12, 14);
          }
        }
      }
    }

    // Ground
    const gnd=ctx.createLinearGradient(0,GROUND_Y,0,H);
    gnd.addColorStop(0,'#8BC34A'); gnd.addColorStop(.15,'#7CB342'); gnd.addColorStop(1,'#558B2F');
    ctx.fillStyle=gnd; ctx.fillRect(0,GROUND_Y,W,H-GROUND_Y);

    // Ground line
    ctx.strokeStyle='#a5d65a'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(0,GROUND_Y); ctx.lineTo(W,GROUND_Y); ctx.stroke();

    // Lane markings
    ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.lineWidth=2;
    ctx.setLineDash([20,30]);
    ctx.beginPath(); ctx.moveTo(0,GROUND_Y+GROUND_H/2); ctx.lineTo(W,GROUND_Y+GROUND_H/2);
    ctx.stroke(); ctx.setLineDash([]);
  }

  function drawKid(){
    const k=kid;
    const sx=k.x-k.w/2, sy=k.y-k.h;
    const bounce=Math.sin(k.runFrame*.25)*3;

    ctx.save();
    if(invincible>0 && Math.floor(invincible/5)%2===0){
      ctx.globalAlpha=.4;
    }

    // Shadow
    ctx.fillStyle='rgba(0,0,0,.2)';
    ctx.beginPath(); ctx.ellipse(k.x, GROUND_Y, k.w*.6, 6, 0,0,Math.PI*2); ctx.fill();

    // Kid body
    ctx.font=k.h+'px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.shadowColor='rgba(0,0,0,.3)'; ctx.shadowBlur=4;
    ctx.fillText('🏃', k.x, sy+bounce+k.h);

    ctx.restore();
  }

  function drawDog(){
    // Dog approaches from left side
    const dogX=W*.05;
    const dogY=GROUND_Y;
    const scale=0.8+dogDist*.002;
    const shake=Math.sin(Date.now()/80)*3;

    ctx.save();
    ctx.font=(50*scale)+'px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.shadowColor='rgba(0,0,0,.3)'; ctx.shadowBlur=4;
    ctx.fillText('🐕', dogX+shake, dogY);
    ctx.restore();

    // Dog bark lines
    if(Math.random()<.05){
      ctx.strokeStyle='rgba(255,100,0,.3)';
      ctx.lineWidth=2;
      for(let i=0;i<3;i++){
        ctx.beginPath();
        ctx.moveTo(dogX+20+i*10, dogY-40-i*8);
        ctx.lineTo(dogX+35+i*10, dogY-40-i*8-10);
        ctx.stroke();
      }
    }
  }

  function drawObstacle(o){
    ctx.font=o.h+'px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.shadowColor='rgba(0,0,0,.3)'; ctx.shadowBlur=4;
    ctx.fillText(o.emoji, o.x, o.y+o.h);
    ctx.shadowBlur=0;
  }

  function drawCollectible(c){
    if(c.collected) return;
    const bob=Math.sin(Date.now()/200+c.x)*5;
    ctx.save();
    ctx.font=c.size+'px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#ffd700'; ctx.shadowBlur=12;
    ctx.fillText(c.emoji, c.x, c.y+bob);
    ctx.restore();
  }

  function drawDust(){
    for(const p of dustParticles){
      ctx.save(); ctx.globalAlpha=p.life*.7;
      ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  // ── Update ────────────────────────────────────────────────

  function update(){
    if(!running) return;

    // Distance & speed
    distance+=gameSpeed*.3;
    distEl.textContent='🏃 '+Math.floor(distance)+'m';

    // Dog distance
    if(dogSlowTimer>0){
      dogSlowTimer--;
      dogDist=Math.min(100,dogDist+.8);
    } else {
      dogDist=Math.max(0, dogDist-.35-(distance*.001));
    }

    const barW=Math.max(0,Math.min(100,dogDist));
    dogBar.style.width=barW+'%';
    if(barW<25) dogBar.style.background='#ff3333';
    else if(barW<50) dogBar.style.background='#ff9900';
    else dogBar.style.background='#ff6b6b';
    dogEl.textContent='🐕 '+(dogDist<20?'危险!':dogDist<50?'接近!':'距离');

    if(dogDist<=0){ endGame(); return; }

    if(invincible>0) invincible--;

    // Kid physics
    kid.vy+=GRAV;
    kid.y+=kid.vy;
    if(kid.y>=GROUND_Y){
      kid.y=GROUND_Y;
      kid.vy=0;
      kid.jumping=false;
      kid.canDouble=true;
    }
    kid.runFrame+=gameSpeed*.4;

    // Spawn
    if(Math.random()<.018+distance*.0001) spawnObstacle();
    if(Math.random()<.025) spawnCollectible();

    // Update obstacles
    for(let i=obstacles.length-1;i>=0;i--){
      const o=obstacles[i];
      o.x-=gameSpeed;

      // Collision with kid
      if(!o.passed && invincible<=0){
        const kx=kid.x, ky=kid.y-kid.h*.5;
        const ox=o.x, oy=o.y+o.h*.5;
        if(Math.abs(kx-ox)<(kid.w+o.w)*.45 && Math.abs(ky-oy)<(kid.h+o.h)*.45){
          // Hit!
          invincible=120;
          addDust(kid.x,kid.y-kid.h*.5,10,'#ff6666');
          dogDist=Math.min(100,dogDist+18);
          o.passed=true;
        }
      }

      // Passed obstacle
      if(!o.passed && o.x<kid.x-kid.w){
        o.passed=true;
        score+=o.pts||0;
        scoreEl.textContent='🏆 '+score;
      }

      if(o.x<-80) obstacles.splice(i,1);
    }

    // Update collectibles
    for(let i=collectibles.length-1;i>=0;i--){
      const c=collectibles[i];
      c.x-=gameSpeed;
      if(c.collected){ collectibles.splice(i,1); continue; }

      const dx=Math.abs(c.x-kid.x), dy=Math.abs(c.y-(kid.y-kid.h*.5));
      if(dx<kid.w*.8 && dy<kid.h*.8){
        c.collected=true;
        score+=c.pts;
        scoreEl.textContent='🏆 '+score;
        if(c.isBone){
          dogSlowTimer=180;
          addDust(c.x,c.y,12,'#ffd700');
          popScore(c.x,c.y,'🍖+'+c.pts+' 慢!','score-pop');
        } else {
          addDust(c.x,c.y,8,'#fff');
          popScore(c.x,c.y,c.pts,'score-pop');
        }
      }

      if(c.x<-40) collectibles.splice(i,1);
    }

    // Dust trail
    if(!kid.jumping && Math.random()<.3){
      addDust(kid.x-kid.w*.3, GROUND_Y, 1);
    }

    // Update dust
    for(let i=dustParticles.length-1;i>=0;i--){
      const p=dustParticles[i];
      p.x+=p.vx; p.y+=p.vy; p.vy+=.1;
      p.life-=.04;
      if(p.life<=0) dustParticles.splice(i,1);
    }

    // Speed increase
    gameSpeed=4+distance*.008;

    // Parallax
    bgX-=gameSpeed*.4;
  }

  // ── Main loop ─────────────────────────────────────────────

  function draw(){
    ctx.clearRect(0,0,W,H);
    drawBg();
    drawDust();
    for(const o of obstacles) drawObstacle(o);
    for(const c of collectibles) drawCollectible(c);
    drawKid();
    drawDog();
  }

  function gameLoop(){
    if(gameOver) return;
    update(); draw();
    requestAnimationFrame(gameLoop);
  }

  // ── Controls ─────────────────────────────────────────────

  function doJump(){
    if(!running) return;
    if(!kid.jumping){
      kid.vy=JUMP_V;
      kid.jumping=true;
      kid.canDouble=true;
      addDust(kid.x,GROUND_Y,6);
    } else if(kid.canDouble){
      kid.vy=JUMP_V*.75;
      kid.canDouble=false;
      addDust(kid.x,kid.y-kid.h*.5,4);
    }
  }

  canvas.addEventListener('click',doJump);
  canvas.addEventListener('touchstart',e=>{e.preventDefault();doJump();},{passive:false});
  document.addEventListener('keydown',e=>{
    if(e.code==='Space'||e.key==='ArrowUp'||e.key==='w'){e.preventDefault();doJump();}
  });

  function startGame(){
    resetGame();
    overlay.style.display='none';
    running=true; gameOver=false;
    best=parseInt(localStorage.getItem('kidRunBest')||'0');
    gameLoop();
  }

  function endGame(){
    gameOver=true; running=false;
    if(score>best) localStorage.setItem('kidRunBest',score);
    setTimeout(()=>{
      overlay.innerHTML=
        '<h1>被抓住了！</h1>'+
        '<div style="font-size:60px;color:#ffd700;font-weight:900;margin:8px 0 14px">'+score+'</div>'+
        '<p style="color:#cce8f4;font-size:14px;margin-bottom:22px">跑了 '+Math.floor(distance)+' 米<br>最高纪录：'+Math.max(score,best)+'</p>'+
        '<button class="btn btn-primary" id="reBtn">再跑一次</button>';
      overlay.style.display='flex';
      document.getElementById('reBtn').onclick=startGame;
    },400);
  }

  document.getElementById('startBtn').onclick=startGame;
})();
</script>

<script>
/**
 * Iframe 元素高亮注入脚本

        right: rect.right,
        bottom: rect.bottom,
        width: rect.width,
        height: rect.height,
        x: rect.x,
