<!doctype html><html lang='zh-CN'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover'><title>3D Box War</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#05070b;font-family:Arial,Helvetica,sans-serif;touch-action:none}#game{display:block;width:100vw;height:100vh;background:#070a10}#ui{position:fixed;inset:0;pointer-events:none;color:white}#top{position:absolute;left:12px;right:12px;top:env(safe-area-inset-top,10px);display:flex;justify-content:space-between;align-items:flex-start;font-weight:700;text-shadow:0 2px 8px #000;font-size:15px}#msg{position:absolute;left:18px;right:18px;top:46%;text-align:center;font-size:22px;font-weight:800;text-shadow:0 2px 10px #000;display:none}.pad{position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 24px);width:118px;height:118px;border:2px solid rgba(255,255,255,.28);border-radius:50%;background:rgba(255,255,255,.08)}#stick{left:20px}.knob{position:absolute;left:39px;top:39px;width:36px;height:36px;border-radius:50%;background:rgba(80,220,255,.75);box-shadow:0 0 18px rgba(80,220,255,.8)}#fire{right:24px;width:96px;height:96px;border-radius:50%;background:rgba(255,70,70,.22);border-color:rgba(255,120,120,.5);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800}.hint{position:absolute;left:0;right:0;bottom:calc(env(safe-area-inset-bottom,0px) + 6px);text-align:center;font-size:12px;color:rgba(255,255,255,.72)}</style></head><body><canvas id='game'></canvas><div id='ui'><div id='top'><div id='stats'>HP 100<br>Score 0</div><div id='wave'>Wave 1</div></div><div id='msg'>点击开始</div><div id='stick' class='pad'><div id='knob' class='knob'></div></div><div id='fire' class='pad'>FIRE</div><div class='hint'>左侧拖动移动，右侧点击射击</div></div><script>(()=>{const c=document.getElementById('game'),x=c.getContext('2d'),msg=document.getElementById('msg'),stats=document.getElementById('stats'),waveEl=document.getElementById('wave'),stick=document.getElementById('stick'),knob=document.getElementById('knob'),fire=document.getElementById('fire');let W=0,H=0,D=1,last=0,run=false,over=false,score=0,wave=1,shake=0;function size(){D=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;x.setTransform(D,0,0,D,0,0)}addEventListener('resize',size);size();const P={x:0,z:0,yaw:0,hp:100,cd:0,hit:0};let enemies=[],bullets=[],parts=[];const keys={mx:0,my:0,aim:0};function rnd(a,b){return a+Math.random()*(b-a)}function spawn(n){for(let i=0;i<n;i++){let a=rnd(0,Math.PI*2),r=rnd(13,22);enemies.push({x:Math.cos(a)*r,z:Math.sin(a)*r,hp:2+Math.floor(wave/2),cd:rnd(.4,1.8),s:rnd(.8,1.15),hit:0})}}function reset(){P.x=0;P.z=0;P.yaw=0;P.hp=100;P.cd=0;P.hit=0;score=0;wave=1;over=false;bullets=[];parts=[];enemies=[];spawn(5);run=true;msg.style.display='none'}function shoot(){if(!run||over){reset();return}if(P.cd>0)return;P.cd=.18;let vx=Math.sin(P.yaw),vz=Math.cos(P.yaw);bullets.push({x:P.x+vx*.9,z:P.z+vz*.9,vx:vx*18,vz:vz*18,life:1.1,team:0});shake=.08}function boom(px,pz,col){for(let i=0;i<12;i++)parts.push({x:px,z:pz,y:rnd(.3,1.8),vx:rnd(-4,4),vz:rnd(-4,4),vy:rnd(1,5),life:rnd(.35,.8),col})}function startPoint(e){return e.touches?e.touches[0]:e}let sid=null,base=null;stick.addEventListener('pointerdown',e=>{sid=e.pointerId;base={x:e.clientX,y:e.clientY};stick.setPointerCapture(sid)});stick.addEventListener('pointermove',e=>{if(e.pointerId!==sid)return;let dx=e.clientX-base.x,dy=e.clientY-base.y,m=Math.hypot(dx,dy),lim=42;if(m>lim){dx=dx/m*lim;dy=dy/m*lim}keys.mx=dx/lim;keys.my=dy/lim;knob.style.transform='translate('+dx+'px,'+dy+'px)' });function endStick(e){if(e.pointerId!==sid)return;sid=null;keys.mx=0;keys.my=0;knob.style.transform='translate(0,0)'}stick.addEventListener('pointerup',endStick);stick.addEventListener('pointercancel',endStick);fire.addEventListener('pointerdown',e=>{e.preventDefault();shoot()});c.addEventListener('pointerdown',e=>{if(!run||over)shoot()});addEventListener('keydown',e=>{if(e.key===' '||e.key==='Enter')shoot();if(e.key==='a'||e.key==='ArrowLeft')keys.mx=-1;if(e.key==='d'||e.key==='ArrowRight')keys.mx=1;if(e.key==='w'||e.key==='ArrowUp')keys.my=-1;if(e.key==='s'||e.key==='ArrowDown')keys.my=1});addEventListener('keyup',e=>{if('adArrowLeftArrowRight'.includes(e.key))keys.mx=0;if('wsArrowUpArrowDown'.includes(e.key))keys.my=0});function cam(){return{x:P.x-Math.sin(P.yaw)*7,z:P.z-Math.cos(P.yaw)*7,y:5.2,yaw:P.yaw,pitch:.55}}function pr(v,C){let dx=v.x-C.x,dz=v.z-C.z,sy=Math.sin(-C.yaw),cy=Math.cos(-C.yaw),cx=dx*cy-dz*sy,cz=dx*sy+dz*cy;if(cz<.25)return null;let yy=v.y-C.y,cp=Math.cos(C.pitch),sp=Math.sin(C.pitch),py=yy*cp-cz*sp,pz=yy*sp+cz*cp;if(pz<.25)return null;let f=Math.min(W,H)*.88;return{x:W/2+cx*f/pz,y:H*.47-py*f/pz,z:pz}}function face(poly,fill,stroke){x.beginPath();x.moveTo(poly[0].x,poly[0].y);for(let i=1;i<poly.length;i++)x.lineTo(poly[i].x,poly[i].y);x.closePath();x.fillStyle=fill;x.fill();if(stroke){x.strokeStyle=stroke;x.lineWidth=1;x.stroke()}}function cube(cx,cy,cz,sx,sy,sz,col,C){let v=[{x:cx-sx,y:cy-sy,z:cz-sz},{x:cx+sx,y:cy-sy,z:cz-sz},{x:cx+sx,y:cy+sy,z:cz-sz},{x:cx-sx,y:cy+sy,z:cz-sz},{x:cx-sx,y:cy-sy,z:cz+sz},{x:cx+sx,y:cy-sy,z:cz+sz},{x:cx+sx,y:cy+sy,z:cz+sz},{x:cx-sx,y:cy+sy,z:cz+sz}].map(p=>pr(p,C));if(v.some(q=>!q))return;let fs=[[0,1,2,3,.75],[4,5,6,7,1],[0,4,7,3,.9],[1,5,6,2,.82],[3,2,6,7,1.14],[0,1,5,4,.62]].map(f=>({p:f.slice(0,4).map(i=>v[i]),d:f.slice(0,4).reduce((a,i)=>a+v[i].z,0)/4,l:f[4]})).sort((a,b)=>b.d-a.d);for(const f of fs){let r=Math.floor(col[0]*f.l),g=Math.floor(col[1]*f.l),b=Math.floor(col[2]*f.l);face(f.p,'rgb('+r+','+g+','+b+')','rgba(255,255,255,.16)')}}function line3(a,b,C,col,w){let p=pr(a,C),q=pr(b,C);if(!p||!q)return;x.strokeStyle=col;x.lineWidth=w;x.beginPath();x.moveTo(p.x,p.y);x.lineTo(q.x,q.y);x.stroke()}function update(dt){if(!run||over)return;P.cd=Math.max(0,P.cd-dt);P.hit=Math.max(0,P.hit-dt);shake=Math.max(0,shake-dt);let turn=keys.mx*2.8*dt;P.yaw+=turn;let sp=-keys.my*8*dt;P.x+=Math.sin(P.yaw)*sp;P.z+=Math.cos(P.yaw)*sp;P.x=Math.max(-18,Math.min(18,P.x));P.z=Math.max(-18,Math.min(18,P.z));for(const e of enemies){let dx=P.x-e.x,dz=P.z-e.z,di=Math.hypot(dx,dz)||1;e.x+=dx/di*(2.1+wave*.15)*dt*e.s;e.z+=dz/di*(2.1+wave*.15)*dt*e.s;e.cd-=dt;e.hit=Math.max(0,e.hit-dt);if(di<1.35&&e.cd<=0){e.cd=.75;P.hp-=9;P.hit=.16;shake=.15;boom(P.x,P.z,[255,80,70])}}for(const b of bullets){b.x+=b.vx*dt;b.z+=b.vz*dt;b.life-=dt;for(const e of enemies){if(e.hp>0&&Math.hypot(b.x-e.x,b.z-e.z)<1){e.hp--;e.hit=.1;b.life=0;if(e.hp<=0){score+=10;boom(e.x,e.z,[255,210,70])}}}}bullets=bullets.filter(b=>b.life>0);enemies=enemies.filter(e=>e.hp>0);for(const p of parts){p.x+=p.vx*dt;p.z+=p.vz*dt;p.y+=p.vy*dt;p.vy-=8*dt;p.life-=dt}parts=parts.filter(p=>p.life>0&&p.y>0);if(enemies.length===0){wave++;spawn(4+wave*2);P.hp=Math.min(100,P.hp+18)}if(P.hp<=0){over=true;run=false;msg.innerHTML='战斗结束<br>得分 '+score+'<br>点击重开';msg.style.display='block'}stats.innerHTML='HP '+Math.max(0,Math.floor(P.hp))+'<br>Score '+score;waveEl.textContent='Wave '+wave}function draw(){let C=cam();x.clearRect(0,0,W,H);let grd=x.createLinearGradient(0,0,0,H);grd.addColorStop(0,'#111827');grd.addColorStop(.52,'#0b1020');grd.addColorStop(1,'#07090d');x.fillStyle=grd;x.fillRect(0,0,W,H);if(shake>0){x.save();x.translate(rnd(-5,5)*shake*7,rnd(-5,5)*shake*7)}for(let i=-20;i<=20;i+=2){line3({x:-20,y:0,z:i},{x:20,y:0,z:i},C,'rgba(85,170,210,.18)',1);line3({x:i,y:0,z:-20},{x:i,y:0,z:20},C,'rgba(85,170,210,.18)',1)}line3({x:-20,y:.02,z:-20},{x:20,y:.02,z:-20},C,'rgba(255,255,255,.4)',2);line3({x:20,y:.02,z:-20},{x:20,y:.02,z:20},C,'rgba(255,255,255,.4)',2);line3({x:20,y:.02,z:20},{x:-20,y:.02,z:20},C,'rgba(255,255,255,.4)',2);line3({x:-20,y:.02,z:20},{x:-20,y:.02,z:-20},C,'rgba(255,255,255,.4)',2);let items=[];items.push({d:Math.hypot(P.x-C.x,P.z-C.z),t:'p',o:P});for(const e of enemies)items.push({d:Math.hypot(e.x-C.x,e.z-C.z),t:'e',o:e});for(const b of bullets)items.push({d:Math.hypot(b.x-C.x,b.z-C.z),t:'b',o:b});for(const p of parts)items.push({d:Math.hypot(p.x-C.x,p.z-C.z),t:'r',o:p});items.sort((a,b)=>b.d-a.d);for(const it of items){let o=it.o;if(it.t==='p')cube(o.x,.65,o.z,.65,.65,.65,o.hit>0?[255,90,90]:[70,210,255],C);if(it.t==='e')cube(o.x,.62,o.z,.62,.62,.62,o.hit>0?[255,240,130]:[255,70,90],C);if(it.t==='b')cube(o.x,.35,o.z,.18,.18,.18,[255,245,100],C);if(it.t==='r')cube(o.x,o.y,o.z,.12,.12,.12,o.col,C)}let cp=pr({x:P.x+Math.sin(P.yaw)*2,y:1.1,z:P.z+Math.cos(P.yaw)*2},C);if(cp){x.strokeStyle='rgba(255,255,255,.85)';x.lineWidth=2;x.beginPath();x.arc(cp.x,cp.y,8,0,Math.PI*2);x.stroke();x.beginPath();x.moveTo(cp.x-14,cp.y);x.lineTo(cp.x-4,cp.y);x.moveTo(cp.x+4,cp.y);x.lineTo(cp.x+14,cp.y);x.moveTo(cp.x,cp.y-14);x.lineTo(cp.x,cp.y-4);x.moveTo(cp.x,cp.y+4);x.lineTo(cp.x,cp.y+14);x.stroke()}if(shake>0)x.restore();if(!run&&!over){msg.style.display='block'}requestAnimationFrame(loop)}function loop(t){let dt=Math.min((t-last)/1000,.033)||.016;last=t;update(dt);draw()}requestAnimationFrame(loop)})();</script></body></html>
