<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Link Check</title>
  <style>
    :root {
      --bg1: #08111f;
      --bg2: #0d2340;
      --panel: rgba(255,255,255,0.08);
      --line: rgba(120,200,255,0.28);
      --text: #ecf7ff;
      --accent: #67e8f9;
      --accent2: #34d399;
      --warn: #fbbf24;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #12345f 0%, var(--bg1) 45%, #050a12 100%);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
      color: var(--text);
      touch-action: manipulation;
    }
    body {
      display: flex;
      align-items: stretch;
      justify-content: center;
    }
    #game {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
        radial-gradient(circle at 50% 20%, rgba(103,232,249,0.14), transparent 35%);
      background-size: 28px 28px, 28px 28px, auto;
    }
    .hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: max(14px, env(safe-area-inset-top)) 14px 14px 14px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      z-index: 5;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px 12px;
      backdrop-filter: blur(6px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      min-height: 68px;
    }
    .label {
      font-size: 12px;
      opacity: 0.75;
      margin-bottom: 6px;
    }
    .value {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    #arena {
      position: absolute;
      inset: 0;
    }
    .target {
      position: absolute;
      width: 84px;
      height: 84px;
      margin-left: -42px;
      margin-top: -42px;
      border-radius: 50%;
      border: 2px solid rgba(103,232,249,0.95);
      background:
        radial-gradient(circle, rgba(255,255,255,0.95) 0 12%, rgba(103,232,249,0.95) 13% 28%, rgba(52,211,153,0.35) 29% 44%, rgba(255,255,255,0.04) 45% 100%);
      box-shadow: 0 0 0 10px rgba(103,232,249,0.06), 0 0 26px rgba(103,232,249,0.4);
      animation: pulse 1.1s ease-out infinite;
      touch-action: none;
    }
    .target::before, .target::after {
      content: "";
      position: absolute;
      inset: 50%;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .target::before {
      width: 8px;
      height: 8px;
      background: #fff;
      box-shadow: 0 0 16px #fff;
    }
    .target::after {
      width: 108px;
      height: 108px;
      border: 1px solid rgba(103,232,249,0.18);
    }
    @keyframes pulse {
      0% { transform: scale(0.92); }
      50% { transform: scale(1); }
      100% { transform: scale(0.92); }
    }
    .pop {
      position: absolute;
      font-weight: 800;
      font-size: 22px;
      color: var(--warn);
      text-shadow: 0 2px 10px rgba(0,0,0,0.35);
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: floatUp 0.65s ease-out forwards;
      z-index: 4;
    }
    @keyframes floatUp {
      0% { opacity: 0; transform: translate(-50%, -20%) scale(0.8); }
      20% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -120%) scale(1.15); }
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 8;
      background: rgba(4,10,18,0.34);
      backdrop-filter: blur(8px);
    }
    .panel {
      width: min(92vw, 420px);
      padding: 24px 20px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(18,52,95,0.92), rgba(7,18,35,0.94));
      border: 1px solid rgba(103,232,249,0.26);
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      text-align: center;
    }
    .title {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .desc {
      font-size: 15px;
      line-height: 1.5;
      opacity: 0.88;
      margin-bottom: 18px;
    }
    .big {
      font-size: 44px;
      font-weight: 900;
      color: var(--accent);
      margin: 6px 0 16px;
    }
    button {
      appearance: none;
      border: none;
      outline: none;
      width: 100%;
      padding: 16px 18px;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 800;
      color: #042334;
      background: linear-gradient(180deg, #8af5ff, #34d399);
      box-shadow: 0 10px 26px rgba(52,211,153,0.28);
    }
    .hint {
      margin-top: 12px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div id="game">
    <div class="hud">
      <div class="card">
        <div class="label">分数</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="card">
        <div class="label">连击</div>
        <div class="value" id="combo">0</div>
      </div>
      <div class="card">
        <div class="label">剩余</div>
        <div class="value" id="time">20</div>
      </div>
    </div>
    <div id="arena"></div>
    <div class="overlay" id="overlay">
      <div class="panel">
        <div class="title">Link Check</div>
        <div class="desc" id="message">点击屏幕中跳出的信号点得分。连续命中会提升连击，每次命中都会刷新目标位置。</div>
        <div class="big" id="finalScore">0</div>
        <button id="startBtn">开始检查</button>
        <div class="hint">支持触摸和鼠标点击，适配手机竖屏</div>
      </div>
    </div>
  </div>
  <script>
    const arena = document.getElementById('arena');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');
    const scoreEl = document.getElementById('score');
    const comboEl = document.getElementById('combo');
    const timeEl = document.getElementById('time');
    const finalScoreEl = document.getElementById('finalScore');
    const messageEl = document.getElementById('message');

    let score = 0;
    let combo = 0;
    let timeLeft = 20;
    let playing = false;
    let timer = null;
    let target = null;

    function setHud() {
      scoreEl.textContent = score;
      comboEl.textContent = combo;
      timeEl.textContent = timeLeft;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function removeTarget() {
      if (target && target.parentNode) target.parentNode.removeChild(target);
      target = null;
    }

    function spawnTarget() {
      removeTarget();
      const rect = arena.getBoundingClientRect();
      const size = Math.max(74, Math.min(92, rect.width * 0.18));
      const margin = size * 0.6;
      const topSafe = Math.max(120, rect.height * 0.18);
      const x = margin + Math.random() * Math.max(1, rect.width - margin * 2);
      const y = topSafe + Math.random() * Math.max(1, rect.height - topSafe - margin);
      const el = document.createElement('div');
      el.className = 'target';
      el.style.width = size + 'px';
      el.style.height = size + 'px';
      el.style.marginLeft = -(size / 2) + 'px';
      el.style.marginTop = -(size / 2) + 'px';
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.addEventListener('pointerdown', hitTarget);
      arena.appendChild(el);
      target = el;
    }

    function showPop(text, x, y) {
      const pop = document.createElement('div');
      pop.className = 'pop';
      pop.textContent = text;
      pop.style.left = x + 'px';
      pop.style.top = y + 'px';
      arena.appendChild(pop);
      setTimeout(() => pop.remove(), 650);
    }

    function hitTarget(e) {
      if (!playing) return;
      e.preventDefault();
      combo += 1;
      const gain = 1 + Math.min(4, Math.floor(combo / 4));
      score += gain;
      setHud();
      const rect = arena.getBoundingClientRect();
      const x = clamp(e.clientX - rect.left, 40, rect.width - 40);
      const y = clamp(e.clientY - rect.top, 80, rect.height - 40);
      showPop('+' + gain, x, y);
      spawnTarget();
    }

    function missTap(e) {
      if (!playing) return;
      if (e.target === target) return;
      combo = 0;
      comboEl.textContent = combo;
    }

    function endGame() {
      playing = false;
      clearInterval(timer);
      removeTarget();
      messageEl.textContent = '检查结束，再来一轮刷新你的最高分。';
      finalScoreEl.textContent = score;
      startBtn.textContent = '重新开始';
      overlay.style.display = 'flex';
    }

    function startGame() {
      score = 0;
      combo = 0;
      timeLeft = 20;
      playing = true;
      overlay.style.display = 'none';
      setHud();
      spawnTarget();
      clearInterval(timer);
      timer = setInterval(() => {
        timeLeft -= 1;
        setHud();
        if (timeLeft <= 0) endGame();
      }, 1000);
    }

    startBtn.addEventListener('click', startGame);
    arena.addEventListener('pointerdown', missTap);
    window.addEventListener('resize', () => {
      if (playing) spawnTarget();
    });
    setHud();
  </script>
</body>
</html>
