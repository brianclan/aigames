<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'><title>Cat Catch</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;touch-action:none;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}#gameContainer{position:relative;width:100vw;height:100vw;max-width:400px;max-height:600px;background:linear-gradient(180deg,#4a90e2,#90caf9);border-radius:12px;overflow:hidden}canvas{display:block;width:100%;height:100%}#hud{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;color:white;font-weight:bold;font-size:18px;text-shadow:2px 2px 4px rgba(0,0,0,0.5);z-index:10}#hud span{background:rgba(0,0,0,0.3);padding:6px 12px;border-radius:20px}#gameOver{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,0,0,0.7);z-index:20;color:white}#gameOver h2{font-size:36px;margin-bottom:10px}#gameOver p{font-size:22px;margin-bottom:20px}#gameOver button{background:#ff7043;border:none;color:white;font-size:20px;padding:12px 30px;border-radius:30px;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,0.3)}#startScreen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,0,0,0.5);z-index:30;color:white}#startScreen h1{font-size:42px;margin-bottom:10px}#startScreen p{font-size:18px;margin-bottom:30px}#startScreen button{background:#4caf50;border:none;color:white;font-size:22px;padding:14px 40px;border-radius:30px;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,0.3)}</style></head><body><div id='gameContainer'><canvas id='gameCanvas'></canvas><div id='hud'><span id='scoreDisplay'>Score: 0</span><span id='livesDisplay'>Lives: 3</span></div><div id='gameOver'><h2>Game Over</h2><p id='finalScore'>Score: 0</p><button id='restartBtn'>Play Again</button></div><div id='startScreen'><h1>Cat Catch</h1><p>Catch fish, avoid trash!</p><button id='startBtn'>Start</button></div></div><script>const canvas=document.getElementById('gameCanvas');const ctx=canvas.getContext('2d');const container=document.getElementById('gameContainer');let W, H, catW, catH, fishW, fishH, trashW, trashH;let cat, fishes, trashes, score, lives, gameRunning, gameOver, start;let animationId;let spawnInterval, moveSpeed;const maxTrash=3;const maxFish=5;function resize(){const rect=container.getBoundingClientRect();canvas.width=rect.width;canvas.height=rect.height;W=canvas.width;H=canvas.height;catW=W*0.15;catH=H*0.1;fishW=W*0.08;fishH=H*0.06;trashW=W*0.08;trashH=H*0.06;if(cat)cat.w=catW,cat.h=catH;if(fishes)fishes.forEach(f=>{f.w=fishW,f.h=fishH});if(trashes)trashes.forEach(t=>{t.w=trashW,t.h=trashH});}function initGame(){cat={x:W/2-catW/2,y:H-catH-20,w:catW,h:catH};fishes=[];trashes=[];score=0;lives=3;gameRunning=true;gameOver=false;document.getElementById('scoreDisplay').textContent='Score: 0';document.getElementById('livesDisplay').textContent='Lives: 3';document.getElementById('gameOver').style.display='none';if(spawnInterval)clearInterval(spawnInterval);spawnInterval=setInterval(spawnObjects,800);}function spawnObjects(){if(!gameRunning)return;if(fishes.length<maxFish&&Math.random()<0.6){fishes.push({x:Math.random()*(W-fishW),y:-fishH,w:fishW,h:fishH,type:'fish'});}if(trashes.length<maxTrash&&Math.random()<0.3){trashes.push({x:Math.random()*(W-trashW),y:-trashH,w:trashW,h:trashH,type:'trash'});}}function update(){if(!gameRunning)return;const speed=H*0.008;fishes.forEach(f=>f.y+=speed);trashes.forEach(t=>t.y+=speed);fishes=fishes.filter(f=>f.y<H);trashes=trashes.filter(t=>t.y<H);for(let i=fishes.length-1;i>=0;i--){const f=fishes[i];if(cat.x<f.x+f.w&&cat.x+cat.w>f.x&&cat.y<f.y+f.h&&cat.y+cat.h>f.y){score++;fishes.splice(i,1);document.getElementById('scoreDisplay').textContent='Score: '+score;}}for(let i=trashes.length-1;i>=0;i--){const t=trashes[i];if(cat.x<t.x+t.w&&cat.x+cat.w>t.x&&cat.y<t.y+t.h&&cat.y+cat.h>t.y){lives--;trashes.splice(i,1);document.getElementById('livesDisplay').textContent='Lives: '+lives;if(lives<=0){gameOver=true;gameRunning=false;clearInterval(spawnInterval);document.getElementById('finalScore').textContent='Score: '+score;document.getElementById('gameOver').style.display='flex';}}}}function draw(){ctx.clearRect(0,0,W,H);ctx.fillStyle='#4a90e2';ctx.fillRect(0,0,W,H);ctx.fillStyle='#90caf9';ctx.fillRect(0,H*0.9,W,H*0.1);ctx.fillStyle='#ffb74d';ctx.beginPath();ctx.arc(cat.x+cat.w/2,cat.y+cat.h/2,cat.w/2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#333';ctx.beginPath();ctx.arc(cat.x+cat.w*0.3,cat.y+cat.h*0.3,5,0,Math.PI*2);ctx.arc(cat.x+cat.w*0.7,cat.y+cat.h*0.3,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#e91e63';ctx.beginPath();ctx.arc(cat.x+cat.w/2,cat.y+cat.h*0.6,8,0,Math.PI,false);ctx.fill();ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cat.x,cat.y+cat.h);ctx.lineTo(cat.x-10,cat.y+cat.h+15);ctx.stroke();ctx.beginPath();ctx.moveTo(cat.x+cat.w,cat.y+cat.h);ctx.lineTo(cat.x+cat.w+10,cat.y+cat.h+15);ctx.stroke();fishes.forEach(f=>{ctx.fillStyle='#ff7043';ctx.beginPath();ctx.ellipse(f.x+f.w/2,f.y+f.h/2,f.w/2,f.h/2,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(f.x+f.w*0.7,f.y+f.h*0.3,3,0,Math.PI*2);ctx.fill();});trashes.forEach(t=>{ctx.fillStyle='#5d4037';ctx.fillRect(t.x+2,t.y+2,t.w-4,t.h-4);ctx.fillStyle='#795548';ctx.fillRect(t.x+5,t.y-3,t.w-10,6);});requestAnimationFrame(draw);}function gameLoop(){update();draw();if(!gameOver)animationId=requestAnimationFrame(gameLoop);}function startGame(){document.getElementById('startScreen').style.display='none';resize();initGame();if(animationId)cancelAnimationFrame(animationId);gameLoop();}let mouseDown=false;let touchId=null;canvas.addEventListener('mousedown',(e)=>{mouseDown=true;moveCat(e.clientX);});canvas.addEventListener('mousemove',(e)=>{if(mouseDown)moveCat(e.clientX);});canvas.addEventListener('mouseup',()=>{mouseDown=false;});canvas.addEventListener('touchstart',(e)=>{e.preventDefault();const touch=e.touches[0];if(touch){touchId=touch.identifier;moveCat(touch.clientX);}});canvas.addEventListener('touchmove',(e)=>{e.preventDefault();const touch=Array.from(e.touches).find(t=>t.identifier===touchId);if(touch)moveCat(touch.clientX);});canvas.addEventListener('touchend',(e)=>{e.preventDefault();touchId=null;});function moveCat(clientX){if(!gameRunning)return;const rect=canvas.getBoundingClientRect();let x=clientX-rect.left;x/=rect.width;x*=W;cat.x=x-cat.w/2;if(cat.x<0)cat.x=0;if(cat.x+cat.w>W)cat.x=W-cat.w;}document.getElementById('startBtn').addEventListener('click',startGame);document.getElementById('restartBtn').addEventListener('click',()=>{initGame();if(animationId)cancelAnimationFrame(animationId);gameLoop();});window.addEventListener('resize',resize);resize();</script></body></html>
