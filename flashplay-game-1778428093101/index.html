<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cat Catch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 480px;
            margin: 0 auto;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: bold;
            color: #333;
            text-shadow: 1px 1px 2px white;
        }
        #startScreen, #endScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(135, 206, 235, 0.9);
            pointer-events: auto;
        }
        #endScreen {
            display: none;
        }
        .title {
            font-size: 48px;
            font-weight: bold;
            color: #FF6B35;
            text-shadow: 3px 3px 0 #333;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 18px;
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            padding: 0 20px;
        }
        .btn {
            padding: 15px 50px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: #FF6B35;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 0 #C44D1C;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #C44D1C;
        }
        .result {
            font-size: 36px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .score-display {
            font-size: 28px;
            color: #FF6B35;
            margin-bottom: 30px;
        }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 14px;
            color: #666;
        }
        #touchControls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: auto;
        }
        .arrow-btn {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.7);
            border: 3px solid #FF6B35;
            border-radius: 50%;
            font-size: 36px;
            color: #FF6B35;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .arrow-btn:active {
            background: rgba(255, 107, 53, 0.5);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div id="hud" style="display: none;">
                <div>Score: <span id="scoreText">0</span></div>
                <div>Time: <span id="timeText">60</span></div>
            </div>
            <div id="startScreen">
                <div class="title">Cat Catch</div>
                <div class="subtitle">Help the hungry cat catch all the fish before time runs out!</div>
                <button class="btn" id="startBtn">START</button>
                <div class="controls-hint">Use arrow buttons or tap sides of screen to move</div>
            </div>
            <div id="endScreen">
                <div class="result" id="resultText">Game Over</div>
                <div class="score-display">Final Score: <span id="finalScore">0</span></div>
                <button class="btn" id="restartBtn">PLAY AGAIN</button>
            </div>
            <div id="touchControls" style="display: none;">
                <div class="arrow-btn" id="leftBtn">◀</div>
                <div class="arrow-btn" id="rightBtn">▶</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('gameContainer');
        const hud = document.getElementById('hud');
        const scoreText = document.getElementById('scoreText');
        const timeText = document.getElementById('timeText');
        const startScreen = document.getElementById('startScreen');
        const endScreen = document.getElementById('endScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const resultText = document.getElementById('resultText');
        const finalScore = document.getElementById('finalScore');
        const touchControls = document.getElementById('touchControls');
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        let gameWidth, gameHeight;
        let gameRunning = false;
        let score = 0;
        let timeLeft = 60;
        let timerInterval;

        const cat = {
            x: 0,
            y: 0,
            width: 80,
            height: 60,
            speed: 8,
            direction: 1,
            animFrame: 0
        };

        let fishes = [];
        const fishTypes = [
            { color: '#FF6B35', size: 30, speed: 3 },
            { color: '#FFD93D', size: 25, speed: 4 },
            { color: '#6BCB77', size: 35, speed: 2.5 }
        ];

        let keys = { left: false, right: false };

        function resizeCanvas() {
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            gameWidth = canvas.width;
            gameHeight = canvas.height;
            cat.x = gameWidth / 2 - cat.width / 2;
            cat.y = gameHeight - cat.height - 20;
        }

        function drawCat() {
            const x = cat.x;
            const y = cat.y;
            const w = cat.width;
            const h = cat.height;

            ctx.save();

            if (cat.direction < 0) {
                ctx.translate(x + w / 2, 0);
                ctx.scale(-1, 1);
                ctx.translate(-(x + w / 2), 0);
            }

            // Body
            ctx.fillStyle = '#FFA500';
            ctx.beginPath();
            ctx.ellipse(x + w / 2, y + h * 0.6, w / 2 - 5, h / 2 - 5, 0, 0, Math.PI * 2);
            ctx.fill();

            // Head
            ctx.fillStyle = '#FFA500';
            ctx.beginPath();
            ctx.arc(x + w / 2, y + h * 0.3, w / 3, 0, Math.PI * 2);
            ctx.fill();

            // Ears
            ctx.beginPath();
            ctx.moveTo(x + w * 0.25, y + h * 0.15);
            ctx.lineTo(x + w * 0.35, y - 5);
            ctx.lineTo(x + w * 0.45, y + h * 0.15);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(x + w * 0.55, y + h * 0.15);
            ctx.lineTo(x + w * 0.65, y - 5);
            ctx.lineTo(x + w * 0.75, y + h * 0.15);
            ctx.fill();

            // Inner ears
            ctx.fillStyle = '#FFB6C1';
            ctx.beginPath();
            ctx.moveTo(x + w * 0.3, y + h * 0.12);
            ctx.lineTo(x + w * 0.35, y);
            ctx.lineTo(x + w * 0.4, y + h * 0.12);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(x + w * 0.6, y + h * 0.12);
            ctx.lineTo(x + w * 0.65, y);
            ctx.lineTo(x + w * 0.7, y + h * 0.12);
            ctx.fill();

            // Eyes
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.ellipse(x + w * 0.38, y + h * 0.28, 8, 10, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + w * 0.62, y + h * 0.28, 8, 10, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(x + w * 0.4, y + h * 0.28, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + w * 0.64, y + h * 0.28, 4, 0, Math.PI * 2);
            ctx.fill();

            // Nose
            ctx.fillStyle = '#FFB6C1';
            ctx.beginPath();
            ctx.moveTo(x + w / 2, y + h * 0.38);
            ctx.lineTo(x + w / 2 - 4, y + h * 0.43);
            ctx.lineTo(x + w / 2 + 4, y + h * 0.43);
            ctx.closePath();
            ctx.fill();

            // Whiskers
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(x + w * 0.3, y + h * 0.4);
            ctx.lineTo(x + w * 0.1, y + h * 0.35);
            ctx.moveTo(x + w * 0.3, y + h * 0.43);
            ctx.lineTo(x + w * 0.1, y + h * 0.45);
            ctx.moveTo(x + w * 0.7, y + h * 0.4);
            ctx.lineTo(x + w * 0.9, y + h * 0.35);
            ctx.moveTo(x + w * 0.7, y + h * 0.43);
            ctx.lineTo(x + w * 0.9, y + h * 0.45);
            ctx.stroke();

            // Tail
            ctx.strokeStyle = '#FFA500';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.beginPath();
            const tailWave = Math.sin(Date.now() / 200) * 10;
            ctx.moveTo(x + w - 10, y + h * 0.5);
            ctx.quadraticCurveTo(x + w + 20, y + h * 0.3 + tailWave, x + w + 10, y + h * 0.1);
            ctx.stroke();

            // Legs
            ctx.fillStyle = '#FFA500';
            const legOffset = Math.sin(Date.now() / 100) * 3;
            ctx.fillRect(x + w * 0.2, y + h * 0.85 + legOffset, 12, 15);
            ctx.fillRect(x + w * 0.35, y + h * 0.85 - legOffset, 12, 15);
            ctx.fillRect(x + w * 0.53, y + h * 0.85 + legOffset, 12, 15);
            ctx.fillRect(x + w * 0.68, y + h * 0.85 - legOffset, 12, 15);

            ctx.restore();
        }

        function drawFish(fish) {
            const x = fish.x;
            const y = fish.y;
            const size = fish.size;

            ctx.save();

            if (fish.direction < 0) {
                ctx.translate(x + size / 2, 0);
                ctx.scale(-1, 1);
                ctx.translate(-(x + size / 2), 0);
            }

            // Body
            ctx.fillStyle = fish.color;
            ctx.beginPath();
            ctx.ellipse(x, y, size, size * 0.5, 0, 0, Math.PI * 2);
            ctx.fill();

            // Tail
            ctx.beginPath();
            ctx.moveTo(x - size * 0.8, y);
            ctx.lineTo(x - size * 1.4, y - size * 0.5);
            ctx.lineTo(x - size * 1.4, y + size * 0.5);
            ctx.closePath();
            ctx.fill();

            // Eye
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(x + size * 0.4, y - size * 0.1, size * 0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(x + size * 0.45, y - size * 0.1, size * 0.1, 0, Math.PI * 2);
            ctx.fill();

            // Fin
            ctx.fillStyle = fish.color;
            ctx.globalAlpha = 0.7;
            ctx.beginPath();
            ctx.moveTo(x, y - size * 0.3);
            ctx.lineTo(x - size * 0.3, y - size * 0.8);
            ctx.lineTo(x + size * 0.3, y - size * 0.3);
            ctx.closePath();
            ctx.fill();
            ctx.globalAlpha = 1;

            ctx.restore();
        }

        function spawnFish() {
            const type = fishTypes[Math.floor(Math.random() * fishTypes.length)];
            const side = Math.random();
            let fish;

            if (side < 0.5) {
                fish = {
                    x: -type.size,
                    y: Math.random() * (gameHeight * 0.5) + 50,
                    size: type.size,
                    speed: type.speed + Math.random() * 2,
                    color: type.color,
                    direction: 1
                };
            } else {
                fish = {
                    x: gameWidth + type.size,
                    y: Math.random() * (gameHeight * 0.5) + 50,
                    size: type.size,
                    speed: type.speed + Math.random() * 2,
                    color: type.color,
                    direction: -1
                };
            }

            fishes.push(fish);
        }

        function drawBackground() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, gameHeight);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, gameWidth, gameHeight);

            // Clouds
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            const cloudY = 50;
            const cloudOffset = (Date.now() / 50) % (gameWidth + 200);
            drawCloud(cloudOffset - 100, cloudY, 60);
            drawCloud((cloudOffset + 200) % (gameWidth + 200) - 100, cloudY + 30, 40);
            drawCloud((cloudOffset + 400) % (gameWidth + 200) - 100, cloudY + 10, 50);

            // Water/Ground
            ctx.fillStyle = '#4A90D9';
            ctx.fillRect(0, gameHeight - 80, gameWidth, 80);

            // Water surface
            ctx.fillStyle = '#6BB3E0';
            ctx.fillRect(0, gameHeight - 85, gameWidth, 10);

            // Water waves
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 2;
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                const waveY = gameHeight - 70 + i * 15;
                for (let x = 0; x < gameWidth; x += 10) {
                    const y = waveY + Math.sin((x + Date.now() / 200 + i * 50) / 20) * 3;
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }
        }

        function drawCloud(x, y, size) {
            ctx.beginPath();
            ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y - size * 0.2, size * 0.4, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y, size * 0.45, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y + size * 0.15, size * 0.35, 0, Math.PI * 2);
            ctx.fill();
        }

        function update() {
            if (!gameRunning) return;

            // Move cat
            if (keys.left) {
                cat.x -= cat.speed;
                cat.direction = -1;
            }
            if (keys.right) {
                cat.x += cat.speed;
                cat.direction = 1;
            }

            // Keep cat in bounds
            cat.x = Math.max(0, Math.min(gameWidth - cat.width, cat.x));

            // Update fish
            for (let i = fishes.length - 1; i >= 0; i--) {
                const fish = fishes[i];
                fish.x += fish.speed * fish.direction;

                // Remove fish that went off screen
                if ((fish.direction > 0 && fish.x > gameWidth + fish.size * 2) ||
                    (fish.direction < 0 && fish.x < -fish.size * 2)) {
                    fishes.splice(i, 1);
                    continue;
                }

                // Check collision with cat
                const fishCenterX = fish.x;
                const fishCenterY = fish.y;
                const catCenterX = cat.x + cat.width / 2;
                const catCenterY = cat.y + cat.height / 2;

                const dx = fishCenterX - catCenterX;
                const dy = fishCenterY - catCenterY;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < (fish.size + cat.width / 2) * 0.6) {
                    fishes.splice(i, 1);
                    score += 10;
                    scoreText.textContent = score;
                }
            }

            // Spawn new fish
            if (Math.random() < 0.03) {
                spawnFish();
            }
        }

        function draw() {
            drawBackground();

            // Draw fish
            fishes.forEach(fish => drawFish(fish));

            // Draw cat
            drawCat();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            score = 0;
            timeLeft = 60;
            fishes = [];
            cat.x = gameWidth / 2 - cat.width / 2;
            cat.direction = 1;

            scoreText.textContent = '0';
            timeText.textContent = '60';

            startScreen.style.display = 'none';
            endScreen.style.display = 'none';
            hud.style.display = 'flex';
            touchControls.style.display = 'flex';

            gameRunning = true;

            timerInterval = setInterval(() => {
                timeLeft--;
                timeText.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameRunning = false;
            clearInterval(timerInterval);

            hud.style.display = 'none';
            touchControls.style.display = 'none';
            endScreen.style.display = 'flex';

            if (score >= 100) {
                resultText.textContent = 'Amazing!';
                resultText.style.color = '#FFD93D';
            } else if (score >= 50) {
                resultText.textContent = 'Great Job!';
                resultText.style.color = '#6BCB77';
            } else {
                resultText.textContent = 'Game Over';
                resultText.style.color = '#333';
            }

            finalScore.textContent = score;
        }

        // Event listeners
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); keys.left = true; });
        leftBtn.addEventListener('touchend', (e) => { e.preventDefault(); keys.left = false; });
        leftBtn.addEventListener('mousedown', () => keys.left = true);
        leftBtn.addEventListener('mouseup', () => keys.left = false);
        leftBtn.addEventListener('mouseleave', () => keys.left = false);

        rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); keys.right = true; });
        rightBtn.addEventListener('touchend', (e) => { e.preventDefault(); keys.right = false; });
        rightBtn.addEventListener('mousedown', () => keys.right = true);
        rightBtn.addEventListener('mouseup', () => keys.right = false);
        rightBtn.addEventListener('mouseleave', () => keys.right = false);

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
        });

        // Touch tap controls
        canvas.addEventListener('touchstart', (e) => {
            if (!gameRunning) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;

            if (x < rect.width / 2) {
                keys.left = true;
                keys.right = false;
            } else {
                keys.right = true;
                keys.left = false;
            }
        });

        canvas.addEventListener('touchend', () => {
            keys.left = false;
            keys.right = false;
        });

        canvas.addEventListener('click', (e) => {
            if (!gameRunning) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;

            if (x < rect.width / 2) {
                keys.left = true;
                setTimeout(() => keys.left = false, 100);
            } else {
                keys.right = true;
                setTimeout(() => keys.right = false, 100);
            }
        });

        window.addEventListener('resize', resizeCanvas);

        resizeCanvas();
        gameLoop();
    </script>
</body>
</html>
