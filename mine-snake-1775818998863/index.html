<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Mine Snake</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#111;font-family:monospace}body{display:flex;align-items:stretch;justify-content:center}#game{position:fixed;inset:0;width:100vw;height:100vh;touch-action:none;background:linear-gradient(180deg,#1b1b1b,#0d0d0d)}.ui{position:fixed;left:0;top:0;width:100%;padding:max(12px,env(safe-area-inset-top)) 14px 10px;color:#f4f4f4;pointer-events:none;display:flex;justify-content:space-between;align-items:flex-start;text-shadow:2px 2px 0 #000;font-size:14px;z-index:3}.panel{background:rgba(0,0,0,.35);border:2px solid #2e2e2e;padding:8px 10px;image-rendering:pixelated}.center{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:4;pointer-events:none}.card{pointer-events:auto;background:rgba(18,18,18,.92);border:4px solid #4a4a4a;color:#fff;padding:16px 18px;max-width:min(88vw,420px);text-align:center;box-shadow:0 0 0 4px #000}.title{font-size:26px;line-height:1;margin:4px 0 10px;color:#9df56b;text-shadow:3px 3px 0 #000}.desc{font-size:14px;line-height:1.6;color:#ddd;margin:8px 0 14px}.btn{display:inline-block;border:none;background:#9df56b;color:#111;font:inherit;font-weight:700;padding:12px 18px;box-shadow:0 4px 0 #4b7a2a;cursor:pointer;touch-action:manipulation}.btn:active{transform:translateY(2px);box-shadow:0 2px 0 #4b7a2a}.controls{position:fixed;left:0;right:0;bottom:max(12px,env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(3,72px);grid-template-rows:repeat(2,72px);gap:10px;justify-content:center;z-index:3}.pad{background:rgba(255,255,255,.08);border:2px solid #444;color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;user-select:none;touch-action:none;box-shadow:inset 0 0 0 2px rgba(0,0,0,.35)}.pad:active{background:rgba(157,245,107,.28)}.up{grid-column:2;grid-row:1}.left{grid-column:1;grid-row:2}.down{grid-column:2;grid-row:2}.right{grid-column:3;grid-row:2}.hint{position:fixed;left:50%;transform:translateX(-50%);bottom:170px;z-index:2;color:#cfcfcf;font-size:12px;background:rgba(0,0,0,.28);padding:6px 10px;border:1px solid #333;text-shadow:1px 1px 0 #000}@media (min-width:900px){.controls{bottom:18px;right:18px;left:auto}.hint{left:auto;right:34px;transform:none;bottom:180px}}</style></head><body><canvas id="game"></canvas><div class="ui"><div class="panel"><div>得分 <span id="score">0</span></div><div>长度 <span id="length">3</span></div></div><div class="panel"><div>地雷 <span id="mines">0</span></div><div>速度 <span id="speed">1</span></div></div></div><div class="center" id="overlay"><div class="card"><div class="title">MINE SNAKE</div><div class="desc" id="message">吃掉苹果增长身体，避开随机出现的地雷。<br>滑动、点击方向键或用键盘控制。</div><button class="btn" id="startBtn">开始游戏</button></div></div><div class="hint">支持触摸滑动 / 点击方向键 / 键盘方向键</div><div class="controls"><div class="pad up" data-dir="up">▲</div><div class="pad left" data-dir="left">◀</div><div class="pad down" data-dir="down">▼</div><div class="pad right" data-dir="right">▶</div></div><script>(()=>{const canvas=document.getElementById('game');const ctx=canvas.getContext('2d');const scoreEl=document.getElementById('score');const lengthEl=document.getElementById('length');const minesEl=document.getElementById('mines');const speedEl=document.getElementById('speed');const overlay=document.getElementById('overlay');const startBtn=document.getElementById('startBtn');const message=document.getElementById('message');const dirs={up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};let dpr=1,w=0,h=0,cols=18,rows=28,cell=20,offsetX=0,offsetY=0;let snake,dir,nextDir,food,mines,score,tick,stepTime,lastTime,gameOver,running,particles,mineTimer,mineSpawnGap;function resize(){dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1));w=window.innerWidth;h=window.innerHeight;canvas.width=Math.floor(w*dpr);canvas.height=Math.floor(h*dpr);canvas.style.width=w+'px';canvas.style.height=h+'px';ctx.setTransform(dpr,0,0,dpr,0,0);const targetCell=Math.floor(Math.min(w/cols,h/rows));cell=Math.max(12,targetCell);offsetX=Math.floor((w-cols*cell)/2);offsetY=Math.floor((h-rows*cell)/2)}function randCell(){return{x:Math.floor(Math.random()*cols),y:Math.floor(Math.random()*rows)}}function eq(a,b){return a.x===b.x&&a.y===b.y}function occupied(pos){for(const s of snake){if(eq(s,pos))return true}if(food&&eq(food,pos))return true;for(const m of mines){if(eq(m,pos))return true}return false}function spawnFood(){let p=randCell(),guard=0;while(occupied(p)&&guard++<1000)p=randCell();food=p}function spawnMine(count=1){for(let i=0;i<count;i++){let p=randCell(),guard=0;while(occupied(p)&&guard++<1000)p=randCell();if(!occupied(p))mines.push(p)}}function reset(){snake=[{x:Math.floor(cols/2),y:Math.floor(rows/2)},{x:Math.floor(cols/2)-1,y:Math.floor(rows/2)},{x:Math.floor(cols/2)-2,y:Math.floor(rows/2)}];dir='right';nextDir='right';food=null;mines=[];score=0;tick=0;stepTime=220;lastTime=0;gameOver=false;running=true;particles=[];mineTimer=0;mineSpawnGap=2400;spawnFood();spawnMine(2);updateUI()}function updateUI(){scoreEl.textContent=score;lengthEl.textContent=snake.length;minesEl.textContent=mines.length;speedEl.textContent=(Math.max(1,Math.round((260-stepTime)/18))).toString()}function setDir(name){if(!dirs[name])return;const opposite=(dir==='up'&&name==='down')||(dir==='down'&&name==='up')||(dir==='left'&&name==='right')||(dir==='right'&&name==='left');if(snake.length>1&&opposite)return;nextDir=name}function explodeAt(cellPos){particles=[];const cx=offsetX+cellPos.x*cell+cell/2;const cy=offsetY+cellPos.y*cell+cell/2;for(let i=0;i<42;i++){const a=Math.random()*Math.PI*2;const sp=1.2+Math.random()*4.8;particles.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:24+Math.random()*18,size:3+Math.random()*5,color:Math.random()>.35?'#ffcc33':'#ff6b35'})}}function endGame(reason){gameOver=true;running=false;message.innerHTML=reason+'<br>得分 '+score+'，长度 '+snake.length+'。';startBtn.textContent='重新开始';overlay.style.display='flex'}function step(){if(gameOver)return;dir=nextDir;const head={x:snake[0].x+dirs[dir].x,y:snake[0].y+dirs[dir].y};if(head.x<0||head.x>=cols||head.y<0||head.y>=rows){explodeAt({x:Math.max(0,Math.min(cols-1,head.x)),y:Math.max(0,Math.min(rows-1,head.y))});endGame('撞墙爆炸，游戏结束');return}for(const s of snake){if(eq(head,s)){explodeAt(head);endGame('咬到自己，游戏结束');return}}for(const m of mines){if(eq(head,m)){explodeAt(head);endGame('踩中地雷，瞬间爆炸');return}}snake.unshift(head);if(eq(head,food)){score++;spawnFood();if(score%2===0&&stepTime>90)stepTime-=10;if(score%3===0)spawnMine(1)}else{snake.pop()}updateUI()}function update(dt){if(running){tick+=dt;mineTimer+=dt;if(mineTimer>=mineSpawnGap){mineTimer=0;spawnMine(1);if(mineSpawnGap>1200)mineSpawnGap-=40;updateUI()}while(tick>=stepTime){tick-=stepTime;step();if(gameOver)break}}for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life-=1}particles=particles.filter(p=>p.life>0)}function drawPixelRect(x,y,size,color,shade){ctx.fillStyle=shade||'#000';ctx.fillRect(x,y,size,size);ctx.fillStyle=color;ctx.fillRect(x+2,y+2,size-4,size-4);ctx.fillStyle='rgba(255,255,255,.18)';ctx.fillRect(x+2,y+2,size-8,4)}function drawGrid(){ctx.fillStyle='#151515';ctx.fillRect(0,0,w,h);ctx.fillStyle='#0f0f0f';ctx.fillRect(offsetX,offsetY,cols*cell,rows*cell);for(let y=0;y<rows;y++){for(let x=0;x<cols;x++){ctx.fillStyle=(x+y)%2===0?'#1b1b1b':'#161616';ctx.fillRect(offsetX+x*cell,offsetY+y*cell,cell,cell)}}ctx.strokeStyle='#2b2b2b';ctx.lineWidth=4;ctx.strokeRect(offsetX-2,offsetY-2,cols*cell+4,rows*cell+4)}function drawFood(){const x=offsetX+food.x*cell,y=offsetY+food.y*cell;drawPixelRect(x,y,cell,'#ff5252','#5f1515');ctx.fillStyle='#7CFC00';ctx.fillRect(x+cell*0.55,y+4,4,6)}function drawMine(m){const x=offsetX+m.x*cell,y=offsetY+m.y*cell;ctx.fillStyle='#2d2d2d';ctx.fillRect(x+3,y+3,cell-6,cell-6);ctx.fillStyle='#111';ctx.fillRect(x+6,y+6,cell-12,cell-12);ctx.fillStyle='#ffcf33';ctx.fillRect(x+cell/2-2,y+2,4,cell-4);ctx.fillRect(x+2,y+cell/2-2,cell-4,4);ctx.fillRect(x+5,y+5,4,4);ctx.fillRect(x+cell-9,y+5,4,4);ctx.fillRect(x+5,y+cell-9,4,4);ctx.fillRect(x+cell-9,y+cell-9,4,4);ctx.fillStyle='#ff6b35';ctx.fillRect(x+cell/2-3,y+cell/2-3,6,6)}function drawSnake(){for(let i=snake.length-1;i>=0;i--){const s=snake[i];const x=offsetX+s.x*cell,y=offsetY+s.y*cell;const bodyColor=i===0?'#9df56b':'#67c94b';drawPixelRect(x,y,cell,bodyColor,'#28491d');if(i===0){ctx.fillStyle='#111';const ex=dir==='right'?x+cell-8:dir==='left'?x+4:x+5;const ey1=y+5,ey2=y+cell-9;ctx.fillRect(ex,ey1,4,4);ctx.fillRect(ex,ey2,4,4)}}}function drawParticles(){for(const p of particles){ctx.globalAlpha=Math.max(0,p.life/42);ctx.fillStyle=p.color;ctx.fillRect(p.x,p.y,p.size,p.size)}ctx.globalAlpha=1}function draw(){drawGrid();if(food)drawFood();for(const m of mines)drawMine(m);drawSnake();drawParticles();if(!running&&!gameOver){ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(offsetX,offsetY,cols*cell,rows*cell)}}function loop(ts){const dt=Math.min(33,ts-lastTime||16);lastTime=ts;update(dt);draw();requestAnimationFrame(loop)}function start(){reset();overlay.style.display='none'}startBtn.addEventListener('click',start);window.addEventListener('resize',resize);document.addEventListener('keydown',e=>{if(e.key==='ArrowUp'||e.key==='w')setDir('up');else if(e.key==='ArrowDown'||e.key==='s')setDir('down');else if(e.key==='ArrowLeft'||e.key==='a')setDir('left');else if(e.key==='ArrowRight'||e.key==='d')setDir('right');else if((e.key===' '||e.key==='Enter')&&!running)start()});let sx=0,sy=0,tracking=false;canvas.addEventListener('pointerdown',e=>{tracking=true;sx=e.clientX;sy=e.clientY});canvas.addEventListener('pointerup',e=>{if(!tracking)return;const dx=e.clientX-sx,dy=e.clientY-sy;tracking=false;if(Math.abs(dx)<8&&Math.abs(dy)<8)return;if(Math.abs(dx)>Math.abs(dy))setDir(dx>0?'right':'left');else setDir(dy>0?'down':'up')});for(const el of document.querySelectorAll('.pad')){const dirName=el.dataset.dir;el.addEventListener('pointerdown',e=>{e.preventDefault();setDir(dirName)})}resize();overlay.style.display='flex';requestAnimationFrame(loop)})();</script></body></html>
