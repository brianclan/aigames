<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>维港疾航</title>
<style>
body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh; overflow: hidden; }
canvas { display: block; border-radius: 8px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
var c = document.getElementById('c');
var x = c.getContext('2d');

// Size canvas to fill screen in portrait
function size() {
  var w = Math.min(window.innerWidth, 500);
  var h = w * 16 / 9;
  if (h > window.innerHeight) { h = window.innerHeight; w = h * 9 / 16; }
  c.width = Math.floor(w);
  c.height = Math.floor(h);
}
size();
window.addEventListener('resize', size);

// Colors
var scenes = [
  { w1:'#0055aa', w2:'#003388', acc:'#ff4444', name:'日间' },
  { w1:'#aa3300', w2:'#660044', acc:'#ffdd00', name:'黄昏' },
  { w1:'#000033', w2:'#000011', acc:'#00ffcc', name:'夜色' }
];
var scene = 0;
var time = 0;
var waveOff = 0;

// State: MENU=0, PLAY=1, OVER=2
var STATE = 0;
var score = 0;
var high = parseInt(localStorage.getItem('vrHS') || '0');
var lives = 3;
var fuel = 100;
var speed = 2;
var menuPulse = 0;

// Player boat position
var px, py, pw, ph, ptarget, ptilt;
function initPlayer() {
  pw = c.width * 0.12;
  ph = pw * 1.8;
  px = c.width / 2;
  py = c.height * 0.78;
  ptarget = px;
  ptilt = 0;
}
initPlayer();

// Obstacles
var OBS = [];
var TYPES = [
  {e:'🛥️', w:0.17, h:0.055, s:0.9},
  {e:'🚢', w:0.27, h:0.07, s:0.5},
  {e:'🐟', w:0.13, h:0.045, s:1.1},
  {e:'🚤', w:0.12, h:0.04, s:1.3}
];
var ITEMS = [];
var ITYPES = [
  {e:'🪙', p:10, f:0},
  {e:'💎', p:50, f:0},
  {e:'⛽', p:0, f:30}
];

function spawnObs() {
  var T = TYPES[Math.floor(Math.random() * TYPES.length)];
  var ow = c.width * T.w;
  OBS.push({
    x: ow/2 + Math.random() * (c.width - ow),
    y: -c.height * T.h,
    w: ow, h: c.height * T.h,
    e: T.e, s: T.s,
    phase: Math.random() * Math.PI * 2
  });
}
function spawnItem() {
  var T = ITYPES[Math.floor(Math.random() * ITYPES.length)];
  var s = c.width * 0.09;
  ITEMS.push({
    x: s/2 + Math.random() * (c.width - s),
    y: -s, s: s, e: T.e, p: T.p, f: T.f,
    rot: 0, g: 0
  });
}

var dragX = 0;
c.addEventListener('mousedown', function(e) {
  dragX = e.clientX;
  if (STATE === 0) { STATE = 1; reset(); }
  else if (STATE === 2) { STATE = 0; }
});
c.addEventListener('mousemove', function(e) {
  if (!dragX) return;
  ptarget += (e.clientX - dragX) * 1.8;
  if (ptarget < pw/2) ptarget = pw/2;
  if (ptarget > c.width - pw/2) ptarget = c.width - pw/2;
  dragX = e.clientX;
});
c.addEventListener('mouseup', function() { dragX = 0; });
c.addEventListener('touchstart', function(e) { e.preventDefault();
  dragX = e.touches[0].clientX;
  if (STATE === 0) { STATE = 1; reset(); }
  else if (STATE === 2) { STATE = 0; }
}, {passive:false});
c.addEventListener('touchmove', function(e) { e.preventDefault();
  if (!dragX) return;
  ptarget += (e.touches[0].clientX - dragX) * 1.8;
  if (ptarget < pw/2) ptarget = pw/2;
  if (ptarget > c.width - pw/2) ptarget = c.width - pw/2;
  dragX = e.touches[0].clientX;
}, {passive:false});
c.addEventListener('touchend', function(e) { e.preventDefault(); dragX = 0; }, {passive:false});

function reset() {
  score = 0; lives = 3; fuel = 100; speed = 2; time = 0; scene = 0;
  OBS = []; ITEMS = []; waveOff = 0;
  initPlayer();
}

var obsT = 0, itemT = 0;
function update(dt) {
  if (STATE !== 1) { menuPulse += dt * 2; return; }
  time += dt;
  waveOff += speed;

  // Scene cycle
  if (time > 30 && Math.floor(time) % 30 < dt) {
    scene = (scene + 1) % 3;
  }

  // Move player
  px += (ptarget - px) * 0.12;
  ptilt += ((ptarget - px) * 0.007 - ptilt) * 0.2;

  // Fuel
  fuel -= dt * (2 + speed * 0.5);
  if (fuel <= 0) { fuel = 0; STATE = 2; if (score > high) { high = score; localStorage.setItem('vrHS', high); } return; }

  score += dt * speed * 3;
  speed = Math.min(2 + Math.floor(score / 400) * 0.4, 7);

  // Spawn
  obsT += dt;
  if (obsT > Math.max(0.5, 1.5 - speed * 0.12)) { obsT = 0; spawnObs(); }
  itemT += dt;
  if (itemT > 3) { itemT = 0; spawnItem(); }

  // Update obs
  OBS = OBS.filter(function(o) {
    o.y += speed * o.s;
    o.phase += 0.05;

    var dx = Math.abs(o.x - px), dy = Math.abs(o.y - py);
    if (dx < (o.w + pw) * 0.36 && dy < (o.h + ph) * 0.32) {
      lives--;
      if (lives <= 0) { STATE = 2; if (score > high) { high = score; localStorage.setItem('vrHS', high); } }
      return false;
    }
    return o.y < c.height + o.h;
  });

  // Update items
  var sc = scenes[scene];
  ITEMS = ITEMS.filter(function(it) {
    it.y += speed * 0.75;
    it.rot += 0.04;
    it.g = 0.5 + Math.sin(time * 5) * 0.5;

    var dx = Math.abs(it.x - px), dy = Math.abs(it.y - py);
    if (dx < (it.s + pw) * 0.38 && dy < (it.s + ph) * 0.35) {
      score += it.p;
      fuel = Math.min(100, fuel + it.f);
      return false;
    }
    return it.y < c.height + it.s;
  });
}

// Draw water
function drawWater() {
  var sc = scenes[scene];
  var g = x.createLinearGradient(0, 0, 0, c.height);
  g.addColorStop(0, sc.w1);
  g.addColorStop(1, sc.w2);
  x.fillStyle = g;
  x.fillRect(0, 0, c.width, c.height);

  // Waves
  x.globalAlpha = 0.15;
  for (var wi = 0; wi < 12; wi++) {
    var wy = ((wi * 80 + waveOff * 0.5) % (c.height + 60)) - 30;
    x.beginPath();
    x.moveTo(0, wy);
    for (var wx = 0; wx <= c.width; wx += 15) {
      x.lineTo(wx, wy + Math.sin((wx + waveOff * 2) * 0.04) * 5);
    }
    x.strokeStyle = '#fff';
    x.lineWidth = 1.5;
    x.stroke();
  }
  x.globalAlpha = 1;

  // Sparkles
  x.globalAlpha = 0.3;
  for (var si = 0; si < 18; si++) {
    var sx = (si * 93 + waveOff * 1.1) % c.width;
    var sy = (si * 71 + waveOff * 1.8) % c.height;
    var sr = 1 + Math.sin(time * 4 + si) * 1.2;
    x.fillStyle = '#fff';
    x.beginPath();
    x.arc(sx, sy, sr, 0, Math.PI * 2);
    x.fill();
  }
  x.globalAlpha = 1;

  // City silhouette at top
  var cityH = c.height * 0.28;
  x.fillStyle = sc.w1;
  for (var ci = 0; ci < 14; ci++) {
    var bw = c.width * (0.05 + Math.random() * 0.06);
    var bh = cityH * (0.3 + Math.random() * 0.7);
    var bx = (ci / 14) * c.width + Math.random() * 10;
    x.fillStyle = sc.w1;
    x.fillRect(bx, -bh, bw, bh);
    x.fillStyle = sc.acc;
    x.globalAlpha = 0.3 + Math.sin(time * 2 + ci) * 0.2;
    x.fillRect(bx + 2, -bh + 4, bw - 4, 3);
    x.globalAlpha = 1;
  }
}

// Draw player yacht
function drawBoat(cx, cy, w, h, tilt) {
  x.save();
  x.translate(cx, cy);
  x.rotate(tilt);

  // Shadow
  x.fillStyle = 'rgba(0,0,0,0.3)';
  x.beginPath();
  x.ellipse(2, 2, w * 0.36, h * 0.44, 0, 0, Math.PI * 2);
  x.fill();

  // Hull
  var hg = x.createLinearGradient(-w/2, 0, w/2, 0);
  hg.addColorStop(0, '#1a7');
  hg.addColorStop(0.5, '#2e8b57');
  hg.addColorStop(1, '#1a7');
  x.fillStyle = hg;
  x.beginPath();
  x.moveTo(0, -h/2);
  x.bezierCurveTo(w*0.46, -h*0.3, w*0.43, h*0.3, w*0.26, h*0.46);
  x.lineTo(-w*0.26, h*0.46);
  x.bezierCurveTo(-w*0.43, h*0.3, -w*0.46, -h*0.3, 0, -h/2);
  x.fill();

  // Stripe
  x.fillStyle = 'rgba(255,255,255,0.35)';
  x.fillRect(-w*0.04, -h*0.35, w*0.08, h*0.65);

  // Cabin
  var cw = w * 0.52, ch = h * 0.24;
  x.fillStyle = '#ecf0f1';
  x.fillRect(-cw/2, -h*0.1, cw, ch);
  x.fillStyle = 'rgba(100,200,255,0.6)';
  x.fillRect(-cw/2+3, -h*0.1+2, cw-6, ch*0.5);

  // Antenna
  x.strokeStyle = '#ccc';
  x.lineWidth = 1;
  x.beginPath();
  x.moveTo(0, -h*0.34);
  x.lineTo(0, -h*0.52);
  x.stroke();
  x.fillStyle = '#e74c3c';
  x.beginPath();
  x.arc(0, -h*0.52, 2.5, 0, Math.PI * 2);
  x.fill();

  x.restore();
}

// Draw emoji obstacle
function drawObs(o) {
  x.save();
  x.translate(o.x, o.y);
  x.rotate(Math.sin(o.phase) * 0.06);
  x.font = Math.floor(o.h * 0.88) + 'px serif';
  x.textAlign = 'center';
  x.textBaseline = 'middle';
  x.fillText(o.e, 0, 0);
  x.restore();
}

// Draw item
function drawItem(it) {
  var sc = scenes[scene];
  x.save();
  x.translate(it.x, it.y);
  x.rotate(it.rot);
  x.font = Math.floor(it.s * (0.65 + it.g * 0.15)) + 'px serif';
  x.textAlign = 'center';
  x.textBaseline = 'middle';
  x.shadowColor = sc.acc;
  x.shadowBlur = 10 + it.g * 10;
  x.fillText(it.e, 0, 0);
  x.shadowBlur = 0;
  x.restore();
}

// Draw HUD
function drawHUD() {
  var pad = c.width * 0.03;
  var sc = scenes[scene];

  // Score
  x.fillStyle = '#fff';
  x.font = Math.floor(c.width * 0.07) + 'px sans-serif';
  x.textAlign = 'left';
  x.textBaseline = 'top';
  x.fillText('🪙 ' + Math.floor(score), pad, pad);

  // Hi
  x.font = Math.floor(c.width * 0.038) + 'px sans-serif';
  x.fillStyle = 'rgba(255,255,255,0.5)';
  x.fillText('最高 ' + high, pad, pad + c.height * 0.07);

  // Fuel bar
  var fx = c.width - pad - c.width * 0.22;
  var fy = pad;
  var fbw = c.width * 0.22;
  var fbh = c.height * 0.018;
  x.fillStyle = 'rgba(0,0,0,0.4)';
  x.fillRect(fx, fy, fbw, fbh);
  var fc = fuel > 50 ? '#6bcb77' : fuel > 25 ? '#ffd93d' : '#e74c3c';
  x.fillStyle = fc;
  x.fillRect(fx, fy, fbw * fuel / 100, fbh);
  x.fillStyle = '#fff';
  x.font = Math.floor(c.width * 0.035) + 'px sans-serif';
  x.textAlign = 'center';
  x.fillText('⛽', fx - c.width * 0.04, fy + fbh * 0.5);

  // Lives
  x.font = Math.floor(c.width * 0.07) + 'px serif';
  x.textAlign = 'right';
  var ls = '';
  for (var i = 0; i < 3; i++) ls += (i < lives) ? '❤️' : '🖤';
  x.fillText(ls, c.width - pad, pad);

  // Speed
  x.font = Math.floor(c.width * 0.038) + 'px sans-serif';
  x.fillStyle = sc.acc;
  x.textAlign = 'left';
  x.fillText('⚡' + speed.toFixed(1) + 'x', pad, c.height - pad - c.height * 0.04);

  // Scene name
  x.fillStyle = 'rgba(255,255,255,0.45)';
  x.textAlign = 'right';
  x.fillText(sc.name, c.width - pad, c.height - pad - c.height * 0.04);
}

// Draw menu
function drawMenu() {
  drawWater();

  var cx = c.width / 2;
  var sc = scenes[scene];

  // Big boat in the middle of screen
  var bw = c.width * 0.22;
  var bh = bw * 1.8;
  var by = c.height * 0.62;

  // White glow behind boat
  x.save();
  x.shadowColor = '#ffffff';
  x.shadowBlur = 25;
  drawBoat(cx, by, bw, bh, Math.sin(menuPulse) * 0.06);
  x.restore();

  // Title box at top
  x.fillStyle = 'rgba(0,0,0,0.7)';
  x.fillRect(0, 0, c.width, c.height * 0.42);

  // Title
  var glow = 0.5 + Math.sin(menuPulse) * 0.3;
  x.shadowColor = sc.acc;
  x.shadowBlur = 20 * glow;
  x.fillStyle = '#ffffff';
  x.font = Math.floor(c.width * 0.13) + 'px sans-serif';
  x.textAlign = 'center';
  x.textBaseline = 'middle';
  x.fillText('维港疾航', cx, c.height * 0.14);
  x.shadowBlur = 0;

  x.fillStyle = sc.acc;
  x.font = Math.floor(c.width * 0.045) + 'px sans-serif';
  x.fillText('Victoria Harbour Rush', cx, c.height * 0.26);

  // Tap to start
  var alpha = 0.6 + Math.sin(menuPulse * 2) * 0.4;
  x.globalAlpha = alpha;
  x.fillStyle = '#ffffff';
  x.font = Math.floor(c.width * 0.055) + 'px sans-serif';
  x.fillText('👋 点我开始 👋', cx, c.height * 0.36);
  x.globalAlpha = 1;

  // High score
  x.fillStyle = 'rgba(255,255,255,0.7)';
  x.font = Math.floor(c.width * 0.045) + 'px sans-serif';
  x.fillText('🏆 最高分 ' + high, cx, by + bh / 2 + c.height * 0.04);

  // Hint at very bottom
  x.fillStyle = 'rgba(255,255,255,0.4)';
  x.font = Math.floor(c.width * 0.035) + 'px sans-serif';
  x.fillText('左右滑动躲避船只 | 收集金币补给', cx, c.height - c.height * 0.04);
}

// Draw game over
function drawOver() {
  x.fillStyle = 'rgba(0,0,0,0.65)';
  x.fillRect(0, 0, c.width, c.height);

  var cx = c.width / 2;
  var cy = c.height / 2;

  x.shadowColor = '#e74c3c';
  x.shadowBlur = 20;
  x.fillStyle = '#e74c3c';
  x.font = Math.floor(c.width * 0.12) + 'px sans-serif';
  x.textAlign = 'center';
  x.textBaseline = 'middle';
  x.fillText('💥 撞毁了!', cx, cy - c.height * 0.24);
  x.shadowBlur = 0;

  x.fillStyle = '#fff';
  x.font = Math.floor(c.width * 0.07) + 'px sans-serif';
  x.fillText('得分 ' + Math.floor(score), cx, cy - c.height * 0.06);

  if (score >= high && score > 0) {
    x.fillStyle = '#ffd93d';
    x.font = Math.floor(c.width * 0.055) + 'px sans-serif';
    x.fillText('🎉 新纪录! 🎉', cx, cy + c.height * 0.04);
  } else {
    x.fillStyle = 'rgba(255,255,255,0.6)';
    x.font = Math.floor(c.width * 0.05) + 'px sans-serif';
    x.fillText('最高分 ' + high, cx, cy + c.height * 0.04);
  }

  var alpha = 0.6 + Math.sin(menuPulse * 2) * 0.4;
  x.globalAlpha = alpha;
  x.fillStyle = '#fff';
  x.font = Math.floor(c.width * 0.055) + 'px sans-serif';
  x.fillText('点我返回主页', cx, cy + c.height * 0.18);
  x.globalAlpha = 1;
}

// Main draw
function draw() {
  x.clearRect(0, 0, c.width, c.height);

  if (STATE === 0) { drawMenu(); return; }

  drawWater();

  // Items
  ITEMS.forEach(drawItem);

  // Obstacles
  OBS.forEach(drawObs);

  // Player boat
  drawBoat(px, py, pw, ph, ptilt);

  drawHUD();

  if (STATE === 2) drawOver();
}

// Game loop
var last = 0;
function loop(ts) {
  var dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(function(ts) { last = ts; loop(ts); });
</script>

<script>
/**
 * Iframe 元素高亮注入脚本
 * 需要在目标网站中引入此脚本来支持跨域 iframe 高亮功能
 *
 * 使用方法：
 * 1. 将此脚本添加到目标网站的 HTML 中
 * 2. 或通过浏览器扩展、用户脚本等方式注入
 */

(function () {
  "use strict";

  // 检查是否在 iframe 中
  if (window.self === window.top) {
