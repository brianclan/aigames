<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1,user-scalable=no'><style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial,sans-serif;touch-action:none;}#gameContainer{position:relative;width:100%;max-width:400px;height:100vh;max-height:700px;background:linear-gradient(180deg,#87CEEB,#cce7f0);overflow:hidden;border-radius:10px;}#cat{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:60px;height:40px;background:#ff8c00;border-radius:50% 50% 40% 40%;transition:left 0.05s;z-index:10;}#cat::before{content:'';position:absolute;top:-12px;left:10px;width:15px;height:15px;background:#ff8c00;border-radius:50%;transform:rotate(-30deg);}#cat::after{content:'';position:absolute;top:-12px;right:10px;width:15px;height:15px;background:#ff8c00;border-radius:50%;transform:rotate(30deg);}#cat .eye{position:absolute;top:8px;width:8px;height:8px;background:#000;border-radius:50%;}#cat .eye.left{left:12px;}#cat .eye.right{right:12px;}.fish{position:absolute;width:30px;height:20px;background:#f44336;border-radius:50%;z-index:5;}.fish::after{content:'';position:absolute;right:-8px;top:5px;width:0;height:0;border-left:10px solid #f44336;border-top:5px solid transparent;border-bottom:5px solid transparent;}#score{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:24px;font-weight:bold;color:#fff;text-shadow:2px 2px 4px rgba(0,0,0,0.5);z-index:20;}#misses{position:absolute;top:45px;left:50%;transform:translateX(-50%);font-size:18px;color:#ffeb3b;text-shadow:1px 1px 2px rgba(0,0,0,0.5);z-index:20;}#gameOver{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:30;color:white;}#gameOver h1{font-size:48px;margin-bottom:20px;}#gameOver p{font-size:28px;margin:10px 0;}#gameOver button{font-size:24px;padding:15px 40px;border:none;background:#4CAF50;color:white;border-radius:30px;cursor:pointer;margin-top:20px;}#instructions{position:absolute;bottom:10px;left:0;width:100%;text-align:center;color:white;font-size:14px;text-shadow:1px 1px 2px rgba(0,0,0,0.5);z-index:5;pointer-events:none;}</style></head><body><div id='gameContainer'><div id='cat'><div class='eye left'></div><div class='eye right'></div></div><div id='score'>Score: 0</div><div id='misses'>Misses: 0</div><div id='gameOver'><h1>Game Over</h1><p id='finalScore'>Score: 0</p><button onclick='restartGame()'>Play Again</button></div><div id='instructions'>Tap or click to move the cat</div></div><script>const container=document.getElementById('gameContainer');const cat=document.getElementById('cat');const scoreDisplay=document.getElementById('score');const missesDisplay=document.getElementById('misses');const gameOverDiv=document.getElementById('gameOver');const finalScore=document.getElementById('finalScore');const catWidth=60;const maxLeft=container.clientWidth-catWidth;let score=0;let misses=0;let gameActive=true;let spawnInterval;let fishElements=[];let missesThreshold=10;function moveCat(e){if(!gameActive)return;let x;if(e.touches){x=e.touches[0].clientX-container.getBoundingClientRect().left-catWidth/2;}else{x=e.clientX-container.getBoundingClientRect().left-catWidth/2;}x=Math.max(0,Math.min(x,maxLeft));cat.style.left=x+'px';}container.addEventListener('mousemove',moveCat);container.addEventListener('touchmove',function(e){e.preventDefault();moveCat(e);},{passive:false});container.addEventListener('click',function(e){if(!gameActive)return;let x=e.clientX-container.getBoundingClientRect().left-catWidth/2;x=Math.max(0,Math.min(x,maxLeft));cat.style.left=x+'px';});function createFish(){if(!gameActive)return;const fish=document.createElement('div');fish.className='fish';const containerWidth=container.clientWidth-30;const left=Math.random()*containerWidth;fish.style.left=left+'px';fish.style.top='-20px';fish.style.background='#'+Math.floor(Math.random()*16777215).toString(16);fish.style.setProperty('--bcolor',fish.style.background);container.appendChild(fish);fishElements.push(fish);}function updateFish(){if(!gameActive)return;for(let i=fishElements.length-1;i>=0;i--){const fish=fishElements[i];const top=parseInt(fish.style.top);if(top>container.clientHeight){fish.remove();fishElements.splice(i,1);misses++;missesDisplay.textContent='Misses: '+misses;if(misses>=missesThreshold){endGame();}continue;}fish.style.top=(top+5)+'px';const catRect=cat.getBoundingClientRect();const fishRect=fish.getBoundingClientRect();if(catRect.left<fishRect.right&&catRect.right>fishRect.left&&catRect.top<fishRect.bottom&&catRect.bottom>fishRect.top){fish.remove();fishElements.splice(i,1);score++;scoreDisplay.textContent='Score: '+score;}}}function endGame(){gameActive=false;clearInterval(spawnInterval);gameOverDiv.style.display='flex';finalScore.textContent='Score: '+score;}function restartGame(){score=0;misses=0;scoreDisplay.textContent='Score: 0';missesDisplay.textContent='Misses: 0';gameActive=true;gameOverDiv.style.display='none';fishElements.forEach(f=>f.remove());fishElements=[];spawnInterval=setInterval(createFish,800);}spawnInterval=setInterval(createFish,800);setInterval(updateFish,50);window.addEventListener('resize',function(){const newMax=container.clientWidth-catWidth;if(parseInt(cat.style.left)>newMax)cat.style.left=newMax+'px';});</script></body></html>
