<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水滴接接乐 🌧️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 800px;
            overflow: hidden;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 50%, #B2EBF2 100%);
            border-radius: 0;
        }
        
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10;
        }
        
        .title {
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 0 20px #00d4ff, 0 0 40px #00d4ff;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 40px;
            text-align: center;
            padding: 0 20px;
        }
        
        .score-display {
            font-size: 3rem;
            color: #ffd700;
            text-shadow: 0 0 15px #ffd700;
            margin: 20px 0;
        }
        
        .btn {
            padding: 15px 50px;
            font-size: 1.3rem;
            background: linear-gradient(45deg, #00d4ff, #0099cc);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
            margin: 10px;
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.6);
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        #scoreBoard {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #333;
            font-size: 1.2rem;
            font-weight: bold;
            z-index: 5;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }
        
        #highScoreBoard {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #d35400;
            font-size: 1rem;
            font-weight: bold;
            z-index: 5;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }
        
        .instructions {
            color: #888;
            font-size: 0.9rem;
            margin-top: 30px;
            text-align: center;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* 云朵动画 */
        .cloud {
            position: absolute;
            font-size: 3rem;
            animation: float 15s linear infinite;
            z-index: 1;
        }
        
        @keyframes float {
            from { transform: translateX(-100px); }
            to { transform: translateX(calc(100vw + 100px)); }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="scoreBoard">得分: <span id="score">0</span></div>
        <div id="highScoreBoard">最高: <span id="highScore">0</span></div>
        
        <div id="startScreen">
            <div class="title">🌧️ 水滴接接乐 🌧️</div>
            <div class="subtitle">移动小桶，接住水滴！躲避乌云和闪电！</div>
            <button class="btn" id="startBtn">开始游戏</button>
            <div class="instructions">
                🖱️ 电脑：鼠标左右移动<br>
                📱 手机：触摸左右滑动
            </div>
        </div>
        
        <div id="gameOverScreen" class="hidden">
            <div class="title">游戏结束!</div>
            <div class="score-display">得分: <span id="finalScore">0</span></div>
            <button class="btn" id="restartBtn">再来一次</button>
            <button class="btn" id="menuBtn">返回菜单</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 设置画布大小
        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // 游戏状态
        let gameRunning = false;
        let score = 0;
        let highScore = localStorage.getItem('raindropHighScore') || 0;
        document.getElementById('highScore').textContent = highScore;
        
        // 玩家（桶）
        const bucket = {
            x: 0,
            y: 0,
            width: 80,
            height: 50,
            speed: 0
        };
        
        // 水滴数组
        let raindrops = [];
        
        // 乌云数组
        let clouds = [];
        
        // 闪电数组
        let lightning = [];
        
        // 粒子效果
        let particles = [];
        
        // 游戏难度
        let difficulty = 1;
        let spawnRate = 60;
        let difficultyTimer = 0;
        
        // 初始化桶的位置
        function initBucket() {
            bucket.x = canvas.width / 2 - bucket.width / 2;
            bucket.y = canvas.height - 80;
            bucket.speed = 0;
        }
        
        // 绘制桶
        function drawBucket() {
            ctx.save();
            
            // 桶身
            const gradient = ctx.createLinearGradient(bucket.x, bucket.y, bucket.x, bucket.y + bucket.height);
            gradient.addColorStop(0, '#8B4513');
            gradient.addColorStop(0.5, '#A0522D');
            gradient.addColorStop(1, '#654321');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.moveTo(bucket.x, bucket.y);
            ctx.lineTo(bucket.x + bucket.width, bucket.y);
            ctx.lineTo(bucket.x + bucket.width - 10, bucket.y + bucket.height);
            ctx.lineTo(bucket.x + 10, bucket.y + bucket.height);
            ctx.closePath();
            ctx.fill();
            
            // 桶边
            ctx.fillStyle = '#5D3A1A';
            ctx.fillRect(bucket.x - 5, bucket.y, bucket.width + 10, 8);
            
            // 桶把手
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(bucket.x + bucket.width / 2, bucket.y - 10, 25, Math.PI, 0);
            ctx.stroke();
            
            ctx.restore();
        }
        
        // 创建水滴
        function createRaindrop() {
            raindrops.push({
                x: Math.random() * (canvas.width - 30),
                y: -20,
                size: 15 + Math.random() * 10,
                speed: 3 + Math.random() * 2 + difficulty * 0.5,
                type: Math.random() > 0.9 ? 'diamond' : 'drop'
            });
        }
        
        // 绘制水滴
        function drawRaindrop(drop) {
            ctx.save();
            
            if (drop.type === 'diamond') {
                // 钻石 - 金色
                ctx.fillStyle = '#FFD700';
                ctx.shadowColor = '#FFD700';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.moveTo(drop.x, drop.y - drop.size);
                ctx.lineTo(drop.x + drop.size / 2, drop.y);
                ctx.lineTo(drop.x, drop.y + drop.size);
                ctx.lineTo(drop.x - drop.size / 2, drop.y);
                ctx.closePath();
                ctx.fill();
            } else {
                // 普通水滴 - 蓝色
                ctx.fillStyle = '#00BFFF';
                ctx.shadowColor = '#00BFFF';
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.moveTo(drop.x, drop.y - drop.size);
                ctx.quadraticCurveTo(drop.x + drop.size, drop.y + drop.size / 2, drop.x, drop.y + drop.size);
                ctx.quadraticCurveTo(drop.x - drop.size, drop.y + drop_size / 2, drop.x, drop.y - drop.size);
                ctx.fill();
            }
            
            ctx.restore();
        }
        
        // 创建乌云
        function createCloud() {
            clouds.push({
                x: Math.random() * (canvas.width - 60),
                y: Math.random() * 150 + 30,
                size: 40 + Math.random() * 30,
                speed: 0.5 + Math.random() * 0.5 + difficulty * 0.2,
                direction: Math.random() > 0.5 ? 1 : -1
            });
        }
        
        // 绘制乌云
        function drawCloud(cloud) {
            ctx.save();
            ctx.fillStyle = '#555';
            ctx.shadowColor = '#333';
            ctx.shadowBlur = 10;
            
            // 绘制云朵形状
            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                ctx.arc(
                    cloud.x + i * 15,
                    cloud.y + Math.sin(i) * 10,
                    cloud.size / 3,
                    0, Math.PI * 2
                );
                ctx.fill();
            }
            
            ctx.restore();
        }
        
        // 创建闪电
        function createLightning() {
            lightning.push({
                x: Math.random() * (canvas.width - 20),
                y: 0,
                length: 80 + Math.random() * 60,
                speed: 8 + difficulty,
                active: true,
                life: 30
            });
        }
        
        // 绘制闪电
        function drawLightning(bolt) {
            if (!bolt.active) return;
            
            ctx.save();
            ctx.strokeStyle = '#FFFF00';
            ctx.shadowColor = '#FFFF00';
            ctx.shadowBlur = 20;
            ctx.lineWidth = 3;
            
            ctx.beginPath();
            ctx.moveTo(bolt.x, bolt.y);
            
            // 闪电折线
            let currentY = bolt.y;
            let currentX = bolt.x;
            while (currentY < bolt.y + bolt.length) {
                currentX += (Math.random() - 0.5) * 30;
                currentY += 20;
                ctx.lineTo(currentX, currentY);
            }
            
            ctx.stroke();
            
            // 闪电光芒
            ctx.globalAlpha = 0.5;
            ctx.lineWidth = 8;
            ctx.stroke();
            
            ctx.restore();
        }
        
        // 创建粒子效果
        function createParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    size: 3 + Math.random() * 4,
                    color: color,
                    life: 30
                });
            }
        }
        
        // 绘制粒子
        function drawParticles() {
            particles.forEach((p, index) => {
                ctx.save();
                ctx.globalAlpha = p.life / 30;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                
                if (p.life <= 0) {
                    particles.splice(index, 1);
                }
            });
        }
        
        // 更新游戏
        function update() {
            if (!gameRunning) return;
            
            // 难度递增
            difficultyTimer++;
            if (difficultyTimer > 300) {
                difficulty += 0.1;
                difficultyTimer = 0;
                if (spawnRate > 20) spawnRate -= 2;
            }
            
            // 移动桶
            bucket.x += bucket.speed;
            
            // 边界检测
            if (bucket.x < 0) bucket.x = 0;
            if (bucket.x + bucket.width > canvas.width) bucket.x = canvas.width - bucket.width;
            
            // 生成水滴
            if (Math.random() * spawnRate < 1) {
                createRaindrop();
            }
            
            // 生成乌云
            if (Math.random() * 200 < 1) {
                createCloud();
            }
            
            // 生成闪电
            if (difficulty > 1.5 && Math.random() * 150 < 1) {
                createLightning();
            }
            
            // 更新水滴
            raindrops.forEach((drop, index) => {
                drop.y += drop.speed;
                
                // 碰撞检测 - 桶
                if (
                    drop.y + drop.size > bucket.y &&
                    drop.y - drop.size < bucket.y + bucket.height &&
                    drop.x + drop.size > bucket.x &&
                    drop.x - drop.size < bucket.x + bucket.width
                ) {
                    // 接住了！
                    score += drop.type === 'diamond' ? 10 : 1;
                    createParticles(drop.x, drop.y, drop.type === 'diamond' ? '#FFD700' : '#00BFFF');
                    document.getElementById('score').textContent = score;
                    raindrops.splice(index, 1);
                }
                
                // 超出屏幕
                if (drop.y > canvas.height) {
                    raindrops.splice(index, 1);
                }
            });
            
            // 更新乌云
            clouds.forEach((cloud, index) => {
                cloud.x += cloud.speed * cloud.direction;
                
                // 边界反弹
                if (cloud.x < 0 || cloud.x > canvas.width - 60) {
                    cloud.direction *= -1;
                }
                
                // 碰撞检测 - 桶
                if (
                    cloud.y + cloud.size / 2 > bucket.y &&
                    cloud.y - cloud.size / 2 < bucket.y + bucket.height &&
                    cloud.x + cloud.size > bucket.x &&
                    cloud.x < bucket.x + bucket.width
                ) {
                    gameOver();
                }
                
                // 超时消失
                if (cloud.x < -50 || cloud.x > canvas.width + 50) {
                    clouds.splice(index, 1);
                }
            });
            
            // 更新闪电
            lightning.forEach((bolt, index) => {
                bolt.y += bolt.speed;
                bolt.life--;
                
                if (bolt.life <= 0) {
                    bolt.active = false;
                }
                
                // 碰撞检测 - 桶
                if (
                    bolt.active &&
                    bolt.y + bolt.length > bucket.y &&
                    bolt.y < bucket.y + bucket.height &&
                    bolt.x > bucket.x &&
                    bolt.x < bucket.x + bucket.width
                ) {
                    gameOver();
                }
                
                // 超出屏幕
                if (bolt.y > canvas.height) {
                    lightning.splice(index, 1);
                }
            });
        }
        
        // 绘制背景
        function drawBackground() {
            // 天空渐变
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#4A90D9');
            gradient.addColorStop(0.5, '#87CEEB');
            gradient.addColorStop(1, '#E0F7FA');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 草地
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(0, canvas.height - 60, canvas.width, 60);
            
            // 草地装饰
            ctx.fillStyle = '#388E3C';
            for (let i = 0; i < canvas.width; i += 20) {
                ctx.beginPath();
                ctx.moveTo(i, canvas.height - 60);
                ctx.lineTo(i + 10, canvas.height - 75);
                ctx.lineTo(i + 20, canvas.height - 60);
                ctx.fill();
            }
        }
        
        // 渲染
        function render() {
            drawBackground();
            
            // 绘制水滴
            raindrops.forEach(drawRaindrop);
            
            // 绘制乌云
            clouds.forEach(drawCloud);
            
            // 绘制闪电
            lightning.forEach(drawLightning);
            
            // 绘制桶
            drawBucket();
            
            // 绘制粒子
            drawParticles();
        }
        
        // 游戏循环
        function gameLoop() {
            if (gameRunning) {
                update();
            }
            render();
            requestAnimationFrame(gameLoop);
        }
        
        // 开始游戏
        function startGame() {
            score = 0;
            difficulty = 1;
            spawnRate = 60;
            difficultyTimer = 0;
            raindrops = [];
            clouds = [];
            lightning = [];
            particles = [];
            
            initBucket();
            document.getElementById('score').textContent = score;
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            gameRunning = true;
        }
        
        // 游戏结束
        function gameOver() {
            gameRunning = false;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('raindropHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }
        
        // 事件监听
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        document.getElementById('menuBtn').addEventListener('click', () => {
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
        });
        
        // 鼠标控制
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            bucket.x = mouseX - bucket.width / 2;
        });
        
        // 触摸控制
        let touchStartX = 0;
        let bucketStartX = 0;
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            bucketStartX = bucket.x;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touchX = e.touches[0].clientX;
            const deltaX = touchX - touchStartX;
            bucket.x = bucketStartX + deltaX;
        });
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') {
                bucket.speed = -10;
            } else if (e.key === 'ArrowRight' || e.key === 'd') {
                bucket.speed = 10;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'ArrowRight' || e.key === 'd') {
                bucket.speed = 0;
            }
        });
        
        // 启动游戏循环
        gameLoop();
        initBucket();
    </script>

<script>
