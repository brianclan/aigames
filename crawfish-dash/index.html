<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Crayfish Dash</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(180deg, #1a5c1a 0%, #0d3d0d 100%);
      overflow: hidden;
      touch-action: none;
      font-family: 'Segoe UI', sans-serif;
    }
    #gameCanvas {
      display: block;
      margin: 0 auto;
      background: transparent;
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #fff;
      font-size: 18px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    #startScreen, #gameOverScreen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.7);
      color: #fff;
    }
    #gameOverScreen { display: none; }
    h1 { font-size: 32px; margin-bottom: 10px; color: #ff6b6b; }
    p { font-size: 16px; margin-bottom: 20px; text-align: center; padding: 0 20px; }
    button {
      padding: 15px 40px;
      font-size: 20px;
      background: #ff6b6b;
      color: #fff;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255,107,107,0.4);
    }
    button:active { transform: scale(0.95); }
    .crayfish { font-size: 40px; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="ui">Score: <span id="score">0</span></div>
  
  <div id="startScreen">
    <div class="crayfish">🦞</div>
    <h1>Crayfish Dash</h1>
    <p>Drag to move the crayfish!<br>Collect bubbles +10 pts<br>Avoid the fishing nets!</p>
    <button onclick="startGame()">START</button>
  </div>
  
  <div id="gameOverScreen">
    <div class="crayfish">🦞</div>
    <h1>Game Over!</h1>
    <p>Final Score: <span id="finalScore">0</span></p>
    <button onclick="restartGame()">PLAY AGAIN</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let W, H;
    let score = 0;
    let gameRunning = false;
    let crayfish = { x: 0, y: 0, size: 50, vx: 0, vy: 0 };
    let bubbles = [];
    let nets = [];
    let lastTime = 0;
    let spawnTimer = 0;
    
    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();
    
    // Touch/Mouse control
    let targetX, targetY;
    function updateInput(x, y) {
      targetX = x;
      targetY = y;
    }
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      updateInput(e.touches[0].clientX, e.touches[0].clientY);
    });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      updateInput(e.touches[0].clientX, e.touches[0].clientY);
    });
    canvas.addEventListener('mousedown', e => updateInput(e.clientX, e.clientY));
    canvas.addEventListener('mousemove', e => {
      if (e.buttons === 1) updateInput(e.clientX, e.clientY);
    });
    
    function startGame() {
      document.getElementById('startScreen').style.display = 'none';
      score = 0;
      document.getElementById('score').textContent = '0';
      crayfish.x = W / 2;
      crayfish.y = H - 100;
      targetX = crayfish.x;
      targetY = crayfish.y;
      bubbles = [];
      nets = [];
      spawnTimer = 0;
      gameRunning = true;
      lastTime = performance.now();
      requestAnimationFrame(gameLoop);
    }
    
    function restartGame() {
      document.getElementById('gameOverScreen').style.display = 'none';
      startGame();
    }
    
    function gameOver() {
      gameRunning = false;
      document.getElementById('finalScore').textContent = score;
      document.getElementById('gameOverScreen').style.display = 'flex';
    }
    
    function spawnBubble() {
      bubbles.push({
        x: Math.random() * (W - 40) + 20,
        y: -30,
        size: 20 + Math.random() * 15,
        speed: 1.5 + Math.random() * 1.5,
        wobble: Math.random() * Math.PI * 2
      });
    }
    
    function spawnNet() {
      nets.push({
        x: Math.random() * (W - 60) + 30,
        y: -50,
        size: 45,
        speed: 2 + Math.random() * 2
      });
    }
    
    function drawCrayfish(x, y, size) {
      ctx.save();
      ctx.translate(x, y);
      // Body
      ctx.fillStyle = '#cc4444';
      ctx.beginPath();
      ctx.ellipse(0, 0, size * 0.5, size * 0.7, 0, 0, Math.PI * 2);
      ctx.fill();
      // Head
      ctx.fillStyle = '#dd5555';
      ctx.beginPath();
      ctx.ellipse(0, -size * 0.4, size * 0.3, size * 0.25, 0, 0, Math.PI * 2);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(-size * 0.15, -size * 0.45, size * 0.08, 0, Math.PI * 2);
      ctx.arc(size * 0.15, -size * 0.45, size * 0.08, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(-size * 0.15, -size * 0.45, size * 0.04, 0, Math.PI * 2);
      ctx.arc(size * 0.15, -size * 0.45, size * 0.04, 0, Math.PI * 2);
      ctx.fill();
      // Claws
      ctx.fillStyle = '#cc3333';
      ctx.beginPath();
      ctx.ellipse(-size * 0.55, size * 0.1, size * 0.25, size * 0.15, -0.3, 0, Math.PI * 2);
      ctx.ellipse(size * 0.55, size * 0.1, size * 0.25, size * 0.15, 0.3, 0, Math.PI * 2);
      ctx.fill();
      // Tail
      ctx.fillStyle = '#bb3333';
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.ellipse(0, size * 0.5 + i * size * 0.15, size * 0.2 - i * 0.03, size * 0.1, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
    
    function drawBubble(b) {
      ctx.save();
      ctx.translate(b.x + Math.sin(b.wobble) * 5, b.y);
      ctx.fillStyle = 'rgba(150, 220, 255, 0.7)';
      ctx.beginPath();
      ctx.arc(0, 0, b.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
      ctx.beginPath();
      ctx.arc(-b.size * 0.3, -b.size * 0.3, b.size * 0.25, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    
    function drawNet(n) {
      ctx.save();
      ctx.translate(n.x, n.y);
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 2;
      // Net ring
      ctx.beginPath();
      ctx.arc(0, 0, n.size * 0.4, 0, Math.PI * 2);
      ctx.stroke();
      // Mesh
      for (let i = 0; i < 8; i++) {
        ctx.beginPath();
        ctx.moveTo(0, 0);
        const angle = (i / 8) * Math.PI * 2;
        ctx.lineTo(Math.cos(angle) * n.size * 0.4, Math.sin(angle) * n.size * 0.4);
        ctx.stroke();
      }
      for (let r = 0.2; r < 0.4; r += 0.1) {
        ctx.beginPath();
        ctx.arc(0, 0, n.size * r, 0, Math.PI * 2);
        ctx.stroke();
      }
      // Handle
      ctx.strokeStyle = '#8B4513';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(0, n.size * 0.4);
      ctx.lineTo(0, n.size * 0.9);
      ctx.stroke();
      ctx.restore();
    }
    
    function gameLoop(timestamp) {
      if (!gameRunning) return;
      const dt = Math.min((timestamp - lastTime) / 16.67, 2);
      lastTime = timestamp;
      
      // Move crayfish toward touch
      crayfish.x += (targetX - crayfish.x) * 0.15;
      crayfish.y += (targetY - crayfish.y) * 0.15;
      crayfish.x = Math.max(crayfish.size * 0.5, Math.min(W - crayfish.size * 0.5, crayfish.x));
      crayfish.y = Math.max(crayfish.size * 0.5, Math.min(H - crayfish.size * 0.5, crayfish.y));
      
      // Spawn
      spawnTimer++;
      if (spawnTimer > 40) {
        spawnTimer = 0;
        if (Math.random() > 0.4) spawnBubble();
        if (Math.random() > 0.5) spawnNet();
      }
      
      // Update bubbles
      for (let i = bubbles.length - 1; i >= 0; i--) {
        const b = bubbles[i];
        b.y += b.speed * dt;
        b.wobble += 0.1 * dt;
        // Collision
        const dx = b.x - crayfish.x;
        const dy = b.y - crayfish.y;
        if (Math.sqrt(dx*dx + dy*dy) < b.size + crayfish.size * 0.5) {
          score += 10;
          document.getElementById('score').textContent = score;
          bubbles.splice(i, 1);
          continue;
        }
        if (b.y > H + 30) bubbles.splice(i, 1);
      }
      
      // Update nets
      for (let i = nets.length - 1; i >= 0; i--) {
        const n = nets[i];
        n.y += n.speed * dt;
        // Collision
        const dx = n.x - crayfish.x;
        const dy = n.y - crayfish.y;
        if (Math.sqrt(dx*dx + dy*dy) < n.size * 0.4 + crayfish.size * 0.4) {
          gameOver();
          return;
        }
        if (n.y > H + 50) nets.splice(i, 1);
      }
      
      // Draw
      ctx.clearRect(0, 0, W, H);
      bubbles.forEach(drawBubble);
      nets.forEach(drawNet);
      drawCrayfish(crayfish.x, crayfish.y, crayfish.size);
      
      requestAnimationFrame(gameLoop);
    }
  </script>
</body>
</html>
