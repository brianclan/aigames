<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Courier New', monospace;
        }

        .game-container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #00ff88;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88;
            letter-spacing: 5px;
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
        }

        .score-item {
            color: #fff;
            font-size: 1.2rem;
        }

        .score-item span {
            color: #00ff88;
            font-weight: bold;
            font-size: 1.5rem;
        }

        #gameCanvas {
            border: 4px solid #00ff88;
            box-shadow: 0 0 20px #00ff88, inset 0 0 20px rgba(0, 255, 136, 0.1);
            background: #0a0a0a;
            image-rendering: pixelated;
        }

        .controls {
            margin-top: 20px;
            color: #888;
            font-size: 0.9rem;
        }

        .controls p {
            margin: 5px 0;
        }

        .btn {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #1a1a2e;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            border-radius: 5px;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #00ff88;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border: 3px solid #ff0055;
            border-radius: 10px;
            display: none;
            z-index: 100;
        }

        .game-over h2 {
            color: #ff0055;
            font-size: 2rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff0055;
        }

        .game-over p {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .mobile-controls {
            display: none;
            margin-top: 20px;
            gap: 10px;
        }

        .mobile-controls button {
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid #00ff88;
            color: #00ff88;
            border-radius: 10px;
            cursor: pointer;
        }

        .mobile-controls button:active {
            background: #00ff88;
            color: #1a1a2e;
        }

        .direction-pad {
            display: grid;
            grid-template-areas: 
                ". up ."
                "left . right"
                ". down .";
            gap: 5px;
        }

        .direction-pad button:nth-child(1) { grid-area: up; }
        .direction-pad button:nth-child(2) { grid-area: left; }
        .direction-pad button:nth-child(3) { grid-area: right; }
        .direction-pad button:nth-child(4) { grid-area: down; }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .mobile-controls {
                display: flex;
                justify-content: center;
            }
            
            .controls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 像素贪吃蛇 🐍</h1>
        
        <div class="score-board">
            <div class="score-item">得分：<span id="score">0</span></div>
            <div class="score-item">最高分：<span id="highScore">0</span></div>
        </div>
        
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div class="controls">
            <p>⬆️⬇️⬅️➡️ 方向键控制</p>
            <p>空格键 - 暂停/继续</p>
            <p>WASD - 也可控制方向</p>
        </div>
        
        <div class="mobile-controls">
            <div class="direction-pad">
                <button onclick="changeDirection('up')">⬆️</button>
                <button onclick="changeDirection('left')">⬅️</button>
                <button onclick="changeDirection('right')">➡️</button>
                <button onclick="changeDirection('down')">⬇️</button>
            </div>
        </div>
        
        <button class="btn" onclick="startGame()">开始游戏</button>
        
        <div class="game-over" id="gameOver">
            <h2>游戏结束!</h2>
            <p>最终得分：<span id="finalScore">0</span></p>
            <button class="btn" onclick="startGame()">再来一局</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [];
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop;
        let gameSpeed = 100;
        let isPaused = false;
        let isGameRunning = false;
        
        document.getElementById('highScore').textContent = highScore;
        
        function initGame() {
            snake = [
                {x: 5, y: 10},
                {x: 4, y: 10},
                {x: 3, y: 10}
            ];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            gameSpeed = 100;
            document.getElementById('score').textContent = score;
            spawnFood();
        }
        
        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }
        
        function drawPixelRect(x, y, color, glow = false) {
            ctx.fillStyle = color;
            if (glow) {
                ctx.shadowColor = color;
                ctx.shadowBlur = 10;
            }
            ctx.fillRect(x * gridSize + 1, y * gridSize + 1, gridSize - 2, gridSize - 2);
            ctx.shadowBlur = 0;
            
            // Pixel highlight effect
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(x * gridSize + 2, y * gridSize + 2, gridSize - 6, 3);
        }
        
        function draw() {
            // Clear canvas with dark background
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid lines (subtle)
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            
            // Draw food (pixel apple)
            drawPixelRect(food.x, food.y, '#ff0055', true);
            
            // Draw snake
            snake.forEach((segment, index) => {
                const color = index === 0 ? '#00ff88' : '#00cc6a';
                drawPixelRect(segment.x, segment.y, color, index === 0);
                
                // Draw eyes on head
                if (index === 0) {
                    ctx.fillStyle = '#000';
                    let eyeOffset1, eyeOffset2;
                    
                    switch(direction) {
                        case 'up':
                            eyeOffset1 = {x: 5, y: 5};
                            eyeOffset2 = {x: 12, y: 5};
                            break;
                        case 'down':
                            eyeOffset1 = {x: 5, y: 12};
                            eyeOffset2 = {x: 12, y: 12};
                            break;
                        case 'left':
                            eyeOffset1 = {x: 5, y: 5};
                            eyeOffset2 = {x: 5, y: 12};
                            break;
                        case 'right':
                        default:
                            eyeOffset1 = {x: 12, y: 5};
                            eyeOffset2 = {x: 12, y: 12};
                    }
                    
                    ctx.fillRect(segment.x * gridSize + eyeOffset1.x, segment.y * gridSize + eyeOffset1.y, 3, 3);
                    ctx.fillRect(segment.x * gridSize + eyeOffset2.x, segment.y * gridSize + eyeOffset2.y, 3, 3);
                }
            });
            
            // Draw pause overlay
            if (isPaused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#00ff88';
                ctx.font = '30px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('暂停', canvas.width / 2, canvas.height / 2);
            }
        }
        
        function update() {
            if (isPaused) return;
            
            direction = nextDirection;
            
            const head = {x: snake[0].x, y: snake[0].y};
            
            switch(direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }
            
            // Check wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            
            // Check self collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }
            
            snake.unshift(head);
            
            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                spawnFood();
                
                // Speed up slightly
                if (gameSpeed > 50) {
                    gameSpeed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, gameSpeed);
                }
            } else {
                snake.pop();
            }
        }
        
        function gameStep() {
            update();
            draw();
        }
        
        function gameOver() {
            isGameRunning = false;
            clearInterval(gameLoop);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function startGame() {
            if (isGameRunning) {
                clearInterval(gameLoop);
            }
            
            initGame();
            isGameRunning = true;
            isPaused = false;
            document.getElementById('gameOver').style.display = 'none';
            gameLoop = setInterval(gameStep, gameSpeed);
        }
        
        function changeDirection(newDirection) {
            const opposites = {
                'up': 'down',
                'down': 'up',
                'left': 'right',
                'right': 'left'
            };
            
            if (opposites[newDirection] !== direction) {
                nextDirection = newDirection;
            }
        }
        
        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;
            
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    changeDirection('up');
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    changeDirection('down');
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    changeDirection('left');
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    changeDirection('right');
                    break;
                case ' ':
                    e.preventDefault();
                    isPaused = !isPaused;
                    draw();
                    break;
            }
        });
        
        // Initial draw
        initGame();
        draw();
    </script>
</body>
</html>
