<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stack Fall</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#1a1a2e;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    overflow:hidden;
    font-family:'Segoe UI',sans-serif;
    touch-action:none;
    user-select:none;
  }
  #hud{
    position:fixed;top:0;left:0;right:0;
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 20px;
    color:#fff;font-size:16px;z-index:10;
  }
  #hud span{font-weight:700;}
  #scoreEl{color:#ffd700;font-size:22px;}
  #bestEl{color:#a29bfe;font-size:16px;}
  canvas{display:block;cursor:pointer;}
  #overlay{
    position:fixed;inset:0;
    background:rgba(26,26,46,0.93);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:20;color:#fff;
  }
  #overlay h1{
    font-size:44px;margin-bottom:6px;
    background:linear-gradient(135deg,#ffd700,#ff6b6b);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  }
  #overlay p{color:#aaa;font-size:15px;margin-bottom:28px;text-align:center;max-width:280px;line-height:1.6;}
  #finalScore{font-size:60px;color:#ffd700;font-weight:900;margin:6px 0 20px;}
  .btn{
    padding:13px 38px;border:none;border-radius:40px;
    font-size:17px;font-weight:700;cursor:pointer;
    transition:transform .15s,box-shadow .15s;margin:6px;
  }
  .btn:active{transform:scale(0.94);}
  .btn-primary{
    background:linear-gradient(135deg,#ffd700,#ff9500);color:#1a1a2e;
    box-shadow:0 4px 20px rgba(255,215,0,.4);
  }
  #hint{
    position:fixed;bottom:14px;left:0;right:0;
    text-align:center;color:rgba(255,255,255,.28);
    font-size:13px;pointer-events:none;z-index:5;
  }
  .score-pop{
    position:fixed;pointer-events:none;
    font-size:22px;font-weight:900;
    color:#ffd700;text-shadow:0 0 10px rgba(255,215,0,.9);
    animation:scorePop .7s ease-out forwards;z-index:30;
  }
  @keyframes scorePop{
    0%{transform:translateY(0) scale(1);opacity:1;}
    100%{transform:translateY(-70px) scale(1.5);opacity:0;}
  }
  .combo-pop{
    position:fixed;pointer-events:none;
    font-size:28px;font-weight:900;
    color:#a29bfe;text-shadow:0 0 15px rgba(162,155,254,.9);
    animation:comboPop .8s ease-out forwards;z-index:31;
  }
  @keyframes comboPop{
    0%{transform:translateY(0) scale(1);opacity:1;}
    100%{transform:translateY(-90px) scale(1.6);opacity:0;}
  }
</style>
</head>
<body>

<div id="hud">
  <div>🏆 <span id="scoreEl">0</span></div>
  <div>⭐ 最高 <span id="bestEl">0</span></div>
</div>

<canvas id="canvas"></canvas>

<div id="overlay">
  <h1>🏗️ Stack Fall</h1>
  <p>用方向键或滑动控制方块落下的方向<br>精准叠放，得分！</p>
  <button class="btn btn-primary" id="startBtn">开始游戏</button>
</div>

<div id="hint">⬅️➡️ 方向键 / 左右滑动 控制方向</div>

<script>
(function(){
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const scoreEl = document.getElementById('scoreEl');
  const bestEl = document.getElementById('bestEl');

  let W, H;
  let running = false;
  let score = 0;
  let gameOverFlag = false;
  let gravity = { x: 0, y: 1 };
  let blocks = [];
  let currentBlock = null;
  let particles = [];
  let combo = 0;
  let gridCols = 5;
  let cellW, cellH;
  // cameraY = world-to-screen offset (screenY = worldY - cameraY)
  // Initially cameraY = 0, world Y=0 = screen Y=0 (top of canvas)
  // H = canvas height, floor at world Y = H
  let cameraY = 0;
  let targetCameraY = 0;
  let level = 1;
  let difficultyTimer = 0;
  // World Y of the highest (topmost surface) placed block
  let stackTopWorldY = Infinity;

  const PALETTE = [
    '#ff6b6b','#ffd700','#4ecdc4','#a29bfe','#fd79a8',
    '#00cec9','#e17055','#74b9ff','#55efc4','#fab1a0'
  ];

  function resize() {
    W = canvas.width = Math.min(window.innerWidth, 500);
    H = canvas.height = window.innerHeight;
    cellW = W / gridCols;
    cellH = cellW;
  }
  window.addEventListener('resize', resize);
  resize();

  function randomColor() {
    return PALETTE[Math.floor(Math.random() * PALETTE.length)];
  }

  // Spawn a new falling block above the visible area
  function spawnBlock() {
    const col = Math.floor(Math.random() * gridCols);
    const color = randomColor();
    // Spawn above the visible area (world Y negative = above screen top)
    // Visible world range at start: [-H*0.3, H]
    const spawnWorldY = -H * 0.3;
    currentBlock = {
      col,
      color,
      x: col * cellW + cellW / 2,
      y: spawnWorldY,
      vx: 0,
      vy: 0,
      size: cellW * 0.9,
      settled: false,
      age: 0
    };
  }

  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 3;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 2,
        color,
        life: 1,
        size: 3 + Math.random() * 4
      });
    }
  }

  function showScore(x, y, pts, isCombo) {
    const el = document.createElement('div');
    el.className = isCombo ? 'combo-pop' : 'score-pop';
    el.textContent = isCombo ? pts + ' COMBO!' : '+' + pts;
    el.style.left = Math.min(Math.max(x - 30, 10), W - 60) + 'px';
    el.style.top = Math.min(Math.max(y - 40, 10), H - 40) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 800);
  }

  function applyGravity() {
    if (!currentBlock || currentBlock.settled) return;

    const gx = gravity.x, gy = gravity.y;
    const len = Math.sqrt(gx*gx + gy*gy);
    if (len === 0) return;
    const nx = gx/len, ny = gy/len;
    const gStrength = 3.5 + level * 0.3;

    currentBlock.vx += nx * gStrength * 0.08;
    currentBlock.vy += ny * gStrength * 0.08;

    const spd = Math.sqrt(currentBlock.vx*currentBlock.vx + currentBlock.vy*currentBlock.vy);
    const maxSpd = 8;
    if (spd > maxSpd) {
      currentBlock.vx = (currentBlock.vx / spd) * maxSpd;
      currentBlock.vy = (currentBlock.vy / spd) * maxSpd;
    }

    currentBlock.x += currentBlock.vx;
    currentBlock.y += currentBlock.vy;
    currentBlock.age++;

    const halfSize = currentBlock.size / 2;

    // Wall bounce (horizontal walls always)
    if (currentBlock.x < halfSize) {
      currentBlock.x = halfSize;
      currentBlock.vx *= -0.4;
    }
    if (currentBlock.x > W - halfSize) {
      currentBlock.x = W - halfSize;
      currentBlock.vx *= -0.4;
    }

    // Ceiling bounce (when gravity is up)
    if (ny < 0) {
      if (currentBlock.y < halfSize) {
        currentBlock.y = halfSize;
        currentBlock.vy *= -0.4;
      }
    }

    checkLanding();
  }

  function findLandingY() {
    // For the current block's column, find the world Y where it should land
    // Returns { landY, landedOnBlock }
    const halfSize = currentBlock.size / 2;
    const curCol = currentBlock.col;

    // Check floor first (world Y = H is the floor surface)
    // Block center at floor: H - halfSize
    let landY = H - halfSize;
    let landedOnBlock = null;

    for (const b of blocks) {
      const bCol = b.col;
      if (bCol !== curCol) continue;
      // b.y is world Y of block center, top surface = b.y - b.size/2
      const blockTopWorldY = b.y - b.size / 2;
      // Block can land on top of this block if its top is higher than current floor
      // (higher in world Y = smaller number, since Y increases downward)
      if (blockTopWorldY < landY) {
        landY = blockTopWorldY;
        landedOnBlock = b;
      }
    }
    return { landY, landedOnBlock };
  }

  function checkLanding() {
    if (!currentBlock || currentBlock.settled) return;

    const gx = gravity.x, gy = gravity.y;
    const len = Math.sqrt(gx*gx + gy*gy);
    if (len === 0) return;
    const nx = gx/len, ny = gy/len;
    const halfSize = currentBlock.size / 2;
    const speed = Math.sqrt(currentBlock.vx*currentBlock.vx + currentBlock.vy*currentBlock.vy);
    if (speed < 0.5) return;

    // Downward gravity
    if (ny > 0) {
      const { landY } = findLandingY();
      if (currentBlock.y >= landY - halfSize * 0.2) {
        settleBlock(landY);
        return;
      }
    }

    // Block-to-block side collision (when moving horizontally)
    if (nx !== 0) {
      for (const b of blocks) {
        // Only check blocks in adjacent columns roughly
        if (Math.abs(b.x - currentBlock.x) > cellW * 1.5) continue;
        const dy = Math.abs(currentBlock.y - b.y);
        if (dy > halfSize + b.size/2) continue;
        // Horizontal overlap
        const overlapX = (halfSize + b.size/2) - Math.abs(currentBlock.x - b.x);
        if (overlapX > 0 && ((nx > 0 && currentBlock.x > b.x) || (nx < 0 && currentBlock.x < b.x))) {
          currentBlock.x = nx > 0
            ? b.x - b.size/2 - halfSize
            : b.x + b.size/2 + halfSize;
          currentBlock.vx *= -0.3;
          return;
        }
      }
    }

    // Block-to-block vertical collision (when gravity is not purely down)
    if (ny !== 0) {
      for (const b of blocks) {
        if (Math.abs(b.x - currentBlock.x) > halfSize + b.size/2) continue;
        const dot = (currentBlock.x - b.x) * nx + (currentBlock.y - b.y) * ny;
        if (dot >= 0) continue; // moving away
        const perpDist = Math.abs(-nx * (currentBlock.y - b.y) + ny * (currentBlock.x - b.x));
        if (perpDist > halfSize + b.size/2) continue;
        if (dot > -(halfSize + b.size/2) * 2) {
          if (ny < 0) {
            // Falling up into block bottom
            currentBlock.y = b.y + b.size/2 + halfSize;
            currentBlock.vy *= -0.3;
          } else {
            currentBlock.y = b.y - b.size/2 - halfSize;
            currentBlock.vy *= -0.3;
          }
          return;
        }
      }
    }
  }

  function settleBlock(worldY) {
    if (!currentBlock) return;

    // Snap to column
    const col = Math.max(0, Math.min(gridCols - 1,
      Math.round((currentBlock.x - cellW / 2) / cellW)));
    currentBlock.x = col * cellW + cellW / 2;
    currentBlock.y = worldY;
    currentBlock.col = col;
    currentBlock.settled = true;
    currentBlock.vx = 0;
    currentBlock.vy = 0;

    // Score
    let matchCount = 0;
    for (const b of blocks) {
      if (b.color === currentBlock.color) {
        const dist = Math.sqrt((b.x-currentBlock.x)**2 + (b.y-currentBlock.y)**2);
        if (dist < cellW * 1.6) matchCount++;
      }
    }

    if (matchCount >= 1) {
      combo++;
      const pts = combo >= 3 ? 30 : (combo >= 2 ? 20 : 10);
      score += pts;
      spawnParticles(currentBlock.x, currentBlock.y, currentBlock.color, 12);
      showScore(currentBlock.x, currentBlock.y, pts, combo >= 2);
    } else {
      combo = 0;
      score += 5;
      spawnParticles(currentBlock.x, currentBlock.y, currentBlock.color, 6);
    }

    // Update stack top
    const blockTopWorldY = currentBlock.y - currentBlock.size / 2;
    if (blockTopWorldY < stackTopWorldY) {
      stackTopWorldY = blockTopWorldY;
    }

    // Camera: keep top of stack visible near top of screen
    // The top of the stack should appear near the top of the viewport
    targetCameraY = stackTopWorldY - cellH * 1.5;

    blocks.push(currentBlock);
    scoreEl.textContent = score;

    currentBlock = null;
    combo = 0;

    // Check if any existing block scrolled off bottom → game over
    const minVisibleWorldY = cameraY + H + cellH;
    for (const b of blocks) {
      if (b.y > minVisibleWorldY) {
        endGame();
        return;
      }
    }

    spawnBlock();
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.12;
      p.life -= 0.025;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y - cameraY, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawBlock(b) {
    const sx = b.x - b.size / 2;
    const sy = b.y - b.size / 2 - cameraY;
    if (sy > H + 10 || sy + b.size < -10) return;

    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    roundRect(ctx, sx + 3, sy + 3, b.size, b.size, 6);
    ctx.fill();

    ctx.fillStyle = b.color;
    roundRect(ctx, sx, sy, b.size, b.size, 6);
    ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    roundRect(ctx, sx + 4, sy + 4, b.size * 0.4, b.size * 0.25, 3);
    ctx.fill();

    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1.5;
    roundRect(ctx, sx, sy, b.size, b.size, 6);
    ctx.stroke();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function drawCurrentBlock() {
    if (!currentBlock) return;
    const b = currentBlock;
    const sx = b.x - b.size / 2;
    const sy = b.y - b.size / 2 - cameraY;

    ctx.save();
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 20;
    ctx.fillStyle = b.color;
    roundRect(ctx, sx, sy, b.size, b.size, 6);
    ctx.fill();
    ctx.restore();

    ctx.fillStyle = b.color;
    roundRect(ctx, sx, sy, b.size, b.size, 6);
    ctx.fill();

    const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 150);
    ctx.fillStyle = 'rgba(255,255,255,' + (0.15 + pulse * 0.2) + ')';
    roundRect(ctx, sx + 6, sy + 6, b.size - 12, b.size - 12, 4);
    ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    roundRect(ctx, sx + 4, sy + 4, b.size * 0.4, b.size * 0.25, 3);
    ctx.fill();

    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    roundRect(ctx, sx, sy, b.size, b.size, 6);
    ctx.stroke();
  }

  function drawFloor() {
    // Draw floor line
    const floorScreenY = H - cellH - cameraY;
    if (floorScreenY > H + 20 || floorScreenY < -20) return;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(0, floorScreenY, W, cellH);
    // Floor line
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, floorScreenY);
    ctx.lineTo(W, floorScreenY);
    ctx.stroke();
  }

  function drawBackground() {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#1a1a2e');
    grad.addColorStop(1, '#16213e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= gridCols; i++) {
      const x = i * cellW;
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
  }

  function drawGravityArrow() {
    const cx = W / 2;
    const cy = 60;
    const len = 22;
    const gx = gravity.x, gy = gravity.y;
    const gl = Math.sqrt(gx*gx+gy*gy);
    if (gl === 0) return;
    const nx = gx/gl, ny = gy/gl;

    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx - nx * len, cy - ny * len);
    ctx.lineTo(cx + nx * len, cy + ny * len);
    ctx.stroke();
    const angle = Math.atan2(ny, nx);
    ctx.beginPath();
    ctx.moveTo(cx + nx * len, cy + ny * len);
    ctx.lineTo(cx + nx * len - 8 * Math.cos(angle - 0.5), cy + ny * len - 8 * Math.sin(angle - 0.5));
    ctx.lineTo(cx + nx * len - 8 * Math.cos(angle + 0.5), cy + ny * len - 8 * Math.sin(angle + 0.5));
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function gameLoop() {
    if (gameOverFlag) return;
    ctx.clearRect(0, 0, W, H);
    drawBackground();

    // Smooth camera
    cameraY += (targetCameraY - cameraY) * 0.08;

    drawFloor();
    drawParticles();

    for (const b of blocks) drawBlock(b);
    drawCurrentBlock();
    drawGravityArrow();

    applyGravity();
    updateParticles();

    difficultyTimer++;
    if (difficultyTimer % 600 === 0) level++;

    requestAnimationFrame(gameLoop);
  }

  function setGravity(dir) {
    const maps = {
      up:    { x: 0, y: -1 },
      down:  { x: 0, y: 1 },
      left:  { x: -1, y: 0 },
      right: { x: 1, y: 0 }
    };
    if (maps[dir]) gravity = maps[dir];
  }

  document.addEventListener('keydown', e => {
    if (!running) return;
    if (e.key === 'ArrowLeft'  || e.key === 'a') setGravity('left');
    if (e.key === 'ArrowRight' || e.key === 'd') setGravity('right');
    if (e.key === 'ArrowUp'    || e.key === 'w') setGravity('up');
    if (e.key === 'ArrowDown'  || e.key === 's') setGravity('down');
  });

  let touchStartX = 0, touchStartY = 0;
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.changedTouches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
  }, { passive: false });
  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
    if (Math.abs(dx) > Math.abs(dy)) {
      setGravity(dx > 0 ? 'right' : 'left');
    } else {
      setGravity(dy > 0 ? 'down' : 'up');
    }
  }, { passive: false });

  function startGame() {
    score = 0;
    combo = 0;
    gameOverFlag = false;
    blocks = [];
    particles = [];
    gravity = { x: 0, y: 1 };
    cameraY = 0;
    targetCameraY = 0;
    stackTopWorldY = Infinity;
    level = 1;
    difficultyTimer = 0;
    scoreEl.textContent = '0';
    bestEl.textContent = localStorage.getItem('stackFallBest') || '0';
    overlay.style.display = 'none';
    running = true;
    spawnBlock();
    gameLoop();
  }

  function endGame() {
    gameOverFlag = true;
    running = false;
    const best = parseInt(localStorage.getItem('stackFallBest') || '0');
    if (score > best) localStorage.setItem('stackFallBest', score);
    setTimeout(() => {
      overlay.innerHTML = '<h1>游戏结束</h1><div id="finalScore">' + score + '</div><p>最高纪录：' + Math.max(score, best) + '</p><button class="btn btn-primary" id="restartBtn">再来一次</button>';
      overlay.style.display = 'flex';
      document.getElementById('restartBtn').addEventListener('click', startGame);
    }, 400);
  }

  startBtn.addEventListener('click', startGame);
  bestEl.textContent = localStorage.getItem('stackFallBest') || '0';
})();
</script>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
}

.inland-security-footer {
  position: fixed;
  z-index: 10;
  bottom: 0;
  right: 0;
  width: fit-content;
  display: flex;
  justify-content: flex-end;
}

.tooltip-container {
  position: relative;
}

.trigger-content {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  padding: 8px;
  background-color: transparent;
  border-radius: 8px;
  cursor: pointer;
}

.minimax-link {
  display: flex;
  align-items: center;
  cursor: pointer;
  font-weight: 300;
  color: #adadad;
  text-decoration: none;
}

.minimax-link:visited {
  color: #adadad;
}

.minimax-link:hover {
  color: #666666;
}

.tooltip-content {
  position: absolute;
  bottom: 100%;
  right: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 8px;
  padding-bottom: 16px; /* 8px 内容间距 + 8px 用于鼠标移动的透明区域 */
  font-size: 12px;
  line-height: 17px;
  background-color: #fafafa;
  border-radius: 12px;
  white-space: nowrap;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
  color: #171717;
}
