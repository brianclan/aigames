<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quick Tap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation;
        }
        #game-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .hud-item {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 25px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .score-value {
            color: #4ade80;
            font-size: 24px;
        }
        .time-value {
            color: #fbbf24;
            font-size: 24px;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #60a5fa, #3b82f6, #2563eb);
            box-shadow: 0 0 30px rgba(96, 165, 250, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: transform 0.1s;
            animation: pulse 1s infinite;
        }
        .orb:active {
            transform: scale(0.9);
        }
        .orb.gold {
            background: radial-gradient(circle at 30% 30%, #fcd34d, #f59e0b, #d97706);
            box-shadow: 0 0 30px rgba(252, 211, 77, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.3);
        }
        .orb.bonus {
            background: radial-gradient(circle at 30% 30%, #f472b6, #ec4899, #db2777);
            box-shadow: 0 0 40px rgba(244, 114, 182, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.3);
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 30px rgba(96, 165, 250, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.3); }
            50% { box-shadow: 0 0 50px rgba(96, 165, 250, 0.8), inset 0 0 30px rgba(255, 255, 255, 0.4); }
        }
        .tap-effect {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            pointer-events: none;
            animation: ripple 0.4s forwards;
        }
        @keyframes ripple {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        .score-popup {
            position: absolute;
            color: #4ade80;
            font-size: 28px;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.8s forwards;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.8);
        }
        .score-popup.gold {
            color: #fbbf24;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.8);
        }
        .score-popup.bonus {
            color: #f472b6;
            text-shadow: 0 0 10px rgba(244, 114, 182, 0.8);
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-60px) scale(1.2); opacity: 0; }
        }
        #start-screen, #end-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 200;
        }
        .screen-title {
            font-size: 48px;
            font-weight: bold;
            color: white;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(96, 165, 250, 0.8);
        }
        .screen-subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            text-align: center;
            padding: 0 20px;
        }
        .final-score {
            font-size: 72px;
            font-weight: bold;
            color: #4ade80;
            margin: 20px 0;
            text-shadow: 0 0 30px rgba(74, 222, 128, 0.8);
        }
        .btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 22px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
            margin-top: 20px;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.6);
        }
        .btn:active {
            transform: translateY(0);
        }
        .instructions {
            display: flex;
            gap: 30px;
            margin-top: 30px;
        }
        .instruction-item {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
        }
        .instruction-icon {
            font-size: 36px;
            margin-bottom: 8px;
        }
        .instruction-text {
            font-size: 14px;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="hud">
            <div class="hud-item">Score: <span class="score-value" id="score">0</span></div>
            <div class="hud-item">Time: <span class="time-value" id="time">30</span></div>
        </div>
        <div id="orbs-container"></div>
    </div>
    
    <div id="start-screen">
        <div class="screen-title">Quick Tap</div>
        <div class="screen-subtitle">Tap the orbs as fast as you can! Catch golden orbs for bonus points!</div>
        <button class="btn" id="start-btn">Start Game</button>
        <div class="instructions">
            <div class="instruction-item">
                <div class="instruction-icon">⚪</div>
                <div class="instruction-text">Blue = 1pt</div>
            </div>
            <div class="instruction-item">
                <div class="instruction-icon">🟡</div>
                <div class="instruction-text">Gold = 3pt</div>
            </div>
            <div class="instruction-item">
                <div class="instruction-icon">🟣</div>
                <div class="instruction-text">Pink = 5pt</div>
            </div>
        </div>
    </div>
    
    <div id="end-screen" class="hidden">
        <div class="screen-title">Time's Up!</div>
        <div class="screen-subtitle">Your Final Score</div>
        <div class="final-score" id="final-score">0</div>
        <button class="btn" id="restart-btn">Play Again</button>
    </div>

    <script>
        const gameContainer = document.getElementById('game-container');
        const orbsContainer = document.getElementById('orbs-container');
        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        const startScreen = document.getElementById('start-screen');
        const endScreen = document.getElementById('end-screen');
        const finalScoreEl = document.getElementById('final-score');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');

        let score = 0;
        let timeLeft = 30;
        let gameRunning = false;
        let gameLoop = null;
        let spawnLoop = null;
        let orbs = [];

        function createOrb() {
            if (!gameRunning) return;
            
            const orb = document.createElement('div');
            orb.className = 'orb';
            
            const rand = Math.random();
            let orbType = 'normal';
            let points = 1;
            
            if (rand > 0.92) {
                orb.classList.add('bonus');
                orbType = 'bonus';
                points = 5;
            } else if (rand > 0.75) {
                orb.classList.add('gold');
                orbType = 'gold';
                points = 3;
            }
            
            const size = orbType === 'bonus' ? 70 : (orbType === 'gold' ? 55 : 50);
            const maxX = window.innerWidth - size - 20;
            const maxY = window.innerHeight - size - 100;
            const x = Math.random() * maxX + 10;
            const y = Math.random() * maxY + 80;
            
            orb.style.width = size + 'px';
            orb.style.height = size + 'px';
            orb.style.left = x + 'px';
            orb.style.top = y + 'px';
            
            orb.dataset.points = points;
            orb.dataset.type = orbType;
            orb.dataset.life = 2000 + Math.random() * 1000;
            orb.dataset.created = Date.now();
            
            orbsContainer.appendChild(orb);
            orbs.push(orb);
            
            const handleTap = (e) => {
                e.preventDefault();
                e.stopPropagation();
                tapOrb(orb, points, orbType, e);
            };
            
            orb.addEventListener('touchstart', handleTap, { passive: false });
            orb.addEventListener('mousedown', handleTap);
        }

        function tapOrb(orb, points, type, e) {
            if (!gameRunning || !orbs.includes(orb)) return;
            
            const rect = orb.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            score += points;
            scoreEl.textContent = score;
            
            const effect = document.createElement('div');
            effect.className = 'tap-effect';
            effect.style.width = rect.width + 'px';
            effect.style.height = rect.height + 'px';
            effect.style.left = rect.left + 'px';
            effect.style.top = rect.top + 'px';
            gameContainer.appendChild(effect);
            setTimeout(() => effect.remove(), 400);
            
            const popup = document.createElement('div');
            popup.className = 'score-popup' + (type !== 'normal' ? ' ' + type : '');
            popup.textContent = '+' + points;
            popup.style.left = centerX + 'px';
            popup.style.top = centerY + 'px';
            gameContainer.appendChild(popup);
            setTimeout(() => popup.remove(), 800);
            
            const idx = orbs.indexOf(orb);
            if (idx > -1) orbs.splice(idx, 1);
            orb.remove();
        }

        function updateOrbs() {
            const now = Date.now();
            orbs = orbs.filter(orb => {
                const age = now - parseInt(orb.dataset.created);
                const life = parseInt(orb.dataset.life);
                const progress = age / life;
                
                if (progress >= 1) {
                    orb.remove();
                    return false;
                }
                
                const scale = 1 - progress * 0.5;
                orb.style.transform = `scale(${scale})`;
                orb.style.opacity = 1 - progress * 0.7;
                
                return true;
            });
        }

        function updateTimer() {
            timeLeft--;
            timeEl.textContent = timeLeft;
            
            if (timeLeft <= 0) {
                endGame();
            }
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            scoreEl.textContent = '0';
            timeEl.textContent = '30';
            
            orbs.forEach(orb => orb.remove());
            orbs = [];
            
            startScreen.classList.add('hidden');
            endScreen.classList.add('hidden');
            
            gameRunning = true;
            
            gameLoop = setInterval(updateTimer, 1000);
            spawnLoop = setInterval(() => {
                createOrb();
                if (Math.random() > 0.7) createOrb();
            }, 800);
            
            requestAnimationFrame(gameUpdate);
        }

        function gameUpdate() {
            if (!gameRunning) return;
            updateOrbs();
            requestAnimationFrame(gameUpdate);
        }

        function endGame() {
            gameRunning = false;
            clearInterval(gameLoop);
            clearInterval(spawnLoop);
            
            orbs.forEach(orb => orb.remove());
            orbs = [];
            
            finalScoreEl.textContent = score;
            endScreen.classList.remove('hidden');
        }

        startBtn.addEventListener('click', startGame);
        startBtn.addEventListener('touchend', (e) => { e.preventDefault(); startGame(); });
        
        restartBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('touchend', (e) => { e.preventDefault(); startGame(); });
    </script>
</body>
</html>
