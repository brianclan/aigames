<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubai Gold Rush</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:linear-gradient(180deg,#0a0a2e 0%,#1a1a4e 40%,#c8a76a 70%,#d4b483 100%);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:'Segoe UI',sans-serif;
  overflow:hidden;
}
h1{
  color:#FFD700;
  text-shadow:0 0 20px rgba(255,215,0,0.8),2px 2px 4px rgba(0,0,0,0.8);
  margin-bottom:8px;
  font-size:2.2rem;
  letter-spacing:2px;
}
#gameCanvas{
  border:3px solid #FFD700;
  border-radius:8px;
  box-shadow:0 0 40px rgba(255,215,0,0.4),0 10px 30px rgba(0,0,0,0.6);
}
#score{
  color:#FFD700;
  font-size:1.4rem;
  margin:8px 0;
  text-shadow:2px 2px 4px rgba(0,0,0,0.8);
  letter-spacing:1px;
}
#instructions{
  color:#FFD700;
  font-size:0.95rem;
  opacity:0.85;
  margin-bottom:4px;
}
#gameOver{
  display:none;
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,20,0.95);
  color:#fff;
  padding:40px 50px;
  border-radius:20px;
  text-align:center;
  border:3px solid #FFD700;
  box-shadow:0 0 40px rgba(255,215,0,0.5);
}
#gameOver h2{font-size:2.2rem;color:#FFD700;margin-bottom:15px;text-shadow:0 0 15px rgba(255,215,0,0.8)}
#finalScore{font-size:1.3rem;color:#ccc;margin-bottom:10px}
#hiScore{font-size:1.1rem;color:#FFD700;opacity:0.8;margin-bottom:20px}
#restartBtn{
  background:linear-gradient(135deg,#FFD700,#FFA500);
  border:none;
  padding:14px 40px;
  font-size:1.2rem;
  border-radius:30px;
  cursor:pointer;
  color:#1a1a00;
  font-weight:bold;
  transition:transform 0.2s,box-shadow 0.2s;
  box-shadow:0 4px 15px rgba(255,165,0,0.5);
}
#restartBtn:hover{transform:scale(1.08);box-shadow:0 6px 25px rgba(255,165,0,0.7)}
#combo{
  display:none;
  position:absolute;
  top:20%;left:50%;
  transform:translateX(-50%);
  font-size:1.8rem;
  color:#FFD700;
  font-weight:bold;
  text-shadow:0 0 15px rgba(255,215,0,0.9);
  pointer-events:none;
  animation:fadeUp 0.8s forwards;
}
@keyframes fadeUp{0%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-50px)}}
</style>
</head>
<body>
<h1>🕌 Dubai Gold Rush 🐪</h1>
<p id="instructions">← → or A/D to move  |  Avoid obstacles!</p>
<canvas id="gameCanvas" width="420" height="620"></canvas>
<p id="score">⭐ Score: 0</p>
<div id="gameOver">
  <h2>يا سلام! 🌙</h2>
  <p id="finalScore">Your Score: 0</p>
  <p id="hiScore">Best: 0</p>
  <button id="restartBtn" onclick="restartGame()">🐪 Play Again</button>
</div>
<div id="combo"></div>

<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const scoreEl=document.getElementById('score'),gameOverEl=document.getElementById('gameOver');
const finalScoreEl=document.getElementById('finalScore'),hiScoreEl=document.getElementById('hiScore');
const comboEl=document.getElementById('combo');

let score=0,hiScore=0,gameRunning=true,speed=3,frameCount=0,bgOffset=0;
let particles=[];
let stars=[];

// Generate stars
for(let i=0;i<80;i++)stars.push({x:Math.random()*420,y:Math.random()*250,r:Math.random()*1.5+0.3,twinkle:Math.random()*Math.PI*2});

const camel={x:185,y:490,w:55,h:75,sp:7};
let golds=[],diamonds=[],oils=[],rocks=[],palms=[];

const keys={};
document.addEventListener('keydown',e=>{keys[e.key]=true;e.preventDefault&&['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)&&e.preventDefault()});
document.addEventListener('keyup',e=>keys[e.key]=false);

// Touch support
let touchStartX=null;
canvas.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;e.preventDefault()},{passive:false});
canvas.addEventListener('touchmove',e=>{
  if(touchStartX===null)return;
  const dx=e.touches[0].clientX-touchStartX;
  if(dx<-10){keys['ArrowLeft']=true;keys['ArrowRight']=false}
  else if(dx>10){keys['ArrowRight']=true;keys['ArrowLeft']=false}
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',e=>{keys['ArrowLeft']=false;keys['ArrowRight']=false;touchStartX=null},{passive:false});

// Particle system
function spawnParticle(x,y,color,count=6){
  for(let i=0;i<count;i++)particles.push({
    x,y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5-2,
    life:30,maxLife:30,color,r:Math.random()*5+2
  });
}

function showCombo(text){
  comboEl.textContent=text;
  comboEl.style.display='block';
  comboEl.style.animation='none';
  void comboEl.offsetWidth;
  comboEl.style.animation='fadeUp 0.8s forwards';
  setTimeout(()=>comboEl.style.display='none',800);
}

function drawBackground(){
  // Night sky gradient
  const skyGrad=ctx.createLinearGradient(0,0,0,350);
  skyGrad.addColorStop(0,'#040420');
  skyGrad.addColorStop(0.6,'#0d1b4b');
  skyGrad.addColorStop(1,'#1a3a6b');
  ctx.fillStyle=skyGrad;
  ctx.fillRect(0,0,420,350);

  // Stars twinkle
  frameCount++;
  stars.forEach(s=>{
    s.twinkle+=0.05;
    const alpha=0.4+Math.sin(s.twinkle)*0.4;
    ctx.fillStyle=`rgba(255,255,220,${alpha})`;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  });

  // Moon
  ctx.fillStyle='rgba(255,245,200,0.9)';
  ctx.beginPath();ctx.arc(370,55,28,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(10,10,50,0.85)';
  ctx.beginPath();ctx.arc(380,50,24,0,Math.PI*2);ctx.fill();

  // Burj Khalifa silhouette
  drawBurjKhalifa(60,100);
  // Other buildings
  drawBuilding(200,200,30,150,'#0d1540');
  drawBuilding(240,220,25,130,'#0a1035');
  drawBuilding(275,180,35,170,'#0d1540');
  drawBuilding(320,210,28,140,'#0a1035');
  drawBuilding(360,195,22,155,'#0d1540');
  drawBuilding(130,230,20,120,'#0a1035');
  drawBuilding(155,215,18,135,'#0d1540');

  // Sand ground gradient
  const sandGrad=ctx.createLinearGradient(0,350,0,620);
  sandGrad.addColorStop(0,'#c8a76a');
  sandGrad.addColorStop(0.3,'#d4b483');
  sandGrad.addColorStop(1,'#e8c990');
  ctx.fillStyle=sandGrad;
  ctx.fillRect(0,350,420,270);

  // Road
  const roadGrad=ctx.createLinearGradient(0,370,0,620);
  roadGrad.addColorStop(0,'#2a2a2a');
  roadGrad.addColorStop(1,'#3a3a3a');
  ctx.fillStyle=roadGrad;
  ctx.fillRect(80,370,260,250);

  // Road lines
  bgOffset=(bgOffset+speed)%60;
  ctx.strokeStyle='rgba(255,215,0,0.5)';
  ctx.lineWidth=3;
  ctx.setLineDash([30,30]);
  ctx.lineDashOffset=-bgOffset;
  ctx.beginPath();ctx.moveTo(210,370);ctx.lineTo(210,620);ctx.stroke();
  ctx.setLineDash([]);

  // Road edge lines
  ctx.strokeStyle='rgba(255,255,255,0.6)';
  ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(85,370);ctx.lineTo(85,620);ctx.stroke();
  ctx.beginPath();ctx.moveTo(335,370);ctx.lineTo(335,620);ctx.stroke();

  // Sand dunes decorative
  ctx.fillStyle='rgba(200,170,100,0.3)';
  ctx.beginPath();
  ctx.ellipse(40,430,50,20,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();
  ctx.ellipse(390,500,45,18,0,0,Math.PI*2);ctx.fill();
}

function drawBurjKhalifa(x,baseY){
  // Main shaft
  ctx.fillStyle='#0a1540';
  ctx.beginPath();
  ctx.moveTo(x+20,baseY);
  ctx.lineTo(x+25,baseY+180);
  ctx.lineTo(x+15,baseY+180);
  ctx.closePath();
  ctx.fill();
  // Sections
  for(let i=0;i<6;i++){
    const w=18-i*2,h=25;
    const bx=x+20-w/2,by=baseY+i*22;
    ctx.fillStyle=i%2===0?'#0d1845':'#0a1540';
    ctx.fillRect(bx,by,w,h);
    // Windows
    if(w>6){
      ctx.fillStyle='rgba(255,215,0,0.2)';
      for(let j=0;j<3;j++)ctx.fillRect(bx+2+j*(w/4),by+4,w/5,h-8);
    }
  }
  // Spire
  ctx.fillStyle='#FFD700';
  ctx.beginPath();
  ctx.moveTo(x+20,baseY-20);
  ctx.lineTo(x+22,baseY);
  ctx.lineTo(x+18,baseY);
  ctx.closePath();
  ctx.fill();
}

function drawBuilding(x,baseY,w,h,color){
  ctx.fillStyle=color;
  ctx.fillRect(x,baseY,w,h);
  // Windows glow
  ctx.fillStyle='rgba(255,215,0,0.15)';
  for(let row=0;row<Math.floor(h/15);row++)
    for(let col=0;col<Math.floor(w/10);col++)
      ctx.fillRect(x+2+col*10,baseY+3+row*15,6,8);
}

function drawCamel(){
  const x=camel.x,y=camel.y;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath();ctx.ellipse(x+28,y+75,28,8,0,0,Math.PI*2);ctx.fill();

  // Legs (animated)
  const legSwing=Math.sin(frameCount*0.25)*8;
  ctx.strokeStyle='#8B6914';ctx.lineWidth=5;ctx.lineCap='round';
  // Back legs
  ctx.beginPath();ctx.moveTo(x+10,y+52);ctx.lineTo(x+5,y+72+legSwing);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+15,y+52);ctx.lineTo(x+18,y+72-legSwing);ctx.stroke();
  // Front legs
  ctx.beginPath();ctx.moveTo(x+38,y+52);ctx.lineTo(x+32,y+72-legSwing);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+43,y+52);ctx.lineTo(x+46,y+72+legSwing);ctx.stroke();

  // Body
  ctx.fillStyle='#C8A050';
  ctx.beginPath();
  ctx.ellipse(x+27,y+38,28,22,0,0,Math.PI*2);
  ctx.fill();

  // Hump
  ctx.fillStyle='#D4AA58';
  ctx.beginPath();
  ctx.ellipse(x+20,y+18,13,15,Math.PI*0.1,0,Math.PI*2);
  ctx.fill();

  // Neck
  ctx.fillStyle='#C8A050';
  ctx.beginPath();
  ctx.moveTo(x+38,y+22);
  ctx.quadraticCurveTo(x+52,y+10,x+50,y+35);
  ctx.lineTo(x+44,y+40);
  ctx.quadraticCurveTo(x+48,y+22,x+38,y+28);
  ctx.closePath();
  ctx.fill();

  // Head
  ctx.fillStyle='#C8A050';
  ctx.beginPath();
  ctx.ellipse(x+52,y+22,10,8,Math.PI*0.2,0,Math.PI*2);
  ctx.fill();

  // Eye
  ctx.fillStyle='#1a0a00';
  ctx.beginPath();ctx.arc(x+56,y+20,2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(x+57,y+19.5,0.8,0,Math.PI*2);ctx.fill();

  // Nostril
  ctx.fillStyle='#8B6030';
  ctx.beginPath();ctx.arc(x+60,y+24,1.5,0,Math.PI*2);ctx.fill();

  // Ear
  ctx.fillStyle='#B89040';
  ctx.beginPath();
  ctx.moveTo(x+52,y+14);
  ctx.lineTo(x+48,y+8);
  ctx.lineTo(x+55,y+12);
  ctx.closePath();
  ctx.fill();

  // Rider (person)
  // Body
  ctx.fillStyle='#8B0000';
  ctx.beginPath();ctx.ellipse(x+23,y+5,8,12,0,0,Math.PI*2);ctx.fill();
  // Head
  ctx.fillStyle='#FDBCB4';
  ctx.beginPath();ctx.arc(x+23,y-9,7,0,Math.PI*2);ctx.fill();
  // Keffiyeh
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(x+23,y-10,7.5,Math.PI,0);ctx.fill();
  ctx.fillStyle='#cc0000';
  ctx.beginPath();ctx.arc(x+23,y-10,7.5,Math.PI*1.2,Math.PI*1.8);ctx.fill();
  // Agal (headband)
  ctx.strokeStyle='#222';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(x+23,y-10,8,Math.PI*1.05,Math.PI*1.95);ctx.stroke();
}

function drawGold(g){
  const pulse=Math.sin(frameCount*0.1+g.x)*3;
  ctx.shadowBlur=15;ctx.shadowColor='#FFD700';
  ctx.fillStyle='#FFD700';
  ctx.beginPath();
  for(let i=0;i<8;i++){
    const angle=i*Math.PI/4,r=i%2===0?14+pulse:7+pulse/2;
    i===0?ctx.moveTo(g.x+r*Math.cos(angle),g.y+r*Math.sin(angle)):ctx.lineTo(g.x+r*Math.cos(angle),g.y+r*Math.sin(angle));
  }
  ctx.closePath();ctx.fill();
  ctx.fillStyle='#FFF8DC';
  ctx.beginPath();ctx.arc(g.x,g.y,4,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
}

function drawDiamond(d){
  ctx.shadowBlur=20;ctx.shadowColor='#00FFFF';
  ctx.fillStyle=`hsl(${frameCount*2+d.x},80%,75%)`;
  ctx.beginPath();
  ctx.moveTo(d.x,d.y-15);
  ctx.lineTo(d.x+12,d.y-3);
  ctx.lineTo(d.x,d.y+15);
  ctx.lineTo(d.x-12,d.y-3);
  ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.beginPath();
  ctx.moveTo(d.x,d.y-15);
  ctx.lineTo(d.x+12,d.y-3);
  ctx.lineTo(d.x,d.y-5);
  ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;
}

function drawOil(o){
  ctx.fillStyle='#333';
  ctx.beginPath();ctx.ellipse(o.x,o.y+2,10,14,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#555';
  ctx.fillRect(o.x-10,o.y-12,20,4);
  ctx.fillStyle='#FFD700';
  ctx.beginPath();ctx.arc(o.x,o.y-10,3,0,Math.PI*2);ctx.fill();
  // Oil shine
  ctx.fillStyle='rgba(100,200,255,0.3)';
  ctx.beginPath();ctx.ellipse(o.x-3,o.y-5,3,6,0.3,0,Math.PI*2);ctx.fill();
}

function drawRock(r){
  ctx.fillStyle='#7a5c3a';
  ctx.beginPath();
  ctx.moveTo(r.x-r.s*0.5,r.y+r.s*0.6);
  ctx.quadraticCurveTo(r.x-r.s*0.9,r.y,r.x-r.s*0.5,r.y-r.s*0.5);
  ctx.quadraticCurveTo(r.x,r.y-r.s*0.9,r.x+r.s*0.5,r.y-r.s*0.5);
  ctx.quadraticCurveTo(r.x+r.s*0.9,r.y,r.x+r.s*0.5,r.y+r.s*0.6);
  ctx.closePath();ctx.fill();
  ctx.fillStyle='#9a7c5a';
  ctx.beginPath();
  ctx.moveTo(r.x-r.s*0.2,r.y-r.s*0.5);
  ctx.quadraticCurveTo(r.x+r.s*0.2,r.y-r.s*0.8,r.x+r.s*0.4,r.y-r.s*0.4);
  ctx.quadraticCurveTo(r.x+r.s*0.1,r.y-r.s*0.2,r.x-r.s*0.2,r.y-r.s*0.5);
  ctx.closePath();ctx.fill();
}

function drawPalm(p){
  // Trunk
  ctx.strokeStyle='#6B4226';ctx.lineWidth=7;ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(p.x,p.y+40);
  ctx.quadraticCurveTo(p.x+8,p.y+10,p.x,p.y-20);
  ctx.stroke();
  // Leaves
  const leafColors=['#228B22','#2D8B22','#186020'];
  for(let i=0;i<6;i++){
    const a=(i/6)*Math.PI*2+frameCount*0.02,len=28+Math.sin(frameCount*0.05+i)*4;
    ctx.strokeStyle=leafColors[i%3];ctx.lineWidth=4;
    ctx.beginPath();
    ctx.moveTo(p.x,p.y-20);
    ctx.quadraticCurveTo(p.x+Math.cos(a)*len*0.6,p.y-20+Math.sin(a)*len*0.6,p.x+Math.cos(a)*len,p.y-20+Math.sin(a)*len);
    ctx.stroke();
    // Dates
    ctx.fillStyle='#FF8C00';
    ctx.beginPath();ctx.arc(p.x+Math.cos(a)*len*0.8,p.y-20+Math.sin(a)*len*0.8,3,0,Math.PI*2);ctx.fill();
  }
}

function spawnObjects(){
  const r=Math.random();
  if(r<0.025)golds.push({x:Math.random()*240+90,y:-20});
  else if(r<0.04)diamonds.push({x:Math.random()*240+90,y:-20});
  else if(r<0.055)oils.push({x:Math.random()*240+90,y:-20});
  if(Math.random()<0.012)rocks.push({x:Math.random()*220+100,y:-30,s:22+Math.random()*12});
  if(Math.random()<0.008&&score>50)palms.push({x:Math.random()<0.5?30+Math.random()*40:350+Math.random()*30,y:-60});
}

function updateParticles(){
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;
    const alpha=p.life/p.maxLife;
    ctx.fillStyle=p.color.replace(')',`,${alpha})`).replace('rgb','rgba');
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*alpha,0,Math.PI*2);ctx.fill();
    return p.life>0;
  });
}

function collide(obj,w,h){
  return Math.abs(obj.x-(camel.x+27))<(w+27) && Math.abs(obj.y-(camel.y+37))<(h+37);
}

function gameOver(){
  gameRunning=false;
  if(score>hiScore)hiScore=score;
  finalScoreEl.textContent=`Your Score: ${score}`;
  hiScoreEl.textContent=`Best: ${hiScore}`;
  gameOverEl.style.display='block';
}

function restartGame(){
  score=0;speed=3;frameCount=0;bgOffset=0;
  golds=[];diamonds=[];oils=[];rocks=[];palms=[];particles=[];
  camel.x=185;
  gameRunning=true;
  gameOverEl.style.display='none';
  scoreEl.textContent='⭐ Score: 0';
  loop();
}

function update(){
  if(!gameRunning)return;
  frameCount++;
  if((keys['ArrowLeft']||keys['a']||keys['A'])&&camel.x>85)camel.x-=camel.sp;
  if((keys['ArrowRight']||keys['d']||keys['D'])&&camel.x<320)camel.x+=camel.sp;
  if(frameCount%400===0)speed+=0.25;
  spawnObjects();

  // Golds
  golds=golds.filter((g,i)=>{
    g.y+=speed;
    if(collide(g,14,14)){
      score+=10;spawnParticle(g.x,g.y,'rgb(255,215,0)',8);showCombo('+10 🥇');return false;
    }
    return g.y<660;
  });

  // Diamonds
  diamonds=diamonds.filter((d,i)=>{
    d.y+=speed;
    if(collide(d,12,15)){
      score+=25;spawnParticle(d.x,d.y,'rgb(0,255,255)',10);showCombo('+25 💎');return false;
    }
    return d.y<660;
  });

  // Oils
  oils=oils.filter((o,i)=>{
    o.y+=speed;
    if(collide(o,10,14)){
      score+=15;spawnParticle(o.x,o.y,'rgb(100,100,200)',6);showCombo('+15 🛢️');return false;
    }
    return o.y<660;
  });

  // Rocks
  rocks=rocks.filter((r,i)=>{
    r.y+=speed;
    if(collide(r,r.s*0.7,r.s*0.6)){gameOver();return false;}
    return r.y<660;
  });

  // Palms
  palms=palms.filter((p,i)=>{
    p.y+=speed;
    return p.y<700;
  });

  score++;
  scoreEl.textContent=`⭐ Score: ${score}`;
}

function draw(){
  ctx.clearRect(0,0,420,620);
  drawBackground();
  palms.forEach(drawPalm);
  golds.forEach(drawGold);
  diamonds.forEach(drawDiamond);
  oils.forEach(drawOil);
  rocks.forEach(drawRock);
  drawCamel();
  updateParticles();
}

function loop(){
  update();draw();
  if(gameRunning)requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
